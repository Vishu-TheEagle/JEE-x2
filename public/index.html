<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JEE X2 Study Planner</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#0f0f13;--surface:#1a1a22;--card:#22222e;--border:#2e2e3e;
  --accent:#6c63ff;--accent2:#ff6584;--green:#22c55e;--yellow:#f59e0b;--red:#ef4444;
  --text:#e2e2f0;--muted:#8888aa;--radius:14px;
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

/* ── NAV ── */
nav{background:var(--surface);border-bottom:1px solid var(--border);padding:0 20px;display:flex;align-items:center;justify-content:space-between;height:60px;position:sticky;top:0;z-index:100;}
.nav-brand{font-size:18px;font-weight:700;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.nav-tabs{display:flex;gap:4px;}
.nav-tab{padding:8px 16px;border-radius:8px;border:none;background:transparent;color:var(--muted);cursor:pointer;font-size:14px;font-weight:500;transition:.2s;}
.nav-tab.active,.nav-tab:hover{background:var(--card);color:var(--text);}
.notif-btn{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:8px 12px;cursor:pointer;color:var(--text);font-size:16px;}

/* ── PAGES ── */
.page{display:none;padding:20px;max-width:1000px;margin:0 auto;}
.page.active{display:block;}

/* ── DASHBOARD ── */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:24px;}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;text-align:center;}
.stat-num{font-size:36px;font-weight:700;}
.stat-label{font-size:13px;color:var(--muted);margin-top:4px;}
.progress-ring-wrap{display:flex;justify-content:center;margin:20px 0;}
.progress-ring{transform:rotate(-90deg);}
.section-bars{display:grid;gap:10px;}
.section-bar{background:var(--card);border-radius:10px;padding:12px 16px;}
.bar-label{display:flex;justify-content:space-between;font-size:13px;margin-bottom:6px;}
.bar-track{background:var(--border);border-radius:4px;height:6px;}
.bar-fill{height:6px;border-radius:4px;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:.4s;}

/* ── LECTURES ── */
.filter-row{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center;}
.filter-btn{padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:var(--card);color:var(--muted);cursor:pointer;font-size:13px;}
.filter-btn.active{background:var(--accent);border-color:var(--accent);color:white;}
.search-inp{flex:1;min-width:200px;padding:8px 14px;border-radius:20px;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:14px;outline:none;}
.lecture-list{display:grid;gap:8px;}
.lecture-item{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 16px;display:flex;align-items:center;gap:12px;transition:.2s;}
.lecture-item.watched{border-color:var(--green);opacity:.7;}
.watch-check{width:22px;height:22px;border-radius:50%;border:2px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:.2s;}
.watch-check.done{background:var(--green);border-color:var(--green);}
.lecture-info{flex:1;min-width:0;}
.lecture-title{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.lecture-meta{font-size:12px;color:var(--muted);margin-top:2px;}
.play-btn{padding:6px 12px;border-radius:8px;border:none;background:var(--accent);color:white;cursor:pointer;font-size:12px;flex-shrink:0;}

/* ── TODO ── */
.add-form{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:20px;display:grid;gap:10px;}
.add-form input,.add-form select{padding:10px 14px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:14px;outline:none;}
.add-row{display:flex;gap:8px;}
.add-row input{flex:1;}
.btn{padding:10px 18px;border-radius:8px;border:none;cursor:pointer;font-size:14px;font-weight:600;}
.btn-primary{background:var(--accent);color:white;}
.btn-danger{background:var(--red);color:white;}
.btn-sm{padding:5px 10px;font-size:12px;border-radius:6px;}
.todo-tabs{display:flex;gap:4px;margin-bottom:16px;}
.todo-tab{padding:6px 16px;border-radius:20px;border:none;background:var(--card);color:var(--muted);cursor:pointer;font-size:13px;}
.todo-tab.active{background:var(--accent);color:white;}
.todo-list{display:grid;gap:8px;}
.todo-item{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 16px;display:flex;align-items:center;gap:12px;}
.todo-item.done-item .todo-text{text-decoration:line-through;color:var(--muted);}
.todo-cb{width:20px;height:20px;border-radius:6px;border:2px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.todo-cb.checked{background:var(--green);border-color:var(--green);}
.todo-info{flex:1;}
.todo-text{font-size:14px;}
.todo-due{font-size:12px;color:var(--muted);margin-top:3px;}
.priority-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.p-high{background:var(--red);}
.p-medium{background:var(--yellow);}
.p-low{background:var(--green);}

/* ── REMINDERS ── */
.reminder-list{display:grid;gap:10px;}
.reminder-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;display:flex;align-items:center;gap:14px;}
.reminder-card.inactive{opacity:.5;}
.reminder-icon{font-size:28px;}
.reminder-info{flex:1;}
.reminder-title{font-size:15px;font-weight:600;}
.reminder-time{font-size:13px;color:var(--accent);margin-top:4px;}
.reminder-days{font-size:12px;color:var(--muted);margin-top:2px;}
.toggle-sw{position:relative;width:44px;height:24px;}
.toggle-sw input{opacity:0;width:0;height:0;}
.toggle-track{position:absolute;inset:0;background:var(--border);border-radius:12px;cursor:pointer;transition:.2s;}
.toggle-track:before{content:'';position:absolute;width:18px;height:18px;border-radius:50%;background:white;top:3px;left:3px;transition:.2s;}
input:checked+.toggle-track{background:var(--accent);}
input:checked+.toggle-track:before{transform:translateX(20px);}

/* ── TOAST ── */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--green);color:white;padding:12px 24px;border-radius:12px;font-weight:600;font-size:14px;z-index:9999;display:none;box-shadow:0 4px 20px rgba(0,0,0,.4);}

/* ── MOBILE ── */
@media(max-width:600px){
  nav{padding:0 12px;}
  .nav-tab span{display:none;}
  .page{padding:12px;}
  .stats-grid{grid-template-columns:repeat(2,1fr);}
  .add-row{flex-direction:column;}
}
</style>
</head>
<body>

<nav>
  <div class="nav-brand">📚 JEE X2 Planner</div>
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="showPage('dashboard')">📊 <span>Dashboard</span></button>
    <button class="nav-tab" onclick="showPage('lectures')">🎬 <span>Lectures</span></button>
    <button class="nav-tab" onclick="showPage('todo')">✅ <span>Todo</span></button>
    <button class="nav-tab" onclick="showPage('reminders')">🔔 <span>Reminders</span></button>
  </div>
  <a href="/jee-content.html" style="padding:8px 14px;border-radius:8px;background:#6c63ff;color:white;text-decoration:none;font-size:14px;font-weight:600;">📖 JEE App</a>
  <button class="notif-btn" onclick="requestNotifPermission()" title="Enable notifications">🔔</button>
</nav>

<div id="toast"></div>

<!-- ── DASHBOARD ── -->
<div class="page active" id="page-dashboard">
  <h2 style="margin-bottom:20px;font-size:20px;">Your Progress</h2>
  <div class="stats-grid">
    <div class="stat-card"><div class="stat-num" id="s-watched" style="color:var(--green)">0</div><div class="stat-label">Watched</div></div>
    <div class="stat-card"><div class="stat-num" id="s-left" style="color:var(--accent2)">733</div><div class="stat-label">Remaining</div></div>
    <div class="stat-card"><div class="stat-num" id="s-pct" style="color:var(--accent)">0%</div><div class="stat-label">Complete</div></div>
    <div class="stat-card"><div class="stat-num" id="s-todo" style="color:var(--yellow)">0</div><div class="stat-label">Pending Tasks</div></div>
  </div>
  <div class="progress-ring-wrap">
    <svg width="160" height="160" class="progress-ring">
      <circle cx="80" cy="80" r="65" fill="none" stroke="var(--border)" stroke-width="12"/>
      <circle id="prog-arc" cx="80" cy="80" r="65" fill="none" stroke="url(#g1)" stroke-width="12"
        stroke-dasharray="408.4" stroke-dashoffset="408.4" stroke-linecap="round"/>
      <defs><linearGradient id="g1" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0%" stop-color="#6c63ff"/><stop offset="100%" stop-color="#ff6584"/>
      </linearGradient></defs>
    </svg>
  </div>
  <div class="section-bars" id="section-bars"></div>
</div>

<!-- ── LECTURES ── -->
<div class="page" id="page-lectures">
  <div class="filter-row">
    <input class="search-inp" id="lec-search" placeholder="🔍 Search lectures..." oninput="renderLectures()">
    <button class="filter-btn active" data-sec="All" onclick="setSecFilter(this)">All</button>
    <button class="filter-btn" data-sec="Math" onclick="setSecFilter(this)">📐 Math</button>
    <button class="filter-btn" data-sec="Physics 11Th" onclick="setSecFilter(this)">⚡ Phy 11</button>
    <button class="filter-btn" data-sec="Physics 12Th" onclick="setSecFilter(this)">⚡ Phy 12</button>
    <button class="filter-btn" data-sec="Physical Chemistry" onclick="setSecFilter(this)">🧪 P.Chem</button>
    <button class="filter-btn" data-sec="Organic Chemistry" onclick="setSecFilter(this)">🧬 O.Chem</button>
    <button class="filter-btn" data-sec="Inorganic Chemistry" onclick="setSecFilter(this)">⚗️ I.Chem</button>
  </div>
  <div class="lecture-list" id="lecture-list"></div>
</div>

<!-- ── TODO ── -->
<div class="page" id="page-todo">
  <div class="add-form">
    <input id="todo-text" placeholder="Add a task or lecture plan..." style="font-size:15px;">
    <div class="add-row">
      <select id="todo-priority">
        <option value="high">🔴 High Priority</option>
        <option value="medium" selected>🟡 Medium Priority</option>
        <option value="low">🟢 Low Priority</option>
      </select>
      <input type="date" id="todo-due">
      <button class="btn btn-primary" onclick="addTodo()">+ Add</button>
    </div>
  </div>
  <div class="todo-tabs">
    <button class="todo-tab active" onclick="setTodoFilter('pending',this)">Pending</button>
    <button class="todo-tab" onclick="setTodoFilter('done',this)">Completed</button>
    <button class="todo-tab" onclick="setTodoFilter('all',this)">All</button>
  </div>
  <div class="todo-list" id="todo-list"></div>
</div>

<!-- ── REMINDERS ── -->
<div class="page" id="page-reminders">
  <div class="add-form">
    <input id="rem-title" placeholder="Reminder title (e.g. Watch Physics lecture)">
    <div class="add-row">
      <input type="time" id="rem-time" value="18:00">
      <select id="rem-days" multiple style="min-height:36px;">
        <option value="Mon" selected>Mon</option>
        <option value="Tue" selected>Tue</option>
        <option value="Wed" selected>Wed</option>
        <option value="Thu" selected>Thu</option>
        <option value="Fri" selected>Fri</option>
        <option value="Sat">Sat</option>
        <option value="Sun">Sun</option>
      </select>
      <button class="btn btn-primary" onclick="addReminder()">+ Add</button>
    </div>
    <div style="font-size:12px;color:var(--muted)">Hold Ctrl/Cmd to select multiple days. Keep app open for reminders to fire.</div>
  </div>
  <div class="reminder-list" id="reminder-list"></div>
</div>

const API = ''; // same origin
let todos = [], reminders = [], progress = {};
let secFilter = 'All', todoFilter = 'pending';

// ── INIT ──────────────────────────────────────────────────────────────────────
async function init() {
  await loadData();
  renderDashboard();
  renderLectures();
  renderTodos();
  renderReminders();
  startReminderChecker();
  requestNotifPermission();
}

// ── LOAD/SAVE with server + localStorage fallback ─────────────────────────────
async function loadData() {
  try {
    const [t, r, p] = await Promise.all([
      fetch(API+'/api/todos').then(r=>r.json()),
      fetch(API+'/api/reminders').then(r=>r.json()),
      fetch(API+'/api/progress').then(r=>r.json())
    ]);
    todos = t; reminders = r; progress = p;
    // backup to localStorage
    localStorage.setItem('jee_todos', JSON.stringify(todos));
    localStorage.setItem('jee_reminders', JSON.stringify(reminders));
    localStorage.setItem('jee_progress', JSON.stringify(progress));
  } catch(e) {
    // offline - load from localStorage
    todos = JSON.parse(localStorage.getItem('jee_todos')||'[]');
    reminders = JSON.parse(localStorage.getItem('jee_reminders')||'[]');
    progress = JSON.parse(localStorage.getItem('jee_progress')||'{}');
  }
}

async function apiCall(method, url, body) {
  try {
    const r = await fetch(API+url, {
      method, headers:{'Content-Type':'application/json'},
      body: body ? JSON.stringify(body) : undefined
    });
    return r.ok;
  } catch(e) { return false; }
}

// ── PAGES ────────────────────────────────────────────────────────────────────
function showPage(id) {
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
  document.querySelectorAll('.nav-tab')[['dashboard','lectures','todo','reminders'].indexOf(id)].classList.add('active');
  if(id==='dashboard') renderDashboard();
}

// ── DASHBOARD ────────────────────────────────────────────────────────────────
function renderDashboard() {
  const watched = Object.values(progress).filter(v=>v.watched).length;
  const total = LECTURES.length;
  const pct = Math.round(watched/total*100);
  document.getElementById('s-watched').textContent = watched;
  document.getElementById('s-left').textContent = total-watched;
  document.getElementById('s-pct').textContent = pct+'%';
  document.getElementById('s-todo').textContent = todos.filter(t=>!t.done).length;
  const arc = document.getElementById('prog-arc');
  const circ = 408.4;
  arc.style.strokeDashoffset = circ - (circ * pct/100);
  const secs = [...new Set(LECTURES.map(l=>l.section))];
  const barsEl = document.getElementById('section-bars');
  barsEl.innerHTML = secs.map(s => {
    const secTotal = LECTURES.filter(l=>l.section===s).length;
    const secDone = LECTURES.filter(l=>l.section===s && progress[l.id]?.watched).length;
    const p = Math.round(secDone/secTotal*100);
    return `<div class="section-bar">
      <div class="bar-label"><span>${s}</span><span>${secDone}/${secTotal}</span></div>
      <div class="bar-track"><div class="bar-fill" style="width:${p}%"></div></div>
    </div>`;
  }).join('');
}

// ── LECTURES ─────────────────────────────────────────────────────────────────
function setSecFilter(btn) {
  secFilter = btn.dataset.sec;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderLectures();
}

function renderLectures() {
  const q = document.getElementById('lec-search').value.toLowerCase();
  const list = LECTURES.filter(l =>
    (secFilter==='All' || l.section===secFilter) &&
    (!q || l.title.toLowerCase().includes(q))
  );
  document.getElementById('lecture-list').innerHTML = list.map(l => {
    const done = progress[l.id]?.watched;
    return `<div class="lecture-item ${done?'watched':''}">
      <div class="watch-check ${done?'done':''}" onclick="toggleWatch(${l.id})">
        ${done?'✓':''}
      </div>
      <div class="lecture-info">
        <div class="lecture-title">${l.title}</div>
        <div class="lecture-meta">📁 ${l.section} ${done?'· ✅ Watched':''}</div>
      </div>
      <button class="play-btn" onclick="window.open('${l.url}','_blank')">▶ Play</button>
    </div>`;
  }).join('') || '<div style="text-align:center;color:var(--muted);padding:40px">No lectures found</div>';
}

async function toggleWatch(id) {
  const isWatched = !progress[id]?.watched;
  progress[id] = { watched: isWatched, date: new Date().toISOString() };
  localStorage.setItem('jee_progress', JSON.stringify(progress));
  await apiCall('POST', '/api/progress', { id, watched: isWatched });
  renderLectures();
  renderDashboard();
  showToast(isWatched ? '✅ Marked as watched!' : '↩️ Marked as unwatched');
}

// ── TODOS ────────────────────────────────────────────────────────────────────
function setTodoFilter(f, btn) {
  todoFilter = f;
  document.querySelectorAll('.todo-tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  renderTodos();
}

async function addTodo() {
  const text = document.getElementById('todo-text').value.trim();
  if(!text) return;
  const todo = { id: Date.now(), text, done: false,
    priority: document.getElementById('todo-priority').value,
    due: document.getElementById('todo-due').value, created: new Date().toISOString() };
  todos.unshift(todo);
  localStorage.setItem('jee_todos', JSON.stringify(todos));
  apiCall('POST','/api/todos', todo);
  document.getElementById('todo-text').value='';
  document.getElementById('todo-due').value='';
  renderTodos(); renderDashboard();
  showToast('✅ Task added!');
}

async function toggleTodo(id) {
  const t = todos.find(t=>t.id===id);
  if(!t) return;
  t.done = !t.done;
  localStorage.setItem('jee_todos', JSON.stringify(todos));
  apiCall('PUT','/api/todos/'+id, {done:t.done});
  renderTodos(); renderDashboard();
}

async function deleteTodo(id) {
  todos = todos.filter(t=>t.id!==id);
  localStorage.setItem('jee_todos', JSON.stringify(todos));
  apiCall('DELETE','/api/todos/'+id);
  renderTodos(); renderDashboard();
}

function renderTodos() {
  let list = todoFilter==='pending' ? todos.filter(t=>!t.done)
           : todoFilter==='done' ? todos.filter(t=>t.done) : todos;
  const cols = {high:'p-high',medium:'p-medium',low:'p-low'};
  document.getElementById('todo-list').innerHTML = list.map(t => `
    <div class="todo-item ${t.done?'done-item':''}">
      <div class="todo-cb ${t.done?'checked':''}" onclick="toggleTodo(${t.id})">
        ${t.done?'✓':''}
      </div>
      <div class="priority-dot ${cols[t.priority]||'p-medium'}"></div>
      <div class="todo-info">
        <div class="todo-text">${t.text}</div>
        ${t.due?`<div class="todo-due">📅 Due: ${t.due}</div>`:''}</div>
      <button class="btn btn-danger btn-sm" onclick="deleteTodo(${t.id})">🗑</button>
    </div>`).join('') || `<div style="text-align:center;color:var(--muted);padding:40px">No tasks here</div>`;
}

// ── REMINDERS ────────────────────────────────────────────────────────────────
async function addReminder() {
  const title = document.getElementById('rem-title').value.trim();
  const time = document.getElementById('rem-time').value;
  const days = [...document.getElementById('rem-days').selectedOptions].map(o=>o.value);
  if(!title||!time) { showToast('⚠️ Enter title and time'); return; }
  const r = {id:Date.now(),title,time,days,active:true,created:new Date().toISOString()};
  reminders.push(r);
  localStorage.setItem('jee_reminders', JSON.stringify(reminders));
  apiCall('POST','/api/reminders',r);
  document.getElementById('rem-title').value='';
  renderReminders();
  showToast('🔔 Reminder set for '+time+'!');
}

async function toggleReminder(id) {
  const r = reminders.find(r=>r.id===id);
  if(!r) return;
  r.active = !r.active;
  localStorage.setItem('jee_reminders', JSON.stringify(reminders));
  apiCall('PUT','/api/reminders/'+id,{active:r.active});
  renderReminders();
}

async function deleteReminder(id) {
  reminders = reminders.filter(r=>r.id!==id);
  localStorage.setItem('jee_reminders', JSON.stringify(reminders));
  apiCall('DELETE','/api/reminders/'+id);
  renderReminders();
}

function renderReminders() {
  document.getElementById('reminder-list').innerHTML = reminders.map(r => `
    <div class="reminder-card ${r.active?'':'inactive'}">
      <div class="reminder-icon">⏰</div>
      <div class="reminder-info">
        <div class="reminder-title">${r.title}</div>
        <div class="reminder-time">⏰ ${r.time}</div>
        <div class="reminder-days">📅 ${r.days?.join(', ')||'Every day'}</div>
      </div>
      <label class="toggle-sw">
        <input type="checkbox" ${r.active?'checked':''} onchange="toggleReminder(${r.id})">
        <span class="toggle-track"></span>
      </label>
      <button class="btn btn-danger btn-sm" onclick="deleteReminder(${r.id})">🗑</button>
    </div>`).join('') || `<div style="text-align:center;color:var(--muted);padding:40px">No reminders yet. Add one above!</div>`;
}

// ── REMINDER CHECKER (runs every minute) ─────────────────────────────────────
function startReminderChecker() {
  setInterval(() => {
    const now = new Date();
    const hhmm = now.getHours().toString().padStart(2,'0')+':'+now.getMinutes().toString().padStart(2,'0');
    const day = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][now.getDay()];
    reminders.filter(r=>r.active && r.time===hhmm && (!r.days?.length||r.days.includes(day))).forEach(r=>{
      sendNotification(r.title, 'Time to study! 📚');
      showToast('🔔 '+r.title);
    });
  }, 60000);
}

// ── NOTIFICATIONS ─────────────────────────────────────────────────────────────
function requestNotifPermission() {
  if('Notification' in window && Notification.permission==='default')
    Notification.requestPermission();
}

function sendNotification(title, body) {
  if(Notification.permission==='granted')
    new Notification('JEE Planner: '+title, {body, icon:'📚'});
}

// ── TOAST ─────────────────────────────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.style.display='block';
  setTimeout(()=>t.style.display='none', 2500);
}

// Enter key for todo
document.addEventListener('keydown', e => {
  if(e.key==='Enter' && document.getElementById('todo-text')===document.activeElement) addTodo();
});

init();
</script>

<script>
// Client-side keep-alive: ping server every 4 minutes while page is open
setInterval(() => {
  fetch('/ping').catch(() => {});
}, 5 * 60 * 1000); // every 4 minutes
</script>
