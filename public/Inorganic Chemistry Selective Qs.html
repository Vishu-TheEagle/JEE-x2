<mi mathvariant=\"normal\">C</mi><mo>&lt;</mo><mi mathvariant=\"normal\">O</mi><mo>&lt;</mo><mi mathvariant=\"normal\">N</mi></math>"}], "ans": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi mathvariant=\"normal\">B</mi><mo>&lt;</mo><mi>Be</mi><mo>&lt;</mo><mi mathvariant=\"normal\">C</mi><mo>&lt;</mo><mi mathvariant=\"normal\">O</mi><mo>&lt;</mo><mi mathvariant=\"normal\">N</mi></math>", "correct": "SnkFs"}, {"id": "695e3b3a3dc984756e9de616", "type": "singleCorrect", "html": "The screening effect of s, p, d and f subshells lies in the order", "sol": "The screening effect of s, p, d and f subshells lies in the order s &gt; p &gt; d &gt; f. as screening effect\u00a0<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi>\u03b1</mi></math>\u00a0penetrating power of subshell.", "opts": [{"id": "5IefX", "text": "s &gt; p &gt; d &gt; f"}, {"id": "nLXnv", "text": "s &lt; p &lt; d &lt; f"}, {"id": "Io1K7", "text": "d &gt; p &gt; s &gt; f"}, {"id": "SwcMd", "text": "s &gt; f &gt; d &gt; p"}], "ans": "s &gt; p &gt; d &gt; f", "correct": "5IefX"}, {"id": "695e3b3a3dc984756e9de617", "type": "singleCorrect", "html": "The decreasing order of the bond moment in NH<sub>3</sub>, PH<sub>3</sub>, AsH<sub>3</sub> and SbH<sub>3</sub> is given by", "sol": "Electronegativities of N(3.0), P (2.1), As (2.0), Sb (1.9) and H (2.1) point out clearly that the correct order of decreasing polarity is :<br/>NH<sub>3</sub> &gt; SbH<sub>3</sub> &gt; AsH<sub>3</sub> &gt; PH<sub>3</sub>", "opts": [{"id": "yvDOo", "text": "NH<sub>3</sub> &gt; PH<sub>3</sub> &gt; AsH<sub>3</sub> &gt; SbH<sub>3</sub>"}, {"id": "xt9rc", "text": "SbH<sub>3</sub> &gt; AsH<sub>3</sub> &gt; PH<sub>3</sub> &gt; NH<sub>3</sub>"}, {"id": "a6nNH", "text": "NH<sub>3</sub> &gt; AsH<sub>3</sub> &gt; PH<sub>3</sub> &gt; SbH<sub>3</sub>"}, {"id": "jrFut", "text": "NH<sub>3</sub> &gt; SbH<sub>3</sub> &gt; AsH<sub>3</sub> &gt; PH<sub>3</sub>"}], "ans": "NH<sub>3</sub> &gt; SbH<sub>3</sub> &gt; AsH<sub>3</sub> &gt; PH<sub>3</sub>", "correct": "jrFut"}, {"id": "695e3b3a3dc984756e9de618", "type": "singleCorrect", "html": "An element whose IUPAC name is ununtrium (Uut) belongs to", "sol": "UFor atomic number = 113<br/>electronic confifugration is<br/>113 [Rn] <math><mn>5</mn><msup><mrow><mi mathvariant=\"normal\">f</mi></mrow><mrow><mn>14</mn></mrow></msup><mo>,</mo><mn>6</mn><msup><mrow><mi mathvariant=\"normal\">d</mi></mrow><mrow><mn>10</mn></mrow></msup><mo>,</mo><mn>7</mn><msup><mrow><mi mathvariant=\"normal\">s</mi></mrow><mrow><mn>2</mn></mrow></msup><mo>,</mo><mn>7</mn><msup><mrow><mi mathvariant=\"normal\">p</mi></mrow><mrow><mn>1</mn></mrow></msup></math><br/>p-block, 13 column (III A).", "opts": [{"id": "UZniI", "text": "s-block element"}, {"id": "jUaZl", "text": "p-block element"}, {"id": "Rhray", "text": "d-block element"}, {"id": "PaHZf", "text": "Transition element"}], "ans": "p-block element", "correct": "jUaZl"}, {"id": "695e3b3a3dc984756e9de619", "type": "singleCorrect", "html": "Which of the following processes requires maximum energy", "sol": "<math><msup><mrow><mi mathvariant=\"normal\">N</mi><mi mathvariant=\"normal\">a</mi></mrow><mrow><mo>+</mo></mrow></msup></math> has stable electronic configuration (1s<sup>2</sup>,2s<sup>2</sup>2p<sup>6</sup>). If remove extra electrone that is present in inner shell, so need more energy to remove it.(insufficient amount of energy)", "opts": [{"id": "mT2KA", "text": "<math><mi mathvariant=\"normal\">M</mi><mi mathvariant=\"normal\">g</mi><mfenced separators=\"|\"><mrow><mi mathvariant=\"normal\">g</mi></mrow></mfenced><mi mathvariant=\"normal\">\u00a0</mi><mo>\u27f6</mo><mi mathvariant=\"normal\">\u00a0</mi><msup><mrow><mi mathvariant=\"normal\">M</mi><mi mathvariant=\"normal\">g</mi></mrow><mrow><mo>+</mo></mrow></msup><mfenced separators=\"|\"><mrow><mi mathvariant=\"normal\">g</mi></mrow></mfenced><mo>+</mo><msup><mrow><mi mathvariant=\"normal\">e</mi></mrow><mrow><mo>\u2013</mo></mrow></msup></math>"}, {"id": "ApM0j", "text": "<math><msup><mrow><mi mathvariant=\"normal\">M</mi><mi mathvariant=\"normal\">g</mi></mrow><mrow><mo>+</mo></mrow></msup><mfenced separators=\"|\"><mrow><mi mathvariant=\"normal\">g</mi></mrow></mfenced><mi mathvariant=\"normal\">\u00a0</mi><mo>\u27f6</mo><msup><mrow><mi mathvariant=\"normal\">M</mi><mi mathvariant=\"normal\">g</mi></mrow><mrow><mo>+</mo><mn>2</mn></mrow></msup><mfenced separators=\"|\"><mrow><mi mathvariant=\"normal\">g</mi></mrow></mfenced><mo>+</mo><msup><mrow><mi mathvariant=\"normal\">e</mi></mrow><mrow><mo>\u2013</mo></mrow></msup></math>"}, {"id": "wsUG7", "text": "<math><mi mathvariant=\"normal\">N</mi><mi mathvariant=\"normal\">a</mi><mfenced separators=\"|\"><mrow><mi mathvariant=\"normal\">g</mi></mrow></mfenced><mo>\u27f6</mo><mi mathvariant=\"normal\">\u00a0</mi><msup><mrow><mi mathvariant=\"normal\">N</mi><mi mathvariant=\"normal\">a</mi></mrow><mrow><mo>+</mo></mrow></msup><mfenced separators=\"|\"><mrow><mi mathvariant=\"normal\">g</mi></mrow></mfenced><mo>+</mo><msup><mrow><mi mathvariant=\"normal\">e</mi></mrow><mrow><mo>\u2013</mo></mrow></msup></math>"}, {"id": "PumxY", "text": "<math><msup><mrow><mi mathvariant=\"normal\">N</mi><mi mathvariant=\"normal\">a</mi></mrow><mrow><mo>+</mo></mrow></msup><mfenced separators=\"|\"><mrow><mi mathvariant=\"normal\">g</mi></mrow></mfenced><mo>\u27f6</mo><msup><mrow><mi mathvariant=\"normal\">N</mi><mi mathvariant=\"normal\">a</mi></mrow><mrow><mn>2</mn><mo>+</mo></mrow></msup><mfenced separators=\"|\"><mrow><mi mathvariant=\"normal\">g</mi></mrow></mfenced><mo>+</mo><msup><mrow><mi mathvariant=\"normal\">e</mi></mrow><mrow><mo>\u2013</mo></mrow></msup></math>"}], "ans": "<math><msup><mrow><mi mathvariant=\"normal\">N</mi><mi mathvariant=\"normal\">a</mi></mrow><mrow><mo>+</mo></mrow></msup><mfenced separators=\"|\"><mrow><mi mathvariant=\"normal\">g</mi></mrow></mfenced><mo>\u27f6</mo><msup><mrow><mi mathvariant=\"normal\">N</mi><mi mathvariant=\"normal\">a</mi></mrow><mrow><mn>2</mn><mo>+</mo></mrow></msup><mfenced separators=\"|\"><mrow><mi mathvariant=\"normal\">g</mi></mrow></mfenced><mo>+</mo><msup><mrow><mi mathvariant=\"normal\">e</mi></mrow><mrow><mo>\u2013</mo></mrow></msup></math>", "correct": "PumxY"}, {"id": "695e3b3a3dc984756e9de61a", "type": "singleCorrect", "html": "What is the correct sequence of the increasing basic nature of the given oxides?", "sol": "<p>Basic nature is directly proportional to the metallic nature.</p><p>Metallic nature is inversely\u00a0proportional to the ionisation enthalpy.</p><p>Lesser the ionisation enthalpy, ease of donation of electron and more metallic character due to this most basic oxide will form.</p><p>Most metallic oxides are the alkali metal oxides like\u00a0<math> <msub> <mtext>K</mtext> <mn>2</mn> </msub> <mtext>O</mtext> </math> and <math> <msub> <mtext>Na</mtext> <mtext>2</mtext> </msub> <mtext>O</mtext> </math> are more basic than the\u00a0<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi>MgO</mi></math>\u00a0because magnesium belongs to the alkaline earth metals and it is less metallic than the alkali metals.</p><p><math> <msub> <mtext>Al</mtext> <mtext>2</mtext> </msub> <msub> <mtext>O</mtext> <mtext>3</mtext> </msub> </math> \u00a0belongs to the amphoteric oxides p-block metal.</p><p>Therefore the correct order of the basic strength of the oxides is</p><p><math> <mrow> <mtext>A</mtext><msub> <mtext>l</mtext> <mn>2</mn> </msub> <msub> <mtext>O</mtext> <mn>3</mn> </msub> <mo>&lt;</mo><mtext>M</mtext><mtext>g</mtext><mtext>O</mtext><mo>&lt;</mo><mtext>N</mtext><msub> <mtext>a</mtext> <mn>2</mn> </msub> <mtext>O</mtext><mo>&lt;</mo><msub> <mtext>K</mtext> <mn>2</mn> </msub> <mtext>O</mtext></mrow></math></p>", "opts": [{"id": "qA7AE", "text": "<math> <mrow> <msub> <mtext>K</mtext> <mn>2</mn> </msub> <mtext>O</mtext><mo>&lt;</mo><mtext>N</mtext><msub> <mtext>a</mtext> <mn>2</mn> </msub> <mtext>O</mtext><mo>&lt;</mo><mtext>A</mtext><msub> <mtext>l</mtext> <mn>2</mn> </msub> <msub> <mtext>O</mtext> <mn>3</mn> </msub> <mo>&lt;</mo><mtext>M</mtext><mtext>g</mtext><mtext>O</mtext></mrow></math>"}, {"id": "qW4RF", "text": "<math> <mrow> <mtext>A</mtext><msub> <mtext>l</mtext> <mn>2</mn> </msub> <msub> <mtext>O</mtext> <mn>3</mn> </msub> <mo>&lt;</mo><mtext>M</mtext><mtext>g</mtext><mtext>O</mtext><mo>&lt;</mo><mtext>N</mtext><msub> <mtext>a</mtext> <mn>2</mn> </msub> <mtext>O</mtext><mo>&lt;</mo><msub> <mtext>K</mtext> <mn>2</mn> </msub> <mtext>O</mtext></mrow></math>"}, {"id": "JoSlA", "text": "<math> <mrow> <mtext>M</mtext><mtext>g</mtext><mtext>O</mtext><mo>&lt;</mo><msub> <mtext>K</mtext> <mn>2</mn> </msub> <mtext>O</mtext><mo>&lt;</mo><mtext>A</mtext><msub> <mtext>l</mtext> <mn>2</mn> </msub> <msub> <mtext>O</mtext> <mn>3</mn> </msub> <mo>&lt;</mo><mtext>N</mtext><msub> <mtext>a</mtext> <mn>2</mn> </msub> <mtext>O</mtext></mrow></math>"}, {"id": "fLFoM", "text": "<math> <mrow> <mtext>M</mtext><mtext>g</mtext><mtext>O</mtext><mo>&lt;</mo><msub> <mtext>K</mtext> <mn>2</mn> </msub> <mtext>O</mtext><mo>&lt;</mo><mtext>N</mtext><msub> <mtext>a</mtext> <mn>2</mn> </msub> <mtext>O</mtext><mo>&lt;</mo><mtext>A</mtext><msub> <mtext>l</mtext> <mn>2</mn> </msub> <msub> <mtext>O</mtext> <mn>3</mn> </msub> </mrow></math>"}], "ans": "<math> <mrow> <mtext>A</mtext><msub> <mtext>l</mtext> <mn>2</mn> </msub> <msub> <mtext>O</mtext> <mn>3</mn> </msub> <mo>&lt;</mo><mtext>M</mtext><mtext>g</mtext><mtext>O</mtext><mo>&lt;</mo><mtext>N</mtext><msub> <mtext>a</mtext> <mn>2</mn> </msub> <mtext>O</mtext><mo>&lt;</mo><msub> <mtext>K</mtext> <mn>2</mn> </msub> <mtext>O</mtext></mrow></math>", "correct": "qW4RF"}, {"id": "695e3b3a3dc984756e9de61b", "type": "singleCorrect", "html": "The Pauling's and Mulliken's electronegativity are related as", "sol": "<math><msub><mrow><mi>X</mi></mrow><mrow><mi>P</mi><mi>a</mi><mi>u</mi><mi>l</mi><mi>i</mi><mi>n</mi><mi>g</mi><mi>s</mi></mrow></msub><mo>=</mo><mfrac><mrow><msub><mrow><mi>X</mi></mrow><mrow><mi>M</mi><mi>u</mi><mi>l</mi><mi>l</mi><mi>i</mi><mi>k</mi><mi>e</mi><mi>n</mi><mi>&prime;</mi><mi>s</mi></mrow></msub></mrow><mrow><mn>2.8</mn></mrow></mfrac></math>", "opts": [{"id": "2Ek00", "text": "<math><msub><mrow><mi>X</mi></mrow><mrow><mi>p</mi><mi>a</mi><mi>u</mi><mi>l</mi><mi>i</mi><mi>n</mi><mi>g</mi><mi>&prime;</mi><mi>s</mi></mrow></msub><mo>=</mo><mfrac><mrow><msub><mrow><mi>X</mi></mrow><mrow><mi>M</mi><mi>u</mi><mi>l</mi><mi>l</mi><mi>i</mi><mi>k</mi><mi>e</mi><mi>n</mi><mi>&prime;</mi><mi>s</mi></mrow></msub></mrow><mrow><mn>2</mn></mrow></mfrac><mi>\u00a0</mi></math>"}, {"id": "UasH9", "text": "<math><msub><mrow><mi>X</mi></mrow><mrow><mi>p</mi><mi>a</mi><mi>u</mi><mi>l</mi><mi>i</mi><mi>n</mi><mi>g</mi><mi>&prime;</mi><mi>s</mi></mrow></msub><mo>=</mo><mfrac><mrow><msub><mrow><mi>X</mi></mrow><mrow><mi>M</mi><mi>u</mi><mi>l</mi><mi>l</mi><mi>i</mi><mi>k</mi><mi>e</mi><mi>n</mi><mi>&prime;</mi><mi>s</mi></mrow></msub></mrow><mrow><mn>2.8</mn></mrow></mfrac></math>"}, {"id": "x944h", "text": "<math><msub><mrow><mi>X</mi></mrow><mrow><mi>M</mi><mi>u</mi><mi>l</mi><mi>l</mi><mi>i</mi><mi>k</mi><mi>e</mi><mi>n</mi><mi>&prime;</mi><mi>s</mi></mrow></msub><mo>=</mo><mfrac><mrow><msub><mrow><mi>X</mi></mrow><mrow><mi>P</mi><mi>a</mi><mi>u</mi><mi>l</mi><mi>i</mi><mi>n</mi><mi>g</mi><mi>&prime;</mi><mi>s</mi></mrow></msub></mrow><mrow><mn>2</mn></mrow></mfrac></math>"}, {"id": "4zFqw", "text": "<math><msub><mrow><mi>X</mi></mrow><mrow><mi>M</mi><mi>u</mi><mi>l</mi><mi>l</mi><mi>i</mi><mi>k</mi><mi>e</mi><mi>n</mi><mi>&prime;</mi><mi>s</mi></mrow></msub><mo>=</mo><mfrac><mrow><msub><mrow><mi>X</mi></mrow><mrow><mi>P</mi><mi>a</mi><mi>u</mi><mi>l</mi><mi>i</mi><mi>n</mi><mi>g</mi><mi>&prime;</mi><mi>s</mi></mrow></msub></mrow><mrow><mn>2.8</mn></mrow></mfrac></math>"}], "ans": "<math><msub><mrow><mi>X</mi></mrow><mrow><mi>p</mi><mi>a</mi><mi>u</mi><mi>l</mi><mi>i</mi><mi>n</mi><mi>g</mi><mi>&prime;</mi><mi>s</mi></mrow></msub><mo>=</mo><mfrac><mrow><msub><mrow><mi>X</mi></mrow><mrow><mi>M</mi><mi>u</mi><mi>l</mi><mi>l</mi><mi>i</mi><mi>k</mi><mi>e</mi><mi>n</mi><mi>&prime;</mi><mi>s</mi></mrow></msub></mrow><mrow><mn>2.8</mn></mrow></mfrac></math>", "correct": "UasH9"}, {"id": "695e3b3a3dc984756e9de61c", "type": "singleCorrect", "html": "Which of the following statement is incorrect?", "sol": "Atomic radius of helium is greater than H. Similarly, atomic radius of neon is greater than that of fluorine. This is because interelectronic repulsion in fully-filled shells outweighs the effect of increased effective nuclear charge. Rest statements are correct.", "opts": [{"id": "uOyAi", "text": "Electron affinity of nitrogen and noble gases is zero"}, {"id": "VOW7l", "text": "Cesium is the most electropositive element; while fluorine is the most electronegative element"}, {"id": "Yubgg", "text": "Chlorine has the highest electron affinity among all the elements of periodic table"}, {"id": "2IWix", "text": "In any period, the atomic radius the noble gas is lowest"}], "ans": "In any period, the atomic radius the noble gas is lowest", "correct": "2IWix"}, {"id": "695e3b3a3dc984756e9de61d", "type": "singleCorrect", "html": "Which of the following relation is correct", "sol": "We know that <math><mi>E</mi><mi>N</mi><mo>=</mo><mfrac><mrow><mi>I</mi><mi>P</mi><mo>+</mo><mi>E</mi><mi>A</mi></mrow><mrow><mn>2</mn></mrow></mfrac></math><br/><math><mn>2</mn><mi>E</mi><mi>N</mi><mo>=</mo><mi>I</mi><mi>P</mi><mo>+</mo><mi>E</mi><mi>A</mi></math><br/>Therefore the correct relation is: <br/><math><mn>2</mn><mi>E</mi><mi>N</mi><mo>-</mo><mi>I</mi><mi>P</mi><mo>-</mo><mi>E</mi><mi>A</mi><mo>=</mo><mn>0</mn></math>", "opts": [{"id": "goxXX", "text": "<math><mn>2</mn><mi>I</mi><mi>P</mi><mo>-</mo><mi>E</mi><mi>A</mi><mo>-</mo><mi>E</mi><mi>N</mi><mo>=</mo><mn>0</mn></math>"}, {"id": "FcsOG", "text": "<math><mn>2</mn><mi>I</mi><mi>P</mi><mo>-</mo><mi>E</mi><mi>N</mi><mo>+</mo><mi>E</mi><mi>A</mi><mo>=</mo><mn>0</mn></math>"}, {"id": "XCyZ7", "text": "<math><mn>2</mn><mi>E</mi><mi>N</mi><mo>-</mo><mi>I</mi><mi>P</mi><mo>-</mo><mi>E</mi><mi>A</mi><mo>=</mo><mn>0</mn></math>"}, {"id": "2vWfv", "text": "<math><mi>E</mi><mi>N</mi><mo>-</mo><mi>I</mi><mi>P</mi><mo>-</mo><mi>E</mi><mi>A</mi><mo>=</mo><mn>0</mn></math>"}], "ans": "<math><mn>2</mn><mi>E</mi><mi>N</mi><mo>-</mo><mi>I</mi><mi>P</mi><mo>-</mo><mi>E</mi><mi>A</mi><mo>=</mo><mn>0</mn></math>", "correct": "XCyZ7"}, {"id": "695e3b3a3dc984756e9de61e", "type": "singleCorrect", "html": "Mixture containing aqueous Li<sup>+</sup>, Na<sup>+</sup>, K<sup>+</sup> ions are electrolysed. cations are discharged at cathode in the order : (easiest at the end)<br /> <math> <mrow> <msup> <mtext>M</mtext> <mo>+</mo> </msup> <mfenced close=\")\" open=\"(\" separators=\",\"> <mrow> <mtext>aq</mtext> </mrow> </mfenced> <mo>+</mo> <msup> <mtext>e</mtext> <mo>-</mo> </msup> <mo>\u27f6</mo> <mtext>M</mtext> </mrow> </math>", "sol": "<table border=\"1\" cellpadding=\"1\" cellspacing=\"1\" style=\"width: 100%;\"> <tbody> <tr> <td><math> <mrow> <msubsup> <mtext>E</mtext> <mtext>red</mtext> <mtext>o</mtext> </msubsup> </mrow> </math></td> <td>Metal</td> </tr> <tr> <td>-3.05V</td> <td>Li</td> </tr> <tr> <td>-2.71V</td> <td>Na</td> </tr> <tr> <td>-2.93V</td> <td>K</td> </tr> </tbody></table><br/>Higher the value of <math> <mrow> <msubsup> <mtext>E</mtext> <mtext>red</mtext> <mtext>o</mtext> </msubsup> </mrow> </math> more preferably the ions is reduced at cathode that is Na<sup>+</sup> &gt; K<sup>+</sup> &gt; Li<sup>+</sup>", "opts": [{"id": "Ovg8r", "text": "<math> <mrow> <msup> <mtext>Li</mtext> <mo>+</mo> </msup> <mtext>,\u00a0</mtext> <msup> <mtext>Na</mtext> <mo>+</mo> </msup> <mtext>,\u00a0</mtext> <msup> <mtext>K</mtext> <mo>+</mo> </msup> </mrow> </math>"}, {"id": "r9iB1", "text": "<math> <mrow> <msup> <mtext>K</mtext> <mo>+</mo> </msup> <mtext>,\u00a0</mtext> <msup> <mtext>Na</mtext> <mo>+</mo> </msup> <mtext>,\u00a0</mtext> <msup> <mtext>Li</mtext> <mo>+</mo> </msup> </mrow> </math>"}, {"id": "EcGTt", "text": "<math> <mrow> <msup> <mtext>Li</mtext> <mo>+</mo> </msup> <mtext>,\u00a0</mtext> <msup> <mtext>K</mtext> <mo>+</mo> </msup> <mtext>,\u00a0</mtext> <msup> <mtext>Na</mtext> <mo>+</mo> </msup> </mrow> </math>"}, {"id": "q4CP1", "text": "<math> <mrow> <msup> <mtext>Na</mtext> <mo>+</mo> </msup> <mtext>,\u00a0</mtext> <msup> <mtext>K</mtext> <mo>+</mo> </msup> <mtext>,\u00a0</mtext> <msup> <mtext>Li</mtext> <mo>+</mo> </msup> </mrow> </math>"}], "ans": "<math> <mrow> <msup> <mtext>Na</mtext> <mo>+</mo> </msup> <mtext>,\u00a0</mtext> <msup> <mtext>K</mtext> <mo>+</mo> </msup> <mtext>,\u00a0</mtext> <msup> <mtext>Li</mtext> <mo>+</mo> </msup> </mrow> </math>", "correct": "q4CP1"}, {"id": "695e3b3a3dc984756e9de61f", "type": "singleCorrect", "html": "<p>&quot;Solubility of alkali metal hydroxide increases down the group.&quot;</p><p>Select only the correct explanation for the given statement.</p>", "sol": "<p>Among the alkaline earth metal hydroxides, the anion being common, the cationic radius will influence the lattice enthalpy. Since, the lattice enthalpy decreases much more than the hydration enthalpy with increasing ionic size, the solubility increases down the group. Both hydration energy and lattice energy of alkali metal hydroxide&nbsp;decreases down the group and hydration energy influence over lattice energy. Hence, the solubility increases down the group. Solubility depends on change in the hydration energy&nbsp;and lattice energy.</p>", "opts": [{"id": "8Jv89", "text": "Hydration energy increases and lattice energy decreases down the group."}, {"id": "GadYf", "text": "Both energy decrease down the group, but decrease in hydration energy is rapid."}, {"id": "oAP5q", "text": "Both energy decrease down the group, but decrease in lattice energy is rapid."}, {"id": "jWinm", "text": "Both energy increase down the group, but increase in hydration energy is rapid."}], "ans": "Both energy decrease down the group, but decrease in lattice energy is rapid.", "correct": "oAP5q"}, {"id": "695e3b3a3dc984756e9de620", "type": "singleCorrect", "html": "Which represents alkali metals based on relative (IE)<sub>1</sub> and (IE)<sub>2</sub> values?", "sol": "M<sup>+</sup> (alkali metal ion) has inert gas configuration. Thus, after M<sup>+</sup> is formed from M (by (IE)<sub>1</sub>), further ionisation to M<sup>2</sup><sup>+</sup> from M<sup>+</sup> (by (IE)<sub>2</sub>) requires very high energy.", "opts": [{"id": "HMVzA", "text": "<img 100%\";=\"\" alt=\"\" object-fit:contain\"=\"\" src=\"https://cdn-question-pool.getmarks.app/NEET/DPP-Chemistry/023933_opt_5.jpg\" style=\"width: 245px; height: 67px;\"/>"}, {"id": "yboif", "text": "<img 100%\";=\"\" alt=\"\" object-fit:contain\"=\"\" src=\"https://cdn-question-pool.getmarks.app/NEET/DPP-Chemistry/023933_opt_.jpg\" style=\"width: 242px; height: 66px;\"/>"}, {"id": "Xucpf", "text": "<img 100%\";=\"\" alt=\"\" object-fit:contain\"=\"\" src=\"https://cdn-question-pool.getmarks.app/NEET/DPP-Chemistry/023933_opt_bvdbsddsfas.jpg\" style=\"width: 242px; height: 69px;\"/>"}, {"id": "VZxIt", "text": "<img 100%\";=\"\" alt=\"\" object-fit:contain\"=\"\" src=\"https://cdn-question-pool.getmarks.app/NEET/DPP-Chemistry/023933_opt_4.jpg\" style=\"width: 238px; height: 70px;\"/>"}], "ans": "<img 100%\";=\"\" alt=\"\" object-fit:contain\"=\"\" src=\"https://cdn-question-pool.getmarks.app/NEET/DPP-Chemistry/023933_opt_bvdbsddsfas.jpg\" style=\"width: 242px; height: 69px;\"/>", "correct": "Xucpf"}, {"id": "695e3b3a3dc984756e9de621", "type": "singleCorrect", "html": "Among the following, select the incorrect statement about the helium.", "sol": "The last electron of helium enter in 1s orbital&nbsp;but due to&nbsp;full filled orbit,&nbsp;it is placed with the p-block element in modern periodic table.", "opts": [{"id": "psk1a", "text": "The ionization energy of helium is highest"}, {"id": "YDNAp", "text": "The electron gain enthalpy of helium is positive"}, {"id": "vMYv9", "text": "Helium belongs to a group of elements, which are largest in size in respective period"}, {"id": "Dmg4T", "text": "The last electron of helium enter in 1s orbital so it is placed with the s-block element in modern periodic table"}], "ans": "The last electron of helium enter in 1s orbital so it is placed with the s-block element in modern periodic table", "correct": "Dmg4T"}, {"id": "695e3b3a3dc984756e9de622", "type": "singleCorrect", "html": "Which of the following sequence is correct here?", "sol": "Here both B and C are correct but A is incorrect as the correct order is<br/><math><mi mathvariant=\"normal\">A</mi><mi mathvariant=\"normal\">l</mi><mo>&lt;</mo><mi mathvariant=\"normal\">G</mi><mi mathvariant=\"normal\">a</mi><mo>&lt;</mo><mi mathvariant=\"normal\">l</mi><mi mathvariant=\"normal\">n</mi><mo>&lt;</mo><mi mathvariant=\"normal\">T</mi><mi mathvariant=\"normal\">l</mi></math> (stability of +1 oxidation state)<br/>As due to inert pair effect stability in lower oxidation state increases down the group.", "opts": [{"id": "A0WGu", "text": "<math><mi mathvariant=\"normal\">T</mi><mi mathvariant=\"normal\">l</mi><mo>&lt;</mo><mi mathvariant=\"normal\">l</mi><mi mathvariant=\"normal\">n</mi><mo>&lt;</mo><mi mathvariant=\"normal\">G</mi><mi mathvariant=\"normal\">a</mi><mo>&lt;</mo><mi mathvariant=\"normal\">A</mi><mi mathvariant=\"normal\">l</mi></math> (stability of +1 oxidation state)"}, {"id": "PbKD6", "text": "<math><mi mathvariant=\"normal\">C</mi><msub><mrow><mi mathvariant=\"normal\">O</mi></mrow><mrow><mn>2</mn></mrow></msub><mo>&lt;</mo><mi mathvariant=\"normal\">S</mi><mi mathvariant=\"normal\">i</mi><msub><mrow><mi mathvariant=\"normal\">O</mi></mrow><mrow><mn>2</mn></mrow></msub><mo>&lt;</mo><mi mathvariant=\"normal\">S</mi><mi mathvariant=\"normal\">n</mi><msub><mrow><mi mathvariant=\"normal\">O</mi></mrow><mrow><mn>2</mn></mrow></msub><mo>&lt;</mo><mi mathvariant=\"normal\">P</mi><mi mathvariant=\"normal\">b</mi><msub><mrow><mi mathvariant=\"normal\">O</mi></mrow><mrow><mn>2</mn></mrow></msub></math> (increasing oxidising power)"}, {"id": "8UpUi", "text": "<math><mi mathvariant=\"normal\">B</mi><msub><mrow><mi mathvariant=\"normal\">F</mi></mrow><mrow><mn>3</mn></mrow></msub><mo>&lt;</mo><mi mathvariant=\"normal\">B</mi><mi mathvariant=\"normal\">C</mi><msub><mrow><mi mathvariant=\"normal\">l</mi></mrow><mrow><mn>3</mn></mrow></msub><mo>&lt;</mo><mi mathvariant=\"normal\">B</mi><mi mathvariant=\"normal\">B</mi><msub><mrow><mi mathvariant=\"normal\">r</mi></mrow><mrow><mn>3</mn></mrow></msub><mo>&lt;</mo><mi mathvariant=\"normal\">B</mi><msub><mrow><mi mathvariant=\"normal\">l</mi></mrow><mrow><mn>3</mn></mrow></msub></math> (the lewis acid strength)"}, {"id": "askM6", "text": "Both B and C"}], "ans": "Both B and C", "correct": "askM6"}, {"id": "695e3b3b3dc984756e9de623", "type": "singleCorrect", "html": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi mathvariant=\"normal\">A</mi><mo>,</mo><mo>&#160;</mo><mi mathvariant=\"normal\">B</mi></math> and <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi mathvariant=\"normal\">C</mi></math> are hydroxy-compounds of the elements <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi mathvariant=\"normal\">P</mi><mo>,</mo><mo>&#160;</mo><mi mathvariant=\"normal\">Q</mi></math> and <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi mathvariant=\"normal\">R</mi></math> respectively. <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi mathvariant=\"normal\">P</mi><mo>,</mo><mo>&#160;</mo><mi mathvariant=\"normal\">Q</mi></math> and <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi mathvariant=\"normal\">R</mi></math> are in the same period of the periodic table. <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi mathvariant=\"normal\">A</mi></math> gives an aqueous solution of <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi>pH</mi><mo>&#60;</mo><mn>7</mn></math>. <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi mathvariant=\"normal\">B</mi></math> reacts with both strong acids and strong alkalies. <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi mathvariant=\"normal\">C</mi></math> gives an aqueous solution which is strongly alkaline. Which of the following statement(s) is /are true?<br/><math> <mrow> <mtext>I</mtext> </mrow> </math>. All three elements are metals.<br /><math> <mrow> <mtext>II</mtext> </mrow> </math>. The atomic radius decreases in the order <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi mathvariant=\"normal\">P</mi><mo>&#62;</mo><mi mathvariant=\"normal\">Q</mi><mo>&#62;</mo><mi mathvariant=\"normal\">R</mi></math>.<br /><math> <mrow> <mtext>III</mtext> </mrow> </math>. The electronegativities decrease from <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi mathvariant=\"normal\">P</mi><mo>&#62;</mo><mi mathvariant=\"normal\">Q</mi><mo>&#62;</mo><mi mathvariant=\"normal\">R</mi></math>.<br /><math> <mrow> <mtext>IV</mtext> </mrow> </math>. <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi mathvariant=\"normal\">P</mi><mo>,</mo><mo>&#160;</mo><mi mathvariant=\"normal\">Q</mi></math> and <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi mathvariant=\"normal\">R</mi></math> could be <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi mathvariant=\"normal\">P</mi><mo>,</mo><mo>&#160;</mo><mi>Al</mi></math> and <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi>Na</mi></math> respectively.", "sol": "<p>As per given information in question, only two statements are correct.</p><p>(III) The electronegativities decrease in the order&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi mathvariant=\"normal\">P</mi><mo>&#62;</mo><mi mathvariant=\"normal\">Q</mi><mo>&#62;</mo><mi mathvariant=\"normal\">R</mi></math>.</p><p>(IV) <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi mathvariant=\"normal\">P</mi><mo>,</mo><mo>&#160;</mo><mi mathvariant=\"normal\">Q</mi></math> and <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi mathvariant=\"normal\">R</mi></math> could be <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi mathvariant=\"normal\">P</mi><mo>,</mo><mo>&#160;</mo><mi>Al</mi></math> and <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi>Na</mi></math> respectively.</p><p><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi mathvariant=\"normal\">P</mi><mo>,</mo><mo>&#160;</mo><mi>Na</mi></math> and <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi>Al</mi></math>, all&nbsp;three belong to period-<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mn>3</mn></math>.<br />Hydroxy-compound of phosphorous<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mo>=</mo></math><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi mathvariant=\"normal\">H</mi><mn>3</mn></msub><msub><mi>PO</mi><mn>4</mn></msub></math><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mo>=</mo><mi mathvariant=\"normal\">A</mi></math><br />(which is acidic, so <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi>pH</mi><mo>&#60;</mo><mn>7</mn></math>)<br /><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi>Al</mi><mo>(</mo><mi>OH</mi><msub><mo>)</mo><mn>3</mn></msub></math> is amphoteric in nature<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mo>=</mo><mi mathvariant=\"normal\">B</mi></math><br /><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi>NaOH</mi></math> is strongly alkaline<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mo>=</mo><mi mathvariant=\"normal\">C</mi></math></p>", "opts": [{"id": "aNMxI", "text": "I, II and IV"}, {"id": "MiTbQ", "text": "III and IV only"}, {"id": "Ok03T", "text": "II, III and IV"}, {"id": "7qIrs", "text": "All are correct"}], "ans": "III and IV only", "correct": "MiTbQ"}, {"id": "695e3b3b3dc984756e9de624", "type": "singleCorrect", "html": "Fluorine is more electronegative than nitrogen. The best explanation is that", "sol": "<p>Generally electronegativity decreases down the group due to increase in atomic size and increases across the period due to decrease in atomic size and increase in nuclear charge.</p>", "opts": [{"id": "SK031", "text": "the valence electrons in <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi mathvariant=\"normal\">F</mi></math> are on the average, a little farther to the nucleus than in <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi mathvariant=\"normal\">N</mi></math>."}, {"id": "74LpB", "text": "the charge on a <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi mathvariant=\"normal\">F</mi></math> nucleus is <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mo>+</mo><mn>9</mn><mo>,</mo></math> while that on <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi mathvariant=\"normal\">N</mi></math> nucleus is <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mo>+</mo><mn>7</mn></math>."}, {"id": "HSWGh", "text": "the nitrogen has half filled valence shell electron configuration, <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msup><mi>ns</mi><mn>2</mn></msup><mo>&#160;</mo><msup><mi>np</mi><mn>3</mn></msup></math> where as fluorine has partially filled electron configuration <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msup><mi>ns</mi><mn>2</mn></msup><mo>&#160;</mo><msup><mi>np</mi><mn>5</mn></msup></math>."}, {"id": "PQtDD", "text": "the electronegativity decreases from top to bottom in each of the group as the effective nuclear charge remains constant."}], "ans": "the charge on a <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi mathvariant=\"normal\">F</mi></math> nucleus is <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mo>+</mo><mn>9</mn><mo>,</mo></math> while that on <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi mathvariant=\"normal\">N</mi></math> nucleus is <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mo>+</mo><mn>7</mn></math>.", "correct": "74LpB"}, {"id": "695e3b3b3dc984756e9de625", "type": "singleCorrect", "html": "Which of the following order is incorrect:-", "sol": "<p>(1) On moving from top to bottom acidic character of haloacids increases. Hence,&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi>HF</mi><mi mathvariant=\"normal\">&#160;</mi><mo>&#60;</mo><mi mathvariant=\"normal\">&#160;</mi><mi>HCl</mi><mi mathvariant=\"normal\">&#160;</mi><mo>&#60;</mo><mi mathvariant=\"normal\">&#160;</mi><mi>HBr</mi><mi mathvariant=\"normal\">&#160;</mi><mo>&#60;</mo><mi mathvariant=\"normal\">&#160;</mi><mi>HI</mi></math> is correct order of acidic nature.</p><p>(2)<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi mathvariant=\"normal\">&#160;</mi><msup><mi mathvariant=\"normal\">O</mi><mrow><mn>2</mn><mo>&#8211;</mo></mrow></msup><mi mathvariant=\"normal\">&#160;</mi><mo>&#60;</mo><mi mathvariant=\"normal\">&#160;</mi><msup><mi mathvariant=\"normal\">O</mi><mo>&#8211;</mo></msup><mi mathvariant=\"normal\">&#160;</mi><mo>&#60;</mo><mi mathvariant=\"normal\">&#160;</mi><mi mathvariant=\"normal\">O</mi><mi mathvariant=\"normal\">&#160;</mi></math> is correct order of electronegativity. As electrons are increasing on oxygen atom, it&#39;s&nbsp;need to attract electrons is decreases.</p><p>(3) Large anion will promote more covalent character.&nbsp;</p><p>(4) For isoelectronic species, as number of protons decreases, size of atom increases.</p>", "opts": [{"id": "dKluw", "text": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi mathvariant=\"normal\">H</mi><mi mathvariant=\"normal\">F</mi><mi mathvariant=\"normal\">&#160;</mi><mo>&#60;</mo><mi mathvariant=\"normal\">&#160;</mi><mi mathvariant=\"normal\">H</mi><mi mathvariant=\"normal\">C</mi><mi mathvariant=\"normal\">l</mi><mi mathvariant=\"normal\">&#160;</mi><mo>&#60;</mo><mi mathvariant=\"normal\">&#160;</mi><mi mathvariant=\"normal\">H</mi><mi mathvariant=\"normal\">B</mi><mi mathvariant=\"normal\">r</mi><mi mathvariant=\"normal\">&#160;</mi><mo>&#60;</mo><mi mathvariant=\"normal\">&#160;</mi><mi mathvariant=\"normal\">H</mi><mi mathvariant=\"normal\">I</mi><mi mathvariant=\"normal\">&#160;</mi><mo>:</mo><mi mathvariant=\"normal\">&#160;</mi><mi mathvariant=\"normal\">o</mi><mi mathvariant=\"normal\">r</mi><mi mathvariant=\"normal\">d</mi><mi mathvariant=\"normal\">e</mi><mi mathvariant=\"normal\">r</mi><mi mathvariant=\"normal\">&#160;</mi><mi mathvariant=\"normal\">o</mi><mi mathvariant=\"normal\">f</mi><mi mathvariant=\"normal\">&#160;</mi><mi mathvariant=\"normal\">a</mi><mi mathvariant=\"normal\">c</mi><mi mathvariant=\"normal\">i</mi><mi mathvariant=\"normal\">d</mi><mi mathvariant=\"normal\">i</mi><mi mathvariant=\"normal\">c</mi><mi mathvariant=\"normal\">&#160;</mi><mi mathvariant=\"normal\">c</mi><mi mathvariant=\"normal\">h</mi><mi mathvariant=\"normal\">a</mi><mi mathvariant=\"normal\">r</mi><mi mathvariant=\"normal\">a</mi><mi mathvariant=\"normal\">c</mi><mi mathvariant=\"normal\">t</mi><mi mathvariant=\"normal\">e</mi><mi mathvariant=\"normal\">r</mi></math>"}, {"id": "XMR1Z", "text": "<math><mi mathvariant=\"normal\">O</mi><mi mathvariant=\"normal\">\u00a0</mi><mo>&lt;</mo><mi mathvariant=\"normal\">\u00a0</mi><msup><mrow><mi mathvariant=\"normal\">O</mi></mrow><mrow><mo>\u2013</mo></mrow></msup><mi mathvariant=\"normal\">\u00a0</mi><mo>&lt;</mo><mi mathvariant=\"normal\">\u00a0</mi><msup><mrow><mi mathvariant=\"normal\">O</mi></mrow><mrow><mn>2</mn><mo>\u2013</mo></mrow></msup><mi mathvariant=\"normal\">\u00a0</mi><mo>:</mo><mi mathvariant=\"normal\">\u00a0</mi><mi mathvariant=\"normal\">o</mi><mi mathvariant=\"normal\">r</mi><mi mathvariant=\"normal\">d</mi><mi mathvariant=\"normal\">e</mi><mi mathvariant=\"normal\">r</mi><mi mathvariant=\"normal\">\u00a0</mi><mi mathvariant=\"normal\">o</mi><mi mathvariant=\"normal\">f</mi><mi mathvariant=\"normal\">\u00a0</mi><mi mathvariant=\"normal\">E</mi><mi mathvariant=\"normal\">N</mi></math>"}, {"id": "p0p9m", "text": "<math><mi mathvariant=\"normal\">H</mi><mi mathvariant=\"normal\">F</mi><mi mathvariant=\"normal\">\u00a0</mi><mo>&lt;</mo><mi mathvariant=\"normal\">\u00a0</mi><mi mathvariant=\"normal\">H</mi><mi mathvariant=\"normal\">C</mi><mi mathvariant=\"normal\">l</mi><mi mathvariant=\"normal\">\u00a0</mi><mo>&lt;</mo><mi mathvariant=\"normal\">\u00a0</mi><mi mathvariant=\"normal\">H</mi><mi mathvariant=\"normal\">B</mi><mi mathvariant=\"normal\">r</mi><mi mathvariant=\"normal\">\u00a0</mi><mo>&lt;</mo><mi mathvariant=\"normal\">\u00a0</mi><mi mathvariant=\"normal\">H</mi><mi mathvariant=\"normal\">I</mi><mi mathvariant=\"normal\">\u00a0</mi><mo>:</mo><mi mathvariant=\"normal\">\u00a0</mi><mi mathvariant=\"normal\">o</mi><mi mathvariant=\"normal\">r</mi><mi mathvariant=\"normal\">d</mi><mi mathvariant=\"normal\">e</mi><mi mathvariant=\"normal\">r</mi><mi mathvariant=\"normal\">\u00a0</mi><mi mathvariant=\"normal\">o</mi><mi mathvariant=\"normal\">f</mi><mi mathvariant=\"normal\">\u00a0</mi><mi mathvariant=\"normal\">c</mi><mi mathvariant=\"normal\">o</mi><mi mathvariant=\"normal\">v</mi><mi mathvariant=\"normal\">a</mi><mi mathvariant=\"normal\">l</mi><mi mathvariant=\"normal\">e</mi><mi mathvariant=\"normal\">n</mi><mi mathvariant=\"normal\">t</mi><mi mathvariant=\"normal\">\u00a0</mi><mi mathvariant=\"normal\">c</mi><mi mathvariant=\"normal\">h</mi><mi mathvariant=\"normal\">a</mi><mi mathvariant=\"normal\">r</mi><mi mathvariant=\"normal\">a</mi><mi mathvariant=\"normal\">c</mi><mi mathvariant=\"normal\">t</mi><mi mathvariant=\"normal\">e</mi><mi mathvariant=\"normal\">r</mi></math>"}, {"id": "CVIEq", "text": "<math><msup><mrow><mi mathvariant=\"normal\">C</mi><mi mathvariant=\"normal\">a</mi></mrow><mrow><mn>2</mn><mo>+</mo></mrow></msup><mi mathvariant=\"normal\">\u00a0</mi><mo>&lt;</mo><mi mathvariant=\"normal\">\u00a0</mi><msup><mrow><mi mathvariant=\"normal\">K</mi></mrow><mrow><mo>+</mo></mrow></msup><mi mathvariant=\"normal\">\u00a0</mi><mo>&lt;</mo><mi mathvariant=\"normal\">\u00a0</mi><msup><mrow><mi mathvariant=\"normal\">S</mi></mrow><mrow><mn>2</mn><mo>\u2013</mo></mrow></msup><mi mathvariant=\"normal\">\u00a0</mi><mo>:</mo><mi mathvariant=\"normal\">\u00a0</mi><mi mathvariant=\"normal\">o</mi><mi mathvariant=\"normal\">r</mi><mi mathvariant=\"normal\">d</mi><mi mathvariant=\"normal\">e</mi><mi mathvariant=\"normal\">r</mi><mi mathvariant=\"normal\">\u00a0</mi><mi mathvariant=\"normal\">o</mi><mi mathvariant=\"normal\">f</mi><mi mathvariant=\"normal\">\u00a0</mi><mi mathvariant=\"normal\">s</mi><mi mathvariant=\"normal\">i</mi><mi mathvariant=\"normal\">z</mi><mi mathvariant=\"normal\">e</mi></math>"}], "ans": "<math><mi mathvariant=\"normal\">O</mi><mi mathvariant=\"normal\">\u00a0</mi><mo>&lt;</mo><mi mathvariant=\"normal\">\u00a0</mi><msup><mrow><mi mathvariant=\"normal\">O</mi></mrow><mrow><mo>\u2013</mo></mrow></msup><mi mathvariant=\"normal\">\u00a0</mi><mo>&lt;</mo><mi mathvariant=\"normal\">\u00a0</mi><msup><mrow><mi mathvariant=\"normal\">O</mi></mrow><mrow><mn>2</mn><mo>\u2013</mo></mrow></msup><mi mathvariant=\"normal\">\u00a0</mi><mo>:</mo><mi mathvariant=\"normal\">\u00a0</mi><mi mathvariant=\"normal\">o</mi><mi mathvariant=\"normal\">r</mi><mi mathvariant=\"normal\">d</mi><mi mathvariant=\"normal\">e</mi><mi mathvariant=\"normal\">r</mi><mi mathvariant=\"normal\">\u00a0</mi><mi mathvariant=\"normal\">o</mi><mi mathvariant=\"normal\">f</mi><mi mathvariant=\"normal\">\u00a0</mi><mi mathvariant=\"normal\">E</mi><mi mathvariant=\"normal\">N</mi></math>", "correct": "XMR1Z"}, {"id": "695e3b3b3dc984756e9de626", "type": "singleCorrect", "html": "The successive ionization energy values\u00a0of an element are <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mn>7</mn><mo>.</mo><mn>1</mn><mo>,</mo><mo>\u00a0</mo><mn>14</mn><mo>.</mo><mn>3</mn><mo>,</mo><mo>\u00a0</mo><mn>34</mn><mo>.</mo><mn>5</mn><mo>,</mo><mo>\u00a0</mo><mn>46</mn><mo>.</mo><mn>8</mn></math> and <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mn>162</mn><mo>.</mo><mn>2</mn><mo>\u00a0</mo><mtext>e</mtext><mtext>V</mtext></math> respectively. The element is likely to be:", "sol": "<p>The <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi>IE</mi><mn>1</mn></msub><mo>,</mo><mo>\u00a0</mo><msub><mi>IE</mi><mn>2</mn></msub><mo>,</mo><mo>\u00a0</mo><msub><mi>IE</mi><mn>3</mn></msub><mo>,</mo><mo>\u00a0</mo><msub><mi>IE</mi><mn>4</mn></msub></math> and <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi>IE</mi><mn>5</mn></msub></math> of an element are <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mn>7</mn><mo>.</mo><mn>1</mn><mo>,</mo><mo>\u00a0</mo><mn>14</mn><mo>.</mo><mn>3</mn><mo>,</mo><mo>\u00a0</mo><mn>34</mn><mo>.</mo><mn>5</mn><mo>,</mo><mo>\u00a0</mo><mn>46</mn><mo>.</mo><mn>8</mn></math> and <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mn>162</mn><mo>.</mo><mn>2</mn><mo>\u00a0</mo><mi>eV</mi></math> respectively. Therefore, We can see that there is a regular very close increment of ionization energy till the fourth ionization energy. After the fourth ionization energy, there is a sudden high jump in energy. It confirms that after losing four electrons, that element will achieve the noble gas configuration or stable configuration.</p><p><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mmultiscripts><mi>Na</mi><mprescripts></mprescripts><mn>11</mn><none></none></mmultiscripts><mo>\u2192</mo><mn>1</mn><msup><mi mathvariant=\"normal\">s</mi><mn>2</mn></msup><mo>\u00a0</mo><mn>2</mn><msup><mi mathvariant=\"normal\">s</mi><mn>2</mn></msup><mo>\u00a0</mo><mn>2</mn><msup><mi mathvariant=\"normal\">p</mi><mn>6</mn></msup><mo>\u00a0</mo><mn>3</mn><msup><mi mathvariant=\"normal\">s</mi><mn>1</mn></msup></math></p><p><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mmultiscripts><mi>Si</mi><mprescripts></mprescripts><mn>14</mn><none></none></mmultiscripts><mo>\u2192</mo><mn>1</mn><msup><mi mathvariant=\"normal\">s</mi><mn>2</mn></msup><mo>\u00a0</mo><mn>2</mn><msup><mi mathvariant=\"normal\">s</mi><mn>2</mn></msup><mo>\u00a0</mo><mn>2</mn><msup><mi mathvariant=\"normal\">p</mi><mn>6</mn></msup><mo>\u00a0</mo><mn>3</mn><msup><mi mathvariant=\"normal\">s</mi><mn>2</mn></msup><mo>\u00a0</mo><mn>3</mn><msup><mi mathvariant=\"normal\">p</mi><mn>2</mn></msup></math></p><p><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mmultiscripts><mi mathvariant=\"normal\">F</mi><mprescripts></mprescripts><mn>9</mn><none></none></mmultiscripts><mo>\u2192</mo><mn>1</mn><msup><mi mathvariant=\"normal\">s</mi><mn>2</mn></msup><mo>\u00a0</mo><mn>2</mn><msup><mi mathvariant=\"normal\">s</mi><mn>2</mn></msup><mo>\u00a0</mo><mn>2</mn><msup><mi mathvariant=\"normal\">p</mi><mn>5</mn></msup></math></p><p>We can see the configuration of the elements and can identify that silicon has this tendency to lose the four electrons and gets the noble gas configuration.</p><p>the valency of the element is <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mn>4</mn></math> and it is most likely to be silicon.</p>", "opts": [{"id": "jmmS2", "text": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi>Na</mi></math>"}, {"id": "k6H8V", "text": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi>Si</mi></math>"}, {"id": "ArJ5U", "text": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi mathvariant=\"normal\">F</mi></math>"}, {"id": "Yt1tr", "text": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi>Ca</mi></math>"}], "ans": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi>Si</mi></math>", "correct": "k6H8V"}, {"id": "695e3b3b3dc984756e9de627", "type": "singleCorrect", "html": "Effective nuclear charge <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mo>(</mo><msub><mi mathvariant=\"normal\">Z</mi><mrow><mi mathvariant=\"normal\">e</mi><mi mathvariant=\"normal\">f</mi><mi mathvariant=\"normal\">f</mi></mrow></msub><mo>)</mo></math> for a nucleus of an atom is defined as", "sol": "Effective nuclear charge is the net positive charge experienced by the electrons from the nucleus. Due to presence of electrons in the innermost shells the electrons in the outermost shell do not experience the full positive charge from the nucleus. This is known as shielding of the outermost shell electrons from the nucleus by the innermost shell electrons.", "opts": [{"id": "MoXNn", "text": "shielding of the outermost shell electrons from the nucleus by the innermost shell electrons"}, {"id": "Z718O", "text": "the net positive charge experienced by electron from the nucleus"}, {"id": "rYzM6", "text": "the attractive force experienced by the nucleus from electron"}, {"id": "Zpalw", "text": "screening of positive charge on nucleus by innermost shell electrons"}], "ans": "the net positive charge experienced by electron from the nucleus", "correct": "Z718O"}, {"id": "695e3b3b3dc984756e9de628", "type": "singleCorrect", "html": "The correct decreasing order of electropositive character among the following elements <math> <mrow> <mtext>Fe,\u00a0Sc,\u00a0Rb,\u00a0Br,\u00a0Te,\u00a0F</mtext></mrow> </math> and <math> <mrow> <mtext>Ca</mtext></mrow> </math> is:", "sol": "(i) Alkali metals are more Electropositive than alkaline earth metals.<br/>(ii) <em>d</em>-Block Elements which are near to alkaline earth metals are more Electropositive than other P-Block Elements.<br/>(iii) Metalloids are more Electropositive than non-metals.", "opts": [{"id": "9QqF1", "text": "<math> <mrow> <mtext>Fe</mtext><mo>&gt;</mo><mtext>Sc</mtext><mo>&gt;</mo><mtext>Rb</mtext><mo>&gt;</mo><mtext>Br</mtext><mo>&gt;</mo><mtext>Te</mtext><mo>&gt;</mo><mtext>F</mtext><mo>&gt;</mo><mtext>Ca</mtext></mrow></math>"}, {"id": "nJGke", "text": "<math> <mrow> <mtext>Ca</mtext><mo>&gt;</mo><mtext>Rb</mtext><mo>&gt;</mo><mtext>Sc</mtext><mo>&gt;</mo><mtext>Fe</mtext><mo>&gt;</mo><mtext>Te</mtext><mo>&gt;</mo><mtext>F</mtext><mo>&gt;</mo><mtext>Br</mtext></mrow></math>"}, {"id": "YP51D", "text": "<math> <mrow> <mtext>Rb</mtext><mo>&gt;</mo><mtext>Ca</mtext><mo>&gt;</mo><mtext>Sc</mtext><mo>&gt;</mo><mtext>Fe</mtext><mo>&gt;</mo><mtext>Br</mtext><mo>&gt;</mo><mtext>Te</mtext><mo>&gt;</mo><mtext>F</mtext></mrow></math>"}, {"id": "uWo7D", "text": "<math> <mrow> <mtext>Rb</mtext><mo>&gt;</mo><mtext>Ca</mtext><mo>&gt;</mo><mtext>Sc</mtext><mo>&gt;</mo><mtext>Fe</mtext><mo>&gt;</mo><mtext>Te</mtext><mo>&gt;</mo><mtext>Br</mtext><mo>&gt;</mo><mtext>F</mtext></mrow></math>"}], "ans": "<math> <mrow> <mtext>Rb</mtext><mo>&gt;</mo><mtext>Ca</mtext><mo>&gt;</mo><mtext>Sc</mtext><mo>&gt;</mo><mtext>Fe</mtext><mo>&gt;</mo><mtext>Te</mtext><mo>&gt;</mo><mtext>Br</mtext><mo>&gt;</mo><mtext>F</mtext></mrow></math>", "correct": "uWo7D"}, {"id": "695e3b3b3dc984756e9de629", "type": "singleCorrect", "html": "According to Slater rule, which of the following has the&nbsp;highest screening constant for last electron?", "sol": "<p>According to Slater&#39;s rule, as the number of electrons increase, the screening constant value increases.&nbsp;</p><p><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi mathvariant=\"normal\">Z</mi><mi>eff</mi></msub><mo>=</mo><mi mathvariant=\"normal\">Z</mi><mo>-</mo><mi mathvariant=\"normal\">&#963;</mi></math></p><p><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi mathvariant=\"normal\">&#963;</mi><mo>=</mo></math>screening constant</p><p>Higher the number of electron in an element, more shielding it will provide to the last electron.</p><p>&nbsp;Number of electrons in fluorine&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfenced><mi mathvariant=\"normal\">F</mi></mfenced><mo>=</mo><mn>9</mn></math>. For the last electron, <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mn>8</mn></math> inner shell electrons will provide shielding to the <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msup><mn>9</mn><mi>th</mi></msup></math>&nbsp;electron.</p><p>So, the highest screening constant&nbsp;is in Fluorine.</p>", "opts": [{"id": "BwA0b", "text": "Fluorine <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mo>(</mo><mi mathvariant=\"normal\">F</mi><mo>)</mo></math>"}, {"id": "5ydwW", "text": "Oxygen <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mo>(</mo><mi mathvariant=\"normal\">O</mi><mo>)</mo></math>"}, {"id": "QMS1Z", "text": "Carbon <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mo>(</mo><mi mathvariant=\"normal\">C</mi><mo>)</mo></math>"}, {"id": "SmpVk", "text": "Nitrogen <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mo>(</mo><mi mathvariant=\"normal\">N</mi><mo>)</mo></math>"}], "ans": "Fluorine <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mo>(</mo><mi mathvariant=\"normal\">F</mi><mo>)</mo></math>", "correct": "BwA0b"}, {"id": "695e3b3b3dc984756e9de62a", "type": "singleCorrect", "html": "The formation of the oxide ion <math><msup><mrow><mi mathvariant=\"normal\">O</mi></mrow><mrow><mn>2</mn><mo>-</mo></mrow></msup></math>(g) requires first an exothermic and then an endothermic step as shown below;<br/><math><mi mathvariant=\"normal\">O</mi><mfenced separators=\"|\"><mrow><mi mathvariant=\"normal\">g</mi></mrow></mfenced><mo>+</mo><msup><mrow><mi>e</mi></mrow><mrow><mo>-</mo></mrow></msup><mo>=</mo><msup><mrow><mi mathvariant=\"normal\">O</mi></mrow><mrow><mo>-</mo></mrow></msup><mfenced separators=\"|\"><mrow><mi mathvariant=\"normal\">g</mi></mrow></mfenced><mo>;</mo><mi mathvariant=\"normal\">&#160;</mi><mo>&#8710;</mo><mi>H</mi><mo>&#176;</mo><mo>=</mo><mo>-</mo><mn>142</mn><mi mathvariant=\"normal\">&#160;</mi><mi mathvariant=\"normal\">k</mi><mi mathvariant=\"normal\">J</mi><mi mathvariant=\"normal\">m</mi><mi mathvariant=\"normal\">o</mi><msup><mrow><mn>1</mn></mrow><mrow><mo>-</mo><mn>1</mn></mrow></msup></math><br/><math><mi mathvariant=\"normal\">O</mi><msup><mrow><mfenced separators=\"|\"><mrow><mi mathvariant=\"normal\">g</mi></mrow></mfenced></mrow><mrow><mo>-</mo></mrow></msup><mo>+</mo><msup><mrow><mi>e</mi></mrow><mrow><mo>-</mo></mrow></msup><mo>=</mo><msup><mrow><mi mathvariant=\"normal\">O</mi></mrow><mrow><mn>2</mn><mo>-</mo></mrow></msup><mfenced separators=\"|\"><mrow><mi mathvariant=\"normal\">g</mi></mrow></mfenced><mo>;</mo><mo>&#8710;</mo><mi>H</mi><mo>&#176;</mo><mo>=</mo><mn>844</mn><mi mathvariant=\"normal\">&#160;</mi><mi mathvariant=\"normal\">k</mi><mi mathvariant=\"normal\">J</mi><mi mathvariant=\"normal\">m</mi><mi mathvariant=\"normal\">o</mi><msup><mrow><mn>1</mn></mrow><mrow><mo>-</mo><mn>1</mn></mrow></msup></math><br/>This is because", "sol": "<p>Electron Affinity:<br />If an electron is added to a neutral atom in gas state, energy is given off. We call this energy &quot;electron affinity&quot;.<br />&nbsp;</p><p><math><msup><mrow><mi mathvariant=\"normal\">O</mi></mrow><mrow><mo>-</mo></mrow></msup><mfenced separators=\"|\"><mrow><mi mathvariant=\"normal\">g</mi></mrow></mfenced><mo>+</mo><msup><mrow><mi>e</mi></mrow><mrow><mo>-</mo></mrow></msup><mo>&#8594;</mo><msup><mrow><mi mathvariant=\"normal\">O</mi></mrow><mrow><mn>2</mn><mo>-</mo></mrow></msup><mfenced separators=\"|\"><mrow><mi mathvariant=\"normal\">g</mi></mrow></mfenced><mo>,</mo><mi mathvariant=\"normal\">&#160;</mi><mo>&#8710;</mo><mi>H</mi><mo>&#176;</mo><mo>=</mo><mn>844</mn><mi mathvariant=\"normal\">&#160;</mi><mi mathvariant=\"normal\">k</mi><mi mathvariant=\"normal\">J</mi><mi mathvariant=\"normal\">m</mi><mi mathvariant=\"normal\">o</mi><msup><mrow><mi mathvariant=\"normal\">l</mi></mrow><mrow><mo>-</mo><mn>1</mn></mrow></msup></math><br/>This process is unfavorable in the gas phase because the resulting increase in electron-electron repulsion overweighs the stability gained by achieving the noble gas configuration.</p>", "opts": [{"id": "Mq2fK", "text": "Oxygen is more electronegative"}, {"id": "zXNLm", "text": "Oxygen has high electron affinity"}, {"id": "GELV8", "text": "<math><msup><mrow><mi mathvariant=\"normal\">O</mi></mrow><mrow><mo>-</mo></mrow></msup></math>ion will tend to resist the addition of another electron"}, {"id": "NUzjd", "text": "<math><msup><mrow><mi mathvariant=\"normal\">O</mi></mrow><mrow><mo>-</mo></mrow></msup></math>has comparatively larger size than oxygen atom"}], "ans": "<math><msup><mrow><mi mathvariant=\"normal\">O</mi></mrow><mrow><mo>-</mo></mrow></msup></math>ion will tend to resist the addition of another electron", "correct": "GELV8"}, {"id": "695e3b3b3dc984756e9de62b", "type": "singleCorrect", "html": "Which one of the following arrangements represents the correct order of least negative to most negative electron gain enthalpy for C, Ca, Al, F and O?", "sol": "Electron gain enthalpy becomes less negative from top to bottom in a group while it becomes more negative from left to right within a period. <br/>Ca &lt; Al &lt; C &lt; O &lt; F", "opts": [{"id": "6pcJT", "text": "Al &lt; Ca &lt; O &lt; C &lt; F"}, {"id": "yLsQZ", "text": "Al &lt; O &lt; C &lt; Ca &lt; F"}, {"id": "DDyHr", "text": "C &lt; F &lt; O Al &lt; Ca"}, {"id": "KC8NT", "text": "Ca &lt; Al &lt; C &lt; O &lt; F"}], "ans": "Ca &lt; Al &lt; C &lt; O &lt; F", "correct": "KC8NT"}, {"id": "695e3b3b3dc984756e9de62c", "type": "singleCorrect", "html": "<p><span style=\"font-family:&quot;Calibri&quot;,&quot;sans-serif&quot;\">Along the period <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mo>(</mo><mo>&#10230;</mo><mo>)</mo></math>&nbsp;<span style=\"font-family:&quot;Calibri&quot;,&quot;sans-serif&quot;\">atomic/ionic radii and metallic character decreases while <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi>I</mi><mi>E</mi><mo>,</mo><mi>E</mi><mi>N</mi><mo>,</mo></math>non-metallic character and oxiding power increases. Down the group <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mo>(</mo><mo>&#8595;</mo><mo>)</mo><mo>,</mo></math>&nbsp;atomic/ionic radii, metallic character and reducing character increases while <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi>I</mi><mi>E</mi></math>&nbsp;and&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi>E</mi><mi>N</mi></math>&nbsp;decrease. However, <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><msub><mo>&#8710;</mo><mi>e</mi></msub><mi>g</mi></msub><msup><mi>H</mi><mo>&#8861;</mo></msup></math>&nbsp;becomes less negative down a group but more negative along a period.</p><p><span style=\"font-family:&quot;Calibri&quot;,&quot;sans-serif&quot;\">If the ionic radii of <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msup><mi mathvariant=\"normal\">M</mi><mo>&#8853;</mo></msup></math>&nbsp;and&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msup><mi mathvariant=\"normal\">X</mi><mo>&#8861;</mo></msup></math>&nbsp;are about&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mn>135</mn><mo>&#160;</mo><mi>pm</mi><mo>,</mo></math><span style=\"font-family:&quot;Calibri&quot;,&quot;sans-serif&quot;\">then expected values of metallic radii of <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi mathvariant=\"normal\">M</mi><mo>&#160;</mo></math>and&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi mathvariant=\"normal\">X</mi></math> <span style=\"font-family:&quot;Calibri&quot;,&quot;sans-serif&quot;\">should be respectively.</p>", "sol": "<p>If an atom looses an electron, then the radius of cation decreases due to the increase in effective nuclear charge.</p><p>That means,&nbsp;metal cation should have an ionic radius less than that of metal.&nbsp;</p><p>Given ionic radius of&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msup><mi mathvariant=\"normal\">M</mi><mo>&#8853;</mo></msup></math>&nbsp;is&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mn>135</mn><mo>&#160;</mo><mi>pm</mi></math>.</p><p>Hence,&nbsp;&nbsp;<span style=\"font-family:&quot;Calibri&quot;,&quot;sans-serif&quot;\"><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi mathvariant=\"normal\">M</mi><mo>&#62;</mo><msup><mi mathvariant=\"normal\">M</mi><mo>&#8853;</mo></msup></math><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mo>(</mo><mn>135</mn><mo>&#160;</mo><mi>pm</mi><mo>)</mo></math>&nbsp;</p><p>If an atom gains an electron, radius of anion will increase due to the decrease in effective nuclear charge.</p><p>That means,&nbsp;an anion&nbsp;should have an ionic radius more than that of the respective element.</p><p>Given ionic radius of&nbsp;&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msup><mi mathvariant=\"normal\">X</mi><mo>&#8861;</mo></msup></math>&nbsp;is&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mn>135</mn><mo>&#160;</mo><mi>pm</mi></math>.</p><p>Hence,&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi mathvariant=\"normal\">X</mi><mo>&#60;</mo><msup><mi mathvariant=\"normal\">X</mi><mo>&#8861;</mo></msup><mo>(</mo><mn>135</mn><mi>pm</mi><mo>)</mo></math></p><p>Among the given values, the ionic radii of&nbsp;&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msup><mi mathvariant=\"normal\">M</mi><mo>&#8853;</mo></msup></math>can be&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mn>230</mn><mo>&#160;</mo><mi>pm</mi></math>&nbsp;and that of&nbsp;&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msup><mi mathvariant=\"normal\">X</mi><mo>&#8861;</mo></msup></math>&nbsp;can be&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mn>60</mn><mo>&#160;</mo><mi>pm</mi></math>.</p>", "opts": [{"id": "5eEFJ", "text": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mn>65</mn><mo>&#160;</mo><mi>and</mi><mo>&#160;</mo><mn>230</mn><mo>&#160;</mo><mi>pm</mi></math>"}, {"id": "nQnFX", "text": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mn>230</mn><mo>&#160;</mo><mi>and</mi><mo>&#160;</mo><mn>60</mn><mi>pm</mi></math>"}, {"id": "QlO5S", "text": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mn>230</mn><mo>&#160;</mo><mi>and</mi><mo>&#160;</mo><mn>135</mn><mo>&#160;</mo><mi>pm</mi></math>"}, {"id": "2IKge", "text": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mn>135</mn><mo>&#160;</mo><mi>and</mi><mo>&#160;</mo><mn>135</mn><mo>&#160;</mo><mi>pm</mi></math>"}], "ans": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mn>230</mn><mo>&#160;</mo><mi>and</mi><mo>&#160;</mo><mn>60</mn><mi>pm</mi></math>", "correct": "nQnFX"}, {"id": "695e3b3b3dc984756e9de62d", "type": "singleCorrect", "html": "Which of the following statements is correct for the periodic classification of elements?", "sol": "Across a transition&nbsp;series, initially, the ENC increases and atomic size decreases. After that,&nbsp;due to shielding effect of <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mn>3</mn><mi mathvariant=\"normal\">d</mi><mo>-</mo></math>electrons, atomic size becomes constant at the middle members as we proceed to <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msup><mi>ns</mi><mn>2</mn></msup><mfenced><mrow><mi mathvariant=\"normal\">n</mi><mo>-</mo><mn>1</mn></mrow></mfenced><msup><mi mathvariant=\"normal\">d</mi><mn>10</mn></msup></math><sup> </sup>configurations due to a decrease in the number of unpaired electrons, the strength of metallic bonding decreases and also atomic size at <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mmultiscripts><mi>Zn</mi><mprescripts></mprescripts><mn>30</mn><none></none></mmultiscripts></math>, that is,&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mn>3</mn><msup><mi mathvariant=\"normal\">d</mi><mn>10</mn></msup></math><sup> </sup> increases.", "opts": [{"id": "hp2uX", "text": "Atomic size gradually increases from left to right in a period for representative elements."}, {"id": "rtYuy", "text": "Across a transition series, the atomic size gradually but somewhat irregularly decreases and then increases at the end of the series."}, {"id": "Rd3yx", "text": "Electron affinities of the representative elements in the third period are smaller than those of the second period in their respective groups."}, {"id": "xoUuX", "text": "Ionization potential gradually but irregularly decreases across a representative&nbsp;period."}], "ans": "Across a transition series, the atomic size gradually but somewhat irregularly decreases and then increases at the end of the series.", "correct": "rtYuy"}]}, {"name": "Coordination Compounds", "qs": [{"id": "695e3b3b3dc984756e9de62e", "type": "singleCorrect", "html": "The hypothetical complex chlorodiaquatriammine cobalt (III) chloride can be represented as:", "sol": "The hypothetical complex chlorodiaquatriamminecobalt (III) chloride can be represented as $\\left[\\mathrm{CoCl}\\left(\\mathrm{NH}_3\\right)_3\\right.$ $\\left.\\left(\\mathrm{H}_2 \\mathrm{O}\\right)_2\\right] \\mathrm{Cl}_2$", "opts": [{"id": "ohNKZ", "text": "$\\left[\\mathrm{CoCl}\\left(\\mathrm{NH}_3\\right)_3\\left(\\mathrm{H}_2 \\mathrm{O}\\right)_2\\right] \\mathrm{Cl}_2$"}, {"id": "WshHh", "text": "$\\left[\\mathrm{Co}\\left(\\mathrm{NH}_3\\right)_3\\left(\\mathrm{H}_2 \\mathrm{O}\\right) \\mathrm{Cl}_3\\right]$"}, {"id": "SPp5a", "text": "$\\left[\\mathrm{Co}\\left(\\mathrm{NH}_2\\right)_3\\left(\\mathrm{H}_2 \\mathrm{O}\\right)_2 \\mathrm{Cl}\\right]$"}, {"id": "ve3Pc", "text": "$\\left[\\mathrm{Co}\\left(\\mathrm{NH}_3\\right)_3\\left(\\mathrm{H}_2 \\mathrm{O}\\right)_3 \\mathrm{Cl}_3\\right]$"}], "ans": "$\\left[\\mathrm{CoCl}\\left(\\mathrm{NH}_3\\right)_3\\left(\\mathrm{H}_2 \\mathrm{O}\\right)_2\\right] \\mathrm{Cl}_2$", "correct": "ohNKZ"}, {"id": "695e3b3b3dc984756e9de62f", "type": "singleCorrect", "html": "The name of complex ion, <math><msup><mrow><mfenced close=\"]\" open=\"[\" separators=\"|\"><mrow><mi mathvariant=\"normal\">F</mi><mi mathvariant=\"normal\">e</mi><msub><mrow><mfenced separators=\"|\"><mrow><mi mathvariant=\"normal\">C</mi><mi mathvariant=\"normal\">N</mi></mrow></mfenced></mrow><mrow><mn>6</mn></mrow></msub></mrow></mfenced></mrow><mrow><mn>3</mn><mo>-</mo></mrow></msup></math> is :", "sol": "<math><msup><mrow><mfenced close=\"]\" open=\"[\" separators=\"|\"><mrow><mi mathvariant=\"normal\">F</mi><mi mathvariant=\"normal\">e</mi><msub><mrow><mfenced separators=\"|\"><mrow><mi mathvariant=\"normal\">C</mi><mi mathvariant=\"normal\">N</mi></mrow></mfenced></mrow><mrow><mn>6</mn></mrow></msub></mrow></mfenced></mrow><mrow><mn>3</mn><mo>-</mo></mrow></msup></math> <br/><br/>Hexacyanidoferrate (III) ion", "opts": [{"id": "SHksE", "text": "Hexacyanoiron (III) ion"}, {"id": "MRrV9", "text": "Hexacyanitoferrate (III) ion"}, {"id": "oaqO6", "text": "Tricyanoferrate (III) ion"}, {"id": "Cru3D", "text": "Hexacyanidoferrate (III) ion"}], "ans": "Hexacyanidoferrate (III) ion", "correct": "Cru3D"}, {"id": "695e3b3b3dc984756e9de630", "type": "singleCorrect", "html": "Match the geometry (given in column <math><mi mathvariant=\"normal\">A</mi></math>) with the complexes (given in column <math><mi mathvariant=\"normal\">B</mi></math>) in:\r\r<table border=\"1px solid\"> <thead> <tr> <th>\u00a0</th> <th>Geometry: <math><mi mathvariant=\"normal\">A</mi></math></th> <th>\u00a0</th> <th>Complex: <math><mi mathvariant=\"normal\"></mi><mi mathvariant=\"normal\">B</mi></math></th> </tr> </thead> <tbody> <tr> <td><math><mi mathvariant=\"normal\">I</mi></math></td> <td>Octahedral</td> <td><math><mo>(</mo><mi mathvariant=\"normal\">P</mi><mo>)</mo></math></td> <td><math><mo>[</mo><mi mathvariant=\"normal\">N</mi><mi mathvariant=\"normal\">i</mi><mo>(</mo><mi mathvariant=\"normal\">C</mi><mi mathvariant=\"normal\">N</mi><msub><mrow><mo>)</mo></mrow><mrow><mn>4</mn></mrow></msub><msup><mrow><mo>]</mo></mrow><mrow><mn>2</mn><mo>-</mo></mrow></msup></math></td> </tr> <tr> <td><math><mi mathvariant=\"normal\">I</mi><mi mathvariant=\"normal\">I</mi></math></td> <td>Square planar</td> <td><math><mo>(</mo><mi mathvariant=\"normal\">Q</mi><mo>)</mo></math></td> <td><math><mi mathvariant=\"normal\">N</mi><mi mathvariant=\"normal\">i</mi><mo>(</mo><mi mathvariant=\"normal\">C</mi><mi mathvariant=\"normal\">O</mi><msub><mrow><mo>)</mo></mrow><mrow><mn>4</mn></mrow></msub></math></td> </tr> <tr> <td><math><mi mathvariant=\"normal\">I</mi><mi mathvariant=\"normal\">I</mi><mi mathvariant=\"normal\">I</mi></math></td> <td>Tetrahedral</td> <td><math><mo>(</mo><mi mathvariant=\"normal\">R</mi><mo>)</mo></math></td> <td><math><mo>[</mo><mi mathvariant=\"normal\">F</mi><mi mathvariant=\"normal\">e</mi><mo>(</mo><mi mathvariant=\"normal\">C</mi><mi mathvariant=\" \u00a0</mi><mn>4</mn></math>", "correct": "QSIxz"}, {"id": "695e3b3b3dc984756e9de635", "type": "singleCorrect", "html": "The EAN of <math><mi mathvariant=\"normal\">F</mi><mi mathvariant=\"normal\">e</mi></math> in <math><msub><mrow><mi mathvariant=\"normal\">K</mi></mrow><mrow><mn>4</mn></mrow></msub><mfenced close=\"]\" open=\"[\" separators=\"|\"><mrow><mi mathvariant=\"normal\">F</mi><mi mathvariant=\"normal\">e</mi><msub><mrow><mfenced separators=\"|\"><mrow><mi mathvariant=\"normal\">C</mi><mi mathvariant=\"normal\">N</mi></mrow></mfenced></mrow><mrow><mn>6</mn></mrow></msub></mrow></mfenced></math>\u00a0is", "sol": "EAN is known as effective atomic number. It is given by the relation.<br/><math><mi mathvariant=\"normal\">E</mi><mi mathvariant=\"normal\">A</mi><mi mathvariant=\"normal\">N</mi><mo>=</mo><mi mathvariant=\"normal\">A</mi><mi mathvariant=\"normal\">t</mi><mi mathvariant=\"normal\">o</mi><mi mathvariant=\"normal\">m</mi><mi mathvariant=\"normal\">i</mi><mi mathvariant=\"normal\">c\u00a0</mi><mi mathvariant=\"normal\">n</mi><mi mathvariant=\"normal\">u</mi><mi mathvariant=\"normal\">m</mi><mi mathvariant=\"normal\">b</mi><mi mathvariant=\"normal\">e</mi><mi mathvariant=\"normal\">r</mi><mo>-</mo><mi mathvariant=\"normal\">O</mi><mi mathvariant=\"normal\">x</mi><mi mathvariant=\"normal\">i</mi><mi mathvariant=\"normal\">d</mi><mi mathvariant=\"normal\">a</mi><mi mathvariant=\"normal\">t</mi><mi mathvariant=\"normal\">i</mi><mi mathvariant=\"normal\">o</mi><mi mathvariant=\"normal\">n\u00a0</mi><mi mathvariant=\"normal\">s</mi><mi mathvariant=\"normal\">t</mi><mi mathvariant=\"normal\">a</mi><mi mathvariant=\"normal\">t</mi><mi mathvariant=\"normal\">e</mi><mo>+</mo><mn>2</mn><mo>\u00d7</mo><mi mathvariant=\"normal\">n</mi><mi mathvariant=\"normal\">u</mi><mi mathvariant=\"normal\">m</mi><mi mathvariant=\"normal\">b</mi><mi mathvariant=\"normal\">e</mi><mi mathvariant=\"normal\">r\u00a0</mi><mi mathvariant=\"normal\">o</mi><mi mathvariant=\"normal\">f\u00a0</mi><mi mathvariant=\"normal\">L</mi><mi mathvariant=\"normal\">i</mi><mi mathvariant=\"normal\">g</mi><mi mathvariant=\"normal\">a</mi><mi mathvariant=\"normal\">n</mi><mi mathvariant=\"normal\">d</mi><mi mathvariant=\"normal\">s</mi></math><br/><math><mo>=</mo><mn>26</mn><mo>-</mo><mn>2</mn><mo>+</mo><mn>2</mn><mo>(</mo><mn>6</mn><mo>)</mo><mo>=</mo><mn>36</mn><mo>.</mo></math>", "opts": [{"id": "nuwqo", "text": "<math><mn>33</mn></math>"}, {"id": "eLmeJ", "text": "<math><mn>35</mn></math>"}, {"id": "rgLEC", "text": "<math><mn>36</mn></math>"}, {"id": "uqeU9", "text": "<math><mn>26</mn></math>"}], "ans": "<math><mn>36</mn></math>", "correct": "rgLEC"}, {"id": "695e3b3b3dc984756e9de636", "type": "singleCorrect", "html": "As per the postulates of Werner&#39;s theory for coordination compounds, which of the following is correct?", "sol": "<p>As per the postulates of Werner&#39;s theory for coordination compounds, metal atoms exhibit two types of valencies, i.e., primary valency and secondary valency. The primary valency is ionisable, whereas the secondary valency is non-ionisable.</p>", "opts": [{"id": "J4CEX", "text": "Primary valencies are ionisable."}, {"id": "gI2Z7", "text": "Secondary valencies are ionisable."}, {"id": "I5smr", "text": "Only primary valencies are non-ionisable."}, {"id": "1jHZo", "text": "Primary and secondary valencies are non-ionisable."}], "ans": "Primary valencies are ionisable.", "correct": "J4CEX"}, {"id": "695e3b3b3dc984756e9de637", "type": "singleCorrect", "html": "Among the following which is not the pi-bonded organometallic compound?", "sol": "In case of <math><mo>(</mo><mi mathvariant=\"normal\">C</mi><msub><mrow><mi mathvariant=\"normal\">H</mi></mrow><mrow><mn>3</mn></mrow></msub><msub><mrow><mo>)</mo></mrow><mrow><mn>4</mn></mrow></msub><mi mathvariant=\"normal\">S</mi><mi mathvariant=\"normal\">n</mi></math> only sigma bonds are possible and there is no pi electron density so it is sigma bond complex.", "opts": [{"id": "rBOXG", "text": "<math><mi mathvariant=\"normal\">K</mi><mo>[</mo><mi mathvariant=\"normal\">P</mi><mi mathvariant=\"normal\">t</mi><mi mathvariant=\"normal\">C</mi><msub><mrow><mi mathvariant=\"normal\">l</mi></mrow><mrow><mn>3</mn></mrow></msub><mo>(</mo><msup><mrow><mi mathvariant=\"normal\">\u03b7</mi></mrow><mrow><mn>2</mn></mrow></msup><mo>-</mo><msub><mrow><mi mathvariant=\"normal\">C</mi></mrow><mrow><mn>2</mn></mrow></msub><msub><mrow><mi mathvariant=\"normal\">H</mi></mrow><mrow><mn>4</mn></mrow></msub><mo>)</mo><mo>]</mo></math>"}, {"id": "GAjHi", "text": "<math><mi mathvariant=\"normal\">F</mi><mi mathvariant=\"normal\">e</mi><mo>(</mo><msup><mrow><mi mathvariant=\"normal\">\u03b7</mi></mrow><mrow><mn>5</mn></mrow></msup><mo>-</mo><msub><mrow><mi mathvariant=\"normal\">C</mi></mrow><mrow><mn>5</mn></mrow></msub><msub><mrow><mi mathvariant=\"normal\">H</mi></mrow><mrow><mn>5</mn></mrow></msub><msub><mrow><mo>)</mo></mrow><mrow><mn>2</mn></mrow></msub></math>"}, {"id": "MnvnU", "text": "<math><mi mathvariant=\"normal\">C</mi><mi mathvariant=\"normal\">r</mi><mo>(</mo><msup><mrow><mi mathvariant=\"normal\">\u03b7</mi></mrow><mrow><mn>6</mn></mrow></msup><mo>-</mo><msub><mrow><mi mathvariant=\"normal\">C</mi></mrow><mrow><mn>6</mn></mrow></msub><msub><mrow><mi mathvariant=\"normal\">H</mi></mrow><mrow><mn>6</mn></mrow></msub><msub><mrow><mo>)</mo></mrow><mrow><mn>2</mn></mrow></msub></math>"}, {"id": "Zmm65", "text": "<math><mo>(</mo><mi mathvariant=\"normal\">C</mi><msub><mrow><mi mathvariant=\"normal\">H</mi></mrow><mrow><mn>3</mn></mrow></msub><msub><mrow><mo>)</mo></mrow><mrow><mn>4</mn></mrow></msub><mi mathvariant=\"normal\">S</mi><mi mathvariant=\"normal\">n</mi></math>"}], "ans": "<math><mo>(</mo><mi mathvariant=\"normal\">C</mi><msub><mrow><mi mathvariant=\"normal\">H</mi></mrow><mrow><mn>3</mn></mrow></msub><msub><mrow><mo>)</mo></mrow><mrow><mn>4</mn></mrow></msub><mi mathvariant=\"normal\">S</mi><mi mathvariant=\"normal\">n</mi></math>", "correct": "Zmm65"}, {"id": "695e3b3b3dc984756e9de638", "type": "singleCorrect", "html": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msup><mi>Mn</mi><mrow><mn>2</mn><mo>+</mo></mrow></msup></math> forms a complex with <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msup><mi>Br</mi><mo>-</mo></msup></math> ion. The magnetic moment (spin only) of the complex is <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mn>5</mn><mo>.</mo><mn>92</mn><mo>&#160;</mo><mi mathvariant=\"normal\">B</mi><mo>.</mo><mi mathvariant=\"normal\">M</mi><mo>.</mo></math> The probable formula and geometry of the complex are, respectively.", "sol": "<p><math> <mrow> <mover accent=\"true\"> <mtext>&#956;</mtext> <mo stretchy=\"true\">&#8594;</mo> </mover> </mrow><mo>=</mo><mrow> <msqrt> <mtext>n</mtext> <mfenced close=\")\" open=\"(\" separators=\",\"> <mrow> <mtext>n</mtext> <mo>+</mo> <mn>2</mn> </mrow> </mfenced> </msqrt> <mo>=</mo> <mn>5</mn> <mtext>.</mtext> <mn>9</mn> <mn>2</mn> </mrow> </math><br/><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi mathvariant=\"normal\">n</mi><mfenced><mrow><mi mathvariant=\"normal\">n</mi><mo>+</mo><mn>2</mn></mrow></mfenced><mo>=</mo><mn>35</mn><mo>.</mo><mn>05</mn></math><br/><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi mathvariant=\"normal\">n</mi><mo>=</mo><mn>5</mn></math><br/>Thus, the unpaired electrons should be present in the complex,&nbsp;i.e. inner <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi mathvariant=\"normal\">d</mi><mo>-</mo></math>orbitals. There will be no pairing of electrons due to a weak ligand field.<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msup><mfenced close=\"]\" open=\"[\"><msub><mi>MnBr</mi><mn>4</mn></msub></mfenced><mrow><mn>2</mn><mo>-</mo></mrow></msup></math> is tetrahedral, i.e. <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msup><mi>sp</mi><mn>3</mn></msup></math>.<br/>For <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msup><mi>sp</mi><mn>3</mn></msup></math>, no requirement of <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi mathvariant=\"normal\">d</mi><mo>-</mo></math>orbitals, thus the electronic configuration will be<br /><img height=\"92\" src=\"https://cdn-question-pool.getmarks.app/NEET/DPP-Chemistry/31933b77-6195-42f6-b176-3084b5404bff-image.png\" width=\"350\" /></p>", "opts": [{"id": "THbFA", "text": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msup><mfenced open=\"[\" close=\"]\"><msub><mi>MnBr</mi><mn>4</mn></msub></mfenced><mrow><mn>2</mn><mo>-</mo></mrow></msup></math>; tetrahedral"}, {"id": "KixEc", "text": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msup><mfenced open=\"[\" close=\"]\"><msub><mi>MnBr</mi><mn>4</mn></msub></mfenced><mrow><mn>2</mn><mo>-</mo></mrow></msup></math>; square planar"}, {"id": "KmPMk", "text": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msup><mfenced open=\"[\" close=\"]\"><msub><mi>MnBr</mi><mn>6</mn></msub></mfenced><mrow><mn>4</mn><mo>-</mo></mrow></msup></math>; octahedral"}, {"id": "fne0V", "text": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msup><mfenced open=\"[\" close=\"]\"><msub><mi>MnBr</mi><mn>5</mn></msub></mfenced><mrow><mn>3</mn><mo>-</mo></mrow></msup></math>; trigonal planar"}], "ans": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msup><mfenced open=\"[\" close=\"]\"><msub><mi>MnBr</mi><mn>4</mn></msub></mfenced><mrow><mn>2</mn><mo>-</mo></mrow></msup></math>; tetrahedral", "correct": "THbFA"}, {"id": "695e3b3b3dc984756e9de639", "type": "singleCorrect", "html": "Which of the following compounds has coordination number as 5?", "sol": "<p>Among the given coordination compounds, the complex with coordination number of 5 is&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msup><mfenced open=\"[\" close=\"]\"><msub><mi>VOCl</mi><mn>4</mn></msub></mfenced><mrow><mn>2</mn><mo>-</mo></mrow></msup></math>. In&nbsp;this compound, the 4 chlorine&nbsp;ligands are bonded with&nbsp;the vanadium metal&nbsp;atom at the corners of the square&nbsp;whereas the&nbsp;oxygen ligand is bonded to the&nbsp;vanadium above the plane&nbsp;of the square.</p>", "opts": [{"id": "d9A30", "text": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msup><mfenced open=\"[\" close=\"]\"><mrow><mi>Cu</mi><msub><mfenced><mi>CN</mi></mfenced><mn>3</mn></msub></mrow></mfenced><mrow><mn>2</mn><mo>-</mo></mrow></msup></math>"}, {"id": "TwUQq", "text": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msup><mfenced open=\"[\" close=\"]\"><msub><mi>VOCl</mi><mn>4</mn></msub></mfenced><mrow><mn>2</mn><mo>-</mo></mrow></msup></math>"}, {"id": "etaTk", "text": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msup><mfenced open=\"[\" close=\"]\"><mrow><mi>Ag</mi><msub><mfenced><msub><mi>NH</mi><mn>3</mn></msub></mfenced><mn>2</mn></msub></mrow></mfenced><mo>+</mo></msup></math>"}, {"id": "9MydG", "text": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msup><mfenced open=\"[\" close=\"]\"><msub><mi>NiCl</mi><mn>4</mn></msub></mfenced><mrow><mn>2</mn><mo>-</mo></mrow></msup></math>"}], "ans": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msup><mfenced open=\"[\" close=\"]\"><msub><mi>VOCl</mi><mn>4</mn></msub></mfenced><mrow><mn>2</mn><mo>-</mo></mrow></msup></math>", "correct": "TwUQq"}, {"id": "695e3b3b3dc984756e9de63a", "type": "singleCorrect", "html": "According to Werner&#39;s theory, the most metallic elements exhibit _____ types of valence(s).", "sol": "<p>According to Werner&#39;s theory, the most metallic elements exhibit two types of valence, primary and secondary.</p><p>The primary valence is basically the ionic bond in which the positive charge of the metal is satisfied by anion and it is non-directional.</p><p>The secondary valence is due to the presence of vacant orbitals on metal, it is satisfied by ligands which donate lone pair to the central metal ion and form co-ordinate bonds. It is directional in nature.</p>", "opts": [{"id": "qTRtY", "text": "two"}, {"id": "xpJPa", "text": "three"}, {"id": "OzlQo", "text": "five"}, {"id": "gcM38", "text": "infinite"}], "ans": "two", "correct": "qTRtY"}, {"id": "695e3b3b3dc984756e9de63b", "type": "singleCorrect", "html": "Which of the following ligand gives chelate complexes?", "sol": "<math><msub><mrow><mi mathvariant=\"normal\">C</mi></mrow><mrow><mn>2</mn></mrow></msub><msubsup><mrow><mi mathvariant=\"normal\">O</mi></mrow><mrow><mn>4</mn></mrow><mrow><mn>2</mn><mo>-</mo></mrow></msubsup></math> is a symmetrical bidentate ligand so it can be used for chelate complex formation. <br/>Pyridine, <math><mi mathvariant=\"normal\">N</mi><msub><mrow><mi mathvariant=\"normal\">H</mi></mrow><mrow><mn>2</mn></mrow></msub><mo>-</mo><mover><mrow><mi mathvariant=\"normal\">N</mi></mrow><mrow><mo>+</mo></mrow></mover><msub><mrow><mi mathvariant=\"normal\">H</mi></mrow><mrow><mn>3</mn></mrow></msub></math> are monodentate ligands so can not form chelate complex. <br/><math><mi mathvariant=\"normal\">S</mi><mi mathvariant=\"normal\">C</mi><msup><mrow><mi mathvariant=\"normal\">N</mi></mrow><mrow><mo>-</mo></mrow></msup></math> is an ambidentate ligand so only one site can be used at a time so no chelate complex is possible.", "opts": [{"id": "Oi28k", "text": "<math><mi mathvariant=\"normal\">S</mi><mi mathvariant=\"normal\">C</mi><msup><mrow><mi mathvariant=\"normal\">N</mi></mrow><mrow><mo>-</mo></mrow></msup></math>"}, {"id": "FGwJS", "text": "<math><msub><mrow><mi mathvariant=\"normal\">C</mi></mrow><mrow><mn>2</mn></mrow></msub><msubsup><mrow><mi mathvariant=\"normal\">O</mi></mrow><mrow><mn>4</mn></mrow><mrow><mn>2</mn><mo>-</mo></mrow></msubsup></math>"}, {"id": "BpLE0", "text": "Pyridine"}, {"id": "FjwWF", "text": "<math><mi mathvariant=\"normal\">N</mi><msub><mrow><mi mathvariant=\"normal\">H</mi></mrow><mrow><mn>2</mn></mrow></msub><mo>-</mo><mover><mrow><mi mathvariant=\"normal\">N</mi></mrow><mrow><mo>+</mo></mrow></mover><msub><mrow><mi mathvariant=\"normal\">H</mi></mrow><mrow><mn>3</mn></mrow></msub></math>"}], "ans": "<math><msub><mrow><mi mathvariant=\"normal\">C</mi></mrow><mrow><mn>2</mn></mrow></msub><msubsup><mrow><mi mathvariant=\"normal\">O</mi></mrow><mrow><mn>4</mn></mrow><mrow><mn>2</mn><mo>-</mo></mrow></msubsup></math>", "correct": "FGwJS"}, {"id": "695e3b3b3dc984756e9de63c", "type": "singleCorrect", "html": "In sodium nitroprusside, the oxidation number, coordination number and EAN of iron are respectively", "sol": "<math><mi mathvariant=\"normal\">N</mi><msub><mrow><mi mathvariant=\"normal\">a</mi></mrow><mrow><mn>2</mn></mrow></msub><mo>[</mo><mi mathvariant=\"normal\">F</mi><mi mathvariant=\"normal\">e</mi><mo>(</mo><mi mathvariant=\"normal\">C</mi><mi mathvariant=\"normal\">N</mi><msub><mrow><mo>)</mo></mrow><mrow><mn>5</mn></mrow></msub><mi mathvariant=\"normal\">N</mi><mi mathvariant=\"normal\">O</mi><mo>]</mo></math><br/>C.N. of Fe = 6<br/>O.N. of Fe = +3<br/>EAN = 26 \u2013 3 + 12 = 35.", "opts": [{"id": "K14o1", "text": "+3, 6, 36"}, {"id": "Jvvo6", "text": "+3, 6, 35"}, {"id": "OO8nv", "text": "+3, 3, 36"}, {"id": "BWB2P", "text": "6, +3, 35"}], "ans": "+3, 6, 35", "correct": "Jvvo6"}, {"id": "695e3b3b3dc984756e9de63d", "type": "singleCorrect", "html": "Which of the following&nbsp;ligands is used for the separation of lanthanides,in softening of hard water?", "sol": "<p>EDTA is used as a chelating ligand for the separation of lanthanides, in softening of hard water and also in removing lead poisoning.</p>", "opts": [{"id": "x7pvk", "text": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfenced open=\"[\" close=\"]\"><mrow><mi>Ag</mi><msub><mfenced><mi>CN</mi></mfenced><mn>2</mn></msub></mrow></mfenced></math>"}, {"id": "JmA3A", "text": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mo>[</mo><mi>Ni</mi><mo>(</mo><mi>CO</mi><msub><mo>)</mo><mn>4</mn></msub><mo>]</mo></math>"}, {"id": "JKOIy", "text": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfenced open=\"[\" close=\"]\"><mrow><mi>Ni</mi><msub><mfenced><mi>DMG</mi></mfenced><mn>2</mn></msub></mrow></mfenced></math>"}, {"id": "HHbeE", "text": "EDTA"}], "ans": "EDTA", "correct": "HHbeE"}, {"id": "695e3b3b3dc984756e9de63e", "type": "singleCorrect", "html": "<p>Which one of the following does not&nbsp;have a&nbsp;<math><mi mathvariant=\"normal\">&#960;</mi><mo>-</mo></math>bond?</p>", "sol": "The Grignard reagent is a <math><mi mathvariant=\"normal\">&#963;</mi></math>-bonded organometallic compound because all the bonds present in the reagent are single bonds&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi mathvariant=\"normal\">R</mi><mo>-</mo><mi>Mg</mi><mo>-</mo><mi mathvariant=\"normal\">X</mi></math>.", "opts": [{"id": "ESEuW", "text": "<p>Grignard reagent</p>"}, {"id": "mi6A0", "text": "Dibenzene chromium"}, {"id": "wfn0C", "text": "Zeise's salt"}, {"id": "1gdbb", "text": "Ferrocene"}], "ans": "<p>Grignard reagent</p>", "correct": "ESEuW"}, {"id": "695e3b3b3dc984756e9de63f", "type": "singleCorrect", "html": "Which of the following is true about the complex <math><mo>[</mo><mi mathvariant=\"normal\">P</mi><mi mathvariant=\"normal\">t</mi><mi mathvariant=\"normal\">C</mi><msub><mrow><mi mathvariant=\"normal\">l</mi></mrow><mrow><mn>2</mn></mrow></msub><mo>(</mo><msub><mrow><mi mathvariant=\"normal\">H</mi></mrow><mrow><mn>2</mn></mrow></msub><mi mathvariant=\"normal\">O</mi><mo>)</mo><mo>(</mo><mi mathvariant=\"normal\">N</mi><msub><mrow><mi mathvariant=\"normal\">H</mi></mrow><mrow><mn>3</mn></mrow></msub><mo>)</mo><mo>]</mo></math> ?", "sol": "This complex exhibits geometrical isomerism as it is <math><mi mathvariant=\"normal\">M</mi><msub><mrow><mi mathvariant=\"normal\">a</mi></mrow><mrow><mn>2</mn></mrow></msub><mi mathvariant=\"normal\">b</mi><mi mathvariant=\"normal\">c</mi></math> type complex. Rest other things given here are wrong about it as<br/><math><mo>[</mo><mi mathvariant=\"normal\">P</mi><mi mathvariant=\"normal\">t</mi><mi mathvariant=\"normal\">C</mi><msub><mrow><mi mathvariant=\"normal\">l</mi></mrow><mrow><mn>
