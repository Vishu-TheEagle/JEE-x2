><mn>4</mn><mo>&#8203;</mo></mrow></msub></math>&nbsp;or&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mn>2</mn><mi>PbO</mi><mo>.</mo><msub><mi>PbO</mi><mrow><mn>2</mn><mo>&#8203;</mo></mrow></msub></math>. It is used in the manufacture of batteries.</p>", "opts": [{"id": "sFQBB", "text": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi>Pb</mi><mn>3</mn></msub><msub><mi mathvariant=\"normal\">O</mi><mn>4</mn></msub></math>"}, {"id": "nMYbf", "text": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi>PbO</mi><mn>2</mn></msub></math>"}, {"id": "9RdYw", "text": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi>PbO</mi></math>"}, {"id": "AXSpy", "text": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi>Pb</mi><mn>4</mn></msub><msub><mi mathvariant=\"normal\">O</mi><mn>3</mn></msub></math>"}], "ans": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi>Pb</mi><mn>3</mn></msub><msub><mi mathvariant=\"normal\">O</mi><mn>4</mn></msub></math>", "correct": "sFQBB"}, {"id": "695e3b3c3dc984756e9de663", "type": "singleCorrect", "html": "Identify the correct statement", "sol": "Lead forms compounds in +2 oxidation state due to inert pair effect", "opts": [{"id": "z5GQ4", "text": "Lead forms compounds in +2 oxidation state due to inert pair effect"}, {"id": "CXhfH", "text": "All halogens form only negative oxidation states"}, {"id": "QlnMb", "text": "Catenation property increases from boron to oxygen"}, {"id": "iZM12", "text": "Oxygen's oxidation state is - 1 in ozonides"}], "ans": "Lead forms compounds in +2 oxidation state due to inert pair effect", "correct": "z5GQ4"}, {"id": "695e3b3c3dc984756e9de664", "type": "singleCorrect", "html": "Which reaction cannot give anhydrous <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi>AlCl</mi><mn>3</mn></msub></math>?", "sol": "<p><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi>AlCl</mi><mn>3</mn></msub><mo>.</mo><mn>6</mn><msub><mi mathvariant=\"normal\">H</mi><mn>2</mn></msub><mi mathvariant=\"normal\">O</mi><munderover><mo>&#8594;</mo><mi>hydrolysis</mi><mi mathvariant=\"normal\">&#916;</mi></munderover><msub><mi>Al</mi><mn>2</mn></msub><msub><mi mathvariant=\"normal\">O</mi><mn>3</mn></msub><mo>+</mo><mn>6</mn><mi>HCl</mi><mo>+</mo><mn>3</mn><msub><mi mathvariant=\"normal\">H</mi><mn>2</mn></msub><mi mathvariant=\"normal\">O</mi></math></p><p><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mn>6</mn><msub><mi mathvariant=\"normal\">H</mi><mn>2</mn></msub><mi mathvariant=\"normal\">O</mi></math>&nbsp;water of crystallization evaporated because&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi>AlCl</mi><mn>3</mn></msub></math>&nbsp;is covalent. When it reacts with water it forms hydroxide. Hence, it is not used for the preparation of anhydrous aluminium chloride.</p>", "opts": [{"id": "FFUtE", "text": "Heating of <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi>AlCl</mi><mn>3</mn></msub><mo>.</mo><mn>6</mn><msub><mi mathvariant=\"normal\">H</mi><mn>2</mn></msub><mi mathvariant=\"normal\">O</mi></math>"}, {"id": "5uTGA", "text": "Passing dry <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi>HCl</mi></math> over heated aluminium powder"}, {"id": "46lvI", "text": "Passing dry <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi>Cl</mi><mn>2</mn></msub></math> over heated aluminium powder"}, {"id": "ivTiy", "text": "Heating a mixture of alumina and coke in a current of dry <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi>Cl</mi><mn>2</mn></msub></math>"}], "ans": "Heating of <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi>AlCl</mi><mn>3</mn></msub><mo>.</mo><mn>6</mn><msub><mi mathvariant=\"normal\">H</mi><mn>2</mn></msub><mi mathvariant=\"normal\">O</mi></math>", "correct": "FFUtE"}, {"id": "695e3b3d3dc984756e9de665", "type": "singleCorrect", "html": "The correct statement about orthoboric acid is", "sol": "Orthoboric acid is a weak mono basic acid with K<sub>a</sub>=1.0 x 10<sup>-9</sup>. It does not act as protonic acid (i.e. proton donor) but behaves as Lewis acid by accepting a pair of electrons from OH<sup>-</sup> ion.<br/><math> <mrow> <mtext>B</mtext> <msub> <mrow> <mfenced close=\")\" open=\"(\" separators=\",\"> <mrow> <mtext>OH</mtext> </mrow> </mfenced> </mrow> <mn>3</mn> </msub> <mo>+</mo> <mn>2</mn> <mtext>H</mtext> <mo>-</mo> <mtext>O</mtext> <mo>-</mo> <mtext>H</mtext> <mo>\u2192</mo> <msup> <mrow> <mfenced close=\"]\" open=\"[\" separators=\",\"> <mrow> <mtext>B</mtext> <msub> <mrow> <mfenced close=\")\" open=\"(\" separators=\",\"> <mrow> <mtext>OH</mtext> </mrow> </mfenced> </mrow> <mn>4</mn> </msub> </mrow> </mfenced> </mrow> <mo>-</mo> </msup> <mo>+</mo> <msub> <mtext>H</mtext> <mn>3</mn> </msub> <msup> <mtext>O</mtext> <mo>+</mo> </msup> </mrow> </math>", "opts": [{"id": "t147P", "text": "It is a strong monobasic acid"}, {"id": "KVyil", "text": "It is not a proton donor, but a weak Lewis acid"}, {"id": "Uoh7e", "text": "It is a tribasic acid"}, {"id": "ieUsi", "text": "It is harmful for eyes"}], "ans": "It is not a proton donor, but a weak Lewis acid", "correct": "KVyil"}, {"id": "695e3b3d3dc984756e9de666", "type": "singleCorrect", "html": "Monoxide of which group <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mn>14</mn></math> element is acidic&nbsp;in nature?", "sol": "<p>The lower oxides called monoxides of group 14 are&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi>CO</mi><mo>,</mo><mo>&#160;</mo><mi>GeO</mi><mo>,</mo><mo>&#160;</mo><mi>SnO</mi><mo>,</mo><mo>&#160;</mo><mi>PbO</mi></math>. These are slightly more basic and ionic than the corresponding higher oxides.&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi>CO</mi></math>&nbsp;is neutral oxide,&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi>GeO</mi></math>&nbsp;is distinctly acidic.&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi>SnO</mi><mo>&#160;</mo><mi>and</mi><mo>&#160;</mo><mi>PbO</mi></math>&nbsp;are amphoteric oxides.</p><p>Note: The book question is slightly changed for its correctness.</p>", "opts": [{"id": "iiKMY", "text": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi mathvariant=\"normal\">C</mi></math>"}, {"id": "LAxvR", "text": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi>Ge</mi></math>"}, {"id": "rQIRM", "text": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi>Sn</mi></math>"}, {"id": "bCBvh", "text": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"/><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi>Pb</mi></math>"}], "ans": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi>Ge</mi></math>", "correct": "LAxvR"}, {"id": "695e3b3d3dc984756e9de667", "type": "singleCorrect", "html": "Which of the following option is correct regarding the structure of borax?", "sol": "<img 100%\";=\"\" alt=\"\" object-fit:contain\"=\"\" src=\"https://cdn-question-pool.getmarks.app/NEET/DPP-Chemistry/wegfdsafldsfasfhbsadf.JPG\" style=\"width: 486px; height: 278px;\"/>", "opts": [{"id": "tDqWU", "text": "Two triangular and two tetrahedral units"}, {"id": "O3pF1", "text": "Three triangular and one tetrahedral units"}, {"id": "6pP5N", "text": "All tetrahedral units"}, {"id": "5vIiI", "text": "All triangular units"}], "ans": "Two triangular and two tetrahedral units", "correct": "tDqWU"}, {"id": "695e3b3d3dc984756e9de668", "type": "singleCorrect", "html": "What is true about orthoboric acid in aqueous medium?", "sol": "<math> <mrow> <msub> <mtext>H</mtext> <mtext>3</mtext> </msub> <msub> <mrow> <mtext>BO</mtext></mrow> <mtext>3</mtext> </msub> <mtext>\u2004</mtext><mtext>+</mtext><mtext>\u2004</mtext><msub> <mtext>H</mtext> <mtext>2</mtext> </msub> <mtext>O</mtext><mtext>\u2004</mtext><mo>\u21cc</mo><mtext>\u2004</mtext><msup> <mrow> <mfenced close=\"]\" open=\"[\"> <mrow> <msub> <mrow> <mtext>B(OH)</mtext></mrow> <mtext>4</mtext> </msub> </mrow> </mfenced></mrow> <mo>\u2212</mo> </msup> <mtext>\u2004</mtext><mtext>+</mtext><mtext>\u2004</mtext><msup> <mtext>H</mtext> <mtext>+</mtext> </msup> </mrow> </math><br/><math><msub><mrow><mi mathvariant=\"normal\">H</mi></mrow><mrow><mn>3</mn></mrow></msub><mi mathvariant=\"normal\">B</mi><msub><mrow><mi mathvariant=\"normal\">O</mi></mrow><mrow><mn>3</mn></mrow></msub></math> is a weak monobasic acid it does not act as a <math><msup><mrow><mi mathvariant=\"normal\">H</mi></mrow><mrow><mo>+</mo></mrow></msup></math> donor but behaves as a Lewis acid.", "opts": [{"id": "PhCPX", "text": "Monobasic"}, {"id": "Al2iV", "text": "Dibasic"}, {"id": "19BGm", "text": "Tribasic"}, {"id": "dwTT3", "text": "All are correct"}], "ans": "Monobasic", "correct": "PhCPX"}, {"id": "695e3b3d3dc984756e9de669", "type": "singleCorrect", "html": "Find out which of the following oxidation states is the most characteristic oxidation state for lead and tin, respectively?", "sol": "<p>1. Lead and tin are in the 4<sup>th</sup>&nbsp;group of the periodic table, so we can expect an oxidation state of&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mo>+</mo><mn>4</mn></math>&nbsp;for both of them.</p><p>2. Just because of the reluctance of participation of electrons in the outermost&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi mathvariant=\"normal\">s</mi></math>-orbital in bonding i.e., inert pair effect, which increases down the group.</p><p>3. So, the oxidation states of lead and tin are&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mo>+</mo><mn>4</mn></math>&nbsp;and&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mo>+</mo><mn>2</mn></math>&nbsp;respectively.</p>", "opts": [{"id": "PWjxE", "text": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mo>+</mo><mn>2</mn><mo>,</mo><mo>+</mo><mn>2</mn></math>"}, {"id": "ix9cI", "text": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mo>+</mo><mn>4</mn><mo>,</mo><mo>&#160;</mo><mn>2</mn></math>"}, {"id": "GlAcG", "text": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mo>+</mo><mn>2</mn><mo>,</mo><mo>+</mo><mn>4</mn></math>"}, {"id": "mXvsY", "text": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mo>+</mo><mn>4</mn><mo>,</mo><mo>&#160;</mo><mo>+</mo><mn>4</mn></math>"}], "ans": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mo>+</mo><mn>2</mn><mo>,</mo><mo>+</mo><mn>4</mn></math>", "correct": "GlAcG"}, {"id": "695e3b3d3dc984756e9de66a", "type": "singleCorrect", "html": "The stability of +1 oxidation state increases in the sequence", "sol": "Group <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mo>-</mo><mo>&#160;</mo><mn>13</mn></math> elements exhibit <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mo>+</mo><mn>3</mn></math> and&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mo>+</mo><mn>1</mn></math>&nbsp;oxidation states.&nbsp; Stability of the lower oxidation state increases on moving down the group due to inert pair effect.<br /><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msup><mi>Al</mi><mo>+</mo></msup><mo>&#160;</mo><mo>&#60;</mo><mo>&#160;</mo><msup><mi>Ga</mi><mo>+</mo></msup><mo>&#160;</mo><mo>&#60;</mo><mo>&#160;</mo><msup><mi>In</mi><mo>+</mo></msup><mo>&#160;</mo><mo>&#60;</mo><mo>&#160;</mo><msup><mi>Tl</mi><mo>+</mo></msup><mo>&#160;</mo></math>", "opts": [{"id": "xJJ2W", "text": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi>Tl</mi><mo>&#160;</mo><mo>&#60;</mo><mo>&#160;</mo><mi>In</mi><mo>&#160;</mo><mo>&#60;</mo><mo>&#160;</mo><mi>Ga</mi><mo>&#160;</mo><mo>&#60;</mo><mo>&#160;</mo><mi>Al</mi></math>"}, {"id": "us30D", "text": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi>In</mi><mo>&#160;</mo><mo>&#60;</mo><mo>&#160;</mo><mi>Tl</mi><mo>&#160;</mo><mo>&#60;</mo><mo>&#160;</mo><mi>Ga</mi><mo>&#160;</mo><mo>&#60;</mo><mo>&#160;</mo><mi>Al</mi></math>"}, {"id": "RB9MG", "text": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi>Ga</mi><mo>&#160;</mo><mo>&#60;</mo><mo>&#160;</mo><mi>In</mi><mo>&#160;</mo><mo>&#60;</mo><mo>&#160;</mo><mi>Al</mi><mo>&#160;</mo><mo>&#60;</mo><mo>&#160;</mo><mi>Tl</mi></math>"}, {"id": "Are2k", "text": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi>Al</mi><mo>&#160;</mo><mo>&#60;</mo><mo>&#160;</mo><mi>Ga</mi><mo>&#160;</mo><mo>&#60;</mo><mo>&#160;</mo><mi>In</mi><mo>&#160;</mo><mo>&#60;</mo><mo>&#160;</mo><mi>Tl</mi></math>"}], "ans": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi>Al</mi><mo>&#160;</mo><mo>&#60;</mo><mo>&#160;</mo><mi>Ga</mi><mo>&#160;</mo><mo>&#60;</mo><mo>&#160;</mo><mi>In</mi><mo>&#160;</mo><mo>&#60;</mo><mo>&#160;</mo><mi>Tl</mi></math>", "correct": "Are2k"}, {"id": "695e3b3d3dc984756e9de66b", "type": "singleCorrect", "html": "The geometry of the dimer of <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi>AlCl</mi><mn>3</mn></msub></math> is", "sol": "<p>Generally aluminium chloride is found in liquid or molten state where it exists as a dimer having <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msup><mi>sp</mi><mn>3</mn></msup></math> hybridisation. Here its geometry will be trigonal planar.</p><p><img alt=\"How is Al2Cl6 covalent and Al2O3 ionic? - Chemistry Stack Exchange\" src=\"https://cdn-question-pool.getmarks.app/NEET/DPP-Chemistry/XLYLK.png\" /></p>", "opts": [{"id": "ZdKV9", "text": "octahedral"}, {"id": "4Ul1E", "text": "square planar"}, {"id": "hiTdc", "text": "tetrahedral"}, {"id": "okng0", "text": "trigonal planar"}], "ans": "trigonal planar", "correct": "okng0"}, {"id": "695e3b3d3dc984756e9de66c", "type": "singleCorrect", "html": "The soldiers of Napoleon army while at the Alps during freezing winter suffered a serious problem as regards to the tin buttons of their uniforms. White metallic tin buttons get converted to grey powder. This transformation is related to:", "sol": "<p>Grey tin is very brittle and easily crumbles down to a powder in very cold climates.</p><p><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><munder><mrow><mi>Grey</mi><mo>&#160;</mo><mi>tin</mi></mrow><mi>Cubic</mi></munder><mo>&#8652;</mo><munder><mrow><mi>White</mi><mo>&#160;</mo><mi>tin</mi></mrow><mi>Tetragonal</mi></munder></math></p><p>The change of white tin to grey tin is accompanied by increase in volume. This is called tin disease or tin plague.</p>", "opts": [{"id": "vo3js", "text": "An interaction with water vapour contained in humid air"}, {"id": "V6Ksf", "text": "A change in crystalline structure of tin"}, {"id": "ZKJov", "text": "A change in the partial pressure of&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi mathvariant=\"normal\">O</mi><mn>2</mn></msub></math> in air"}, {"id": "koLkB", "text": "An interaction with <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi mathvariant=\"normal\">N</mi><mn>2</mn></msub></math> of air at low temperature"}], "ans": "A change in crystalline structure of tin", "correct": "V6Ksf"}, {"id": "695e3b3d3dc984756e9de66d", "type": "singleCorrect", "html": "Which is incorrect statements ?", "sol": "<p>It is phosgene. Phosphine is <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi>PH</mi><mn>3</mn></msub></math></p><p><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi mathvariant=\"normal\">C</mi><mn>3</mn></msub><msub><mi mathvariant=\"normal\">O</mi><mn>2</mn></msub></math>, carbon suboxide, is a foul-smelling gas.</p>", "opts": [{"id": "rn1X8", "text": "Diamond is unaffected by conc. acids but graphite reacts with hot conc. <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi>HNO</mi><mn>3</mn></msub><mo>&#160;</mo></math>forming mellitic acid <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi mathvariant=\"normal\">C</mi><mn>6</mn></msub><mo>(</mo><mi>COOH</mi><msub><mo>)</mo><mn>6</mn></msub></math>."}, {"id": "DQzR0", "text": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi>CO</mi><mo>&#160;</mo></math>is toxic because it forms a complex with haemoglobin in the blood."}, {"id": "m8RKQ", "text": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi mathvariant=\"normal\">C</mi><mn>3</mn></msub><msub><mi mathvariant=\"normal\">O</mi><mn>2</mn></msub></math>, carbon sub oxide, is a foul-smelling gas"}, {"id": "aYbK1", "text": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi>COCl</mi><mn>2</mn></msub><mo>&#160;</mo></math>is called phosphine gas."}], "ans": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi>COCl</mi><mn>2</mn></msub><mo>&#160;</mo></math>is called phosphine gas.", "correct": "aYbK1"}, {"id": "695e3b3d3dc984756e9de66e", "type": "singleCorrect", "html": "Anhydrous aluminium chloride <math><mo>(</mo><mi mathvariant=\"normal\">A</mi><msub><mrow><mi mathvariant=\"normal\">l</mi></mrow><mrow><mn>2</mn></mrow></msub><mi mathvariant=\"normal\">C</mi><msub><mrow><mi mathvariant=\"normal\">l</mi></mrow><mrow><mn>6</mn></mrow></msub><mo>)</mo></math> is covalent compound and soluble in water giving", "sol": "Anhydrous aluminium chloride <math><mo>(</mo><mi mathvariant=\"normal\">A</mi><msub><mrow><mi mathvariant=\"normal\">l</mi></mrow><mrow><mn>2</mn></mrow></msub><mi mathvariant=\"normal\">C</mi><msub><mrow><mi mathvariant=\"normal\">l</mi></mrow><mrow><mn>6</mn></mrow></msub><mo>)</mo></math> is covalent compound and soluble in water giving <math><mo>[</mo><mi mathvariant=\"normal\">A</mi><mi mathvariant=\"normal\">l</mi><mi mathvariant=\"normal\">C</mi><msub><mrow><mi mathvariant=\"normal\">l</mi></mrow><mrow><mn>2</mn></mrow></msub><mo>(</mo><msub><mrow><mi mathvariant=\"normal\">H</mi></mrow><mrow><mn>2</mn></mrow></msub><mi mathvariant=\"normal\">O</mi><msub><mrow><mo>)</mo></mrow><mrow><mn>4</mn></mrow></msub><msup><mrow><mo>]</mo></mrow><mrow><mo>+</mo></mrow></msup></math> and <math><mo>[</mo><mi mathvariant=\"normal\">A</mi><mi mathvariant=\"normal\">l</mi><mi mathvariant=\"normal\">C</mi><msub><mrow><mi mathvariant=\"normal\">l</mi></mrow><mrow><mn>4</mn></mrow></msub><mo>(</mo><msub><mrow><mi mathvariant=\"normal\">H</mi></mrow><mrow><mn>2</mn></mrow></msub><mi mathvariant=\"normal mi></mrow><mrow><mn>4</mn></mrow></msub></math>"}, {"id": "4hXnp", "text": "All are correct"}], "ans": "All are correct", "correct": "4hXnp"}, {"id": "695e3b3d3dc984756e9de674", "type": "singleCorrect", "html": "A bottle of fire extinguishers contain <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi mathvariant=\"normal\">H</mi><mn>2</mn></msub><msub><mi>SO</mi><mn>4</mn></msub></math> and:", "sol": "<p>In the heat of a fire it releases a cloud of carbon dioxide that smothers the fire. The gas drives the oxygen away from the fire thus stopping the chemical reaction.</p><p><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mn>2</mn><msub><mi>NaHCO</mi><mn>3</mn></msub><mo>+</mo><msub><mi mathvariant=\"normal\">H</mi><mn>2</mn></msub><msub><mi>SO</mi><mn>4</mn></msub><mo>&#10230;</mo><msub><mi>Na</mi><mn>2</mn></msub><msub><mi>SO</mi><mn>4</mn></msub><mo>+</mo><mn>2</mn><msub><mi>CO</mi><mn>2</mn></msub><mo>&#8593;</mo><mo>+</mo><mn>2</mn><msub><mi mathvariant=\"normal\">H</mi><mn>2</mn></msub><mi mathvariant=\"normal\">O</mi></math></p>", "opts": [{"id": "ExnfC", "text": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi>CaCO</mi><mn>3</mn></msub></math>"}, {"id": "Jyu4V", "text": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi>MgCO</mi><mn>3</mn></msub></math>"}, {"id": "mQr2l", "text": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi>NaHCO</mi><mn>3</mn></msub></math>"}, {"id": "42TCv", "text": "any carbonate"}], "ans": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi>NaHCO</mi><mn>3</mn></msub></math>", "correct": "mQr2l"}, {"id": "695e3b3d3dc984756e9de675", "type": "singleCorrect", "html": "Which of the following statement is/are true -<br/>(I) Borazine is aromatic<br/>(II) There are four isotopic disubstituted borazine molecules <math><msub><mrow><mi mathvariant=\"normal\">B</mi></mrow><mrow><mn>3</mn></mrow></msub><msub><mrow><mi mathvariant=\"normal\">N</mi></mrow><mrow><mn>3</mn></mrow></msub><msu n has a property of self linking stability while others do not have. Lead does not show&nbsp;catenation&nbsp;</p><p>Hence, lead does not have allotropes, rendered passive by steam and shows no&nbsp;catenation.</p>", "opts": [{"id": "jL6Ge", "text": "Both <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi mathvariant=\"normal\">a</mi></math> and <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi mathvariant=\"normal\">b</mi></math>"}, {"id": "0tcyZ", "text": "Both <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi mathvariant=\"normal\">b</mi></math> and <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi mathvariant=\"normal\">c</mi></math>"}, {"id": "gmZWg", "text": "Both <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi mathvariant=\"normal\">a</mi></math> and <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi mathvariant=\"normal\">c</mi></math>"}, {"id": "4gZYL", "text": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi mathvariant=\"normal\">a</mi><mo>,</mo><mo>&#160;</mo><mi mathvariant=\"normal\">b</mi></math>&nbsp;and <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi mathvariant=\"normal\">c</mi></math>"}], "ans": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi mathvariant=\"normal\">a</mi><mo>,</mo><mo>&#160;</mo><mi mathvariant=\"normal\">b</mi></math>&nbsp;and <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi mathvariant=\"normal\">c</mi></math>", "correct": "4gZYL"}, {"id": "695e3b3d3dc984756e9de677", "type": "singleCorrect", "html": "<img alt=\"\" src=\"https://cdn-question-pool.getmarks.app/NEET/DPP-Chemistry/674325.PNG\" style=\"width: 342px; height: 171px;\"/><br />for (X) and (Y) the incorrect choice is?", "sol": "<math><mi mathvariant=\"normal\">M</mi><msub><mrow><mi mathvariant=\"normal\">g</mi></mrow><mrow><mn>3</mn></mrow></msub><msub><mrow><mi mathvariant=\"normal\">B</mi></mrow><mrow><mn>2</mn></mrow></msub><mo>+</mo><mi mathvariant=\"normal\">H</mi><mi mathvariant=\"normal\">C</mi><msub><mrow><m ub><mi>O</mi></math>  <br/>Thus,  <math><mi>N</mi><mi>a</mi><mi>O</mi><mi>H</mi></math>  cannot be stored in a vessel made of  <math><mi>A</mi><mi>l</mi><mo>.</mo></math> <br/> <math><mfenced separators=\"|\"><mrow><mi>i</mi><mi>i</mi><mi>i</mi></mrow></mfenced></math>  Aluminum chloride dissociate in water.<br/> <math><mfenced separators=\"|\"><mrow><mi>i</mi><mi>v</mi></mrow></mfenced><mi>\u00a0</mi><mi>A</mi><mi>l</mi><msub><mrow><mi>F</mi></mrow><mrow><mn>3</mn></mrow></msub></math>  is insoluble in anhydrous  <math><mi>H</mi><mi>F</mi><mo>.</mo></math> <br/>Thus, the only correct statement among the given options is  <math><mfenced separators=\"|\"><mrow><mi>A</mi></mrow></mfenced></math> .", "opts": [{"id": "wD07P", "text": "Aluminum dissolves in dilute mineral acids but is made passive by concentrated nitric acid."}, {"id": "nsB7R", "text": "Aluminum vessel can be used as storage of <math><mi>N</mi><mi>a</mi><mi>O</mi><mi>H</mi><mo>.</mo></math>"}, {"id": "q5hKL", "text": "Aluminum chloride does not dissociate in water."}, {"id": "cMOwd", "text": "<math><mi>A</mi><mi>l</mi><msub><mrow><mi>F</mi></mrow><mrow><mn>3</mn></mrow></msub></math> is soluble in anhydrous <math><mi>H</mi><mi>F</mi></math> ."}], "ans": "Aluminum dissolves in dilute mineral acids but is made passive by concentrated nitric acid.", "correct": "wD07P"}, {"id": "695e3b3d3dc984756e9de679", "type": "singleCorrect", "html": "<p>Identify the correct statements about borazene,<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi mathvariant=\"normal\">B</mi><mn>3</mn></msub><msub><mi mathvariant=\"normal\">N</mi><mn>3</mn></msub><msub><mi mathvariant=\"normal\">H</mi><mn>6</mn></msub><mo>,</mo></math>:</p> <p>(i) Borazene is aromatic.<br/>(ii) There are four isomers of bi substituted molecule of borazene molecules,<math> <mrow> <mfenced> <mrow> <msub> <mtext>B</mtext> <mn>3</mn> </msub> <msub> <mtext>N</mtext> <mtext>3</mtext> </msub> <msub> <mtext>H</mtext> <mtext>4</mtext> </msub> <msub> o>)</mo><mn>3</mn></msub><mo>+</mo><msub><mi>NH</mi><mn>3</mn></msub></math></p><p>Aluminium forms aluminium nitride and it further hydrolysed as follows:</p><p><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mn>2</mn><mi>Al</mi><mo>+</mo><msub><mi mathvariant=\"normal\">N</mi><mn>2</mn></msub><mover><mo>&#8594;</mo><mrow><mi>High</mi><mo>&#160;</mo><mi>temp</mi><mo>.</mo></mrow></mover><mn>2</mn><mi>AlN</mi><munderover><mo>&#8594;</mo><mrow><mi>High</mi><mo>&#160;</mo><mi>temp</mi><mo>.</mo></mrow><mi>water</mi></munderover><mi>Al</mi><mo>(</mo><mi>OH</mi><msub><mo>)</mo><mn>3</mn></msub><mo>+</mo><msub><mi>NH</mi><mn>3</mn></msub></math></p>", "opts": [{"id": "fTMiz", "text": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi mathvariant=\"normal\">B</mi></math> or <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi>Al</mi></math>"}, {"id": "RvH9o", "text": "Any element of B family"}, {"id": "EgoNp", "text": "in or <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi>Ti</mi></math>"}, {"id": "nnOoT", "text": "only <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi>Al</mi></math>"}], "ans": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi mathvariant=\"normal\">B</mi></math> or <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi>Al</mi></math>", "correct": "fTMiz"}, {"id": "695e3b3d3dc984756e9de67b", "type": "singleCorrect", "html": "<math><mi mathvariant=\"normal\">N</mi><msub><mrow><mi mathvariant=\"normal\">a</mi></mrow><mrow><mn>2</mn></mrow></msub><msub><mrow><mi mathvariant=\"normal\">B</mi></mrow><mrow><mn>4</mn></mrow></msub><msub><mrow><mi mathvariant=\"normal\">O</mi></mrow><mrow><mn>7</mn></mrow></msub><mo>.</mo><mn>10</mn><msub><mrow><mi mathvariant=\"normal\">H</mi></mrow><mrow><mn>2</mn></mrow></msub><mi mathvariant=\"normal\">O</mi></math> is correctly represented by", "sol": "Borax is represented as <math><mi mathvariant=\"normal\">N</mi><msub><mrow><mi mathvariant=\"normal\">a</mi></mrow><mrow><mn>2</mn></mrow></msub><mo iant=\"normal\">B</mi></mrow><mrow><mn>4</mn></mrow></msub><mfenced close=\"]\" separators=\"|\"><mrow><msub><mrow><mi mathvariant=\"normal\">H</mi></mrow><mrow><mn>2</mn></mrow></msub><mi mathvariant=\"normal\">O</mi><msub><mrow><mo>)</mo></mrow><mrow><mn>4</mn></mrow></msub><msub><mrow><mi mathvariant=\"normal\">O</mi></mrow><mrow><mn>7</mn></mrow></msub></mrow></mfenced><mo>.</mo><mn>6</mn><msub><mrow><mi mathvariant=\"normal\">H</mi></mrow><mrow><mn>2</mn></mrow></msub><mi mathvariant=\"normal\">O</mi></math>"}, {"id": "Invz1", "text": "All of the above"}], "ans": "<math><mi mathvariant=\"normal\">N</mi><msub><mrow><mi mathvariant=\"normal\">a</mi></mrow><mrow><mn>2</mn></mrow></msub><mo>[</mo><msub><mrow><mi mathvariant=\"normal\">B</mi></mrow><mrow><mn>4</mn></mrow></msub><msub><mrow><mi mathvariant=\"normal\">O</mi></mrow><mrow><mn>5</mn></mrow></msub><mfenced close=\"]\" separators=\"|\"><mrow><mi mathvariant=\"normal\">O</mi><mi mathvariant=\"normal\">H</mi><msub><mrow><mo>)</mo></mrow><mrow><mn>4</mn></mrow></msub></mrow></mfenced><mo>.</mo><mn>8</mn><msub><mrow><mi mathvariant=\"normal\">H</mi></mrow><mrow><mn>2</mn></mrow></msub><mi mathvariant=\"normal\">O</mi></math>", "correct": "9gRsJ"}]}, {"name": "d and f Block Elements", "qs": [{"id": "695e3b3d3dc984756e9de67c", "type": "singleCorrect", "html": "General electronic configuration of transition metals is", "sol": "<p>In general, the electronic configuration of the outer orbitals of&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi mathvariant=\"normal\">d</mi></math>- block elements is&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mo>(</mo><mi mathvariant=\"normal\">n</mi><mo>-</mo><mn>1</mn><mo>)</mo><msup><mi mathvariant=\"normal\">d</mi><mrow><mn>1</mn><mo>-</mo><mn>10</mn></mrow></msup><msup><mi>ns</mi><mrow><mn>1</mn><mo>-</mo><mn>2</mn></mrow></msup></math>.&nbsp;The&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfenced><mrow><mi mathvariant=\"normal\">n</mi><mo>-</mo><mn>1</mn></mrow></mfenced></math>&nbsp;stands for the inner&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi mathvariant=\"normal\">d</mi></math> orbitals which may have one to ten electrons and the outermost <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi>ns</mi></math>&nbsp;orbital may have one or two electrons. However, this generalisation has several exceptions because of very little energy difference between&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfenced><mrow><mi mathvariant=\"normal\">n</mi><mo>-</mo><mn>1</mn></mrow></mfenced><mi mathvariant=\"normal\">d</mi></math> and&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi>ns</mi></math> orbitals.</p>", "opts": [{"id": "ByENu", "text": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mo>(</mo><mi mathvariant=\"normal\">n</mi><mo>-</mo><mn>1</mn><mo>)</mo><msup><mi mathvariant=\"normal\">d</mi><mrow><mn>1</mn><mo>-</mo><mn>10</mn></mrow></msup><msup><mi>ns</mi><mn>2</mn></msup></math>"}, {"id": "RJZCR", "text": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msup><mi>nd</mi><mn>10</mn></msup><msup><mi>ns</mi><mn>2</mn></msup></math>"}, {"id": "Bj8ws", "text": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mo>(</mo><mi mathvariant=\"normal\">n</mi><mo>-</mo><mn>1</mn><mo>)</mo><msup><mi mathvariant=\"normal\">d</mi><mn>10</mn></msup><msup><mi>ns</mi><mn>2</mn></msup></math>"}, {"id": "B72I9", "text": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mo>(</mo><mi mathvariant=\"normal\">n</mi><mo>-</mo><mn>1</mn><mo>)</mo><msup><mi mathvariant=\"normal\">d</mi><mrow><mn>1</mn><mo>-</mo><mn>5</mn></mrow></msup><msup><mi>ns</mi><mn>2</mn></msup></math>"}], "ans": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mo>(</mo><mi mathvariant=\"normal\">n</mi><mo>-</mo><mn>1</mn><mo>)</mo><msup><mi mathvariant=\"normal\">d</mi><mrow><mn>1</mn><mo>-</mo><mn>10</mn></mrow></msup><msup><mi>ns</mi><mn>2</mn></msup></math>", "correct": "ByENu"}, {"id": "695e3b3d3dc984756e9de67d", "type": "singleCorrect", "html": " <p>A compound which is a strong oxidizing agent and has orange coloured crystal. It is used in the preparation of azo compounds. Identify the compound:</p>  ", "sol": "<p>Potassium dichromate \u00a0<math> <mrow> <msub> <mtext>K</mtext> <mtext>2</mtext> </msub> <msub> <mrow> <mtext>Cr</mtext> </mrow> <mtext>2</mtext> </msub> <msub> <mtext>O</mtext> <mtext>7</mtext> </msub> </mrow> </math> \u00a0is an orange-red crystalline soluble solid substance. It is a good oxidizing agent and is used in making chrome pigments,azo dyes and as a bleaching agent.</p>", "opts": [{"id": "1kulR", "text": "Hydrogen peroxide"}, {"id": "8gQfN", "text": "Potassium permanganate"}, {"id": "mKyK0", "text": "Sodium chromate"}, {"id": "bTF9B", "text": "Potassium dichromate"}], "ans": "Potassium dichromate", "correct": "bTF9B"}, {"id": "695e3b3d3dc984756e9de67e", "type": "singleCorrect", "html": "A compound of vanadium chloride has spin only magnetic moment of 1.73 BM. Its formula is", "sol": "Spin only Magnetic Moment<br/><br/><math> <mrow> <mtext>\u03bc</mtext> <mo>=</mo> <msqrt> <mtext>n</mtext> <mfenced close=\")\" open=\"(\" separators=\",\"> <mrow> <mtext>n</mtext> <mo>+</mo> <mn>2</mn> </mrow> </mfenced> </msqrt> <mtext>\u00a0BM</mtext> <mo>=</mo> <mn>1</mn> <mtext>.</mtext> <mn>7</mn> <mn>3</mn> <mo>=</mo> <msqrt> <mn>3</mn> </msqrt> </mrow> </math><br/><br/><math> <mrow> <mo>\u2234</mo> <mo>\u00a0n</mo> <mo>=</mo> <mn>1</mn>\u00a0 \u00a0\u00a0</mrow></math>\u00a0\u00a0\u00a0\u00a0\u00a0(unpaired e<sup>-</sup>)<br/><br/>Electronic configuration of <math> <mrow> <mtext>V</mtext><mo>=</mo><msup> <mrow> <mtext>1s</mtext></mrow> <mtext>2</mtext> </msup> <msup> <mrow> <mtext>2s</mtext></mrow> <mtext>2</mtext> </msup> <msup> <mrow> <mtext>2p</mtext></mrow> <mtext>6</mtext> </msup> <msup> <mrow> <mtext>3s</mtext></mrow> <mtext>2</mtext> </msup> <msup> <mrow> <mtext>3p</mtext></mrow> <mtext>6</mtext> </msup> <msup> <mrow> <mtext>3d</mtext></mrow> <mtext>3</mtext> </msup> <msup> <mrow> <mtext>4s</mtext></mrow> <mtext>2</mtext> </msup> </mrow> </math><br/><br/><img alt=\"\" src=\"https://cdn-question-pool.getmarks.app/NEET/DPP-Chemistry/EM0025985_AnsExp_11.jpg\" style=\"width: 328px; height: 68px;\"/><br/><br/>to get 1 unpaired electron V has to loose 4 electron to form <math><mrow><msup><mtext>V</mtext> <mrow> <mn>4</mn><mo>+</mo></mrow></msup></mrow><mo>.</mo></math><br/><br/>So, formula of chloride is <math> <mrow> <msub> <mrow> <mtext>VCl</mtext></mrow> <mtext>4</mtext> </msub> </mrow> </math>", "opts": [{"id": "sF3mj", "text": "VCl<sub>2</sub>"}, {"id": "OlDrI", "text": "VCl<sub>5</sub>"}, {"id": "e5fX4", "text": "VCl<sub>4</sub>"}, {"id": "qqfzt", "text": "VCl<sub>3</sub>"}], "ans": "VCl<sub>4</sub>", "correct": "e5fX4"}, {"id": "695e3b3d3dc984756e9de67f", "type": "singleCorrect", "html": "Although Zirconium belongs to 4d and hafnium belongs to 5d transition series, they show similar physical and chemical properties because both", "sol": "This is because the atomic radii of 4d and 5d transition elements are nearly same. This similarity in size <math><mfenced separators=\"|\"><mrow><mtext>Z</mtext><mtext>r</mtext><mo>=</mo><mn>160</mn><mo>,</mo><mtext>\u00a0</mtext><mtext>H</mtext><mtext>f</mtext><mo>=</mo><mn>159</mn><mtext>\u00a0</mtext><mtext>p</mtext><mtext>m</mtext></mrow></mfenced></math>\u00a0is due to lanthanoid contraction. Because of this contraction the radius of <math><mtext>H</mtext><mtext>f</mtext></math> becomes nearly equal to that of <math><mtext>Z</mtext><mtext>r</mtext></math> and as the properties of an element depends on its atomic radii they show similar properties.", "opts": [{"id": "1QpHf", "text": "belong to d-block"}, {"id": "dUGpK", "text": "have same number of electrons"}, {"id": "GGIsj", "text": "belongs to the same group of the periodic table"}, {"id": "YRtsy", "text": "have similar atomic radius"}], "ans": "have similar atomic radius", "correct": "YRtsy"}, {"id": "695e3b3d3dc984756e9de680", "type": "singleCorrect", "html": "The lanthanide contraction is responsible for the fact that", "sol": "Due to lanthanide contraction effective nuclear charge of 5d series metals increases and size decreases.", "opts": [{"id": "tENfv", "text": "Zr and Hf have same radius"}, {"id": "zopKe", "text": "Zr and Zn have the same oxidation state"}, {"id": "ewx3z", "text": "Zr and Y have same radius"}, {"id": "7q7NH", "text": "Zr and Nb have similar oxidation state"}], "ans": "Zr and Hf have same radius", "correct": "tENfv"}, {"id": "695e3b3d3dc984756e9de681", "type": "singleCorrect", "html": "With which of the following metals,\u00a0<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi>CO</mi></math> forms a volatile carbonyl complex?", "sol": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi>Ni</mi><mo>(</mo><mi>CO</mi><msub><mo>)</mo><mn>4</mn></msub></math>\u00a0 is a volatile compound.", "opts": [{"id": "iFagJ", "text": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi>Na</mi></math>"}, {"id": "x0qWD", "text": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi>Sn</mi></math>"}, {"id": "zfJKq", "text": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi>Ni</mi></math>"}, {"id": "M5gb1", "text": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi>Hg</mi></math>"}], "ans": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi>Ni</mi></math>", "correct": "zfJKq"}, {"id": "695e3b3d3dc984756e9de682", "type": "singleCorrect", "html": " <p>Which of the following statements are true.</p> <p>(i) \u00a0<math> <mrow> <mtext>L</mtext><msup> <mtext>a</mtext> <mrow> <mn>3</mn><mo>+</mo> </mrow> </msup> <mtext>\u2009</mtext><mo stretchy=\"false\">(</mo><mtext>Z</mtext><mo>=</mo><mn>57</mn><mo stretchy=\"false\">)</mo><mtext>\u2009</mtext><mtext>\u2009</mtext><mtext>a</mtext><mtext>n</mtext><mtext>d</mtext><mtext>\u2009</mtext><mtext>\u2009</mtext><mtext>L</mtext><msup> <mtext>u</mtext> <mrow> <mn>3</mn><mo>+</mo> </mrow> </msup> <mtext>\u2009</mtext><mo stretchy=\"false\">(</mo><mtext>Z</mtext><mo>=</mo><mn>71</mn><mo stretchy=\"false\">)</mo> </mrow> </math> \u00a0do not show any colour in solutions.</p> <p>(ii) Among the divalent cations in the first series of transition elements, manganese exhibits the maximum paramagnetism.</p>  ", "sol": "<p>(i) Colour of lanthanoids ions may be attributed due to the presence of f-electrons. La<sup>3+</sup> ion do not show any colour, because of empty f-orbital.\u00a0Lu<sup>3+</sup>\u00a0ion do not show any colour, because of completely field f-orbitals.</p><p>(ii) Since <math><mrow><mtext>M</mtext><msup> <mtext>n</mtext> <mrow> <mn>2</mn><mo>+</mo> </mrow> </msup> <mo stretchy=\"false\">(</mo><mtext>Z</mtext><mo>=</mo><mn>25</mn><mo stretchy=\"false\">)</mo><mo>=</mo><mn>3</mn><msup> <mtext>d</mtext> <mn>5</mn> </msup> <mo>,</mo><mn>4</mn><msup> <mtext>s</mtext> <mn>0</mn> </msup> </mrow> </math> \u00a0has maximum number of unpaired electrons.therefore Mn<sup>2+</sup> exhibit maximum paramagnetism.</p>", "opts": [{"id": "gEsKd", "text": "<p>(i),(ii)</p>"}, {"id": "foyeu", "text": "<p>(ii)</p>"}, {"id": "RRDnL", "text": "<p>(i)</p>"}, {"id": "AEwMM", "text": "<p>None of these</p>"}], "ans": "<p>(i),(ii)</p>", "correct": "gEsKd"}, {"id": "695e3b3d3dc984756e9de683", "type": "singleCorrect", "html": "The correct order of decreasing second ionisation enthalpy of Ti (22), V (23), Cr (24) and Mn (25) is-", "sol": "Electronic configuration of the given elements are<br/><math> <mrow> <mtext>Mn</mtext> <mo>\u2192</mo> <mn>1</mn> <msup> <mtext>s</mtext> <mn>2</mn> </msup> <mn>2</mn> <msup> <mtext>s</mtext> <mn>2</mn> </msup> <mn>2</mn> <msup> <mtext>p</mtext> <mn>6</mn> </msup> <mn>3</mn> <msup> <mtext>s</mtext> <mn>2</mn> </msup> <mn>3</mn> <msup> <mtext>p</mtext> <mn>6</mn> </msup> <mn>3</mn> <msup> <mtext>d</mtext> <mn>5</mn> </msup> <mn>4</mn> <msup> <mtext>s</mtext> <mn>2</mn> </msup> </mrow> </math><br/><math> <mrow> <mtext>Cr</mtext> <mo>\u2192</mo> <mn>1</mn> <msup> <mtext>s</mtext> <mn>2</mn> </msup> <mn>2</mn> <msup> <mtext>s</mtext> <mn>2</mn> </msup> <mn>2</mn> <msup> <mtext>p</mtext> <mn>6</mn> </msup> <mn>3</mn> <msup> <mtext>s</mtext> <mn>2</mn> </msup> <mn>3</mn> <msup> <mtext>p</mtext> <mn>6</mn> </msup> <mn>3</mn> <msup> <mtext>d</mtext> <mn>5</mn> </msup> <mn>4</mn> <msup> <mtext>s</mtext> <mn>1</mn> </msup> </mrow> </math><br/><math> <mrow> <mtext>Ti</mtext> <mo>\u2192</mo> <mn>1</mn> <msup> <mtext>s</mtext> <mn>2</mn> </msup> <mn>2</mn> <msup> <mtext>s</mtext> <mn>2</mn> </msup> <mn>2</mn> <msup> <mtext>p</mtext> <mn>6</mn> </msup> <mn>3</mn> <msup> <mtext>s</mtext> <mn>2</mn> </msup> <mn>3</mn> <msup> <mtext>p</mtext> <mn>6</mn> </msup> <mn>3</mn> <msup> <mtext>d</mtext> <mn>2</mn> </msup> <mn>4</mn> <msup> <mtext>s</mtext> <mn>2</mn> </msup> </mrow> </math><br/><math> <mrow> <mtext>V</mtext> <mo>\u2192</mo> <mn>1</mn> <msup> <mtext>s</mtext> <mn>2</mn> </msup> <mn>2</mn> <msup> <mtext>s</mtext> <mn>2</mn> </msup> <mn>2</mn> <msup> <mtext>p</mtext> <mn>6</mn> </msup> <mn>3</mn> <msup> <mtext>s</mtext> <mn>2</mn> </msup> <mn>3</mn> <msup> <mtext>p</mtext> <mn>6</mn> </msup> <mn>3</mn> <msup> <mtext>d</mtext> <mn>3</mn> </msup> <mn>4</mn> <msup> <mtext>s</mtext> <mn>2</mn> </msup> </mrow> </math><br/>In general, ionization potential (both 1<sup>st</sup> and 2<sup>nd</sup>) increases form left to right across the period due to increase in effective nuclear charge. On this basis, the second IP values should exhibit the trend :<br/>Mn &gt; Cr &gt; V &gt; Ti<br/>But the actual observed order is :<br/>Cr &gt; Mn &gt; V &gt; Ti<br/>Practically, only chromium is exceptional and rest others show the normal trend. This exceptional behaviour of chromium is due to the stable configuration (3d<sup>5</sup>) that it achieves after the loss of first electron.", "opts": [{"id": "E54hx", "text": "Mn &gt; Cr &gt; Ti &gt; V"}, {"id": "CU39k", "text": "Ti &gt; V &gt; Cr &gt; Mn"}, {"id": "Y0s2S", "text": "Cr &gt; Mn &gt; V &gt; Ti"}, {"id": "FLIry", "text": "V &gt; Mn &gt; Cr &gt; Ti"}], "ans": "Cr &gt; Mn &gt; V &gt; Ti", "correct": "Y0s2S"}, {"id": "695e3b3d3dc984756e9de684", "type": "singleCorrect", "html": "Identify the element that forms amphoteric oxide:", "sol": "<math> <mrow> <mtext>ZnO</mtext> <mo>+</mo> <mn>2</mn> <mtext>HCl</mtext> <mo>\u2192</mo> <mn>Z</mn> <msub> <mtext>nCl</mtext> <mn>2</mn> </msub> <mo>+</mo> <msub> <mtext>H</mtext> <mn>2</mn> </msub> <mtext>O</mtext> </mrow> </math><br/><math> <mrow> <mtext>ZnO</mtext> <mo>+</mo> <mn>2</mn> <mtext>NaOH</mtext> <mo>\u2192</mo> <msub> <mtext>Na</mtext> <mn>2</mn> </msub> <msub> <mtext>ZnO</mtext> <mn>2</mn> </msub> <mo>+</mo> <msub> <mtext>H</mtext> <mn>2</mn> </msub> <mtext>O</mtext> </mrow> </math>", "opts": [{"id": "Xh7wL", "text": "Carbon"}, {"id": "tdKnW", "text": "Zinc"}, {"id": "aQdb4", "text": "Calcium"}, {"id": "q0vny", "text": "Sulphur"}], "ans": "Zinc", "correct": "tdKnW"}, {"id": "695e3b3d3dc984756e9de685", "type": "singleCorrect", "html": "Among the following the coloured compound is", "sol": "In <math><msub><mrow><mi mathvariant=\"normal\">C</mi><mi mathvariant=\"normal\">u</mi><mi mathvariant=\"normal\">F</mi></mrow><mrow><mn>2</mn></mrow></msub></math>, <math><msup><mrow><mi mathvariant=\"normal\">C</mi><mi mathvariant=\"normal\">u</mi></mrow><mrow><mn>2</mn><mo>+</mo></mrow></msup></math> ion exist, having <math><msup><mrow><mi>d</mi></mrow><mrow><mn>9</mn></mrow></msup></math> configuration. Unpaired electron causes colour (<math><mi>d</mi><mo>-</mo><mi>d</mi></math> transition). In the crystalline form, <math><msub><mrow><mi mathvariant=\"normal\">C</mi><mi mathvariant=\"normal\">u</mi><mi mathvariant=\"normal\">F</mi></mrow><mrow><mn>2</mn></mrow></msub></math> is blue coloured.<br/><br/>While in other compounds\u00a0<math> <mrow> <mtext>Cu</mtext></mrow> </math> is\u00a0in positive one oxidation state\u00a0and does not have unpaired electron. Hence all are colourless.", "opts": [{"id": "8WV9M", "text": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"> <mrow> <msub> <mrow> <mtext>Cu</mtext></mrow> <mn>2</mn> </msub> <msub> <mrow> <mtext>Cl</mtext></mrow> <mn>2</mn> </msub> </mrow></math>"}, {"id": "wwdvs", "text": "<math><msub><mrow><mi mathvariant=\"normal\">K</mi></mrow><mrow><mn>3</mn></mrow></msub><mo>[</mo><mi mathvariant=\"normal\">C</mi><mi mathvariant=\"normal\">u</mi><msub><mrow><mfenced separators=\"|\"><mrow><mi mathvariant=\"normal\">C</mi><mi mathvariant=\"normal\">N</mi></mrow></mfenced></mrow><mrow><mn>4</mn></mrow></msub><mo>]</mo></math>"}, {"id": "BwNO7", "text": "<math><msub><mrow><mi mathvariant=\"normal\">C</mi><mi mathvariant=\"normal\">u</mi><mi mathvariant=\"normal\">F</mi></mrow><mrow><mn>2</mn></mrow></msub></math>"}, {"id": "ejbmO", "text": "<math><mfenced close=\"]\" open=\"[\" separators=\"|\"><mrow><mi mathvariant=\"normal\">C</mi><mi mathvariant=\"normal\">u</mi><msub><mrow><mfenced separators=\"|\"><mrow><msub><mrow><mi mathvariant=\"normal\">C</mi><mi mathvariant=\"normal\">H</mi></mrow><mrow><mn>3</mn></mrow></msub><mi mathvariant=\"normal\">C</mi><mi mathvariant=\"normal\">N</mi></mrow></mfenced></mrow><mrow><mn>4</mn></mrow></msub></mrow></mfenced><msub><mrow><mi mathvariant=\"normal\">B</mi><mi mathvariant=\"normal\">F</mi></mrow><mrow><mn>4</mn></mrow></msub></math>"}], "ans": "<math><msub><mrow><mi mathvariant=\"normal\">C</mi><mi mathvariant=\"normal\">u</mi><mi mathvariant=\"normal\">F</mi></mrow><mrow><mn>2</mn></mrow></msub></math>", "correct": "BwNO7"}, {"id": "695e3b3d3dc984756e9de686", "type": "singleCorrect", "html": " <p>On what grounds can you say that scandium<math><mrow><mo stretchy=\"false\">(</mo><mtext>Z</mtext><mo>=</mo><mn>21</mn><mo stretchy=\"false\">)</mo> </mrow> </math> \u00a0is a transition element but zinc<math><mrow><mo stretchy=\"false\">(</mo><mtext>Z</mtext><mo>=</mo><mn>30</mn><mo stretchy=\"false\">)</mo> </mrow> </math> \u00a0is not one?</p>  ", "sol": "<p>Scandium is one of the two elements in the first transition metal period which has only one oxidation state (zinc is the other, with an oxidation state of +2). </p><p>On the basis of incompletely filled 3d orbitals, scandium \u00a0<math> <mrow> <mo stretchy=\"false\">(</mo><mtext>Z</mtext><mo>=</mo><mn>21</mn><mo stretchy=\"false\">)\u00a0</mo></mrow></math>has incompletely filled d-orbitals<math><mrow><mo stretchy=\"false\">(</mo><mn>3</mn><msup> <mtext>d</mtext> <mn>1</mn> </msup> <mo stretchy=\"false\">)</mo> </mrow> </math>\u00a0 in its ground state, so it is regarded as a transition element.</p><p>On the other hand, zinc<math><mrow><mo stretchy=\"false\">(</mo><mtext>Z</mtext><mo>=</mo><mn>30</mn><mo stretchy=\"false\">)\u00a0</mo></mrow></math>has completely filled d-orbitals \u00a0<math> <mrow> <mo stretchy=\"false\">(</mo><mn>3</mn><msup> <mtext>d</mtext> <mrow> <mn>10</mn> </mrow> </msup> <mo stretchy=\"false\">)</mo> </mrow> </math> \u00a0in its ground state.</p>", "opts": [{"id": "T1ED3", "text": "<p>Incompletely filled 3d orbitals in Sc</p>"}, {"id": "0z0CL", "text": "<p>Coloured compounds</p>"}, {"id": "XYRfZ", "text": "<p>Variable oxidation state</p>"}, {"id": "fKyOm", "text": "None of the above"}], "ans": "<p>Incompletely filled 3d orbitals in Sc</p>", "correct": "T1ED3"}, {"id": "695e3b3d3dc984756e9de687", "type": "singleCorrect", "html": "The atomic radii of transition elements from Cr to Cu are almost equal because", "sol": "From <math> <mrow> <mtext>Cr</mtext> </mrow> </math> to <math> <mrow> <mtext>Cu,</mtext> </mrow> </math> elements have half or more than half filled (n-1)d-orbitals. Here, an increase in effective nuclear charge is balanced by increased screening effect of\u00a0electrons in\u00a0 (n - 1)d-orbitals.", "opts": [{"id": "R8esW", "text": "Increased effective nuclear charge is balanced by decreased screening effect of electrons in\u00a0 (n-1)d-orbitals"}, {"id": "YNBys", "text": "Increased effective nuclear charge is balanced by increased screening effect of (n-1)d-orbitals"}, {"id": "9XVaS", "text": "Decreased effective nuclear charge is balanced by increased screening effect of\u00a0electrons in\u00a0 (n-1)d-orbitals"}, {"id": "wjFap", "text": "None of these"}], "ans": "Increased effective nuclear charge is balanced by increased screening effect of (n-1)d-orbitals", "correct": "YNBys"}, {"id": "695e3b3e3dc984756e9de688", "type": "singleCorrect", "html": "Which of the following does not represent the correct order of the properties indicated?", "sol": "In a period on moving from left to right ionic radii decreases.<br/>a. So order of cationic radii is<br/><math><mtext>C</mtext><msup><mrow><mtext>r</mtext></mrow><mrow><mn>2</mn><mo>+</mo></mrow></msup><mo>&gt;</mo><mtext>M</mtext><msup><mrow><mtext>n</mtext></mrow><mrow><mn>2</mn><mo>+</mo></mrow></msup><mo>&gt;</mo><mtext>F</mtext><msup><mrow><mtext>e</mtext></mrow><mrow><mn>2</mn><mo>+</mo></mrow></msup><mo>&gt;</mo><mtext>N</mtext><msup><mrow><mtext>i</mtext></mrow><mrow><mn>2</mn><mo>+</mo></mrow></msup><mtext>\u00a0</mtext></math> and<br/>b. <math><mtext>S</mtext><mtext>c</mtext><mo>&gt;</mo><mtext>T</mtext><mtext>i</mtext><mo>&gt;</mo><mtext>C</mtext><mtext>r</mtext><mo>&gt;</mo><mtext>M</mtext><mtext>n</mtext></math><br/>(correct order of atomic radii)<br/>c. For unpaired electron<br/><math><mtext>M</mtext><msup><mrow><mtext>n</mtext></mrow><mrow><mn>2</mn><mo>+</mo></mrow></msup><mfenced separators=\"|\"><mrow><mtext>F</mtext><mtext>i</mtext><mtext>v</mtext><mtext>e</mtext></mrow></mfenced><mo>&gt;</mo><mtext>N</mtext><msup><mrow><mtext>i</mtext></mrow><mrow><mn>2</mn><mo>+</mo></mrow></msup><mfenced separators=\"|\"><mrow><mtext>T</mtext><mtext>w</mtext><mtext>o</mtext></mrow></mfenced><mo>&lt;</mo><mtext>C</mtext><msup><mrow><mtext>o</mtext></mrow><mrow><mn>2</mn><mo>+</mo></mrow></msup><mfenced separators=\"|\"><mrow><mtext>T</mtext><mtext>h</mtext><mtext>r</mtext><mtext>e</mtext><mtext>e</mtext></mrow></mfenced><mo>&lt;</mo><mtext>F</mtext><msup><mrow><mtext>e</mtext></mrow><mrow><mn>2</mn><mo>+</mo></mrow></msup><mfenced separators=\"|\"><mrow><mtext>F</mtext><mtext>o</mtext><mtext>u</mtext><mtext>r</mtext></mrow></mfenced></math><br/>d. For unpaired electrons<br/><math><mtext>F</mtext><msup><mrow><mtext>e</mtext></mrow><mrow><mn>2</mn><mo>+</mo></mrow></msup><mfenced separators=\"|\"><mrow><mtext>F</mtext><mtext>o</mtext><mtext>u</mtext><mtext>r</mtext></mrow></mfenced><mo>&gt;</mo><mtext>C</mtext><msup><mrow><mtext>o</mtext></mrow><mrow><mn>2</mn><mo>+</mo></mrow></msup><mfenced separators=\"|\"><mrow><mtext>T</mtext><mtext>h</mtext><mtext>r</mtext><mtext>e</mtext><mtext>e</mtext></mrow></mfenced><mo>&lt;</mo><mtext>N</mtext><msup><mrow><mtext>i</mtext></mrow><mrow><mn>2</mn><mo>+</mo></mrow></msup><mfenced separators=\"|\"><mrow><mtext>T</mtext><mtext>w</mtext><mtext>o</mtext></mrow></mfenced><mo>&lt;</mo><mtext>C</mtext><msup><mrow><mtext>u</mtext></mrow><mrow><mn>2</mn><mo>+</mo></mrow></msup><mfenced separators=\"|\"><mrow><mtext>O</mtext><mtext>n</mtext><mtext>e</mtext></mrow></mfenced></math>", "opts": [{"id": "uSsDH", "text": "<math><mtext>N</mtext><msup><mrow><mtext>i</mtext></mrow><mrow><mn>2</mn><mo>+</mo></mrow></msup><mo>&gt;</mo><mtext>C</mtext><msup><mrow><mtext>r</mtext></mrow><mrow><mn>2</mn><mo>+</mo></mrow></msup><mo>&gt;</mo><mtext>F</mtext><msup><mrow><mtext>e</mtext></mrow><mrow><mn>2</mn><mo>+</mo></mrow></msup><mo>&gt;</mo><mtext>M</mtext><msup><mrow><mtext>n</mtext></mrow><mrow><mn>2</mn><mo>+</mo></mrow></msup><mfenced separators=\"|\"><mrow><mtext>s</mtext><mtext>i</mtext><mtext>z</mtext><mtext>e</mtext></mrow></mfenced></math>"}, {"id": "Mp0VT", "text": "<math><mtext>S</mtext><mtext>c</mtext><mo>&gt;</mo><mtext>T</mtext><mtext>i</mtext><mo>&gt;</mo><mtext>C</mtext><mtext>r</mtext><mo>&gt;Fe</mo><mtext>\u00a0</mtext><mfenced separators=\"|\"><mrow><mtext>s</mtext><mtext>i</mtext><mtext>z</mtext><mtext>e</mtext></mrow></mfenced></math>"}, {"id": "AP8Jp", "text": "<math><mtext>M</mtext><msup><mrow><mtext>n</mtext></mrow><mrow><mn>2</mn><mo>+</mo></mrow></msup><mo>&gt;</mo><mtext>N</mtext><msup><mrow><mtext>i</mtext></mrow><mrow><mn>2</mn><mo>+</mo></mrow></msup><mo>&lt;</mo><mtext>C</mtext><msup><mrow><mtext>o</mtext></mrow><mrow><mn>2</mn><mo>+</mo></mrow></msup><mo>&lt;</mo><mtext>F</mtext><msup><mrow><mtext>e</mtext></mrow><mrow><mn>2</mn><mo>+</mo></mrow></msup><mtext>\u00a0</mtext><mfenced separators=\"|\"><mrow><mtext>u</mtext><mtext>n</mtext><mtext>p</mtext><mtext>a</mtext><mtext>i</mtext><mtext>r</mtext><mtext>e</mtext><mtext>d</mtext><mtext>\u00a0</mtext><mtext>e</mtext><mtext>l</mtext><mtext>e</mtext><mtext>c</mtext><mtext>t</mtext><mtext>r</mtext><mtext>o</mtext><mtext>n</mtext></mrow></mfenced></math>"}, {"id": "s7aAL", "text": "<math><mtext>F</mtext><msup><mrow><mtext>e</mtext></mrow><mrow><mn>2</mn><mo>+</mo></mrow></msup><mo>&gt;</mo><msup><mrow><mtext>C</mtext><mtext>o</mtext></mrow><mrow><mn>2</mn><mo>+</mo></mrow></msup><mo>&gt;</mo><mtext>N</mtext><msup><mrow><mtext>i</mtext></mrow><mrow><mn>2</mn><mo>+</mo></mrow></msup><mo>&gt;</mo><mtext>C</mtext><msup><mrow><mtext>u</mtext></mrow><mrow><mn>2</mn><mo>+</mo></mrow></msup><mfenced separators=\"|\"><mrow><mtext>u</mtext><mtext>n</mtext><mtext>p</mtext><mtext>a</mtext><mtext>i</mtext><mtext>r</mtext><mtext>e</mtext><mtext>d</mtext><mtext>\u00a0</mtext><mtext>e</mtext><mtext>l</mtext><mtext>e</mtext><mtext>c</mtext><mtext>t</mtext><mtext>r</mtext><mtext>o</mtext><mtext>n</mtext></mrow></mfenced></math>"}], "ans": "<math><mtext>N</mtext><msup><mrow><mtext>i</mtext></mrow><mrow><mn>2</mn><mo>+</mo></mrow></msup><mo>&gt;</mo><mtext>C</mtext><msup><mrow><mtext>r</mtext></mrow><mrow><mn>2</mn><mo>+</mo></mrow></msup><mo>&gt;</mo><mtext>F</mtext><msup><mrow><mtext>e</mtext></mrow><mrow><mn>2</mn><mo>+</mo></mrow></msup><mo>&gt;</mo><mtext>M</mtext><msup><mrow><mtext>n</mtext></mrow><mrow><mn>2</mn><mo>+</mo></mrow></msup><mfenced separators=\"|\"><mrow><mtext>s</mtext><mtext>i</mtext><mtext>z</mtext><mtext>e</mtext></mrow></mfenced></math>", "correct": "uSsDH"}, {"id": "695e3b3e3dc984756e9de689", "type": "singleCorrect", "html": "The colour and magnetic nature of manganate ion <math><mfenced separators=\"|\"><mrow><mtext>M</mtext><mtext>n</mtext><msubsup><mrow><mtext>O</mtext></mrow><mrow><mn>4</mn></mrow><mrow><msub><mrow><mn>2-</mn></mrow></msub></mrow></msubsup></mrow></mfenced></math>\u00a0is-", "sol": "<math><mtext>M</mtext><mtext>n</mtext><msubsup><mrow><mtext>O</mtext></mrow><mrow><mn>4</mn></mrow><mrow><msub><mrow><mn>2</mn></mrow><mrow><mo>-</mo></mrow></msub></mrow></msubsup></math> manganate ion is green and paramagnetic", "opts": [{"id": "Rpori", "text": "Green, paramagnetic"}, {"id": "VDrwF", "text": "Purple, diamagnetic"}, {"id": "jblWJ", "text": "Green, diamagnetic"}, {"id": "oqgL4", "text": "Purple, paramagnetic"}], "ans": "Green, paramagnetic", "correct": "Rpori"}, {"id": "695e3b3e3dc984756e9de68a", "type": "singleCorrect", "html": "Aqua-regia reacts with Pt to yield \u2013", "sol": "Aqua-regia is a mixture of nitric acid and hydrochloric acid in molar ratio <math><mn>1</mn><mo>:</mo><mn>3</mn></math>. It is yellow orange fuming liquid. In Aqua-regia Pt form chloroplatinic acid, <math><msub><mrow><mi mathvariant=\"normal\">H</mi></mrow><mrow><mn>2</mn></mrow></msub><mi mathvariant=\"normal\">P</mi><mi mathvariant=\"normal\">t</mi><mi mathvariant=\"normal\">C</mi><msub><mrow><mi mathvariant=\"normal\">l</mi></mrow><mrow><mn>6</mn></mrow></msub></math>", "opts": [{"id": "UUky6", "text": "<math><mi mathvariant=\"normal\">P</mi><mi mathvariant=\"normal\">t</mi><mo>(</mo><mi mathvariant=\"normal\">N</mi><msub><mrow><mi mathvariant=\"normal\">O</mi></mrow><mrow><mn>3</mn></mrow></msub><msub><mrow><mo>)</mo></mrow><mrow><mn>4</mn></mrow></msub></math>"}, {"id": "ewVgX", "text": "<math><msub><mrow><mi mathvariant=\"normal\">H</mi></mrow><mrow><mn>2</mn></mrow></msub><mi mathvariant=\"normal\">P</mi><mi mathvariant=\"normal\">t</mi><mi mathvariant=\"normal\">C</mi><msub><mrow><mi mathvariant=\"normal\">l</mi></mrow><mrow><mn>6</mn></mrow></msub></math>"}, {"id": "6F9Nv", "text": "<math><mi mathvariant=\"normal\">P</mi><mi mathvariant=\"normal\">t</mi><mi mathvariant=\"normal\">C</mi><msub><mrow><mi mathvariant=\"normal\">l</mi></mrow><mrow><mn>4</mn></mrow></msub></math>"}, {"id": "ZgKzC", "text": "<math><mi mathvariant=\"normal\">P</mi><mi mathvariant=\"normal\">t</mi><mi mathvariant=\"normal\">C</mi><msub><mrow><mi mathvariant=\"normal\">l</mi></mrow><mrow><mn>2</mn></mrow></msub></math>"}], "ans": "<math><msub><mrow><mi mathvariant=\"normal\">H</mi></mrow><mrow><mn>2</mn></mrow></msub><mi mathvariant=\"normal\">P</mi><mi mathvariant=\"normal\">t</mi><mi mathvariant=\"normal\">C</mi><msub><mrow><mi mathvariant=\"normal\">l</mi></mrow><mrow><mn>6</mn></mrow></msub></math>", "correct": "ewVgX"}, {"id": "695e3b3e3dc984756e9de68b", "type": "singleCorrect", "html": "The true statement for an element with atomic number <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mn>46</mn></math> is :", "sol": "<p>Atomic number <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mo>&#8594;</mo><mn>46</mn></msub><mi>Pd</mi><mo>&#8594;</mo><mo>[</mo><mi>Kr</mi><mo>]</mo><mn>4</mn><mo>&#160;</mo><msup><mi mathvariant=\"normal\">d</mi><mn>10</mn></msup></math>\\</p><p>Pd is a non-representative element and it does not have the highest value of ionization energy in the respective group.</p>", "opts": [{"id": "slriD", "text": "inner transition element"}, {"id": "o5bYs", "text": "highest value of <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi>IE</mi></math> with same group elements."}, {"id": "PNpG9", "text": "having <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msup><mi mathvariant=\"normal\">d</mi><mn>10</mn></msup></math> configuration."}, {"id": "3Fe2o", "text": "It is a representative element."}], "ans": "having <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msup><mi mathvariant=\"normal\">d</mi><mn>10</mn></msup></math> configuration.", "correct": "PNpG9"}, {"id": "695e3b3e3dc984756e9de68c", "type": "singleCorrect", "html": "Which of the following statements regarding copper salts is not true:", "sol": "Copper (II) oxide is black powder", "opts": [{"id": "6NNk7", "text": "Copper (I) disproportionates into Cu and Cu (II) in aqueous solution"}, {"id": "4zWb1", "text": "Copper (I) can be stabilized by the formation of insoluble complex compounds such as <math><mi mathvariant=\"normal\">C</mi><mi mathvariant=\"normal\">u</mi><mi mathvariant=\"normal\">C</mi><msubsup><mrow><mi mathvariant=\"normal\">l</mi></mrow><mrow><mn>2</mn></mrow><mrow><mo>-</mo></mrow></msubsup><mi mathvariant=\"normal\"></mi><mi mathvariant=\"normal\">a</mi><mi mathvariant=\"normal\">n</mi><mi mathvariant=\"normal\">d</mi><mi mathvariant=\"normal\"></mi><mi mathvariant=\"normal\">C</mi><mi mathvariant=\"normal\">u</mi><mo>(</mo><mi mathvariant=\"normal\">C</mi><mi mathvariant=\"normal\">N</mi><msubsup><mrow><mo>)</mo></mrow><mrow><mn>2</mn></mrow><mrow><mo>-</mo></mrow></msubsup></math>"}, {"id": "QomZV", "text": "Copper (II) oxide is red powder"}, {"id": "es7Lk", "text": "Hydrated <math><mi mathvariant=\"normal\">C</mi><mi mathvariant=\"normal\">u</mi><mi mathvariant=\"normal\">S</mi><msub><mrow><mi mathvariant=\"normal\">O</mi></mrow><mrow><mn>4</mn></mrow></msub><mi mathvariant=\"normal\"></mi><mi mathvariant=\"normal\">i</mi><mi mathvariant=\"normal\">s</mi><mi mathvariant=\"normal\"></mi><mo>[</mo><mi mathvariant=\"normal\">C</mi><mi mathvariant=\"normal\">u</mi><mo>(</mo><msub><mrow><mi mathvariant=\"normal\">H</mi></mrow><mrow><mn>2</mn></mrow></msub><mi mathvariant=\"normal\">O</mi><msub><mrow><mo>)</mo></mrow><mrow><mn>4</mn></mrow></msub><mo>]</mo><mi mathvariant=\"normal\">S</mi><msub><mrow><mi mathvariant=\"normal\">O</mi></mrow><mrow><mn>4</mn></mrow></msub><mo>.</mo><msub><mrow><mi mathvariant=\"normal\">H</mi></mrow><mrow><mn>2</mn></mrow></msub><mi mathvariant=\"normal\">O</mi></math>"}], "ans": "Copper (II) oxide is red powder", "correct": "QomZV"}, {"id": "695e3b3e3dc984756e9de68d", "type": "singleCorrect", "html": "Which of the following metal is expected to have the highest third ionisastion enthalpy.", "sol": "<math><mi mathvariant=\"normal\">M</mi><mi mathvariant=\"normal\">n</mi></math> had outer electronic configuration as <math><mn>4</mn><msup><mrow><mi mathvariant=\"normal\">s</mi></mrow><mrow><mn>2</mn></mrow></msup><mi mathvariant=\"normal\"></mi><mn>3</mn><msup><mrow><mi mathvariant=\"normal\">d</mi></mrow><mrow><mn>5</mn></mrow></msup></math>, first two electrons are removed from <math><mn>4</mn><mi mathvariant=\"normal\">S</mi><mo>-</mo></math> orbital, but the removal of <math><msup><mrow><mn>3</mn></mrow><mrow><mi mathvariant=\"normal\">r</mi><mi mathvariant=\"normal\">d</mi></mrow></msup></math> electron is from half filled <math><mn>3</mn><mi mathvariant=\"normal\">d</mi><mo>-</mo></math> orbital, which requires higher ionization energy then other metal.", "opts": [{"id": "IbTSi", "text": "<math><mi mathvariant=\"normal\">C</mi><mi mathvariant=\"normal\">r</mi><mfenced separators=\"|\"><mrow><mi mathvariant=\"normal\">Z</mi><mo>=</mo><mn>24</mn></mrow></mfenced></math>"}, {"id": "2Oh4V", "text": "<math><mi mathvariant=\"normal\">V</mi><mo>(</mo><mi mathvariant=\"normal\">Z</mi><mo>=</mo><mn>23</mn><mo>)</mo></math>"}, {"id": "GqBn6", "text": "<math><mi mathvariant=\"normal\">M</mi><mi mathvariant=\"normal\">n</mi><mo>(</mo><mi mathvariant=\"normal\">Z</mi><mo>=</mo><mn>25</mn><mo>)</mo></math>"}, {"id": "fOccO", "text": "<math><mi mathvariant=\"normal\">F</mi><mi mathvariant=\"normal\">e</mi><mo>(</mo><mi mathvariant=\"normal\">Z</mi><mo>=</mo><mn>26</mn><mo>)</mo></math>"}], "ans": "<math><mi mathvariant=\"normal\">M</mi><mi mathvariant=\"normal\">n</mi><mo>(</mo><mi mathvariant=\"normal\">Z</mi><mo>=</mo><mn>25</mn><mo>)</mo></math>", "correct": "GqBn6"}, {"id": "695e3b3e3dc984756e9de68e", "type": "singleCorrect", "html }_{-} 4\\) units that share a single oxygen atom at one vertex.<br/>This creates two distinct types of oxygen atoms and consequently two types of \\(\\mathrm{Cr}-\\mathrm{O}\\) bonds:<br/>1. Terminal \\(\\mathrm{Cr}-\\mathrm{O}\\) bonds: Each chromium atom is bonded to three terminal oxygen atoms. This gives a total of six terminal \\(\\mathbf{C r}-\\mathbf{O}\\) bonds. These six bonds are all equivalent in length due to resonance, which delocalizes the negative charges and gives them partial double-bond character.<br/>2. Bridging Cr-O bonds: There are two Cr-O bonds that involve the central, bridging oxygen atom forming a \\(\\mathrm{Cr}-\\mathrm{O}-\\mathrm{Cr}\\) linkage. These two bonds are different in length from the terminal bonds.", "opts": [{"id": "aQWQO", "text": "<math><mn>4</mn><mi mathvariant=\"normal\">C</mi><mi mathvariant=\"normal\">r</mi><mo>-</mo><mi mathvariant=\"normal\">O</mi></math> bonds are equivalent"}, {"id": "0Wwsb", "text": "<math><mn>6</mn><mi mathvariant=\"normal\">C</mi><mi mathvariant=\"normal\">r</mi><mo>-</mo><mi mathvariant=\"normal\">O</mi></math> bonds are equivalent"}, {"id": "AZQd3", "text": "All <math><mi mathvariant=\"normal\">C</mi><mi mathvariant=\"normal\">r</mi><mo>-</mo><mi mathvariant=\"normal\">O</mi></math> bonds are equivalent"}, {"id": "HxGTI", "text": "None of <math><mi mathvariant=\"normal\">C</mi><mi mathvariant=\"normal\">r</mi><mo>-</mo><mi mathvariant=\"normal\">O</mi></math> bonds are equivalent"}], "ans": "<math><mn>6</mn><mi mathvariant=\"normal\">C</mi><mi mathvariant=\"normal\">r</mi><mo>-</mo><mi mathvariant=\"normal\">O</mi></math> bonds are equivalent", "correct": "0Wwsb"}, {"id": "695e3b3e3dc984756e9de694", "type": "singleCorrect", "html": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><munder><mi mathvariant=\"normal\">A</mi><mrow><mo>(</mo><mi mathvariant=\"normal\">I</mi><mi mathvariant=\"normal\">n</mi><mi mathvariant=\"normal\">o</mi><mi mathvariant=\"normal\">r</mi><mi mathvariant=\"normal\
