ariant=\"normal\">o</mi><mi mathvariant=\"normal\">u</mi><mi mathvariant=\"normal\">r</mi></math><br/>when ext. pressure is reduced on ice. <math><msub><mrow><mi mathvariant=\"normal\">P</mi></mrow><mrow><mi mathvariant=\"normal\">e</mi><mi mathvariant=\"normal\">x</mi><mi mathvariant=\"normal\">t</mi></mrow></msub></math> at moon = 0.", "opts": [{"id": "OBOmc", "text": "Two sulphur atoms in the thiosulphate ions occupy equivalent positions"}, {"id": "XCS4Y", "text": "Ice results from cooling of water whereas snow results from cooling of vapours to solid"}, {"id": "riZa2", "text": "Formation of ice is solidification whereas formation of snow is Hoar frost"}, {"id": "oanPf", "text": "Ice sublimes on moon"}], "ans": "Two sulphur atoms in the thiosulphate ions occupy equivalent positions", "correct": "OBOmc"}, {"id": "695e3b3f3dc984756e9de6b8", "type": "singleCorrect", "html": "The correct sequence of decreasing number of <math><mi>\u03c0</mi></math> -bonds in the structure of <math><msub><mrow><mi>H</mi></mrow><mrow><mn>2</mn></mrow></msub><mi>S</mi><msub><mrow><mi>O</mi></mrow><mrow><mn>3</mn></mrow></msub><mo>,</mo><mi>\u00a0</mi><msub><mrow><mi>H</mi></mrow><mrow><mn>2</mn></mrow></msub><mi>S</mi><msub><mrow><mi>O</mi></mrow><mrow><mn>4</mn></mrow></msub></math> and <math><msub><mrow><mi>H</mi></mrow><mrow><mn>2</mn></mrow></msub><msub><mrow><mi>S</mi></mrow><mrow><mn>2</mn></mrow></msub><msub><mrow><mi>O</mi></mrow><mrow><mn>7</mn></mrow></msub></math> is:", "sol": "<img src=\"https://cdn-question-pool.getmarks.app/NEET/DPP-Chemistry/pzmiwpblyvapadolzqilntinsmmukmjbgvvqgrubnfnvdqqvtg.jpeg\" style=\"height: 73px; width: 200px;\"/><br/><img src=\"https://cdn-question-pool.getmarks.app/NEET/DPP-Chemistry/mkeohbtgycietyllihruebknvyndgvsujrgjsedcigxxrrsstr.jpeg\"/><br/><img alt=\"\" src=\"https://cdn-question-pool.getmarks.app/NEET/DPP-Chemistry/179844_A_.png\" style=\"width: 200px; height: 79px;\"/>", "opts": [{"id": "vRi5F", "text": "<math><msub><mrow><mtext>H</mtext></mrow><mrow><mn>2</mn></mrow></msub><msub><mrow><mtext>S</mtext></mrow><mrow><mn>2</mn></mrow></msub><msub><mrow><mtext>O</mtext></mrow><mrow><mn>7</mn></mrow></msub><mo>&gt;</mo><msub><mrow><mtext>H</mtext></mrow><mrow><mn>2</mn></mrow></msub><mtext>S</mtext><msub><mrow><mtext>O</mtext></mrow><mrow><mn>3</mn></mrow></msub><mo>&gt;</mo><msub><mrow><mtext>H</mtext></mrow><mrow><mn>2</mn></mrow></msub><mtext>S</mtext><msub><mrow><mtext>O</mtext></mrow><mrow><mn>4</mn></mrow></msub></math>"}, {"id": "TeHwI", "text": "<math><msub><mrow><mtext>H</mtext></mrow><mrow><mn>2</mn></mrow></msub><msub><mrow><mtext>S</mtext></mrow><mrow><mn>2</mn></mrow></msub><msub><mrow><mtext>O</mtext></mrow><mrow><mn>7</mn></mrow></msub><mo>&gt;</mo><msub><mrow><mtext>H</mtext></mrow><mrow><mn>2</mn></mrow></msub><mtext>S</mtext><msub><mrow><mtext>O</mtext></mrow><mrow><mn>4</mn></mrow></msub><mo>&gt;</mo><msub><mrow><mtext>H</mtext></mrow><mrow><mn>2</mn></mrow></msub><mtext>S</mtext><msub><mrow><mtext>O</mtext></mrow><mrow><mn>3</mn></mrow></msub></math>"}, {"id": "ytkmg", "text": "<math><msub><mrow><mtext>H</mtext></mrow><mrow><mn>2</mn></mrow></msub><mtext>S</mtext><msub><mrow><mtext>O</mtext></mrow><mrow><mn>4</mn></mrow></msub><mo>&gt;</mo><msub><mrow><mtext>H</mtext></mrow><mrow><mn>2</mn></mrow></msub><msub><mrow><mtext>S</mtext></mrow><mrow><mn>2</mn></mrow></msub><msub><mrow><mtext>O</mtext></mrow><mrow><mn>7</mn></mrow></msub><mo>&gt;</mo><msub><mrow><mtext>H</mtext></mrow><mrow><mn>2</mn></mrow></msub><mtext>S</mtext><msub><mrow><mtext>O</mtext></mrow><mrow><mn>3</mn></mrow></msub></math>"}, {"id": "TEinq", "text": "<math><msub><mrow><mtext>H</mtext></mrow><mrow><mn>2</mn></mrow></msub><mtext>S</mtext><msub><mrow><mtext>O</mtext></mrow><mrow><mn>3</mn></mrow></msub><mo>&gt;</mo><msub><mrow><mtext>H</mtext></mrow><mrow><mn>2</mn></mrow></msub><mtext>S</mtext><msub><mrow><mtext>O</mtext></mrow><mrow><mn>4</mn></mrow></msub><mo>&gt;</mo><msub><mrow><mtext>H</mtext></mrow><mrow><mn>2</mn></mrow></msub><msub><mrow><mtext>S</mtext></mrow><mrow><mn>2</mn></mrow></msub><msub><mrow><mtext>O</mtext></mrow><mrow><mn>7</mn></mrow></msub></math>"}], "ans": "<math><msub><mrow><mtext>H</mtext></mrow><mrow><mn>2</mn></mrow></msub><msub><mrow><mtext>S</mtext></mrow><mrow><mn>2</mn></mrow></msub><msub><mrow><mtext>O</mtext></mrow><mrow><mn>7</mn></mrow></msub><mo>&gt;</mo><msub><mrow><mtext>H</mtext></mrow><mrow><mn>2</mn></mrow></msub><mtext>S</mtext><msub><mrow><mtext>O</mtext></mrow><mrow><mn>4</mn></mrow></msub><mo>&gt;</mo><msub><mrow><mtext>H</mtext></mrow><mrow><mn>2</mn></mrow></msub><mtext>S</mtext><msub><mrow><mtext>O</mtext></mrow><mrow><mn>3</mn></mrow></msub></math>", "correct": "TeHwI"}, {"id": "695e3b3f3dc984756e9de6b9", "type": "singleCorrect", "html": "Elements of group <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mn>16</mn></math>&nbsp;(except polonium) are called chalcogens because_______.", "sol": "<p>Elements of group <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mn>16</mn></math>&nbsp;(except polonium) are called chalcogens because&nbsp;these elements, particularly sulphur and oxygen are present in many metallic ores, mainly as oxides and sulphides.&nbsp;The chalcogens, the oxygen group, is located in column 16 of the periodic table. It contains the elements oxygen, sulphur, selenium, tellurium, polonium, and ununhexium <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mo>(</mo><mi mathvariant=\"normal\">O</mi><mo>,</mo><mo>&#160;</mo><mi mathvariant=\"normal\">S</mi><mo>,</mo><mo>&#160;</mo><mi>Se</mi><mo>,</mo><mo>&#160;</mo><mi>Te</mi><mo>,</mo><mo>&#160;</mo><mi>Po</mi><mo>)</mo></math>. These elements all contain six valence electrons and form <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mn>2</mn></math>- ions. The physical properties of this group vary dramatically. Oxygen is a colourless gas while sulphur is a yellow solid. Tellurium is a silver metalloid, and selenium is black.</p>", "opts": [{"id": "ZBGk8", "text": "these elements, particularly sulphur and oxygen are present in many metallic ores, mainly as oxides and sulphides"}, {"id": "6ssVI", "text": "a large number of acids contain these elements, particularly sulphur and oxygen."}, {"id": "CmLW7", "text": "these elements mainly form anions."}, {"id": "YNP7Z", "text": "these elements exist in different allotropic forms."}], "ans": "these elements, particularly sulphur and oxygen are present in many metallic ores, mainly as oxides and sulphides", "correct": "ZBGk8"}, {"id": "695e3b3f3dc984756e9de6ba", "type": "singleCorrect", "html": "Select the incorrect statement.", "sol": "<p><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mo>&#8658;</mo></math>In&nbsp;Ostwald method,&nbsp;ammonia&nbsp;and oxygen are added to a tube that contains the metal&nbsp;catalyst&nbsp;(platinum).&nbsp;</p><p><img src=\"https://cdn-question-pool.getmarks.app/NEET/DPP-Chemistry/5fff032c-9ccd-4ba8-84c5-86334e5bd183-image.png\" style=\"width: 403px; height: 274px;\" /></p><p><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mo>&#8658;</mo></math>Oxidation state of <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi mathvariant=\"normal\">N</mi><mo>&#160;</mo></math>in&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi>HNO</mi><mn>2</mn></msub></math>&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mo>=</mo></math><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mo>+</mo><mn>3</mn></math>, Therefore it can accept electron to go to lower oxidation state (till <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mo>-</mo><mn>3</mn></math>), and it can also donate electron to get higher oxidation state <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mo>(</mo><mo>+</mo><mn>5</mn><mo>)</mo></math>, hence it can act as both oxidizing as well as reducing agent.</p><p><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mo>&#8658;</mo><mn>2</mn><msub><mi>NO</mi><mn>2</mn></msub><mo>+</mo><msub><mi mathvariant=\"normal\">O</mi><mn>3</mn></msub><mo>&#8594;</mo><msub><mi mathvariant=\"normal\">N</mi><mn>2</mn></msub><msub><mi mathvariant=\"normal\">O</mi><mn>5</mn></msub><mo>+</mo><msub><mi mathvariant=\"normal\">O</mi><mn>2</mn></msub><mo>&#160;</mo><mo>&#160;</mo><mo>&#160;</mo></math><br/><math><mo>&#160;</mo><mo>&#160;</mo><mo>&#160;</mo><mo>&#160;</mo><mo>&#160;</mo><mo>&#160;</mo><mo>+</mo><mn>4</mn><mo>&#160;</mo><mo>&#160;</mo><mo>&#160;</mo><mo>&#160;</mo><mo>&#160;</mo><mo>&#160;</mo><mo>&#160;</mo><mo>&#160;</mo><mo>&#160;</mo><mo>&#160;</mo><mo>&#160;</mo><mo>&#160;</mo><mo>&#160;</mo><mo>&#160;</mo><mo>&#160;</mo><mo>&#160;</mo><mo>+</mo><mn>5</mn></math></p><p><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mo>&#8658;</mo></math>Ozone is a strong oxidizing&nbsp;agent. Hence, it oxidises&nbsp;nitrogen dioxide to nitrogen pentoxide.</p><p><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mo>&#8658;</mo></math>Mixture of&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi>CaC</mi><mn>2</mn></msub><mo>&#160;</mo><mi>and</mi><mo>&#160;</mo><msub><mi>Ca</mi><mn>3</mn></msub><msub><mi mathvariant=\"normal\">P</mi><mn>2</mn></msub></math>&nbsp;is used to give signals to submarines.&nbsp;A mixture of calcium carbide and calcium phosphide placed in a container which reacts with water and produce phosphine and acetylene gases&nbsp;which burn and thus guide the ships in the sea. It is called as Holmes signal.</p>", "opts": [{"id": "4Hiys", "text": "Ostwald&#39;s method of preparation of nitric acid is based upon catalytic oxidation of <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi>NH</mi><mn>3</mn></msub></math> by <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi mathvariant=\"normal\">O</mi><mn>2</mn></msub></math>."}, {"id": "trhgl", "text": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi>HNO</mi><mn>2</mn></msub></math>&nbsp;acts as both oxidant and reductant."}, {"id": "oJgcx", "text": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi>NO</mi><mn>2</mn></msub></math> reacts with ozone to form&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi mathvariant=\"normal\">N</mi><mn>2</mn></msub><msub><mi mathvariant=\"normal\">O</mi><mn>5</mn></msub></math>."}, {"id": "9h10G", "text": "Mixture of <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi>CaC</mi><mn>2</mn></msub></math> and <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi>Ca</mi><mn>3</mn></msub><msub><mi mathvariant=\"normal\">N</mi><mn>2</mn></msub></math> can be used to give signals to submarine."}], "ans": "Mixture of <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi>CaC</mi><mn>2</mn></msub></math> and <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi>Ca</mi><mn>3</mn></msub><msub><mi mathvariant=\"normal\">N</mi><mn>2</mn></msub></math> can be used to give signals to submarine.", "correct": "9h10G"}, {"id": "695e3b3f3dc984756e9de6bb", "type": "singleCorrect", "html": "Which one of the following properties is <strong>not</strong> shown by NO ?", "sol": "As per MOT, electronic configuration of NO is<br/><math> <mrow> <mi>\u03c3</mi><mn>1</mn><msup> <mi>s</mi> <mn>2</mn> </msup> <mo>&lt;</mo><mover> <mi>\u03c3</mi> <mo>*</mo> </mover> <mn>1</mn><msup> <mi>s</mi> <mn>2</mn> </msup> <mo>&lt;</mo><mi>\u03c3</mi><mn>2</mn><msup> <mi>s</mi> <mn>2</mn> </msup> <mo>&lt;</mo><mover> <mi>\u03c3</mi> <mo>*</mo> </mover> <mn>2</mn><msup> <mi>s</mi> <mn>2</mn> </msup> <mo>&lt;</mo><mi>\u03c3</mi><mn>2</mn><msubsup> <mi>p</mi> <mi>z</mi> <mn>2</mn> </msubsup> <mo>&lt;</mo><mi>\u03c0</mi><mn>2</mn><msubsup> <mi>p</mi> <mi>x</mi> <mn>2</mn> </msubsup> <mo>=</mo><mi>\u03c0</mi><mn>2</mn><msubsup> <mi>p</mi> <mi>y</mi> <mn>2</mn> </msubsup> <mo>&lt;</mo><mover> <mi>\u03c0</mi> <mo>*</mo> </mover> <mn>2</mn><msubsup> <mi>p</mi> <mi>x</mi> <mn>1</mn> </msubsup> <mo>=</mo><mover> <mi>\u03c0</mi> <mo>*</mo> </mover> <mn>2</mn><msubsup> <mi>p</mi> <mi>y</mi> <mn>0</mn> </msubsup> </mrow> </math><br/>It is paramagnetic due to <math> <mrow> <mi>\u03c0</mi> <msup> <mn>2</mn> <mo>*</mo> </msup> <msup> <mtext>py</mtext> <mn>1</mn> </msup> </mrow> </math> (unpaired electron)&nbsp;<br/>Bond order of NO <math> <mrow> <mo stretchy=\"false\">(</mo><mtext>i</mtext><mo>.</mo><mtext>e</mtext><mo>.</mo><mtext> </mtext><mtext> </mtext><msubsup> <mtext>O</mtext> <mrow> <msub> <mrow></mrow> <mn>2</mn> </msub> </mrow> <mo>+</mo> </msubsup> <mo stretchy=\"false\">)</mo><mo>=</mo><mfrac> <mrow> <mn>10</mn><mo>\u2212</mo><mn>5</mn> </mrow> <mn>2</mn> </mfrac> <mo>=</mo><mn>2.5</mn> </mrow> </math><br/>", "opts": [{"id": "NPEVJ", "text": "It is diamagnetic in gaseous state"}, {"id": "aYdGg", "text": "It is a neutral oxide"}, {"id": "J5PDa", "text": "It combines with oxygen to form nitrogen dioxide"}, {"id": "WLOzJ", "text": "It&#39;s bond order is 2.5"}], "ans": "It is diamagnetic in gaseous state", "correct": "NPEVJ"}, {"id": "695e3b3f3dc984756e9de6bc", "type": "singleCorrect", "html": "Ammonia is <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi>NOT</mi></math> produced in the reaction of", "sol": "<p>Ammonia has chemical formula&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi>NH</mi><mn>3</mn></msub></math>. It is industrially prepared by Haber&#39;s process from nitrogen and hydrogen. But, there are other methods by which it can be prepared,&nbsp;which are given below:</p><p>The reaction between ammonium chloride and Potassium hydroxide:</p><p><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi>NH</mi><mn>4</mn></msub><mi>Cl</mi><mo>+</mo><mi>KOH</mi><mo>&#8594;</mo><msub><mi>NH</mi><mn>3</mn></msub><mo>+</mo><mi>HCl</mi><mo>+</mo><msub><mi mathvariant=\"normal\">H</mi><mn>2</mn></msub><mi mathvariant=\"normal\">O</mi></math></p><p>The reaction of aluminium nitride with water:</p><p><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi>AlN</mi><mo>+</mo><mn>3</mn><msub><mi mathvariant=\"normal\">H</mi><mn>2</mn></msub><mi mathvariant=\"normal\">O</mi><mo>&#8594;</mo><mi>Al</mi><msub><mfenced><mi>OH</mi></mfenced><mn>3</mn></msub><mo>+</mo><msub><mi>NH</mi><mn>3</mn></msub></math></p><p>The reaction between ammonium chloride and calcium hydroxide:</p><p><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mn>2</mn><msub><mi>NH</mi><mn>4</mn></msub><mi>Cl</mi><mo>+</mo><mi>Ca</mi><msub><mfenced><mi>OH</mi></mfenced><mn>2</mn></msub><mo>&#8594;</mo><msub><mi>CaCl</mi><mn>2</mn></msub><mo>+</mo><mn>2</mn><msub><mi>NH</mi><mn>3</mn></msub><mo>+</mo><mn>2</mn><msub><mi mathvariant=\"normal\">H</mi><mn>2</mn></msub><mi mathvariant=\"normal\">O</mi></math></p>", "opts": [{"id": "aWVPD", "text": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi>NH</mi><mn>4</mn></msub><mi>Cl</mi></math> with <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi>KOH</mi></math>."}, {"id": "jXMlc", "text": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi>AlN</mi></math>&nbsp;with water."}, {"id": "ISVTA", "text": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi>NH</mi><mn>4</mn></msub><mi>Cl</mi></math> with <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi>NaNO</mi><mn>2</mn></msub></math>."}, {"id": "nor9f", "text": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi>NH</mi><mn>4</mn></msub><mi>Cl</mi></math>&nbsp;with&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi>Ca</mi><mo>(</mo><mi>OH</mi><msub><mo>)</mo><mn>2</mn></msub></math>."}], "ans": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi>NH</mi><mn>4</mn></msub><mi>Cl</mi></math> with <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi>NaNO</mi><mn>2</mn></msub></math>.", "correct": "ISVTA"}, {"id": "695e3b3f3dc984756e9de6bd", "type": "singleCorrect", "html": "The order of the bond energies of the halogen molecules is", "sol": "<p>The bond present in halogen molecules is covalent in nature. The strength of the bond depends upon the size&nbsp;of the halogen&nbsp;atoms forming it.</p><p><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mtable><mtr><mtd><mi>Group</mi><mo>&#160;</mo><mn>17</mn></mtd></mtr><mtr><mtd><mi mathvariant=\"normal\">F</mi></mtd></mtr><mtr><mtd><mi>Cl</mi></mtd></mtr></mtable><mo>&#8595;</mo><mi>Atomic</mi><mo>&#160;</mo><mi>size</mi><mo>&#160;</mo><mi>decreases</mi></math><br/><math><mtable><mtr><mtd><mo>&#160;</mo><mo>&#160;</mo><mo>&#160;</mo><mo>&#160;</mo><mo>&#160;</mo><mo>&#160;</mo><mi>Br</mi></mtd></mtr></mtable><mo>&#160;</mo><mo>&#160;</mo><mo>&#160;</mo><mo>&#160;</mo><mo>&#160;</mo><mo>&#160;</mo><mo>&#160;</mo><mo>&#160;</mo></math><br/><math><mo>&#160;</mo><mo>&#160;</mo><mo>&#160;</mo><mo>&#160;</mo><mo>&#160;</mo><mo>&#160;</mo><mo>&#160;</mo><mo>&#160;</mo><mi mathvariant=\"normal\">I</mi></math></p><p>As we move down&nbsp;the&nbsp;group, the atomic size increases. Due to this, the&nbsp;distance between two similar halogen atoms (<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi mathvariant=\"normal\">X</mi><mo>-</mo><mi mathvariant=\"normal\">X</mi></math>) forming a halogen molecule&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mo>(</mo><msub><mi mathvariant=\"normal\">X</mi><mn>2</mn></msub><mo>)</mo></math>also increases.</p><p>Therefore,&nbsp;the bond length&nbsp;of halogen molecules&nbsp;increases as :</p><p><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi mathvariant=\"normal\">F</mi><mo>&#160;</mo><mo>-</mo><mo>&#160;</mo><mi mathvariant=\"normal\">F</mi><mo>&#160;</mo><mo>&#60;</mo><mo>&#160;</mo><mi>Cl</mi><mo>&#160;</mo><mo>-</mo><mo>&#160;</mo><mi>Cl</mi><mo>&#160;</mo><mo>&#60;</mo><mo>&#160;</mo><mi>Br</mi><mo>&#160;</mo><mo>-</mo><mo>&#160;</mo><mi>Br</mi><mo>&#160;</mo><mo>&#60;</mo><mo>&#160;</mo><mi mathvariant=\"normal\">I</mi><mo>&#160;</mo><mo>-</mo><mo>&#160;</mo><mi mathvariant=\"normal\">I</mi></math></p><p>Now, as the bond length increases, the force of attraction between the nuclei and the bonding electrons decreases. This weakens the bond, and the bond energy becomes lower. Therefore,&nbsp;&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi>Bond</mi><mo>&#160;</mo><mi>Energy</mi><mo>&#160;</mo><mi mathvariant=\"normal\">&#945;</mi><mo>&#160;</mo><mfrac><mn>1</mn><mrow><mi>Bond</mi><mo>&#160;</mo><mi>Length</mi></mrow></mfrac></math></p><p>So, the&nbsp;expected order of bond energies&nbsp;of halogens is :</p><p><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi mathvariant=\"normal\">F</mi><mn>2</mn></msub><mo>&#160;</mo><mo>&#62;</mo><mo>&#160;</mo><msub><mi>Cl</mi><mn>2</mn></msub><mo>&#160;</mo><mo>&#62;</mo><mo>&#160;</mo><msub><mi>Br</mi><mn>2</mn></msub><mo>&#160;</mo><mo>&#62;</mo><mo>&#160;</mo><msub><mi mathvariant=\"normal\">I</mi><mn>2</mn></msub><mo>&#160;</mo></math></p><p>However, an anomaly is observed in the bond strength of&nbsp;fluorine <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mo>(</mo><mi mathvariant=\"normal\">F</mi><mo>-</mo><mi mathvariant=\"normal\">F</mi><mo>)</mo></math>. This is explained by the fact that due to a very small atomic size <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mo>(</mo><mn>1</mn><msup><mi mathvariant=\"normal\">s</mi><mn>2</mn></msup><mn>2</mn><msup><mi mathvariant=\"normal\">s</mi><mn>2</mn></msup><mn>2</mn><msup><mi mathvariant=\"normal\">p</mi><mn>5</mn></msup><mo>)</mo></math>, the lone pairs of electrons in fluorine atoms are closer to each other, and they repel&nbsp;each other very strongly. These&nbsp;inter-electronic repulsions decrease&nbsp;the&nbsp;bond strength of fluorine, and the actual trend of the bond energies of&nbsp;halogen molecules follows as&nbsp;:</p><p><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi>Cl</mi><mn>2</mn></msub><mo>&#160;</mo><mo>&#62;</mo><mo>&#160;</mo><msub><mi>Br</mi><mn>2</mn></msub><mo>&#160;</mo><mo>&#62;</mo><mo>&#160;</mo><msub><mi mathvariant=\"normal\">F</mi><mn>2</mn></msub><mo>&#160;</mo><mo>&#62;</mo><mo>&#160;</mo><msub><mi mathvariant=\"normal\">I</mi><mn>2</mn></msub></math>.</p>", "opts": [{"id": "wpYxG", "text": "<math><msub><mrow><mi mathvariant=\"normal\">F</mi></mrow><mrow><mn>2</mn></mrow></msub><mi mathvariant=\"normal\">&#160;</mi><mo>&#62;</mo><mi mathvariant=\"normal\">&#160;</mi><msub><mrow><mi mathvariant=\"normal\">C</mi><mi mathvariant=\"normal\">l</mi></mrow><mrow><mn>2</mn></mrow></msub><mi mathvariant=\"normal\">&#160;</mi><mo>&#62;</mo><mi mathvariant=\"normal\">&#160;</mi><msub><mrow><mi mathvariant=\"normal\">B</mi><mi mathvariant=\"normal\">r</mi></mrow><mrow><mn>2</mn></mrow></msub><mi mathvariant=\"normal\">&#160;</mi><mo>&#62;</mo><mi mathvariant=\"normal\">&#160;</mi><msub><mrow><mi mathvariant=\"normal\">I</mi></mrow><mrow><mn>2</mn></mrow></msub></math>"}, {"id": "iFFjm", "text": "<math><msub><mrow><mi mathvariant=\"normal\">C</mi><mi mathvariant=\"normal\">l</mi></mrow><mrow><mn>2</mn></mrow></msub><mi mathvariant=\"normal\">&#160;</mi><mo>&#62;</mo><mi mathvariant=\"normal\">&#160;</mi><msub><mrow><mi mathvariant=\"normal\">B</mi><mi mathvariant=\"normal\">r</mi></mrow><mrow><mn>2</mn></mrow></msub><mi mathvariant=\"normal\">&#160;</mi><mo>&#62;</mo><mi mathvariant=\"normal\">&#160;</mi><msub><mrow><mi mathvariant=\"normal\">F</mi></mrow><mrow><mn>2</mn></mrow></msub><mi mathvariant=\"normal\">&#160;</mi><mo>&#62;</mo><mi mathvariant=\"normal\">&#160;</mi><msub><mrow><mi mathvariant=\"normal\">I</mi></mrow><mrow><mn>2</mn></mrow></msub></math>"}, {"id": "ZEE6U", "text": "<math><msub><mrow><mi mathvariant=\"normal\">C</mi><mi mathvariant=\"normal\">l</mi></mrow><mrow><mn>2</mn></mrow></msub><mi mathvariant=\"normal\">&#160;</mi><mo>&#62;</mo><mi mathvariant=\"normal\">&#160;</mi><msub><mrow><mi mathvariant=\"normal\">F</mi></mrow><mrow><mn>2</mn></mrow></msub><mi mathvariant=\"normal\">&#160;</mi><mo>&#62;</mo><mi mathvariant=\"normal\">&#160;</mi><msub><mrow><mi mathvariant=\"normal\">B</mi><mi mathvariant=\"normal\">r</mi></mrow><mrow><mn>2</mn></mrow></msub><mi mathvariant=\"normal\">&#160;</mi><mo>&#62;</mo><mi mathvariant=\"normal\">&#160;</mi><msub><mrow><mi mathvariant=\"normal\">I</mi></mrow><mrow><mn>2</mn></mrow></msub></math>"}, {"id": "o2yNb", "text": "<math><msub><mrow><mi mathvariant=\"normal\">C</mi><mi mathvariant=\"normal\">l</mi></mrow><mrow><mn>2</mn></mrow></msub><mi mathvariant=\"normal\">&#160;</mi><mo>&#62;</mo><mi mathvariant=\"normal\">&#160;</mi><msub><mrow><mi mathvariant=\"normal\">B</mi><mi mathvariant=\"normal\">r</mi></mrow><mrow><mn>2</mn></mrow></msub><mi mathvariant=\"normal\">&#160;</mi><mo>&#62;</mo><mi mathvariant=\"normal\">&#160;</mi><msub><mrow><mi mathvariant=\"normal\">I</mi></mrow><mrow><mn>2</mn></mrow></msub><mi mathvariant=\"normal\">&#160;</mi><mo>&#62;</mo><mi mathvariant=\"normal\">&#160;</mi><msub><mrow><mi mathvariant=\"normal\">F</mi></mrow><mrow><mn>2</mn></mrow></msub></math>"}], "ans": "<math><msub><mrow><mi mathvariant=\"normal\">C</mi><mi mathvariant=\"normal\">l</mi></mrow><mrow><mn>2</mn></mrow></msub><mi mathvariant=\"normal\">&#160;</mi><mo>&#62;</mo><mi mathvariant=\"normal\">&#160;</mi><msub><mrow><mi mathvariant=\"normal\">B</mi><mi mathvariant=\"normal\">r</mi></mrow><mrow><mn>2</mn></mrow></msub><mi mathvariant=\"normal\">&#160;</mi><mo>&#62;</mo><mi mathvariant=\"normal\">&#160;</mi><msub><mrow><mi mathvariant=\"normal\">F</mi></mrow><mrow><mn>2</mn></mrow></msub><mi mathvariant=\"normal\">&#160;</mi><mo>&#62;</mo><mi mathvariant=\"normal\">&#160;</mi><msub><mrow><mi mathvariant=\"normal\">I</mi></mrow><mrow><mn>2</mn></mrow></msub></math>", "correct": "iFFjm"}, {"id": "695e3b3f3dc984756e9de6be", "type": "singleCorrect", "html": "Which of the following is the correct statement?", "sol": "<p><meta name=\"uuid\" content=\"uuiddhsy9RWSCjJg\" /><meta charset=\"utf-8\" /></p><p>The boiling point increases down the group in halogens.</p><p>(i)&nbsp;The bond dissociation energy of <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi mathvariant=\"normal\">F</mi><mn>2</mn></msub></math> is less than that of <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi>Cl</mi><mn>2</mn></msub></math>, due to interelectronic repulsions. This is attributed to the small size of fluorine.&nbsp;</p><p>(ii)&nbsp;Chlorine&nbsp;has a higher electron affinity&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfenced><mrow><mi mathvariant=\"normal\">E</mi><mo>.</mo><mi mathvariant=\"normal\">A</mi><mo>.</mo></mrow></mfenced></math>&nbsp;than fluorine because of its small size and greater interelectronic repulsions.</p><p>(iii) <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi>HF</mi></math> is a weaker acid than <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi>HCl</mi></math> due to its higher bond dissociation energy.</p><p>(iv) The boiling point of halogens increases down the group due to an increase in van der Waal&#39;s forces of attraction.</p>", "opts": [{"id": "zJzd7", "text": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi mathvariant=\"normal\">F</mi><mn>2</mn></msub></math> has&nbsp;a higher dissociation energy than <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi>Cl</mi><mn>2</mn></msub></math>."}, {"id": "nkVou", "text": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi mathvariant=\"normal\">F</mi></math> has a higher electron affinity than <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi>Cl</mi></math>."}, {"id": "HJnbD", "text": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi>HF</mi></math>&nbsp;is&nbsp;a stronger acid than &nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi>HCl</mi></math>."}, {"id": "HMkOa", "text": "The boiling point increases down the group in halogens."}], "ans": "The boiling point increases down the group in halogens.", "correct": "HMkOa"}, {"id": "695e3b3f3dc984756e9de6bf", "type": "singleCorrect", "html": "Zinc gives H<sub>2</sub> gas with <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi mathvariant=\"normal\">H</mi><mn>2</mn></msub><msub><mi>SO</mi><mn>4</mn></msub></math> and <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi>conc</mi><mo>.</mo><mo>&#160;</mo><mi>HCl</mi></math> but not with <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi>conc</mi><mo>.</mo><mo>&#160;</mo><msub><mi>HNO</mi><mn>3</mn></msub></math>, this is because", "sol": "<math> <mrow> <mtable> <mtr> <mtd> <mtext>Zn</mtext> </mtd> <mtd> <mo>+</mo> </mtd> <mtd> <msub> <mtext>H</mtext> <mn>2</mn> </msub> <msub> <mtext>SO</mtext> <mn>4</mn> </msub> </mtd> <mtd> <mo>&rarr;</mo> </mtd> <mtd> <msub> <mtext>ZnSO</mtext> <mn>4</mn> </msub> </mtd> <mtd> <mo>+</mo> </mtd> <mtd> <msub> <mtext>H</mtext> <mn>2</mn> </msub> <mo>&uarr;</mo> </mtd> </mtr> <mtr> <mtd> </mtd> <mtd> </mtd> <mtd> <mtext>conc.</mtext> </mtd> <mtd> </mtd> <mtd> </mtd> <mtd> </mtd> <mtd> </mtd> </mtr> </mtable> </mrow> </math><br/><math> <mrow> <mtable> <mtr> <mtd> <mtext>Zn</mtext> </mtd> <mtd> <mo>+</mo> </mtd> <mtd> <mn>2</mn> <mtext>HCl</mtext> </mtd> <mtd> <mo>&rarr;</mo> </mtd> <mtd> <msub> <mtext>ZnCl</mtext> <mn>2</mn> </msub> </mtd> <mtd> <mo>+</mo> </mtd> <mtd> <msub> <mtext>H</mtext> <mn>2</mn> </msub> <mo>&uarr;</mo> </mtd> </mtr> <mtr> <mtd> </mtd> <mtd> </mtd> <mtd> <mtext>conc.</mtext> </mtd> <mtd> </mtd> <mtd> </mtd> <mtd> </mtd> <mtd> </mtd> </mtr> </mtable> </mrow> </math><br/><math> <mrow> <mtable> <mtr> <mtd> <mtext>Zn</mtext> </mtd> <mtd> <mo>+</mo> </mtd> <mtd> <mn>4</mn> <msub> <mtext>HNO</mtext> <mn>3</mn> </msub> </mtd> <mtd> <mo>&rarr;</mo> </mtd> <mtd> <mtext>Zn</mtext> <msub> <mrow> <mfenced close=\")\" open=\"(\" separators=\",\"> <mrow> <msub> <mtext>NO</mtext> <mn>3</mn> </msub> </mrow> </mfenced> </mrow> <mn>2</mn> </msub> </mtd> <mtd> <mo>+</mo> </mtd> <mtd> <mn>2</mn> <msub> <mtext>NO</mtext> <mn>2</mn> </msub> <mo>&uarr;</mo> </mtd> <mtd> <mo>+</mo> </mtd> <mtd> <mn>2</mn> <msub> <mtext>H</mtext> <mn>2</mn> </msub> <mtext>O</mtext> </mtd> </mtr> <mtr> <mtd> </mtd> <mtd> </mtd> <mtd> <mtext>conc.</mtext> </mtd> <mtd> </mtd> <mtd> </mtd> <mtd> </mtd> <mtd> </mtd> <mtd> </mtd> <mtd> </mtd> </mtr> </mtable> </mrow> </math><br/><math> <mrow> <msubsup> <mtext>NO</mtext> <mn>3</mn> <mo>-</mo> </msubsup> </mrow> </math> ion is reduced to NO<sub>2</sub> in preference to H<sub>3</sub>O<sup>+</sup>", "opts": [{"id": "x1r2K", "text": "Conc. HNO<sub>3</sub> is a weaker acid in conc. H<sub>2</sub>SO<sub>4</sub> and conc. HCl"}, {"id": "586PD", "text": "Zinc is more reactive than H<sub>2</sub>"}, {"id": "yuAmO", "text": "<math> <mrow> <msubsup> <mtext>NO</mtext> <mn>3</mn> <mo>-</mo> </msubsup> </mrow> </math> ion is reduced in preference to hydronium ion"}, {"id": "mnptx", "text": "Conc. HNO<sub>3</sub> acts as a reducing agent"}], "ans": "<math> <mrow> <msubsup> <mtext>NO</mtext> <mn>3</mn> <mo>-</mo> </msubsup> </mrow> </math> ion is reduced in preference to hydronium ion", "correct": "yuAmO"}, {"id": "695e3b3f3dc984756e9de6c0", "type": "singleCorrect", "html": "<math> <mrow> <msub> <mtext>P</mtext> <mn>4</mn> </msub> <mo>+</mo> <mtext>NaOH</mtext> <mo>+</mo> <msub> <mtext>H</mtext> <mn>2</mn> </msub> <mtext>O</mtext> <mo>&#10230;</mo> <msub> <mtext>NaH</mtext> <mn>2</mn> </msub> <msub> <mtext>PO</mtext> <mn>2</mn> </msub> <mo>+</mo> <msub> <mtext>PH</mtext> <mn>3</mn> </msub> </mrow> </math>. It is", "sol": "<p><math> <mrow> <msub> <mrow> <mover> <mtext>P</mtext> <mn>0</mn> </mover> </mrow> <mn>4</mn> </msub> <mo>+</mo> <mtext>NaOH</mtext> <mo>+</mo> <msub> <mtext>H</mtext> <mn>2</mn> </msub> <mtext>O</mtext> <mo>&#8594;</mo> <msub> <mtext>NaH</mtext> <mn>2</mn> </msub> <mover> <mtext>P</mtext> <mrow> <mo>+</mo> <mn>1</mn> </mrow> </mover> <msub> <mtext>O</mtext> <mn>2</mn> </msub> <mo>+</mo> <mover> <mtext>P</mtext> <mrow> <mo>-</mo> <mn>3</mn> </mrow> </mover> <msub> <mtext>H</mtext> <mn>3</mn> </msub> </mrow> </math><br/>In the given reaction,<br />The oxidation state of Phophorus is change from 0 to +1 and -3 .</p><p>Hence <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi mathvariant=\"normal\">P</mi><mn>4</mn></msub></math>&nbsp;is both oxidised <math> <mrow> <mfenced close=\")\" open=\"(\" separators=\",\"> <mrow> <msub> <mrow> <mover> <mtext>P</mtext> <mn>0</mn> </mover> </mrow> <mn>4</mn> </msub> <mo>&#8594;</mo> <msub> <mtext>NaH</mtext> <mn>2</mn> </msub> <mover> <mtext>P</mtext> <mrow> <mo>+</mo> <mn>1</mn> </mrow> </mover> <msub> <mtext>O</mtext> <mn>2</mn> </msub> </mrow> </mfenced> </mrow> </math>&nbsp;as well as reduced <math> <mrow> <mfenced close=\")\" open=\"(\" separators=\",\"> <mrow> <msub> <mrow> <mover> <mtext>P</mtext> <mn>0</mn> </mover> </mrow> <mn>4</mn> </msub> <mo>&#8594;</mo> <mover> <mtext>P</mtext> <mrow> <mo>-</mo> <mn>3</mn> </mrow> </mover> <msub> <mtext>H</mtext> <mn>3</mn> </msub> </mrow> </mfenced> </mrow> </math></p>", "opts": [{"id": "kJK4J", "text": "Oxidation reaction"}, {"id": "dEnOd", "text": "Reduction reaction"}, {"id": "fLdTw", "text": "Both oxidation and reduction"}, {"id": "y6bTA", "text": "None of these"}], "ans": "Both oxidation and reduction", "correct": "fLdTw"}, {"id": "695e3b3f3dc984756e9de6c1", "type": "singleCorrect", "html": "Good reducing nature of <math > <mrow>  <msub>   <mi>H</mi>   <mn>3</mn>  </msub>  <mi>P</mi><msub>   <mi>O</mi>   <mn>2</mn>  </msub>  </mrow></math> is attributed to the presence of:", "sol": "<img src=\"https://cdn-question-pool.getmarks.app/NEET/DPP-Chemistry/uteytjuuisfkikuisfyhkxbseooyybvfeqgvqlavgonbleponc.png\" /><br/>The hydrogen atoms in OH bond are ionisable and are acidic whereas the P-H bonds have reducing property. There are two such P-H bonds in Hypophosphorus acid.", "opts": [{"id": "fK8Ch", "text": "One <math><mi>P</mi><mo>-</mo><mi>H</mi></math>  bond"}, {"id": "UYxG3", "text": "Two <math><mi>P</mi><mo>-</mo><mi>H</mi></math> bond"}, {"id": "dF70x", "text": "One <math><mi>O</mi><mo>-</mo><mi>H</mi></math>  bond"}, {"id": "r1rSB", "text": "Two <math><mo>-</mo><mi>O</mi><mi>H</mi></math>  bond"}], "ans": "Two <math><mi>P</mi><mo>-</mo><mi>H</mi></math> bond", "correct": "UYxG3"}, {"id": "695e3b3f3dc984756e9de6c2", "type": "singleCorrect", "html": "The complex [Fe(H<sub>2</sub>O)<sub>5</sub>NO]<sup>2+</sup> is formed in the brown ring test for nitrates when freshly prepared FeSO<sub>4</sub> solution is added to aqueous solution of <math> <mrow> <msubsup> <mtext>NO</mtext> <mn>3</mn> <mo>-</mo> </msubsup> </mrow> </math> followed by addition of conc. H<sub>2</sub>SO<sub>4</sub>. Select correct statement about this complex.", "sol": "Fe<sup>2+</sup> changes to brown-coloured ring complex<br/>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<math> <mrow> <mtext>NO</mtext> <mo>&#8594;</mo> <msup> <mtext>NO</mtext> <mo>+</mo> </msup> <mo>+</mo> <msup> <mtext>e</mtext> <mo>-</mo> </msup> </mrow> </math><br/><math> <mrow> <msup> <mtext>Fe</mtext> <mrow> <mn>2</mn> <mo>+</mo> </mrow> </msup> <mo>+</mo> <msup> <mtext>e</mtext> <mo>-</mo> </msup> <mo>&#8594;</mo> <msup> <mtext>Fe</mtext> <mo>+</mo> </msup> </mrow> </math><br/><img src=\"https://cdn-question-pool.getmarks.app/NEET/DPP-Chemistry/f4237f44-f3da-4885-837f-6f76df53f1a1-image.png\" style=\"width: 312px; height: 168px;\" /><br/>Magnetic moment <math> <mrow> <mo>=</mo> <msqrt> <mtext>N</mtext> <mfenced close=\")\" open=\"(\" separators=\",\"> <mrow> <mtext>N</mtext> <mo>+</mo> <mn>2</mn> </mrow> </mfenced> </msqrt> <mo>=</mo> <msqrt> <mn>1</mn> <mn>5</mn> </msqrt> <mo>=</mo> <mo>3.87 BM</mo> </mrow> </math><br/>Thus, Colour change is due to charge transfer, It has iron in +1 oxidate state and nitrosyl as NO<sup>+</sup> and It has magnetic moment of 3.87 BM confirming three unpaired electrons in Fe are true.", "opts": [{"id": "5xGmj", "text": "Colour change is due to charge transfer"}, {"id": "kpIdF", "text": "It has iron in +1 oxidate state and nitrosyl as NO<sup>+</sup>"}, {"id": "Jtpwd", "text": "It has magnetic moment of 3.87 BM confirming three unpaired electrons in Fe"}, {"id": "DthJF", "text": "All the above are correct statement"}], "ans": "All the above are correct statement", "correct": "DthJF"}, {"id": "695e3b3f3dc984756e9de6c3", "type": "singleCorrect", "html": "<math><mi mathvariant=\"normal\">A</mi><mi mathvariant=\"normal\">s</mi><msub><mrow><mi mathvariant=\"normal\">F</mi></mrow><mrow><mn>5</mn></mrow></msub></math> reacts with <math><mi mathvariant=\"normal\">X</mi><mi mathvariant=\"normal\">e</mi><msub><mrow><mi mathvariant=\"normal\">F</mi></mrow><mrow><mn>4</mn></mrow></msub></math> to form an adduct. The shapes of cation and anion in the adduct are respectively.", "sol": "<math><mi mathvariant=\"normal\">A</mi><mi mathvariant=\"normal\">s</mi><msub><mrow><mi mathvariant=\"normal\">F</mi></mrow><mrow><mn>5</mn></mrow></msub></math> reacts with <math><mi mathvariant=\"normal\">X</mi><mi mathvariant=\"normal\">e</mi><msub><mrow><mi mathvariant=\"normal\">F</mi></mrow><mrow><mn>4</mn></mrow></msub></math> to form an adduct. The shapes of cation and anion in the adduct are T-shaped, octahedral respectively.<br/><math><mi mathvariant=\"normal\">A</mi><mi mathvariant=\"normal\">s</mi><msub><mrow><mi mathvariant=\"normal\">F</mi></mrow><mrow><mn>5</mn></mrow></msub><mo>+</mo><mi mathvariant=\"normal\">X</mi><mi mathvariant=\"normal\">e</mi><msub><mrow><mi mathvariant=\"normal\">F</mi></mrow><mrow><mn>4</mn></mrow></msub><mo>\u2192</mo><munder><mrow><mo>[</mo><mi mathvariant=\"normal\">X</mi><mi mathvariant=\"normal\">e</mi><msub><mrow><mi mathvariant=\"normal\">F</mi></mrow><mrow><mn>3</mn></mrow></msub><msup><mrow><mo>]</mo></mrow><mrow><mo>+</mo></mrow></msup></mrow><mrow><mi mathvariant=\"normal\">T</mi><mo>-</mo><mi mathvariant=\"normal\">s</mi><mi mathvariant=\"normal\">h</mi><mi mathvariant=\"normal\">a</mi><mi mathvariant=\"normal\">p</mi><mi mathvariant=\"normal\">e</mi><mi mathvariant=\"normal\">d</mi></mrow></munder><mo>+</mo><munder><mrow><mo>[</mo><mi mathvariant=\"normal\">A</mi><mi mathvariant=\"normal\">s</mi><msub><mrow><mi mathvariant=\"normal\">F</mi></mrow><mrow><mn>6</mn></mrow></msub><msup><mrow><mo>]</mo></mrow><mrow><mo>-</mo></mrow></msup></mrow><mrow><mi mathvariant=\"normal\">o</mi><mi mathvariant=\"normal\">c</mi><mi mathvariant=\"normal\">t</mi><mi mathvariant=\"normal\">a</mi><mi mathvariant=\"normal\">h</mi><mi mathvariant=\"normal\">e</mi><mi mathvariant=\"normal\">d</mi><mi mathvariant=\"normal\">r</mi><mi mathvariant=\"normal\">a</mi><mi mathvariant=\"normal\">l</mi></mrow></munder></math>", "opts": [{"id": "nMNHR", "text": "square planar, octahedral"}, {"id": "cT1Gc", "text": "T-shaped, octahedral"}, {"id": "42iju", "text": "square pyramidal, octahedral"}, {"id": "Va1Ul", "text": "square planar, trigonal bipyramidal"}], "ans": "T-shaped, octahedral", "correct": "cT1Gc"}, {"id": "695e3b3f3dc984756e9de6c4", "type": "singleCorrect", "html": "Pick out incorrect statement.", "sol": "Dipole moment of <math><mi mathvariant=\"normal\">N</mi><msub><mrow><mi mathvariant=\"normal\">H</mi></mrow><mrow><mn>3</mn></mrow></msub></math> (0.49 <math><mo>\u00d7</mo><mn>1</mn><msup><mrow><mn>0</mn></mrow><mrow><mo>-</mo><mn>29</mn></mrow></msup></math> cm) is more than that of <math><mi mathvariant=\"normal\">N</mi><msub><mrow><mi mathvariant=\"normal\">F</mi></mrow><mrow><mn>3</mn></mrow></msub><mo>(</mo><mn>0.07</mn><mo>\u00d7</mo><mn>1</mn><msup><mrow><mn>0</mn></mrow><mrow><mo>-</mo><mn>29</mn></mrow></msup><mi mathvariant=\"normal\">c</mi><mi mathvariant=\"normal\">m</mi><mo>)</mo></math>. This is due to the fact that the direction of the dipole moments of the bonding <math><mi mathvariant=\"normal\">N</mi><mo>-</mo><mi mathvariant=\"normal\">H</mi></math> and non-bonding electron pairs coincide in <math><mi mathvariant=\"normal\">N</mi><msub><mrow><mi mathvariant=\"normal\">H</mi></mrow><mrow><mn>3</mn></mrow></msub></math> and therefore, vector addition of all dipole moments yield a large resultant dipole moment. In <math><mi mathvariant=\"normal\">N</mi><msub><mrow><mi mathvariant=\"normal\">F</mi></mrow><mrow><mn>3</mn></mrow></msub></math>, on the contrary, the dipole moments of <math><mi mathvariant=\"normal\">N</mi><mo>-</mo><mi mathvariant=\"normal\">F</mi></math> bonds and of the non-bonding electron pair are in opposite directions, so that they are partially compensated when summated.<br/><img src=\"https://cdn-question-pool.getmarks.app/NEET/DPP-Chemistry/a10d99c6-47a8-4331-b294-b589c3248dd6.png\" style=\"width:3.5in;height:1.75833in\"/><br/>A. From the above figre, it is clear that <math><mi mathvariant=\"normal\">N</mi><msub><mrow><mi mathvariant=\"normal\">F</mi></mrow><mrow><mn>3</mn></mrow></msub></math> has a trigonal pyramidal structure.<br/>B. <math><mn>2</mn><mi mathvariant=\"normal\">N</mi><msub><mrow><mi mathvariant=\"normal\">F</mi></mrow><mrow><mn>3</mn></mrow></msub><mo>+</mo><mn>3</mn><msub><mrow><mi mathvariant=\"normal\">H</mi></mrow><mrow><mn>2</mn></mrow></msub><mi mathvariant=\"normal\">O</mi><mo>(</mo><mi mathvariant=\"normal\">v</mi><mi mathvariant=\"normal\">a</mi><mi mathvariant=\"normal\">p</mi><mi mathvariant=\"normal\">o</mi><mi mathvariant=\"normal\">u</mi><mi mathvariant=\"normal\">r</mi><mo>)</mo><mo>\u2192</mo><msub><mrow><mi mathvariant=\"normal\">N</mi></mrow><mrow><mn>2</mn></mrow></msub><msub><mrow><mi mathvariant=\"normal\">O</mi></mrow><mrow><mn>3</mn></mrow></msub><mo>+</mo><mn>6</mn><mi mathvariant=\"normal\">H</mi><mi mathvariant=\"normal\">F</mi></math><br/>D. <math> <mrow> <msub> <mtext>N</mtext> <mn>2</mn> </msub> <msub> <mtext>O</mtext> <mn>3</mn> </msub> <mfenced> <mtext>l</mtext> </mfenced><mo>+</mo><msub> <mtext>H</mtext> <mn>2</mn> </msub> <mtext>O</mtext><mfenced> <mtext>l</mtext> </mfenced><mo>\u2192</mo><munder> <mrow> <mn>2</mn><msub> <mrow> <mtext>HNO</mtext></mrow> <mn>2</mn> </msub> <mfenced> <mtext>l</mtext> </mfenced></mrow> <mrow> <mfenced> <mrow> <mtext>Acid</mtext></mrow> </mfenced></mrow> </munder> </mrow></math>", "opts": [{"id": "usRIx", "text": "<math><mi mathvariant=\"normal\">N</mi><msub><mrow><mi mathvariant=\"normal\">F</mi></mrow><mrow><mn>3</mn></mrow></msub></math> molecule has trigonal pyramidal structure"}, {"id": "n6COS", "text": "<math> <mrow> <msub> <mrow> <mtext>NF</mtext></mrow> <mtext>3</mtext> </msub> </mrow></math> is practically insoluble in water and is only hydrolyzed, when an electric spark is passed through a mixture with water vapour"}, {"id": "J2rol", "text": "Dipole moment of <math><mi mathvariant=\"normal\">N</mi><msub><mrow><mi mathvariant=\"normal\">F</mi></mrow><mrow><mn>3</mn></mrow></msub></math> is more than that of <math><mi mathvariant=\"normal\">N</mi><msub><mrow><mi mathvariant=\"normal\">H</mi></mrow><mrow><mn>3</mn></mrow></msub></math>"}, {"id": "nzcQR", "text": "Nitrogen (III) oxide <math><mo>(</mo><msub><mrow><mi mathvariant=\"normal\">N</mi></mrow><mrow><mn>2</mn></mrow></msub><msub><mrow><mi mathvariant=\"normal\">O</mi></mrow><mrow><mn>3</mn></mrow></msub><mo>)</mo></math> is an acidic oxide"}], "ans": "Dipole moment of <math><mi mathvariant=\"normal\">N</mi><msub><mrow><mi mathvariant=\"normal\">F</mi></mrow><mrow><mn>3</mn></mrow></msub></math> is more than that of <math><mi mathvariant=\"normal\">N</mi><msub><mrow><mi mathvariant=\"normal\">H</mi></mrow><mrow><mn>3</mn></mrow></msub></math>", "correct": "J2rol"}, {"id": "695e3b3f3dc984756e9de6c5", "type": "singleCorrect", "html": "The property of halogen acids, that indicated incorrect is", "sol": "HI is the strongest acid while HF is the weakest acid. The order of acidic strength is <br/>HI &gt; HBr &gt; HCl &gt; HF", "opts": [{"id": "Dlsvl", "text": "HF &gt; HCl &gt; HBr &gt; HI ..... acidic strength"}, {"id": "DPmgJ", "text": "HI &gt; HBr &gt; HCl &gt; HF ..... reducing strength"}, {"id": "VTwWT", "text": "HI &gt; HBr &gt; HCl &gt; HF .... bond length"}, {"id": "AIJPQ", "text": "HF &gt; HCl &gt; HBr &gt; HI .... thermal stability"}], "ans": "HF &gt; HCl &gt; HBr &gt; HI ..... acidic strength", "correct": "Dlsvl"}, {"id": "695e3b3f3dc984756e9de6c6", "type": "singleCorrect", "html": "Which of the following combination does not evolve <math><mi mathvariant=\"normal\">C</mi><msub><mrow><mi mathvariant=\"normal\">l</mi></mrow><mrow><mn>2</mn></mrow></msub></math> gas?", "sol": "<math><mn>8</mn><mi mathvariant=\"normal\">H</mi><mi mathvariant=\"normal\">C</mi><mi mathvariant=\"normal\">l</mi><mo>+</mo><mi mathvariant=\"normal\">K</mi><mi mathvariant=\"normal\">M</mi><mi mathvariant=\"normal\">n</mi><msub><mrow><mi mathvariant=\"normal\">O</mi></mrow><mrow><mn>4</mn></mrow></msub><mo>\u2192</mo><mi mathvariant=\"normal\">M</mi><mi mathvariant=\"normal\">n</mi><mi mathvariant=\"normal\">C</mi><msub><mrow><mi mathvariant=\"normal\">l</mi></mrow><mrow><mn>2</mn></mrow></msub><mo>+</mo><mi mathvariant=\"normal\">C</mi><msub><mrow><mi mathvariant=\"normal\">l</mi></mrow><mrow><mn>2</mn></mrow></msub><mo>\u2191</mo><mo>+</mo><mi mathvariant=\"normal\">K</mi><mi mathvariant=\"normal\">C</mi><mi mathvariant=\"normal\">l</mi><mo>+</mo><mn>4</mn><msub><mrow><mi mathvariant=\"normal\">H</mi></mrow><mrow><mn>2</mn></mrow></msub><mi mathvariant=\"normal\">O</mi></math><br/><math><mn>4</mn><mi mathvariant=\"normal\">H</mi><mi mathvariant=\"normal\">C</mi><mi mathvariant=\"normal\">l</mi><mo>+</mo><mi mathvariant=\"normal\">M</mi><mi mathvariant=\"normal\">n</mi><msub><mrow><mi mathvariant=\"normal\">O</mi></mrow><mrow><mn>2</mn></mrow></msub><mo>\u2192</mo><mi mathvariant=\"normal\">M</mi><mi mathvariant=\"normal\">n</mi><mi mathvariant=\"normal\">C</mi><msub><mrow><mi mathvariant=\"normal\">l</mi></mrow><mrow><mn>2</mn></mrow></msub><mo>+</mo><mi mathvariant=\"normal\">C</mi><msub><mrow><mi mathvariant=\"normal\">l</mi></mrow><mrow><mn>2</mn></mrow></msub><mo>\u2191</mo><mo>+</mo><mn>2</mn><msub><mrow><mi mathvariant=\"normal\">H</mi></mrow><mrow><mn>2</mn></mrow></msub><mi mathvariant=\"normal\">O</mi></math><br/><math><mi mathvariant=\"normal\">H</mi><mi mathvariant=\"normal\">C</mi><mi mathvariant=\"normal\">l</mi><mo>+</mo><msub><mrow><mi mathvariant=\"normal\">I</mi></mrow><mrow><mn>2</mn></mrow></msub><mo>\u2192</mo></math> No reaction<br/><math><mi mathvariant=\"normal\">H</mi><mi mathvariant=\"normal\">C</mi><mi mathvariant=\"normal\">l</mi><mo>+</mo><msub><mrow><mi mathvariant=\"normal\">F</mi></mrow><mrow><mn>2</mn></mrow></msub><mo>\u2192</mo><mi mathvariant=\"normal\">H</mi><mi mathvariant=\"normal\">F</mi><mo>+</mo><mi mathvariant=\"normal\">C</mi><msub><mrow><mi mathvariant=\"normal\">l</mi></mrow><mrow><mn>2</mn></mrow></msub><mo>\u2191</mo></math>", "opts": [{"id": "06mis", "text": "HCl (aq) <math><mo>+</mo><mi mathvariant=\"normal\">K</mi><mi mathvariant=\"normal\">M</mi><mi mathvariant=\"normal\">n</mi><msub><mrow><mi mathvariant=\"normal\">O</mi></mrow><mrow><mn>4</mn></mrow></msub></math>"}, {"id": "yZCJa", "text": "HCl + <math><mi mathvariant=\"normal\">M</mi><mi mathvariant=\"normal\">n</mi><msub><mrow><mi mathvariant=\"normal\">O</mi></mrow><mrow><mn>2</mn></mrow></msub></math>"}, {"id": "uOPdl", "text": "<math><mi mathvariant=\"normal\">H</mi><mi mathvariant=\"normal\">C</mi><mi mathvariant=\"normal\">l</mi><mo>+</mo><msub><mrow><mi mathvariant=\"normal\">I</mi></mrow><mrow><mn>2</mn></mrow></msub></math>"}, {"id": "fQklu", "text": "<math><mi mathvariant=\"normal\">H</mi><mi mathvariant=\"normal\">C</mi><mi mathvariant=\"normal\">l</mi><mo>+</mo><msub><mrow><mi mathvariant=\"normal\">F</mi></mrow><mrow><mn>2</mn></mrow></msub></math>"}], "ans": "<math><mi mathvariant=\"normal\">H</mi><mi mathvariant=\"normal\">C</mi><mi mathvariant=\"normal\">l</mi><mo>+</mo><msub><mrow><mi mathvariant=\"normal\">I</mi></mrow><mrow><mn>2</mn></mrow></msub></math>", "correct": "uOPdl"}, {"id": "695e3b3f3dc984756e9de6c7", "type": "singleCorrect", "html": "Which of the following reactions is employed to produce ozone in the laboratory?", "sol": "Ozone is formed, when energy is supplied to dioxygen in the form of UV radiation or silent electric discharge.<br/><math><mn>3</mn><msub><mrow><mi mathvariant=\"normal\">O</mi></mrow><mrow><mn>2</mn></mrow></msub><mo>(</mo><mi mathvariant=\"normal\">g</mi><mo>)</mo><mo>\u21cc</mo><mn>2</mn><msub><mrow><mi mathvariant=\"normal\">O</mi></mrow><mrow><mn>3</mn></mrow></msub><mo>(</mo><mi mathvariant=\"normal\">g</mi><mo>)</mo></math> ; <math><mi mathvariant=\"normal\">\u0394</mi><mi mathvariant=\"normal\">H</mi><mo>=</mo><mn>142.7\u00a0</mn><mi mathvariant=\"normal\">k</mi><mi mathvariant=\"normal\">J</mi><mi mathvariant=\"normal\">m</mi><mi mathvariant=\"normal\">o</mi><msup><mrow><mi mathvariant=\"normal\">l</mi></mrow><mrow><mo>-</mo><mn>1</mn></mrow></msup></math><br/>Since <math><msub><mrow><mi mathvariant=\"normal\">O</mi></mrow><mrow><mn>3</mn></mrow></msub></math> is an endothermic molecule, so it is necessary to use a silent electric discharge, otherwise sparking would generate heat and decompose it. This is the laboratory method.<br/>A. Exposure of <math><msub><mrow><mi mathvariant=\"normal\">O</mi></mrow><mrow><mn>2</mn></mrow></msub></math> to UV light also form <math><msub><mrow><mi mathvariant=\"normal\">O</mi></mrow><mrow><mn>3</mn></mrow></msub></math>. This occurs in atmosphere, when photochemical smog is formed over cities like Delhi, Los Angeles or Tokyo.<br/>B. <math><mn>2</mn><msub><mrow><mi mathvariant=\"normal\">H</mi></mrow><mrow><mn>2</mn></mrow></msub><mi mathvariant=\"normal\">O</mi><mo>+</mo><mn>2</mn><msub><mrow><mi mathvariant=\"normal\">F</mi></mrow><mrow><mn>2</mn></mrow></msub><mo>\u2192</mo><mn>4</mn><mi mathvariant=\"normal\">H</mi><mi mathvariant=\"normal\">F</mi><mo>+</mo><msub><mrow><mi mathvariant=\"normal\">O</mi></mrow><mrow><mn>2</mn></mrow></msub></math><br/><math><mn>3</mn><msub><mrow><mi mathvariant=\"normal\">H</mi></mrow><mrow><mn>2</mn></mrow></msub><mi mathvariant=\"normal\">O</mi><mo>+</mo><mn>3</mn><msub><mrow><mi mathvariant=\"normal\">F</mi></mrow><mrow><mn>2</mn></mrow></msub><mo>\u2192</mo><mn>6</mn><mi mathvariant=\"normal\">H</mi><mi mathvariant=\"normal\">F</mi><mo>+</mo><msub><mrow><mi mathvariant=\"normal\">O</mi></mrow><mrow><mn>3</mn></mrow></msub></math><br/>C. <math><mi mathvariant=\"normal\">S</mi><msub><mrow><mi mathvariant=\"normal\">O</mi></mrow><mrow><mn>2</mn></mrow></msub><mo>+</mo><msub><mrow><mi mathvariant=\"normal\">H</mi></mrow><mrow><mn>2</mn></mrow></msub><msub><mrow><mi mathvariant=\"normal\">O</mi></mrow><mrow><mn>2</mn></mrow></msub><mo>\u2192</mo><msub><mrow><mi mathvariant=\"normal\">H</mi></mrow><mrow><mn>2</mn></mrow></msub><mi mathvariant=\"normal\">S</mi><msub><mrow><mi mathvariant=\"normal\">O</mi></mrow><mrow><mn>4</mn></mrow></msub></math>", "opts": [{"id": "IB4OM", "text": "Exposure of air to UV light"}, {"id": "4jwOA", "text": "Reaction of <math><msub><mrow><mi mathvariant=\"normal\">F</mi></mrow><mrow><mn>2</mn></mrow></msub></math> with <math><msub><mrow><mi mathvariant=\"normal\">H</mi></mrow><mrow><mn>2</mn></mrow></msub><mi mathvariant=\"normal\">O</mi></math> at low temperature"}, {"id": "OOlTB", "text": "Reaction of <math><mi mathvariant=\"normal\">S</mi><msub><mrow><mi mathvariant=\"normal\">O</mi></mrow><mrow><mn>2</mn></mrow></msub></math> with <math><msub><mrow><mi mathvariant=\"normal\">H</mi></mrow><mrow><mn>2</mn></mrow></msub><msub><mrow><mi mathvariant=\"normal\">O</mi></mrow><mrow><mn>2</mn></mrow></msub></math>"}, {"id": "RlkFX", "text": "Passage of silent electric discharge through oxygen"}], "ans": "Passage of silent electric discharge through oxygen", "correct": "RlkFX"}, {"id": "695e3b3f3dc984756e9de6c8", "type": "singleCorrect", "html": "Which of the following compound does not liberate oxygen gas on warming with concentrated <math><msub><mrow><mi mathvariant=\"normal\">H</mi></mrow><mrow><mn>2</mn></mrow></msub><mi mathvariant=\"normal\">S</mi><msub><mrow><mi mathvariant=\"normal\">O</mi></mrow><mrow><mn>4</mn></mrow></msub><mo>?</mo></math>", "sol": "<math><mi mathvariant=\"normal\">S</mi><msub><mrow><mi mathvariant=\"normal\">O</mi></mrow><mrow><mn>3</mn></mrow></msub></math> on warming with concentrated <math><msub><mrow><mi mathvariant=\"normal\">H</mi></mrow><mrow><mn>2</mn></mrow></msub><mi mathvariant=\"normal\">S</mi><msub><mrow><mi mathvariant=\"normal\">O</mi></mrow><mrow><mn>4</mn></mrow></msub></math> give Oleum and not oxygen. Rest all given here gives <math><msub><mrow><mi mathvariant=\"normal\">O</mi></mrow><mrow><mn>2</mn></mrow></msub></math> on warming with concentrated sulphuric acid.<br/><img src=\"https://cdn-question-pool.getmarks.app/NEET/DPP-Chemistry/0020def8-cd41-48d1-a7b8-4bb4bc9b8f6b.png\" style=\"width:5.67708in;height:1.55208in\"/><br/>", "opts": [{"id": "2mjyi", "text": "<math><mi mathvariant=\"normal\">S</mi><msub><mrow><mi mathvariant=\"normal\">O</mi></mrow><mrow><mn>3</mn></mrow></msub></math>"}, {"id": "oHmgy", "text": "<math><mi mathvariant=\"normal\">P</mi><mi mathvariant=\"normal\">b</mi><msub><mrow><mi mathvariant=\"normal\">O</mi></mrow><mrow><mn>2</mn></mrow></msub></math>"}, {"id": "w5awI", "text": "<math><mi mathvariant=\"normal\">M</mi><mi mathvariant=\"normal\">n</mi><msub><mrow><mi mathvariant=\"normal\">O</mi></mrow><mrow><mn>2</mn></mrow></msub></math>"}, {"id": "STgcE", "text": "<math><mi mathvariant=\"normal\">C</mi><mi mathvariant=\"normal\">r</mi><msub><mrow><mi mathvariant=\"normal\">O</mi></mrow><mrow><mn>5</mn></mrow></msub></math>"}], "ans": "<math><mi mathvariant=\"normal\">S</mi><msub><mrow><mi mathvariant=\"normal\">O</mi></mrow><mrow><mn>3</mn></mrow></msub></math>", "correct": "2mjyi"}, {"id": "695e3b3f3dc984756e9de6c9", "type": "singleCorrect", "html": "Which of the following combination does not liberate <math><mi mathvariant=\"normal\">N</mi><msub><mrow><mi mathvariant=\"normal\">H</mi></mrow><mrow><mn>3</mn></mrow></msub></math> gas?", "sol": "Heating of <math><mi mathvariant=\"normal\">N</mi><msub><mrow><mi mathvariant=\"normal\">H</mi></mrow><mrow><mn>4</mn></mrow></msub><mi mathvariant=\"normal\">C</mi><mi mathvariant=\"normal\">l</mi><msub><mrow><mi mathvariant=\"normal\"> =\"http://www.w3.org/1998/Math/MathML\"><msub><mi>HNO</mi><mn>3</mn></msub><mfenced><mi>aq</mi></mfenced><mo>+</mo><mn>3</mn><mi>HCl</mi><mfenced><mi>aq</mi></mfenced><mover><mo>&#8594;</mo><mrow></mrow></mover><mi>NOCl</mi><mfenced><mi mathvariant=\"normal\">g</mi></mfenced><mo>+</mo><msub><mi>Cl</mi><mn>2</mn></msub><mfenced><mi mathvariant=\"normal\">g</mi></mfenced><mo>+</mo><mn>2</mn><msub><mi mathvariant=\"normal\">H</mi><mn>2</mn></msub><mi mathvariant=\"normal\">O</mi><mfenced><mi mathvariant=\"normal\">l</mi></mfenced></math></p><p>Gold reacts with aqua-regia and forms the complex tetrachloroaurate ion.</p><p><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi>Au</mi><mo>+</mo><mn>4</mn><msup><mi mathvariant=\"normal\">H</mi><mo>+</mo></msup><mo>+</mo><msubsup><mi>NO</mi><mn>3</mn><mo>-</mo></msubsup><mo>+</mo><mn>4</mn><msup><mi>Cl</mi><mo>&#8722;</mo></msup><mo>&#8594;</mo><mo>[</mo><msub><mi>AuCl</mi><mn>4</mn></msub><msup><mo>]</mo><mo>-</mo></msup><mo>+</mo><mi>NO</mi><mo>+</mo><mn>2</mn><msub><mi mathvariant=\"normal\">H</mi><mn>2</mn></msub><mi mathvariant=\"normal\">O</mi><mo>&#160;</mo></math></p><p>Platinum reacts with aqua-regia and forms the complex&nbsp;hexachloroplatinate <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mo>(</mo><mi>IV</mi><mo>)</mo></math>.</p><p><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mn>3</mn><mi>Pt</mi><mo>+</mo><mn>16</mn><msup><mi mathvariant=\"normal\">H</mi><mo>+</mo></msup><mo>+</mo><mn>4</mn><msubsup><mi>NO</mi><mn>3</mn><mo>-</mo></msubsup><mo>+</mo><mn>18</mn><msup><mi>Cl</mi><mo>&#8722;</mo></msup><mo>&#8594;</mo><mn>3</mn><msubsup><mi>PtCl</mi><mn>6</mn><mrow><mn>2</mn><mo>-</mo></mrow></msubsup><mo>+</mo><mn>4</mn><mi>NO</mi><mo>+</mo><mn>8</mn><msub><mi mathvariant=\"normal\">H</mi><mn>2</mn></msub><mi mathvariant=\"normal\">O</mi></math></p>", "opts": [{"id": "xj5LA", "text": "a, b, c and d"}, {"id": "WctBG", "text": "a, b, and c"}, {"id": "Z9q2Y", "text": "a, b and d"}, {"id": "c5nMe", "text": "Both a and b"}], "ans": "a, b and d", "correct": "Z9q2Y"}, {"id": "695e3b403dc984756e9de6d0", "type": "singleCorrect", "html": "<p>What is the substance bones contain which makes them glow in the dark?</p>", "sol": "<p>Bones contain white phosphorous.&nbsp;It&nbsp;undergoes slow&nbsp;combustion in contact with air due to its low ignition temperature. This&nbsp;property of glowing in the dark and on the application of ultraviolet&nbsp;rays is called phosphorescence.</p>", "opts": [{"id": "h8coB", "text": "red phosphorus that undergoes slow combustion in contact with air."}, {"id": "qHCgm", "text": "red phosphorus that changes into white form."}, {"id": "5KsDt", "text": "white phosphorus that undergoes slow combustion in contact with air."}, {"id": "L9Qcj", "text": "white phosphorus that changes into red form."}], "ans": "white phosphorus that undergoes slow combustion in contact with air.", "correct": "5KsDt"}, {"id": "695e3b403dc984756e9de6d1", "type": "singleCorrect", "html": "Match the following:<br />&nbsp;<table border=\"1\">\t<tbody>\t\t<tr>\t\t\t<td><math><mfenced separators=\"|\"><mrow><mi mathvariant=\"normal\">a</mi></mrow></mfenced><mi mathvariant=\"normal\">&#160;</mi></math></td>\t\t\t<td>Pure nitrogen</td>\t\t\t<td><math><mfenced separators=\"|\"><mrow><mi mathvariant=\"normal\">i</mi></mrow></mfenced><mi mathvariant=\"normal\">&#160;</mi></math></td>\t\t\t<td>Chlorine</td>\t\t</tr>\t\t<tr>\t\t\t<td><math><mfenced separators=\"|\"><mrow><mi mathvariant=\"normal\">b</mi></mrow></mfenced></math></td>\t\t\t<td>Haber process</td>\t\t\t<td><math><mfenced separators=\"|\"><mrow><mi mathvariant=\"normal\">i</mi><mi mathvariant=\"normal\">i</mi></mrow></mfenced></math></td>\t\t\t<td>Sulphuric acid</td>\t\t</tr>\t\t<tr>\t\t\t<td><math><mfenced separators=\"|\"><mrow><mi mathvariant=\"normal\">c</mi></mrow></mfenced><mi mathvariant=\"normal\">&#160;</mi></math></td>\t\t\t<td>Contact process</td>\t\t\t<td><math><mfenced separators=\"|\"><mrow><mi mathvariant=\"normal\">i</mi><mi mathvariant=\"normal\">i</mi><mi mathvariant=\"normal\">i</mi></mrow></mfenced></math></td>\t\t\t<td>Ammonia</td>\t\t</tr>\t\t<tr>\t\t\t<td><math><mfenced separators=\"|\"><mrow><mi mathvariant=\"normal\">d</mi></mrow></mfenced><mi mathvariant=\"normal\">&#160;</mi></math></td>\t\t\t<td>Deacon&rsquo;s process</td>\t\t\t<td><math><mfenced separators=\"|\"><mrow><mi mathvariant=\"normal\">i</mi><mi mathvariant=\"normal\">v</mi></mrow></mfenced></math></td>\t\t\t<td>Sodium azide or Barium azide</td>\t\t</tr>\t</tbody></table><br />Which of the following is the correct option?", "sol": "Haber&#39;s process is the industrial process for production of ammonia.<br/>Contact process is the industrial process for production of sulphuric acid.<br/>Pure nitrogen is prepared from sodium azide.<br/>Deacon&#39;s process is the commercial preparation of chlorine.", "opts": [{"id": "XSzTx", "text": "<math><mi mathvariant=\"normal\">a</mi><mo>-</mo><mfenced separators=\"|\"><mrow><mi mathvariant=\"normal\">i</mi></mrow></mfenced><mo>;</mo><mi mathvariant=\"normal\">\u00a0</mi><mi mathvariant=\"normal\">b</mi><mo>-</mo><mfenced separators=\"|\"><mrow><mi mathvariant=\"normal\">i</mi><mi mathvariant=\"normal\">i</mi></mrow></mfenced><mo>;</mo><mi mathvariant=\"normal\">\u00a0</mi><mi mathvariant=\"normal\">c</mi><mo>-</mo><mfenced separators=\"|\"><mrow><mi mathvariant=\"normal\">i</mi><mi mathvariant=\"normal\">i</mi><mi mathvariant=\"normal\">i</mi></mrow></mfenced><mo>;</mo><mi mathvariant=\"normal\">\u00a0</mi><mi mathvariant=\"normal\">d</mi><mo>-</mo><mfenced separators=\"|\"><mrow><mi mathvariant=\"normal\">i</mi><mi mathvariant=\"normal\">v</mi></mrow></mfenced></math>"}, {"id": "lV8ej", "text": "<math><mi mathvariant=\"normal\">a</mi><mo>-</mo><mfenced separators=\"|\"><mrow><mi mathvariant=\"normal\">i</mi><mi mathvariant=\"normal\">i</mi></mrow></mfenced><mo>;</mo><mi mathvariant=\"normal\">\u00a0</mi><mi mathvariant=\"normal\">b</mi><mo>-</mo><mfenced se
