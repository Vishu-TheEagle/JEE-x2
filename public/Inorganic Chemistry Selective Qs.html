ts contain a complete argon configuration with&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mn>3</mn><mi mathvariant=\"normal\">d</mi></math>&nbsp;and&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mn>4</mn><mi mathvariant=\"normal\">s</mi></math>&nbsp;electrons, whereas, the second transition series elements contain a complete krypton configuration with&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mn>4</mn><mi mathvariant=\"normal\">d</mi></math>&nbsp;and&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mn>5</mn><mi mathvariant=\"normal\">s</mi></math>&nbsp;electrons.</p><p>So,&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi>Ag</mi></math> belongs to the second transition series.</p>", "opts": [{"id": "1wtu0", "text": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi>Fe</mi></math>"}, {"id": "vhqK2", "text": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi mathvariant=\"normal\">V</mi></math>"}, {"id": "HIFZs", "text": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi>Ag</mi></math>"}, {"id": "xI4ui", "text": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi>Cu</mi></math>"}], "ans": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi>Ag</mi></math>", "correct": "HIFZs"}, {"id": "695e3b3e3dc984756e9de698", "type": "singleCorrect", "html": "Lanthanide contraction is caused due to", "sol": "Lanthanide contraction is caused due to poor screening effect of 4f orbitals", "opts": [{"id": "Ci0OB", "text": "The imperfect shielding on outer electrons by 4 f -electrons from the nuclear charge"}, {"id": "kVjjC", "text": "The appreciable shielding on outer electrons by 4 f -electrons from the nuclear charge"}, {"id": "VkC5c", "text": "The appreciable shielding on outer electrons by 5d-electrons from nuclear charge"}, {"id": "EUoqh", "text": "The same effective nuclear charge from Ce to Lu"}], "ans": "The imperfect shielding on outer electrons by 4 f -electrons from the nuclear charge", "correct": "Ci0OB"}, {"id": "695e3b3e3dc984756e9de699", "type": "singleCorrect", "html": "\u00a0Compound\u00a0<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mo>(</mo><mi mathvariant=\"normal\">P</mi><mo>)</mo><mo>\u00a0</mo></math>forms a precipitate with <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi>AgNO</mi><mn>3</mn></msub></math>. The precipitate dissolves in excess reagent <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mo>(</mo><mi mathvariant=\"normal\">P</mi><mo>)</mo><mo>.</mo><mo>\u00a0</mo><mo>(</mo><mi mathvariant=\"normal\">P</mi><mo>)</mo><mo>\u00a0</mo></math>cannot be :", "sol": "<p><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mo>=</mo><mo>(</mo><mn>1</mn><mo>)</mo><mn>2</mn><msub><mi>AgNO</mi><mn>3</mn></msub><mo>+</mo><mn>2</mn><mi>KOH</mi><mo>\u27f6</mo><msub><mi>Ag</mi><mn>2</mn></msub><mi mathvariant=\"normal\">O</mi><mo>\u2193</mo><mo>(</mo><mtext>\u00a0black\u00a0</mtext><mo>)</mo><mo>+</mo><mn>2</mn><msub><mi>KNO</mi><mn>3</mn></msub><mo>+</mo><msub><mi mathvariant=\"normal\">H</mi><mn>2</mn></msub><mi mathvariant=\"normal\">O</mi></math></p><p><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mo>\u2193</mo><mi>excess</mi><mo>\u00a0</mo><mi>KOH</mi></math></p><p>No reaction</p><p><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mtext>\u00a0(2)\u00a0</mtext><msub><mi>AgNO</mi><mn>3</mn></msub><mo>\u00a0\u00a0</mo><mover><mo>\u27f6</mo><msup><mi>CN</mi><mo>-</mo></msup></mover><mtext>\u00a0AgCN\u00a0</mtext><mo>\u2193</mo><mtext>\u00a0(white)\u00a0</mtext><mfrac><msup><mi>CN</mi><mo>-</mo></msup><mtext>excess\u00a0</mtext></mfrac><mi>Ag</mi><mo>(</mo><mi>CN</mi><msubsup><mo>)</mo><mn>2</mn><mo>-</mo></msubsup></math></p><p>(Soluable)</p><p><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mtext>\u00a0(3)\u00a0</mtext><msub><mi>AgNO</mi><mn>3</mn></msub><mo>\u00a0\u00a0</mo><mover><mo>\u27f6</mo><mrow><msub><mi mathvariant=\"normal\">S</mi><mn>2</mn></msub><msubsup><mi mathvariant=\"normal\">O</mi><mn>3</mn><mrow><mn>2</mn><mo>-</mo></mrow></msubsup></mrow></mover><msub><mi>Ag</mi><mn>2</mn></msub><msub><mi mathvariant=\"normal\">S</mi><mn>2</mn></msub><msub><mi mathvariant=\"normal\">O</mi><mn>3</mn></msub><mo>\u2193</mo><mtext>\u00a0(white)\u00a0</mtext><mfrac><mrow><msub><mi mathvariant=\"normal\">S</mi><mn>2</mn></msub><msubsup><mi mathvariant=\"normal\">O</mi><mn>3</mn><mrow><mn>2</mn><mo>-</mo></mrow></msubsup></mrow><mtext>\u00a0excess\u00a0</mtext></mfrac></math></p><p><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi>Ag</mi><msubsup><mfenced><mrow><msub><mi mathvariant=\"normal\">S</mi><mn>2</mn></msub><msub><mi mathvariant=\"normal\">O</mi><mn>3</mn></msub></mrow></mfenced><mn>2</mn><mrow><mn>3</mn><mo>-</mo></mrow></msubsup></math>\u00a0(Soluable)</p><p><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mtext>\u00a0(4)\u00a0</mtext><msub><mi>AgNO</mi><mn>3</mn></msub><mover><mo>\u27f6</mo><msub><mi>NH</mi><mn>3</mn></msub></mover><msub><mi>Ag</mi><mn>2</mn></msub><mi mathvariant=\"normal\">O</mi><mo>\u2193</mo><mtext>\u00a0(black)\u00a0</mtext><mfrac><msub><mi>NH</mi><mn>3</mn></msub><mtext>\u00a0excess\u00a0</mtext></mfrac><msup><mfenced close=\"]\" open=\"[\"><mrow><mi>Ag</mi><msub><mfenced><msub><mi>NH</mi><mn>3</mn></msub></mfenced><mn>2</mn></msub></mrow></mfenced><mo>+</mo></msup></math></p><p>(Soluable)</p><p>Hence (2), (3) &amp;(4) are not the answers</p>", "opts": [{"id": "dm6PL", "text": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi>KOH</mi></math>"}, {"id": "rjevB", "text": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi>KCN</mi></math>"}, {"id": "5hwEV", "text": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi>Na</mi><mn>2</mn></msub><msub><mi mathvariant=\"normal\">S</mi><mn>2</mn></msub><msub><mi mathvariant=\"normal\">O</mi><mn>3</mn></msub></math>"}, {"id": "u5cVF", "text": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi>NH</mi><mn>3</mn></msub></math>"}], "ans": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi>KOH</mi></math>", "correct": "dm6PL"}, {"id": "695e3b3e3dc984756e9de69a", "type": "singleCorrect", "html": "Increasing basic properties of <math><mi mathvariant=\"normal\">T</mi><mi mathvariant=\"normal\">i</mi><msub><mrow><mi mathvariant=\"normal\">O</mi></mrow><mrow><mn>2</mn></mrow></msub><mo>,</mo><mi mathvariant=\"normal\"></mi><mi mathvariant=\"normal\">Z</mi><mi mathvariant=\"normal\">r</mi><msub><mrow><mi mathvariant=\"normal\">O</mi></mrow><mrow><mn>2</mn></mrow></msub></math> and <math><mi mathvariant=\"normal\">H</mi><mi mathvariant=\"normal\">f</mi><msub><mrow><mi mathvariant=\"normal\">O</mi></mrow><mrow><mn>2</mn></mrow></msub></math> are in order:", "sol": "Basicity of metal oxides in d-block element is increase down the group.", "opts": [{"id": "ciI4n", "text": "<math><mi mathvariant=\"normal\">T</mi><mi mathvariant=\"normal\">i</mi><msub><mrow><mi mathvariant=\"normal\">O</mi></mrow><mrow><mn>2</mn></mrow></msub><mo>&lt;</mo><mi mathvariant=\"normal\">Z</mi><mi mathvariant=\"normal\">r</mi><msub><mrow><mi mathvariant=\"normal\">O</mi></mrow><mrow><mn>2</mn></mrow></msub><mo>&lt;</mo><mi mathvariant=\"normal\">H</mi><mi mathvariant=\"normal\">f</mi><msub><mrow><mi mathvariant=\"normal\">O</mi></mrow><mrow><mn>2</mn></mrow></msub></math>"}, {"id": "9nwe9", "text": "<math><mi mathvariant=\"normal\">H</mi><mi mathvariant=\"normal\">f</mi><msub><mrow><mi mathvariant=\"normal\">O</mi></mrow><mrow><mn>2</mn></mrow></msub><mo>&lt;</mo><mi mathvariant=\"normal\">Z</mi><mi mathvariant=\"normal\">r</mi><msub><mrow><mi mathvariant=\"normal\">O</mi></mrow><mrow><mn>2</mn></mrow></msub><mo>&lt;</mo><mi mathvariant=\"normal\">T</mi><mi mathvariant=\"normal\">i</mi><msub><mrow><mi mathvariant=\"normal\">O</mi></mrow><mrow><mn>2</mn></mrow></msub></math>"}, {"id": "pkMiJ", "text": "<math><mi mathvariant=\"normal\">H</mi><mi mathvariant=\"normal\">f</mi><msub><mrow><mi mathvariant=\"normal\">O</mi></mrow><mrow><mn>2</mn></mrow></msub><mo>&lt;</mo><mi mathvariant=\"normal\">T</mi><mi mathvariant=\"normal\">i</mi><msub><mrow><mi mathvariant=\"normal\">O</mi></mrow><mrow><mn>2</mn></mrow></msub><mo>&lt;</mo><mi mathvariant=\"normal\">Z</mi><mi mathvariant=\"normal\">r</mi><msub><mrow><mi mathvariant=\"normal\">O</mi></mrow><mrow><mn>2</mn></mrow></msub></math>"}, {"id": "83OLB", "text": "<math><mi mathvariant=\"normal\">Z</mi><mi mathvariant=\"normal\">r</mi><msub><mrow><mi mathvariant=\"normal\">O</mi></mrow><mrow><mn>2</mn></mrow></msub><mo>&lt;</mo><mi mathvariant=\"normal\">T</mi><mi mathvariant=\"normal\">i</mi><msub><mrow><mi mathvariant=\"normal\">O</mi></mrow><mrow><mn>2</mn></mrow></msub><mo>&lt;</mo><mi mathvariant=\"normal\">H</mi><mi mathvariant=\"normal\">f</mi><msub><mrow><mi mathvariant=\"normal\">O</mi></mrow><mrow><mn>2</mn></mrow></msub></math>"}], "ans": "<math><mi mathvariant=\"normal\">T</mi><mi mathvariant=\"normal\">i</mi><msub><mrow><mi mathvariant=\"normal\">O</mi></mrow><mrow><mn>2</mn></mrow></msub><mo>&lt;</mo><mi mathvariant=\"normal\">Z</mi><mi mathvariant=\"normal\">r</mi><msub><mrow><mi mathvariant=\"normal\">O</mi></mrow><mrow><mn>2</mn></mrow></msub><mo>&lt;</mo><mi mathvariant=\"normal\">H</mi><mi mathvariant=\"normal\">f</mi><msub><mrow><mi mathvariant=\"normal\">O</mi></mrow><mrow><mn>2</mn></mrow></msub></math>", "correct": "ciI4n"}, {"id": "695e3b3e3dc984756e9de69b", "type": "singleCorrect", "html": "If <math><mi>M</mi></math> is element of actinoids series, the degree of complex formation decreases in the order", "sol": "The higher the charge on the metal ion, smaller is the ionic size and more is the complex forming ability. Thus, the degree of complex formation decreases in the order<br/> <math><msup><mrow><mi>M</mi></mrow><mrow><mn>4</mn><mo>+</mo></mrow></msup><mo>&gt;</mo><mi>M</mi><msubsup><mrow><mi>O</mi></mrow><mrow><mn>2</mn></mrow><mrow><mn>2</mn><mo>+</mo></mrow></msubsup><mo>&gt;</mo><msup><mrow><mi>M</mi></mrow><mrow><mn>3</mn><mo>+</mo></mrow></msup><mo>&gt;</mo><mi>M</mi><msubsup><mrow><mi>O</mi></mrow><mrow><mn>2</mn></mrow><mrow><mo>+</mo></mrow></msubsup></math> <br/>The higher tendency of complex formation of <math><mi>M</mi><msubsup><mrow><mi>O</mi></mrow><mrow><mn>2</mn></mrow><mrow><mn>2</mn><mo>+</mo></mrow></msubsup></math>  as compared to  <math><msup><mrow><mi>M</mi></mrow><mrow><mn>3</mn><mo>+</mo></mrow></msup></math>  is due to high concentration of charge on metal atom  <math><mi>M</mi><mo>.</mo></math>", "opts": [{"id": "ygUJB", "text": "<math><msup><mrow><mi>M</mi></mrow><mrow><mn>4</mn><mo>+</mo></mrow></msup><mo>&gt;</mo><msup><mrow><mi>M</mi></mrow><mrow><mn>3</mn><mo>+</mo></mrow></msup><mo>&gt;</mo><mi>M</mi><msubsup><mrow><mi>O</mi></mrow><mrow><mn>2</mn></mrow><mrow><mn>2</mn><mo>+</mo></mrow></msubsup><mo>&gt;</mo><mi>M</mi><msubsup><mrow><mi>O</mi></mrow><mrow><mn>2</mn></mrow><mrow><mo>+</mo></mrow></msubsup></math>"}, {"id": "iNbNh", "text": "<math><msup><mrow><mi>M</mi></mrow><mrow><mn>4</mn><mo>+</mo></mrow></msup><mo>&gt;</mo><msubsup><mrow><mi>M</mi><mi>O</mi></mrow><mrow><mn>2</mn></mrow><mrow><mn>2</mn><mo>+</mo></mrow></msubsup><mo>&gt;</mo><msup><mrow><mi>M</mi></mrow><mrow><mn>3</mn><mo>+</mo></mrow></msup><mo>&gt;</mo><mi>M</mi><msubsup><mrow><mi>O</mi></mrow><mrow><mn>2</mn></mrow><mrow><mo>+</mo></mrow></msubsup></math>"}, {"id": "CctC4", "text": "<math><msubsup><mrow><mi>M</mi><mi>O</mi></mrow><mrow><mn>2</mn></mrow><mrow><mo>+</mo></mrow></msubsup><mo>&gt;</mo><msubsup><mrow><mi>M</mi><mi>O</mi></mrow><mrow><mn>2</mn></mrow><mrow><mn>2</mn><mo>+</mo></mrow></msubsup><mo>&gt;</mo><msup><mrow><mi>M</mi></mrow><mrow><mn>3</mn><mo>+</mo></mrow></msup><mo>&gt;</mo><msup><mrow><mi>M</mi></mrow><mrow><mn>4</mn><mo>+</mo></mrow></msup></math>"}, {"id": "VF2cy", "text": "<math><msubsup><mrow><mi>M</mi><mi>O</mi></mrow><mrow><mn>2</mn></mrow><mrow><mn>2</mn><mo>+</mo></mrow></msubsup><mo>&gt;</mo><msubsup><mrow><mi>M</mi><mi>O</mi></mrow><mrow><mn>2</mn></mrow><mrow><mo>+</mo></mrow></msubsup><mo>&gt;</mo><msup><mrow><mi>M</mi></mrow><mrow><mn>4</mn><mo>+</mo></mrow></msup><mo>&gt;</mo><msup><mrow><mi>M</mi></mrow><mrow><mn>3</mn><mo>+</mo></mrow></msup></math>"}], "ans": "<math><msup><mrow><mi>M</mi></mrow><mrow><mn>4</mn><mo>+</mo></mrow></msup><mo>&gt;</mo><msubsup><mrow><mi>M</mi><mi>O</mi></mrow><mrow><mn>2</mn></mrow><mrow><mn>2</mn><mo>+</mo></mrow></msubsup><mo>&gt;</mo><msup><mrow><mi>M</mi></mrow><mrow><mn>3</mn><mo>+</mo></mrow></msup><mo>&gt;</mo><mi>M</mi><msubsup><mrow><mi>O</mi></mrow><mrow><mn>2</mn></mrow><mrow><mo>+</mo></mrow></msubsup></math>", "correct": "iNbNh"}, {"id": "695e3b3e3dc984756e9de69c", "type": "singleCorrect", "html": "Find the incorrect statement in the following:", "sol": "(1) <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msup><mi>Cr</mi><mrow><mn>2</mn><mo>+</mo></mrow></msup></math> is reducing, as it involves a change from <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msup><mi mathvariant=\"normal\">d</mi><mn>4</mn></msup></math> to <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msup><mi mathvariant=\"normal\">d</mi><mn>3</mn></msup></math>, the latter is a more stable configuration.&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfenced><msubsup><mi mathvariant=\"normal\">t</mi><mn>29</mn><mn>3</mn></msubsup></mfenced><mi>Mn</mi><mo>(</mo><mi>III</mi><mo>)</mo></math> to <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi>Mn</mi><mo>(</mo><mi>II</mi><mo>)</mo></math> is from <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mn>3</mn><msup><mi mathvariant=\"normal\">d</mi><mn>4</mn></msup></math> to <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mn>3</mn><msup><mi mathvariant=\"normal\">d</mi><mn>5</mn></msup></math> again <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mn>3</mn><msup><mi mathvariant=\"normal\">d</mi><mn>5</mn></msup></math> is an extra stable configuration.<br />(2) Due to higher <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi>CFSE</mi></math> of&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi mathvariant=\"normal\">d</mi><mo>&#176;</mo></math> configuration in the presence of ligands, which more than compensates the <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msup><mn>3</mn><mtext>rd&#160;</mtext></msup></math> <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi>IE</mi></math>.<br />(3) The hydration or lattice energy more than compensates the ionisation enthalpy involved in removing electron from <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msup><mi mathvariant=\"normal\">d</mi><mn>1</mn></msup></math>.", "opts": [{"id": "8auPp", "text": "<p>Of the <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msup><mi mathvariant=\"normal\">d</mi><mn>4</mn></msup></math> species, manganese <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfenced><mi>III</mi></mfenced></math> is<br />strongly reducing while <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msup><mi>Cr</mi><mrow><mn>2</mn><mo>+</mo></mrow></msup></math> is strongly<br />oxidising.</p>"}, {"id": "TMPl7", "text": "<p>Cobalt <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfenced><mi>II</mi></mfenced></math> is stable in aqueous solution;&nbsp;but<br />in the presence of complexing reagents, it<br />is easily oxidised.</p>"}, {"id": "Z7iyU", "text": "<p>The&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi mathvariant=\"normal\">d</mi><mo>&#176;</mo></math> configuration is very unstable in ions.</p>"}, {"id": "sNyHm", "text": "<p>None of these.</p>"}], "ans": "<p>Of the <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msup><mi mathvariant=\"normal\">d</mi><mn>4</mn></msup></math> species, manganese <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfenced><mi>III</mi></mfenced></math> is<br />strongly reducing while <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msup><mi>Cr</mi><mrow><mn>2</mn><mo>+</mo></mrow></msup></math> is strongly<br />oxidising.</p>", "correct": "8auPp"}, {"id": "695e3b3e3dc984756e9de69d", "type": "singleCorrect", "html": "What is the value of magnetic moment observed in octahedral complex of <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msup><mi>Zn</mi><mrow><mn>2</mn><mo>+</mo></mrow></msup></math>&nbsp;ion?", "sol": "<p>The spin only magnetic moment is given by the formula:</p><p>&nbsp;<sub><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi mathvariant=\"normal\">&#956;</mi><mo>=</mo><msqrt><mi mathvariant=\"normal\">n</mi><mfenced><mrow><mi mathvariant=\"normal\">n</mi><mo>+</mo><mn>2</mn></mrow></mfenced></msqrt><mo>&#160;</mo><mi mathvariant=\"normal\">B</mi><mo>.</mo><mi mathvariant=\"normal\">M</mi><mo>.</mo></math></sub></p><p>Where,&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi mathvariant=\"normal\">n</mi></math>= number of unpaired electrons.</p><p><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msup><mi>Zn</mi><mrow><mo>+</mo><mn>2</mn></mrow></msup><mo>&#8594;</mo><mfenced close=\"]\" open=\"[\"><mi>Ar</mi></mfenced><mn>3</mn><msup><mi mathvariant=\"normal\">d</mi><mn>10</mn></msup><mn>4</mn><msup><mi mathvariant=\"normal\">s</mi><mn>0</mn></msup></math></p><p>There is zero&nbsp;unpaired <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msup><mi mathvariant=\"normal\">e</mi><mo>-</mo></msup></math>&nbsp;present in <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msup><mi>Zn</mi><mrow><mo>+</mo><mn>2</mn></mrow></msup></math>.</p><p>So, the magnetic moment is zero.</p>", "opts": [{"id": "wL65H", "text": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msqrt><mn>35</mn></msqrt><mi>BM</mi></math>"}, {"id": "PC7j4", "text": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msqrt><mn>3</mn></msqrt><mi>BM</mi></math>"}, {"id": "rhltz", "text": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mn>0</mn><mi>BM</mi></math>"}, {"id": "XXuvK", "text": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mn>1</mn><mo>.</mo><mn>73</mn><mi>BM</mi></math>"}], "ans": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mn>0</mn><mi>BM</mi></math>", "correct": "rhltz"}, {"id": "695e3b3e3dc984756e9de69e", "type": "singleCorrect", "html": "When <math><msub><mrow><mi mathvariant=\"normal\">H</mi></mrow><mrow><mn>2</mn></mrow></msub><msub><mrow><mi mathvariant=\"normal\">O</mi></mrow><mrow><mn>2</mn></mrow></msub></math> is added to an acidified solution of <math><msub><mrow><mi mathvariant=\"normal\">K</mi></mrow><mrow><mn>2</mn></mrow></msub><mi mathvariant=\"normal\">C</mi><msub><mrow><mi mathvariant=\"normal\">r</mi></mrow><mrow><mn>2</mn></mrow></msub><msub><mrow><mi mathvariant=\"normal\">O</mi></mrow><mrow><mn>7</mn></mrow></msub></math>", "sol": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi mathvariant=\"normal\">H</mi><mn>2</mn></msub><msub><mi mathvariant=\"normal\">O</mi><mn>2</mn></msub><mo>+</mo><mi mathvariant=\"normal\">C</mi><msub><mi mathvariant=\"normal\">r</mi><mn>2</mn></msub><msubsup><mi mathvariant=\"normal\">O</mi><mn>4</mn><mrow><mo>-</mo><mn>2</mn></mrow></msubsup><mo>+</mo><msup><mi mathvariant=\"normal\">H</mi><mo>+</mo></msup><mo>\u2192</mo><munder><mrow><mi mathvariant=\"normal\">C</mi><mi mathvariant=\"normal\">r</mi><msub><mi mathvariant=\"normal\">O</mi><mn>5</mn></msub></mrow><mrow><mi mathvariant=\"normal\">B</mi><mi mathvariant=\"normal\">l</mi><mi mathvariant=\"normal\">u</mi><mi mathvariant=\"normal\">e</mi><mo>\u00a0</mo><mi mathvariant=\"normal\">c</mi><mi mathvariant=\"normal\">o</mi><mi mathvariant=\"normal\">l</mi><mi mathvariant=\"normal\">o</mi><mi mathvariant=\"normal\">u</mi><mi mathvariant=\"normal\">r</mi></mrow></munder><mo>+</mo><msub><mi mathvariant=\"normal\">H</mi><mn>2</mn></msub><mi mathvariant=\"normal\">O</mi></math>", "opts": [{"id": "rctYf", "text": "solution turns green due to formation of <math><mi mathvariant=\"normal\">C</mi><msub><mrow><mi mathvariant=\"normal\">r</mi></mrow><mrow><mn>2</mn></mrow></msub><msub><mrow><mi mathvariant=\"normal\">O</mi></mrow><mrow><mn>3</mn></mrow></msub></math>"}, {"id": "Xcjtg", "text": "solution turns yellow due to formation of <math><msub><mrow><mi mathvariant=\"normal\">K</mi></mrow><mrow><mn>2</mn></mrow></msub><mi mathvariant=\"normal\">C</mi><mi mathvariant=\"normal\">r</mi><msub><mrow><mi mathvariant=\"normal\">O</mi></mrow><mrow><mn>4</mn></mrow></msub></math>"}, {"id": "5SHKE", "text": "a deep blue-violet coloured compound <math><mi mathvariant=\"normal\">C</mi><mi mathvariant=\"normal\">r</mi><mi mathvariant=\"normal\">O</mi><mo>(</mo><msub><mrow><mi mathvariant=\"normal\">O</mi></mrow><mrow><mn>2</mn></mrow></msub><msub><mrow><mo>)</mo></mrow><mrow><mn>2</mn></mrow></msub></math> is formed"}, {"id": "8M5YP", "text": "solution gives the green precipitate of <math><mi mathvariant=\"normal\">C</mi><mi mathvariant=\"normal\">r</mi><mo>(</mo><mi mathvariant=\"normal\">O</mi><mi mathvariant=\"normal\">H</mi><msub><mrow><mo>)</mo></mrow><mrow><mn>3</mn></mrow></msub></math>"}], "ans": "a deep blue-violet coloured compound <math><mi mathvariant=\"normal\">C</mi><mi mathvariant=\"normal\">r</mi><mi mathvariant=\"normal\">O</mi><mo>(</mo><msub><mrow><mi mathvariant=\"normal\">O</mi></mrow><mrow><mn>2</mn></mrow></msub><msub><mrow><mo>)</mo></mrow><mrow><mn>2</mn></mrow></msub></math> is formed", "correct": "5SHKE"}, {"id": "695e3b3e3dc984756e9de69f", "type": "singleCorrect", "html": "Match List-I with List-II and select the correct answer using codes given below the lists \u2013<table border=\"1px solid\"> <thead> <tr> <th>\u00a0</th> <th>List-I (Metal ions)</th> <th>\u00a0</th> <th>List- II Magnetic moment (B.M.)</th> </tr> </thead> <tbody> <tr> <td>(1)</td> <td><math><mi mathvariant=\"normal\">C</mi><msup><mrow><mi mathvariant=\"normal\">r</mi></mrow><mrow><mn>3</mn><mo>+</mo></mrow></msup></math></td> <td><math><mo>(</mo><mi mathvariant=\"normal\">A</mi><mo>)</mo></math></td> <td><math><msqrt><mn>35</mn></msqrt></math></td> </tr> <tr> <td>(2)</td> <td><math><mi mathvariant=\"normal\">F</mi><msup><mrow><mi mathvariant=\"normal\">e</mi></mrow><mrow><mn>2</mn><mo>+</mo></mrow></msup></math></td> <td><math><mo>(</mo><mi mathvariant=\"normal\">B</mi><mo>)</mo></math></td> <td><math><msqrt><mn>30</mn></msqrt></math></td> </tr> <tr> <td>(3)</td> <td><math><mi mathvariant=\"normal\">N</mi><msup><mrow><mi mathvariant=\"normal\">i</mi></mrow><mrow><mn>2</mn><mo>+</mo></mrow></msup></math></td> <td><math><mo>(</mo><mi mathvariant=\"normal\">C</mi><mo>)</mo></math></td> <td><math><msqrt><mn>24</mn></msqrt></math></td> </tr> <tr> <td>(4)</td> <td><math><mi mathvariant=\"normal\">M</mi><msup><mrow><mi mathvariant=\"normal\">n</mi></mrow><mrow><mn>2</mn><mo>+</mo></mrow></msup></math></td> <td><math><mo>(</mo><mi mathvariant=\"normal\">D</mi><mo>)</mo></math></td> <td><math><msqrt><mn>15</mn></msqrt></math></td> </tr> <tr> <td>\u00a0</td> <td>\u00a0</td> <td><math><mo>(</mo><mi mathvariant=\"normal\">E</mi><mo>)</mo></math></td> <td><math><msqrt><mn>8</mn></msqrt></math></td> </tr> </tbody> </table> ", "sol": "The atomic number of <math><mi mathvariant=\"normal\">C</mi><mi mathvariant=\"normal\">r</mi><mo>=</mo><mn>24</mn></math>, <math><mi mathvariant=\"normal\">F</mi><mi mathvariant=\"normal\">e</mi><mo>=</mo><mn>26</mn></math>, <math><mi mathvariant=\"normal\">M</mi><mi mathvariant=\"normal\">n</mi><mo>=</mo><mn>25</mn></math>, <math><mi mathvariant=\"normal\">N</mi><mi mathvariant=\"normal\">i</mi><mo>=</mo><mn>28</mn></math> .<br/>No of unpaired electrons <math><mi mathvariant=\"normal\">C</mi><msup><mrow><mi mathvariant=\"normal\">r</mi></mrow><mrow><mn>3</mn><mo>+</mo></mrow></msup><mo>=</mo><mn>3</mn><mo>,</mo></math> <math> <mrow> <msup> <mrow> <mtext>Fe</mtext></mrow> <mrow> <mo>+</mo><mn>2</mn></mrow> </msup> <mo>=</mo><mn>4</mn><mo>,</mo><mo>\u00a0</mo><msup> <mrow> <mtext>Ni</mtext></mrow> <mrow> <mo>+</mo><mn>2</mn></mrow> </msup> <mo>=</mo><mn>2</mn><mo>,</mo><msup> <mrow> <mtext>Mn</mtext></mrow> <mrow> <mo>+</mo><mn>2</mn></mrow> </msup> <mo>=</mo><mn>5</mn></mrow><mo>.</mo></math><br/>The magnetic moment is calculated by <math><msqrt><mi mathvariant=\"normal\">n</mi><mo>(</mo><mi mathvariant=\"normal\">n</mi><mo>+</mo><mn>2</mn><mo>)</mo></msqrt></math>, where n is number of unpaired electrons.", "opts": [{"id": "O5Z8P", "text": "<math><mn>1</mn><mo>-</mo><mo>(</mo><mi mathvariant=\"normal\">B</mi><mo>)</mo><mo>,</mo><mi mathvariant=\"normal\"></mi><mn>2</mn><mo>-</mo><mo>(</mo><mi mathvariant=\"normal\">C</mi><mo>)</mo><mo>,</mo><mn>3</mn><mo>-</mo><mo>(</mo><mi mathvariant=\"normal\">E</mi><mo>)</mo><mo>,</mo><mn>4</mn><mo>-</mo><mo>(</mo><mi mathvariant=\"normal\">D</mi><mo>)</mo></math>"}, {"id": "acQSB", "text": "<math><mn>1</mn><mo>-</mo><mo>(</mo><mi mathvariant=\"normal\">B</mi><mo>)</mo><mo>,</mo><mi mathvariant=\"normal\"></mi><mn>2</mn><mo>-</mo><mo>(</mo><mi mathvariant=\"normal\">C</mi><mo>)</mo><mo>,</mo><mn>3</mn><mo>-</mo><mo>(</mo><mi mathvariant=\"normal\">E</mi><mo>)</mo><mo>,</mo><mn>4</mn><mo>-</mo><mo>(</mo><mi mathvariant=\"normal\">A</mi><mo>)</mo></math>"}, {"id": "zQoRt", "text": "<math><mn>1</mn><mo>-</mo><mo>(</mo><mi mathvariant=\"normal\">D</mi><mo>)</mo><mo>,</mo><mi mathvariant=\"normal\"></mi><mn>2</mn><mo>-</mo><mo>(</mo><mi mathvariant=\"normal\">C</mi><mo>)</mo><mo>,</mo><mn>3</mn><mo>-</mo><mo>(</mo><mi mathvariant=\"normal\">E</mi><mo>)</mo><mo>,</mo><mn>4</mn><mo>-</mo><mo>(</mo><mi mathvariant=\"normal\">A</mi><mo>)</mo></math>"}, {"id": "cdzFO", "text": "<math><mn>1</mn><mo>-</mo><mo>(</mo><mi mathvariant=\"normal\">D</mi><mo>)</mo><mo>,</mo><mi mathvariant=\"normal\"></mi><mn>2</mn><mo>-</mo><mo>(</mo><mi mathvariant=\"normal\">E</mi><mo>)</mo><mo>,</mo><mn>3</mn><mo>-</mo><mo>(</mo><mi mathvariant=\"normal\">C</mi><mo>)</mo><mo>,</mo><mn>4</mn><mo>-</mo><mo>(</mo><mi mathvariant=\"normal\">A</mi><mo>)</mo></math>"}], "ans": "<math><mn>1</mn><mo>-</mo><mo>(</mo><mi mathvariant=\"normal\">D</mi><mo>)</mo><mo>,</mo><mi mathvariant=\"normal\"></mi><mn>2</mn><mo>-</mo><mo>(</mo><mi mathvariant=\"normal\">C</mi><mo>)</mo><mo>,</mo><mn>3</mn><mo>-</mo><mo>(</mo><mi mathvariant=\"normal\">E</mi><mo>)</mo><mo>,</mo><mn>4</mn><mo>-</mo><mo>(</mo><mi mathvariant=\"normal\">A</mi><mo>)</mo></math>", "correct": "zQoRt"}, {"id": "695e3b3e3dc984756e9de6a0", "type": "singleCorrect", "html": "<math><mtext>M</mtext><msup><mrow><mtext>n</mtext></mrow><mrow><mo>2</mo><mo>+</mo></mrow></msup></math> can be converted into <math><mtext>M</mtext><msup><mrow><mtext>n</mtext></mrow><mrow><mn>7</mn><mo>+</mo></mrow></msup></math> by reacting with", "sol": "Strong oxidising agents such as <math><mtext>P</mtext><mtext>b</mtext><msub><mrow><mtext>O</mtext></mrow><mrow><mn>2</mn></mrow></msub></math> or sodium bismuthate <math><mo>(</mo><mtext>N</mtext><mtext>a</mtext><mtext>B</mtext><mtext>i</mtext><msub><mrow><mtext>O</mtext></mrow><mrow><mn>3</mn></mrow></msub><mo>)</mo></math> oxidise\u00a0<math><mtext>M</mtext><msup><mrow><mtext>n</mtext></mrow><mrow><mn>2</mn><mo>+</mo></mrow></msup></math> to <math><mtext>M</mtext><mtext>n</mtext><msubsup><mrow><mtext>O</mtext></mrow><mrow><mn>4</mn></mrow><mrow><mo>-</mo></mrow></msubsup></math> or <math><mtext>M</mtext><msup><mrow><mtext>n</mtext></mrow><mrow><mn>7</mn><mo>+</mo></mrow></msup></math>.<br/><math> <mrow> <mn>2</mn> <msup> <mtext>Mn</mtext> <mrow> <mn>2</mn> <mo>+</mo> </mrow> </msup> <mo>+</mo> <mn>5</mn> <msub> <mtext>PbO</mtext> <mn>2</mn> </msub> <mo>+</mo> <mn>4</mn> <msup> <mtext>H</mtext> <mo>+</mo> </msup> <mo>\u2192</mo> <mn>2</mn> <msubsup> <mtext>MnO</mtext> <mn>4</mn> <mo>-</mo> </msubsup> <mo>+</mo> <mn>5</mn> <msup> <mtext>Pb</mtext> <mrow> <mn>2</mn> <mo>+</mo> </mrow> </msup> <mo>+</mo> <mn>2</mn> <msub> <mtext>H</mtext> <mn>2</mn> </msub> <mtext>O</mtext> </mrow> </math>", "opts": [{"id": "PgsWo", "text": "<math><mtext>S</mtext><msub><mrow><mtext>O</mtext></mrow><mrow><mn>2</mn></mrow></msub></math>"}, {"id": "WUAxb", "text": "<math><mtext>C</mtext><msub><mrow><mtext>l</mtext></mrow><mrow><mn>2</mn></mrow></msub></math>"}, {"id": "xlZhF", "text": "<math><mtext>P</mtext><mtext>b</mtext><msub><mrow><mtext>O</mtext></mrow><mrow><mn>2</mn></mrow></msub></math>"}, {"id": "gZpg1", "text": "<math><mtext mathvariant=\"normal\">S</mtext><mtext mathvariant=\"normal\">n</mtext><mtext mathvariant=\"normal\">C</mtext><msub><mrow><mtext mathvariant=\"normal\">l</mtext></mrow><mrow><mn>2</mn></mrow></msub></math>"}], "ans": "<math><mtext>P</mtext><mtext>b</mtext><msub><mrow><mtext>O</mtext></mrow><mrow><mn>2</mn></mrow></msub></math>", "correct": "xlZhF"}, {"id": "695e3b3e3dc984756e9de6a1", "type": "singleCorrect", "html": "The transition elements are more metallic than the representative elements because they have", "sol": "Transition elements are more metallic than representative elements due to the availability of <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi mathvariant=\"normal\">d</mi></math>-orbitals for bonding which can be used for metallic bonding and for showing multiple oxidation states.", "opts": [{"id": "VPzAg", "text": "Electron pairs in <math><mi>d</mi></math>-orbitals"}, {"id": "DQQ8c", "text": "Availability of <math><mi>d</mi></math>-orbitals for bonding"}, {"id": "D7rOU", "text": "The electron in p-orbitals"}, {"id": "rIu2X", "text": "Unpaired electron in metallic orbitals"}], "ans": "Availability of <math><mi>d</mi></math>-orbitals for bonding", "correct": "DQQ8c"}, {"id": "695e3b3e3dc984756e9de6a2", "type": "singleCorrect", "html": "More number of oxidation states are exhibited by the actinoids than by the lanthanoids. The main reason for this is", "sol": "The 5f-orbitals extend into space beyond the 6s and 6p-orbitals and participate in bonding. This is in direct contrast to the lanthanides where the 4f-orbitals are buried deep inside in the atom, totally shielded by outer orbitals and thus unable to take part in bonding.", "opts": [{"id": "QczK0", "text": "More active nature of the actinoids"}, {"id": "STzKf", "text": "More energy difference between 5f and 6d orbitals than that between 4f and 5d orbitals"}, {"id": "qrj1d", "text": "Lesser energy difference between 5f and 6d orbitals than that between 4f and 5d orbitals"}, {"id": "Q8qIn", "text": "Greater metallic character of the lanthanoids than that of the corresponding actinoids"}], "ans": "Lesser energy difference between 5f and 6d orbitals than that between 4f and 5d orbitals", "correct": "qrj1d"}, {"id": "695e3b3e3dc984756e9de6a3", "type": "singleCorrect", "html": "<math><mtext>M</mtext><msup><mrow><mtext>n</mtext></mrow><mrow><mo>2</mo><mo>+</mo></mrow></msup></math> can be converted into <math><mtext>M</mtext><msup><mrow><mtext>n</mtext></mrow><mrow><mn>7</mn><mo>+</mo></mrow></msup></math> by reacting with", "sol": "Strong oxidising agents such as <math><mtext>P</mtext><mtext>b</mtext><msub><mrow><mtext>O</mtext></mrow><mrow><mn>2</mn></mrow></msub></math> or sodium bismuthate <math><mo>(</mo><mtext>N</mtext><mtext>a</mtext><mtext>B</mtext><mtext>i</mtext><msub><mrow><mtext>O</mtext></mrow><mrow><mn>3</mn></mrow></msub><mo>)</mo></math> oxidise\u00a0<math><mtext>M</mtext><msup><mrow><mtext>n</mtext></mrow><mrow><mn>2</mn><mo>+</mo></mrow></msup></math> to <math><mtext>M</mtext><mtext>n</mtext><msubsup><mrow><mtext>O</mtext></mrow><mrow><mn>4</mn></mrow><mrow><mo>-</mo></mrow></msubsup></math> or <math><mtext>M</mtext><msup><mrow><mtext>n</mtext></mrow><mrow><mn>7</mn><mo>+</mo></mrow></msup></math>.<br/><math> <mrow> <mn>2</mn> <msup> <mtext>Mn</mtext> <mrow> <mn>2</mn> <mo>+</mo> </mrow> </msup> <mo>+</mo> <mn>5</mn> <msub> <mtext>PbO</mtext> <mn>2</mn> </msub> <mo>+</mo> <mn>4</mn> <msup> <mtext>H</mtext> <mo>+</mo> </msup> <mo>\u2192</mo> <mn>2</mn> <msubsup> <mtext>MnO</mtext> <mn>4</mn> <mo>-</mo> </msubsup> <mo>+</mo> <mn>5</mn> <msup> <mtext>Pb</mtext> <mrow> <mn>2</mn> <mo>+</mo> </mrow> </msup> <mo>+</mo> <mn>2</mn> <msub> <mtext>H</mtext> <mn>2</mn> </msub> <mtext>O</mtext> </mrow> </math>", "opts": [{"id": "OBsSh", "text": "<math><mt <mrow><mi mathvariant=\"normal\">O</mi></mrow><mrow><mn>4</mn></mrow></msub></math></td> </tr> <tr> <td>(4) Iron Oxide</td> <td>(iv) <math><mi mathvariant=\"normal\">N</mi><msub><mrow><mi mathvariant=\"normal\">H</mi></mrow><mrow><mn>3</mn></mrow></msub></math></td> </tr> </tbody> </table> ", "sol": "<math><msub><mrow><mi mathvariant=\"normal\">V</mi></mrow><mrow><mn>2</mn></mrow></msub><msub><mrow><mi mathvariant=\"normal\">O</mi></mrow><mrow><mn>5</mn></mrow></msub></math> is used as a catalyst in contact process for <math><msub><mrow><mi mathvariant=\"normal\">H</mi></mrow><mrow><mn>2</mn></mrow></msub><mi mathvariant=\"normal\">S</mi><msub><mrow><mi mathvariant=\"normal\">O</mi></mrow><mrow><mn>4</mn></mrow></msub></math> .<br/><math><mi mathvariant=\"normal\">T</mi><mi mathvariant=\"normal\">i</mi><mi mathvariant=\"normal\">C</mi><msub><mrow><mi mathvariant=\"normal\">l</mi></mrow><mrow><mn>4</mn></mrow></msub><mo>/</mo><mi mathvariant=\"normal\">A</mi><mi mathvariant=\"normal\">l</mi><mo>(</mo><mi mathvariant=\"normal\">M</mi><mi mathvariant=\"normal\">e</mi><msub><mrow><mo>)</mo></mrow><mrow><mn>3</mn></mrow></msub></math> i.e., Ziegler Natta salt is used as catalyst for polymerisation of ethene.<br/><math><mi mathvariant=\"normal\">P</mi><mi mathvariant=\"normal\">d</mi><mi mathvariant=\"normal\">C</mi><msub><mrow><mi mathvariant=\"normal\">l</mi></mrow><mrow><mn>2</mn></mrow></msub></math> is used as catalyst for ethanal (Wacker process).<br/>Iron oxide is used as catalyst in Haber's synthesis.", "opts": [{"id": "bzxth", "text": "(1) \u2013 (ii); (2) \u2013 (iii); (3) \u2013 (i); (4) \u2013 (iv)"}, {"id": "f1TII", "text": "(1) \u2013 (iii); (2) \u2013 (i); (3) \u2013 (ii); (4) \u2013 (iv)"}, {"id": "U1x3G", "text": "(1) \u2013 (iii); (2) \u2013 (iv); (3) \u2013 (i); (4) \u2013 (ii)"}, {"id": "JwoFD", "text": "(1) \u2013 (iv); (2) \u2013 (iii); (3) \u2013 (ii); (4) \u2013 (i)"}], "ans": "(1) \u2013 (iii); (2) \u2013 (i); (3) \u2013 (ii); (4) \u2013 (iv)", "correct": "f1TII"}]}, {"name": "p Block Elements (Group 15, 16, 17 & 18)", "qs": [{"id": "695e3b3e3dc984756e9de6a5", "type": "singleCorrect", "html": "Sodium thiosulphate, <math><mi mathvariant=\"normal\">N</mi><msub><mrow><mi mathvariant=\"normal\">a</mi></mrow><mrow><mn>2</mn></mrow></msub><msub><mrow><mi mathvariant=\"normal\">S</mi></mrow><mrow><mn>2</mn></mrow></msub><msub><mrow><mi mathvariant=\"normal\">O</mi></mrow><mrow><mn>3</mn></mrow></msub><mo>.</mo><mn>5</mn><msub><mrow><mi mathvariant=\"normal\">H</mi></mrow><mrow><mn>2</mn></mrow></msub><mi mathvariant=\"normal\">O</mi></math> is used in photography to:", "sol": "<math> <mrow> <msub> <mrow> <mtext>Na</mtext></mrow> <mn>2</mn> </msub> <msub> <mtext>S</mtext> <mn>2</mn> </msub> <msub> <mtext>O</mtext> <mn>3</mn> </msub> <mo>+</mo><munder> <mrow> <mtext>AgBr</mtext></mrow> <mrow> <mtext>unexposed</mtext></mrow> </munder> <mo>\u2192</mo><msub> <mrow> <mtext>Na</mtext></mrow> <mn>3</mn> </msub> <mtext>Ag</mtext><msub> <mrow> <mo stretchy=\"false\">(</mo><msub> <mtext>S</mtext> <mn>2</mn> </msub> <msub> <mtext>O</mtext> <mn>3</mn> </msub> <mo stretchy=\"false\">)</mo></mrow> <mn>2</mn> </msub> <mo>+</mo><mtext>NaBr</mtext></mrow></math><br/>The property is used for fixing in photography.", "opts": [{"id": "QDPGq", "text": "reduce the silver bromide grains to metallic silver"}, {"id": "rOLBL", "text": "convert the metallic silver to silver salt"}, {"id": "tUaXO", "text": "remove undecomposed AgBr as soluble silver thiosulphate complex"}, {"id": "w3w2l", "text": "remove reduced silver"}], "ans": "remove undecomposed AgBr as soluble silver thiosulphate complex", "correct": "tUaXO"}, {"id": "695e3b3e3dc984756e9de6a6", "type": "singleCorrect", "html": "What is not applicable to ozone?", "sol": "Ozone is an allotrope of oxygen and it is a bent molecule with bond angle approximately 117<sup>o</sup>. it is having 6 lone pairs. In it <math><mi mathvariant=\"normal\">O</mi><mo>-</mo><mi mathvariant=\"normal\">O</mi></math> bond length are equal due to resonance hence, here only statement B is incorrect.<br/><img src=\"https://cdn-question-pool.getmarks.app/NEET/DPP-Chemistry/4e4ec60b-710e-45ae-822b-9e6d60cf0ea6.png\" style=\"width:2.81736in;height:0.66944in\"/>", "opts": [{"id": "dSSxA", "text": "It is a bent molecule with bond angle approximately 117<sup>o</sup>"}, {"id": "U7NWG", "text": "It has four lone pairs of electrons in one of its Lewis formula"}, {"id": "GID0a", "text": "The two <math><mi mathvariant=\"normal\">O</mi><mo>\u2013</mo><mi mathvariant=\"normal\">O</mi></math> bond lengths are equal"}, {"id": "VXT7l", "text": "It is an allotrope of oxygen."}], "ans": "It has four lone pairs of electrons in one of its Lewis formula", "correct": "U7NWG"}, {"id": "695e3b3e3dc984756e9de6a7", "type": "singleCorrect", "html": "Which among the following does not from polyhalide ion?", "sol": "<p>Polyhaldie ions are the monovalent anions formed by the combination of two or more identical halogens. The outer electronic configuration of halogen atoms is ns<sup>2</sup>np<sup>5</sup>. So, for a halogen to form a polyhalide ion, it must contain vacant d-orbitals.&nbsp;</p><p>The electronic configuration of chlorine is 1s<sup>2</sup>2s<sup>2</sup>2p<sup>6</sup>3s<sup>2</sup>3p<sup>5</sup>. Since chlorine has three shells in its atom, it has vacant 3d-orbitals to accomodate other chlroine atoms and form a polyhalide ion.</p><p>The electronic configuration of bromine is [Ar]3d<sup>10</sup>4s<sup>2</sup>4p<sup>5</sup>. Bromine&nbsp;has four shells in its atom. The fourth shell in an atom&nbsp;has d-orbitals, so the vacant 4d-orbitals in bromine can accomodate other bromine atoms and form a polyhalide ion.</p><p>The electronic configuration of iodine is [Kr]4d<sup>10</sup>5s<sup>2</sup>5p<sup>5</sup>. The 5th shell in an atom of iodine&nbsp;has vacant 5d-orbitals&nbsp;to accomodate other iodine atoms and form a polyhalide ion.</p><p>The electronic configuration of fluorine is 1s<sup>2</sup>2s<sup>2</sup>2p<sup>5</sup>. The second shell in an atom has only the s and p-orbitals and the d-orbitals in the second shell of an atom are absent. So, fluorine cannot accomodate electrons in its d-orbitals and thus, does not form a polyhalide ion.&nbsp;</p>", "opts": [{"id": "dDMm2", "text": "Chlorine"}, {"id": "rSc1D", "text": "Bromine"}, {"id": "y2o4v", "text": "Iodine"}, {"id": "V7J6d", "text": "Fluorine"}], "ans": "Fluorine", "correct": "V7J6d"}, {"id": "695e3b3e3dc984756e9de6a8", "type": "singleCorrect", "html": "Bond angle in <math><mi mathvariant=\"normal\">P</mi><msub><mrow><mi mathvariant=\"normal\">H</mi></mrow><mrow><mn>3</mn></mrow></msub></math> is closer to <math><mn>90</mn><mo>\u00b0</mo></math> while that in <math><mi mathvariant=\"normal\">N</mi><msub><mrow><mi mathvariant=\"normal\">H</mi></mrow><mrow><mn>3</mn></mrow></msub></math> is <math><mn>104.5</mn><mo>\u00b0</mo></math>. Which of the following best explains this structural feature?", "sol": "In the hydrides of group <math><mn>15</mn></math> and group <math><mn>16</mn><mi mathvariant=\"normal\"></mi></math> (except <math><mi mathvariant=\"normal\">N</mi><msub><mrow><mi mathvariant=\"normal\">H</mi></mrow><mrow><mn>3</mn></mrow></msub></math> and <math><msub><mrow><mi mathvariant=\"normal\">H</mi></mrow><mrow><mn>2</mn></mrow></msub><mi mathvariant=\"normal\">O</mi></math>) the energy difference between <math><mn>3</mn><mi mathvariant=\"normal\">s</mi></math> and <math><mn>3</mn><mi mathvariant=\"normal\">p</mi></math> orbital\u2019s is quite high. Hybridization increases the energy of <math><mn>3</mn><mi mathvariant=\"normal\">s</mi></math> orbital so much that lone pair rather prefers to occupy unhybridized s orbital. For example, in <math><mi mathvariant=\"normal\">P</mi><msub><mrow><mi mathvariant=\"normal\">H</mi></mrow><mrow><mn>3</mn></mrow></msub></math>, <math><mn>600</mn><mi mathvariant=\"normal\"></mi><mi mathvariant=\"normal\">k</mi><mi mathvariant=\"normal\">J</mi><mi mathvariant=\"normal\"></mi><mi mathvariant=\"normal\">m</mi><mi mathvariant=\"normal\">o</mi><msup><mrow><mi mathvariant=\"normal\">l</mi></mrow><mrow><mo>-</mo><mn>1</mn></mrow></msup></math> of energy is required to hybridize the central atom. So, to avoid such energy demanding hybridization P forms bonds with unhybridized p orbitals leaving the lone pair in the spherical s orbital which leads to a bond angle close to <math><mn>90</mn><mo>\u00b0</mo></math> .", "opts": [{"id": "M5Mlp", "text": "Due to larger size of the lone pair electron cloud, there is larger lone pair \u2013 bond pair repulsion in <math><mi mathvariant=\"normal\">P</mi><msub><mrow><mi mathvariant=\"normal\">H</mi></mrow><mrow><mn>3</mn></mrow></msub></math> compared to <math><mi mathvariant=\"normal\">N</mi><msub><mrow><mi mathvariant=\"normal\">H</mi></mrow><mrow><mn>3</mn></mrow></msub></math> ."}, {"id": "Yh2wN", "text": "Higher electronegativity of nitrogen concentrates the bond pair electron cloud near the central atom which increases the bond pair \u2013 bond pair repulsion which in turn decreases the bond angle in <math><mi mathvariant=\"normal\">N</mi><msub><mrow><mi mathvariant=\"normal\">H</mi></mrow><mrow><mn>3</mn></mrow></msub></math> ."}, {"id": "agwnJ", "text": "Energy difference between <math><mn>3</mn><mi mathvariant=\"normal\">s</mi><mi mathvariant=\"normal\"></mi></math> and <math><mn>3</mn><mi mathvariant=\"normal\">p</mi><mi mathvariant=\"normal\"></mi></math> orbitals is quite high and hence the lone pair on phosphorous prefers to occupy unhybridized <math><mi mathvariant=\"normal\">s</mi><mo>-</mo></math> orbital rather than hybridized <math><msup><mrow><mi mathvariant=\"normal\">s</mi><mi mathvariant=\"normal\">p</mi></mrow><mrow><mn>3</mn></mrow></msup></math> hybridized orbital which causes its <math><mi mathvariant=\"normal\">s</mi><mo>-</mo></math> orbital energy to increase."}, {"id": "twL50", "text": "Phosphorous forms <math><mi mathvariant=\"normal\">p</mi><mi mathvariant=\"normal\">\u03c0</mi><mo>-</mo><mi mathvariant=\"normal\">d</mi><mi mathvariant=\"normal\">\u03c0</mi></math> bonds while nitrogen does not."}], "ans": "Energy difference between <math><mn>3</mn><mi mathvariant=\"normal\">s</mi><mi mathvariant=\"normal\"></mi></math> and <math><mn>3</mn><mi mathvariant=\"normal\">p</mi><mi mathvariant=\"normal\"></mi></math> orbitals is quite high and hence the lone pair on phosphorous prefers to occupy unhybridized <math><mi mathvariant=\"normal\">s</mi><mo>-</mo></math> orbital rather than hybridized <math><msup><mrow><mi mathvariant=\"normal\">s</mi><mi mathvariant=\"normal\">p</mi></mrow><mrow><mn>3</mn></mrow></msup></math> hybridized orbital which causes its <math><mi mathvariant=\"normal\">s</mi><mo>-</mo></math> orbital energy to increase.", "correct": "agwnJ"}, {"id": "695e3b3e3dc984756e9de6a9", "type": "singleCorrect", "html": "Which of the following statements regarding nitrogen pentoxide is not correct?", "sol": "Solid <math><msub><mrow><mi mathvariant=\"normal\">N</mi></mrow><mrow><mn>2</mn></mrow></msub><msub><mrow><mi mathvariant=\"normal\">O</mi></mrow><mrow><mn>5</mn></mrow></msub></math> exist as <math><msup><mrow><mfenced close=\"]\" open=\"[\" separators=\"|\"><mrow><msub><mrow><mi mathvariant=\"normal\">N</mi><mi mathvariant=\"normal\">O</mi></mrow><mrow><mn>2</mn></mrow></msub></mrow></mfenced></mrow><mrow><mo>+</mo></mrow></msup><msup><mrow><mfenced close=\"]\" open=\"[\" separators=\"|\"><mrow><msub><mrow><mi mathvariant=\"normal\">N</mi><mi mathvariant=\"normal\">O</mi></mrow><mrow><mn>3</mn></mrow></msub></mrow></mfenced></mrow><mrow><mo>-</mo></mrow></msup></math>", "opts": [{"id": "DgMIH", "text": "Nitrogen pentoxide is a colourless, deliquescent liquid"}, {"id": "upScT", "text": "Nitrogen pentoxide is the anhydride of nitric acid"}, {"id": "quQYC", "text": "Solid <math><msub><mrow><mi mathvariant=\"normal\">N</mi></mrow><mrow><mn>2</mn></mrow></msub><msub><mrow><mi mathvariant=\"normal\">O</mi></mrow><mrow><mn>5</mn></mrow></msub></math> is a covalent molecule"}, {"id": "MIg9r", "text": "The molecule of <math><msub><mrow><mi mathvariant=\"normal\">N</mi></mrow><mrow><mn>2</mn></mrow></msub><msub><mrow><mi mathvariant=\"normal\">O</mi></mrow><mrow><mn>5</mn></mrow></msub></math> in planar"}], "ans": "Solid <math><msub><mrow><mi mathvariant=\"normal\">N</mi></mrow><mrow><mn>2</mn></mrow></msub><msub><mrow><mi mathvariant=\"normal\">O</mi></mrow><mrow><mn>5</mn></mrow></msub></math> is a covalent molecule", "correct": "quQYC"}, {"id": "695e3b3f3dc984756e9de6aa", "type": "singleCorrect", "html": "<p>Phosphine is prepared in the laboratory by the reaction of _____.</p>", "sol": "<p>White phosphorus&nbsp;reacts with sodium hydroxide to give phosphine in the laboratory easily.</p><p><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi mathvariant=\"normal\">P</mi><mn>4</mn></msub><mo>&#160;</mo><mo>&#160;</mo><mo>+</mo><mo>&#160;</mo><mn>3</mn><mi>NaOH</mi><mo>&#160;</mo><mo>+</mo><mn>3</mn><msub><mi mathvariant=\"normal\">H</mi><mn>2</mn></msub><mi mathvariant=\"normal\">O</mi><mo>&#160;</mo><mo>&#160;</mo><mo>&#8594;</mo><mo>&#160;</mo><msub><mi>PH</mi><mn>3</mn></msub><mo>&#160;</mo><mo>&#160;</mo><mo>+</mo><mo>&#160;</mo><mo>&#160;</mo><mn>3</mn><mo>&#160;</mo><msub><mi>NaH</mi><mn>2</mn></msub><msub><mi>PO</mi><mn>2</mn></msub></math></p>", "opts": [{"id": "aXLqR", "text": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi mathvariant=\"normal\">P</mi><mn>4</mn></msub></math>&nbsp;and&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi mathvariant=\"normal\">H</mi><mi mathvariant=\"normal\">2</mi></msub><msub><mi>SO</mi><mi mathvariant=\"normal\">4</mi></msub></math>"}, {"id": "5EwYe", "text": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi mathvariant=\"normal\">P</mi><mn>4</mn></msub><mi mathvariant=\"normal\">&#160;</mi></math>&nbsp;and&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi>NaOH</mi></math>"}, {"id": "xrbLE", "text": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi mathvariant=\"normal\">P</mi><mn>4</mn></msub><mi mathvariant=\"normal\">&#160;</mi></math>and&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi mathvariant=\"normal\">H</mi><mi mathvariant=\"normal\">2</mi></msub><mi mathvariant=\"normal\">S</mi></math>"}, {"id": "KoOmU", "text": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi mathvariant=\"normal\">P</mi><mn>4</mn></msub></math>&nbsp;and&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi>HNO</mi><mtext>3</mtext></msub></math>"}], "ans": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi mathvariant=\"normal\">P</mi><mn>4</mn></msub><mi mathvariant=\"normal\">&#160;</mi></math>&nbsp;and&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi>NaOH</mi></math>", "correct": "5EwYe"}, {"id": "695e3b3f3dc984756e9de6ab", "type": "singleCorrect", "html": "<p>Which of the following oxide does not form acidic aqueous solution?</p>", "sol": "All other oxides of nitrogen except <math><msub><mrow><mi mathvariant=\"normal\">N</mi></mrow><mrow><mn>2</mn></mrow></msub><mi mathvariant=\"normal\">O</mi></math> and <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi>NO</mi></math>&nbsp;give acidic aqueous solutions.<br/><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi>NO</mi><mn>2</mn></msub></math>&nbsp;disproportionates into nitric acid and nitrous acid in aqueous solution.<br/>Reaction between <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi>NO</mi></math>&nbsp;and&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi>NO</mi><mn>2</mn></msub></math>&nbsp;results in equilibrium with <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi mathvariant=\"normal\">N</mi><mn>2</mn></msub><msub><mi mathvariant=\"normal\">O</mi><mn>3</mn></msub></math>.<br /><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi>NO</mi><mn>2</mn></msub><mo>+</mo><mi>NO</mi><mo>=</mo><msub><mi mathvariant=\"normal\">N</mi><mn>2</mn></msub><msub><mi mathvariant=\"normal\">O</mi><mn>3</mn></msub></math>.<br />In aqueous solution, an additional reaction results in the rapid conversion of <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi mathvariant=\"normal\">N</mi><mn>2</mn></msub><msub><mi mathvariant=\"normal\">O</mi><mn>3</mn></msub></math>&nbsp;to nitrous acid.<br /><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi mathvariant=\"normal\">N</mi><mn>2</mn></msub><msub><mi mathvariant=\"normal\">O</mi><mn>3</mn></msub><mo>+</mo><msub><mi mathvariant=\"normal\">H</mi><mn>2</mn></msub><mi mathvariant=\"normal\">O</mi><mo>&#8594;</mo><mn>2</mn><mo>&#160;</mo><msub><mi>HNO</mi><mn>2</mn></msub></math>", "opts": [{"id": "XzQT3", "text": "<math><msub><mrow><mi mathvariant=\"normal\">N</mi></mrow><mrow><mn>2</mn></mrow></msub><msub><mrow><mi mathvariant=\"normal\">O</mi></mrow><mrow><mn>3</mn></mrow></msub></math>"}, {"id": "74BUe", "text": "<math><mi mathvariant=\"normal\">N</mi><msub><mrow><mi mathvariant=\"normal\">O</mi></mrow><mrow><mn>2</mn></mrow></msub></math>"}, {"id": "LBtnk", "text": "<math><msub><mrow><mi mathvariant=\"normal\">N</mi></mrow><mrow><mn>2</mn></mrow></msub><msub><mrow><mi mathvariant=\"normal\">O</mi></mrow><mrow><mn>5</mn></mrow></msub></math>"}, {"id": "0Y5v5", "text": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi>NO</mi></math>"}], "ans": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi>NO</mi></math>", "correct": "0Y5v5"}, {"id": "695e3b3f3dc984756e9de6ac", "type": "singleCorrect", "html": "Find the incorrect statement.", "sol": "Phosphonium iodide is thermally less stable than ammonium salts because phosphine is less basic than ammonia and decomposition occurs at 60\u00b0C.<br/>Rest all are correct.", "opts": [{"id": "wHAcK", "text": "<math> <mrow> <msubsup> <mrow> <mtext>PH</mtext></mrow> <mtext>4</mtext> <mtext>+</mtext> </msubsup> </mrow></math> ion is tetrahedral like <math> <mrow> <msubsup> <mrow> <mtext>NH</mtext></mrow> <mtext>4</mtext> <mtext>+</mtext> </msubsup> </mrow></math> ion and is obtained when <math> <mrow> <msub> <mrow> <mtext>PH</mtext></mrow> <mtext>3</mtext> </msub> </mrow></math> is bonded to proton"}, {"id": "fgrIU", "text": "<math> <mrow> <msub> <mrow> <mtext>PH</mtext></mrow> <mtext>4</mtext> </msub> <mtext>I</mtext></mrow></math> is one of the most stable salt containing the phosphonium ion. It is also more stable than ammonium salts"}, {"id": "g8Nct", "text": "<math> <mrow> <msub> <mrow> <mtext>PH</mtext></mrow> <mtext>4</mtext> </msub> <mtext>I</mtext></mrow></math> is decomposed by caustic potash to form <math> <mrow> <msub> <mrow> <mtext>PH</mtext></mrow> <mtext>3</mtext> </msub> </mrow></math>"}, {"id": "UbISn", "text": "<math> <mrow> <msub> <mrow> <mtext>PH</mtext></mrow> <mtext>3</mtext> </msub> </mrow></math> is used for making Holme\u2019s signals"}], "ans": "<math> <mrow> <msub> <mrow> <mtext>PH</mtext></mrow> <mtext>4</mtext> </msub> <mtext>I</mtext></mrow></math> is one of the most stable salt containing the phosphonium ion. It is also more stable than ammonium salts", "correct": "fgrIU"}, {"id": "695e3b3f3dc984756e9de6ad", "type": "singleCorrect", "html": "Which of the following is a pseudohalide?", "sol": "<math><mi mathvariant=\"normal\">C</mi><msup><mrow><mi mathvariant=\"normal\">N</mi></mrow><mrow><mo>-</mo></mrow></msup></math> resembles <math><mi mathvariant=\"normal\">C</mi><msup><mrow><mi mathvariant=\"normal\">l</mi></mrow><mrow><mo>-</mo></mrow></msup></math>, <math><mi mathvariant=\"normal\">B</mi><msup><mrow><mi mathvariant=\"normal\">r</mi></mrow><mrow><mo>-</mo></mrow></msup></math> and <math><msup><mrow><mi mathvariant=\"normal\">I</mi></mrow><mrow><mo>-</mo></mrow></msup></math> in the following respects<br/><math><mo>(</mo><mi mathvariant=\"normal\">i</mi><mo>)</mo></math> It forms <math> <mrow> <mtext>HCN</mtext></mrow> </math><br/><math><mo>(</mo><mi mathvariant=\"normal\">i</mi><mi mathvariant=\"normal\">i</mi><mo>)</mo></math> It can be oxidized to form <math> <mrow> <msub> <mrow> <mtext>(CN)</mtext></mrow> <mtext>2</mtext> </msub> </mrow> </math><br/><math><mo>(</mo><mi mathvariant=\"normal\">i</mi><mi mathvariant=\"normal\">i</mi><mi mathvariant=\"normal\">i</mi><mo>)</mo></math> <math><mi mathvariant=\"normal\">A</mi><mi mathvariant=\"normal\">g</mi><mi mathvariant=\"normal\">C</mi><mi mathvariant=\"normal\">N</mi></math> is insoluble in water, but soluble in <math><mi mathvariant=\"normal\">N</mi><msub><mrow><mi mathvariant=\"normal\">H</mi></mrow><mrow><mn>3</mn></mrow></msub></math> as is <math> <mrow> <mtext>AgCl</mtext><mtext>.</mtext></mrow> </math>", "opts": [{"id": "NyMl3", "text": "<math><msubsup><mrow><mi mathvariant=\"normal\">I</mi></mrow><mrow><mn>3</mn></mrow><mrow><mo>-</mo></mrow></msubsup></math>"}, {"id": "BSemO", "text": "<math><mi mathvariant=\"normal\">I</mi><msub><mrow><mi mathvariant=\"normal\">B</mi></mrow><mrow><mn>7</mn></mrow></msub></math>"}, {"id": "FiGBn", "text": "<math><mi mathvariant=\"normal\">C</mi><msup><mrow><mi mathvariant=\"normal\">N</mi></mrow><mrow><mo>-</mo></mrow></msup></math>"}, {"id": "RxRgF", "text": "<math> <mrow> <mtext>ICl</mtext></mrow></math>"}], "ans": "<math><mi mathvariant=\"normal\">C</mi><msup><mrow><mi mathvariant=\"normal\">N</mi></mrow><mrow><mo>-</mo></mrow></msup></math>", "correct": "FiGBn"}, {"id": "695e3b3f3dc984756e9de6ae", "type": "singleCorrect", "html": "<p>The following questions consist of two statements one labelled <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi>ASSERTION</mi><mo>&#160;</mo><mo>(</mo><mi mathvariant=\"normal\">A</mi><mo>)</mo></math> and the another labelled&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi>REASON</mi><mo>&#160;</mo><mo>(</mo><mi mathvariant=\"normal\">R</mi><mo>)</mo></math>. Select the correct answers to these questions from the codes given below:</p><p><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi>Assertion</mi><mo>&#160;</mo><mo>:</mo></math> Pure phosphine is non inflammable.</p><p><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi>Reason</mi><mo>&#160;</mo><mo>:</mo></math> Impure phosphine is inflammable owing to the presence of <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi mathvariant=\"normal\">P</mi><mn>2</mn></msub><msub><mi mathvariant=\"normal\">H</mi><mn>4</mn></msub></math> or <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi mathvariant=\"normal\">P</mi><mn>4</mn></msub></math> vapours.</p>", "sol": "<p>Phosphine is a colourless, inflammable and toxic gas having molecular formula&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi>PH</mi><mn>3</mn></msub></math>. Pure phosphine is colourless and non-inflammable, but due to the mixing of&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi mathvariant=\"normal\">P</mi><mn>2</mn></msub><msub><mi mathvariant=\"normal\">H</mi><mn>4</mn></msub></math>&nbsp;or&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi mathvariant=\"normal\">P</mi><mn>4</mn></msub></math>&nbsp;vapours it has an extremely pungent smell and becomes burns with a luminous flame.</p><p>Hence, both <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi mathvariant=\"normal\">A</mi></math> and <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi mathvariant=\"normal\">R</mi></math> are true and&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi mathvariant=\"normal\">R</mi></math>&nbsp;is the correct explanation of&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi mathvariant=\"normal\">A</mi></math>.</p>", "opts": [{"id": "NnQyG", "text": "Both <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi mathvariant=\"normal\">A</mi></math> and <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi mathvariant=\"normal\">R</mi></math> are true and <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi mathvariant=\"normal\">R</mi></math> is the correct explanation of <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi mathvariant=\"normal\">A</mi></math>."}, {"id": "65iUn", "text": "Both <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi mathvariant=\"normal\">A</mi></math> and <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi mathvariant=\"normal\">R</mi></math> are true but <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi mathvariant=\"normal\">R</mi></math> is not correct explanation of <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi mathvariant=\"normal\">A</mi></math>"}, {"id": "9XvYt", "text": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi mathvariant=\"normal\">A</mi></math> is true but <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi mathvariant=\"normal\">R</mi></math> is false"}, {"id": "uyyJx", "text": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi mathvariant=\"normal\">A</mi></math> and <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi mathvariant=\"normal\">R</mi></math> are false"}], "ans": "Both <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi mathvariant=\"normal\">A</mi></math> and <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi mathvariant=\"normal\">R</mi></math> are true and <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi mathvariant=\"normal\">R</mi></math> is the correct explanation of <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi mathvariant=\"normal\">A</mi></math>.", "correct": "NnQyG"}, {"id": "695e3b3f3dc984756e9de6af", "type": "singleCorrect", "html": "The bleaching action of bleaching powder is due to the formation of:", "sol": "In presence of dil. Acids, bleaching powder loses oxygen.<br/> <math><mn>2</mn><mi mathvariant=\"normal\">C</mi><mi mathvariant=\"normal\">a</mi><mi mathvariant=\"normal\">O</mi><mi mathvariant=\"normal\">C</mi><msub><mrow><mi mathvariant=\"normal\">l</mi></mrow><mrow><mn>2</mn></mrow></msub><mo>+</mo><msub><mrow><mi mathvariant=\"normal\">H</mi></mrow><mrow><mn>2</mn></mrow></msub><mi mathvariant=\"normal\">S</mi><msub><mrow><mi mathvariant=\"normal\">O</mi></mrow><mrow><mn>4</mn></mrow></msub><mo>\u2192</mo><mi mathvariant=\"normal\">C</mi><mi mathvariant=\"normal\">a</mi><mi mathvariant=\"normal\">C</mi><msub><mrow><mi mathvariant=\"normal\">l</mi></mrow><mrow><mn>2</mn></mrow></msub><mo>+</mo><mi mathvariant=\"normal\">C</mi><mi mathvariant=\"normal\">a</mi><mi mathvariant=\"normal\">S</mi><msub><mrow><mi mathvariant=\"normal\">O</mi></mrow><mrow><mn>4</mn></mrow></msub><mo>+</mo><mn>2</mn><mi mathvariant=\"normal\">H</mi><mi mathvariant=\"normal\">C</mi><mi mathvariant=\"normal\">l</mi><mi mathvariant=\"normal\">O</mi></math> <br/> <math><mi mathvariant=\"normal\">H</mi><mi mathvariant=\"normal\">C</mi><mi mathvariant=\"normal\">l</mi><mi mathvariant=\"normal\">O</mi><mo>\u2192</mo><mi mathvariant=\"normal\">H</mi><mi mathvariant=\"normal\">C</mi><mi mathvariant=\"normal\">l</mi><mo>+</mo><mfenced close=\"]\" open=\"[\" separators=\"|\"><mrow><mi mathvariant=\"normal\">O</mi></mrow></mfenced></math> <br/>This oxygen is used for oxidation - bleaching.", "opts": [{"id": "pRYGN", "text": "<math><mi mathvariant=\"normal\">C</mi><mi mathvariant=\"normal\">a</mi><mi mathvariant=\"normal\">C</mi><msub><mrow><mi mathvariant=\"normal\">l</mi></mrow><mrow><mn>2</mn></mrow></msub></math>"}, {"id": "358EH", "text": "<math><mi mathvariant=\"normal\">C</mi><mi mathvariant=\"normal\">a</mi><mi mathvariant=\"normal\">S</mi><msub><mrow><mi mathvariant=\"normal\">O</mi></mrow><mrow><mn>4</mn></mrow></msub></math>"}, {"id": "foe0r", "text": "<math><mi mathvariant=\"normal\">H</mi><mi mathvariant=\"normal\">C</mi><mi mathvariant=\"normal\">l</mi><mi mathvariant=\"normal\">O</mi></math>"}, {"id": "2vHd0", "text": "<math><mi mathvariant=\"normal\">C</mi><mi mathvariant=\"normal\">a</mi><mo>(</mo><mi mathvariant=\"normal\">C</mi><mi mathvariant=\"normal\">l</mi><msub><mrow><mi mathvariant=\"normal\">O</mi></mrow><mrow><mn>3</mn></mrow></msub><msub><mrow><mo>)</mo></mrow><mrow><mn>2</mn></mrow></msub></math>"}], "ans": "<math><mi mathvariant=\"normal\">H</mi><mi mathvariant=\"normal\">C</mi><mi mathvariant=\"normal\">l</mi><mi mathvariant=\"normal\">O</mi></math>", "correct": "foe0r"}, {"id": "695e3b3f3dc984756e9de6b0", "type": "singleCorrect", "html": "Oxidation states of P in <math><msub><mrow><mi mathvariant=\"normal\">H</mi></mrow><mrow><mn>4</mn></mrow></msub><msub><mrow><mi mathvariant=\"normal\">P</mi></mrow><mrow><mn>2</mn></mrow></msub><msub><mrow><mi mathvariant=\"normal\">O</mi></mrow><mrow><mn>5</mn></mrow></msub><mo>,</mo><msub><mrow><mi mathvariant=\"normal\">H</mi></mrow><mrow><mn>4</mn></mrow></msub><msub><mrow><mi mathvariant=\"normal\">P</mi></mrow><mrow><mn>2</mn></mrow></msub><msub><mrow><mi mathvariant=\"normal\">O</mi></mrow><mrow><mn>6</mn></mrow></msub><mo>,</mo><msub><mrow><mi mathvariant=\"normal\">H</mi></mrow><mrow><mn>4</mn></mrow></msub><msub><mrow><mi mathvariant=\"normal\">P</mi></mrow><mrow><mn>2</mn></mrow></msub><msub><mrow><mi mathvariant=\"normal\">O</mi></mrow><mrow><mn>7</mn></mrow></msub><mo>,</mo></math> are respectively", "sol": "The value of O.No. of P- atoms in these acids are as follows <br/><math><msub><mrow><mi mathvariant=\"normal\">H</mi></mrow><mrow><mn>4</mn></mrow></msub><msub><mrow><mi mathvariant=\"normal\">P</mi></mrow><mrow><mn>2</mn></mrow></msub><msub><mrow><mi mathvariant=\"normal\">O</mi></mrow><mrow><mn>5</mn></mrow></msub><mo>\u2192</mo><mn>4</mn><mo>+</mo><mn>2</mn><mi mathvariant=\"normal\">x</mi><mo>-</mo><mn>10</mn><mo>=</mo><mn>0</mn></math> <br/><math><mn>2</mn><mi mathvariant=\"normal\">x</mi><mo>=</mo><mo>+</mo><mn>6</mn></math> <br/><math><mi mathvariant=\"normal\">x</mi><mo>=</mo><mo>+</mo><mn>3</mn></math> <br/><math><msub><mrow><mi mathvariant=\"normal\">H</mi></mrow><mrow><mn>4</mn></mrow></msub><msub><mrow><mi mathvariant=\"normal\">P</mi></mrow><mrow><mn>2</mn></mrow></msub><msub><mrow><mi mathvariant=\"normal\">O</mi></mrow><mrow><mn>7</mn></mrow></msub><mo>\u2192</mo><mn>4</mn><mo>+</mo><mn>2</mn><mi mathvariant=\"normal\">x</mi><mo>-</mo><mn>12</mn><mo>=</mo><mn>0</mn></math> <br/><math><mi mathvariant=\"normal\">x</mi><mo>=</mo><mo>+</mo><mn>4</mn></math> <br/><math><msub><mrow><mi mathvariant=\"normal\">H</mi></mrow><mrow><mn>4</mn></mrow></msub><msub><mrow><mi mathvariant=\"normal\">P</mi></mrow><mrow><mn>2</mn></mrow></msub><msub><mrow><mi mathvariant=\"normal\">O</mi></mrow><mrow><mn>7</mn></mrow></msub><mo>\u2192</mo><mn>4</mn><mo>+</mo><mn>2</mn><mi mathvariant=\"normal\">x</mi><mo>-</mo><mn>14</mn><mo>=</mo><mn>0</mn></math> <br/><math><mi mathvariant=\"normal\">x</mi><mo>=</mo><mo>+</mo><mn>5</mn></math>", "opts": [{"id": "x6xxa", "text": "+3, +4, +5"}, {"id": "xAl40", "text": "+3, +5, +4"}, {"id": "pn5KN", "text": "+5, +3, +4"}, {"id": "t1XBa", "text": "+5, +4, +3"}], "ans": "+3, +4, +5", "correct": "x6xxa"}, {"id": "695e3b3f3dc984756e9de6b1", "type": "singleCorrect", "html": "Which of the following ions combine with&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi>Fe</mi><mo>&#160;</mo><mfenced><mi>II</mi></mfenced></math>&nbsp;ions to form a brown complex?", "sol": "<p>Brown ring test&nbsp;is the confirmatory test for nitrates. The overall reaction is the reduction of the nitrate ion to <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi>NO</mi></math> by <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi>Fe</mi><mo>(</mo><mi>II</mi><mo>)</mo></math>, which is oxidised to <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi>Fe</mi><mo>(</mo><mi>III</mi><mo>)</mo></math>, followed by the formation of a nitrosyl complex between the <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi>NO</mi></math> and the remaining <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi>Fe</mi><mo>(</mo><mi>II</mi><mo>)</mo></math>, where <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi>NO</mi></math>&nbsp;is reduced to <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msup><mi>NO</mi><mo>-</mo></msup></math>. A brown ring is formed at the junction of two liquids which disappears upon shaking but reappears upon further addition of <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi>FeSO</mi><mn>4</mn></msub><mo>.</mo><msubsup><mi>NO</mi><mn>3</mn><mo>-</mo></msubsup></math>&nbsp;is confirmed. The formation of the brown ring is due to pentaaquanitroso iron (I) sulphate.</p><p><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi>NaNO</mi><mn>3</mn></msub><mo>&#160;</mo><mo>+</mo><mo>&#160;</mo><msub><mi mathvariant=\"normal\">H</mi><mn>2</mn></msub><msub><mi>SO</mi><mn>4</mn></msub><mo>&#160;</mo><mo>&#8594;</mo><mo>&#160;</mo><msub><mi>NaHSO</mi><mn>4</mn></msub><mo>&#160;</mo><mo>+</mo><mo>&#160;</mo><msub><mi>HNO</mi><mn>3</mn></msub></math><br/><math><mn>2</mn><msub><mi>HNO</mi><mn>3</mn></msub><mo>&#160;</mo><mo>+</mo><mo>&#160;</mo><mn>6</mn><msub><mi>FeSO</mi><mn>4</mn></msub><mo>&#160;</mo><mo>+</mo><mo>&#160;</mo><mn>3</mn><msub><mi mathvariant=\"normal\">H</mi><mn>2</mn></msub><msub><mi>SO</mi><mn>4</mn></msub><mo>&#160;</mo><mo>&#8594;</mo><mn>3</mn><msub><mi>Fe</mi><mn>2</mn></msub><msub><mfenced><msub><mi>SO</mi><mn>4</mn></msub></mfenced><mn>2</mn></msub><mo>&#160;</mo><mo>+</mo><mo>&#160;</mo><mn>2</mn><mi>NO</mi><mo>&#160;</mo><mo>+</mo><mo>&#160;</mo><mn>4</mn><msub><mi mathvariant=\"normal\">H</mi><mn>2</mn></msub><mi mathvariant=\"normal\">O</mi></math><br/><math><msub><mi>FeSO</mi><mn>4</mn></msub><mo>&#160;</mo><mo>+</mo><mo>&#160;</mo><mi>NO</mi><mo>&#160;</mo><mo>+</mo><mn>5</mn><msub><mi mathvariant=\"normal\">H</mi><mn>2</mn></msub><mi mathvariant=\"normal\">O</mi><mo>&#160;</mo><mo>&#8594;</mo><mo>&#160;</mo><munder><mrow><mfenced close=\"]\" open=\"[\"><mrow><mi>Fe</mi><msub><mfenced><mrow><msub><mi mathvariant=\"normal\">H</mi><mn>2</mn></msub><mi mathvariant=\"normal\">O</mi></mrow></mfenced><mn>5</mn></msub><mi>NO</mi></mrow></mfenced><msub><mi>SO</mi><mn>4</mn></msub></mrow><mrow><mi>pentaaquanitroso</mi><mo>&#160;</mo><mi>iron</mi><mo>&#160;</mo><mo>(</mo><mi mathvariant=\"normal\">I</mi><mo>)</mo><mo>&#160;</mo><mi>sulphate</mi><mo>&#160;</mo><mo>(</mo><mi>Brown</mi><mo>)</mo></mrow></munder></math></p>", "opts": [{"id": "iKY2Y", "text": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi mathvariant=\"normal\">N</mi><mn>2</mn></msub><mi mathvariant=\"normal\">O</mi></math>"}, {"id": "N0B5r", "text": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi>NO</mi></math>"}, {"id": "QV8M5", "text": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi mathvariant=\"normal\">N</mi><mn>2</mn></msub><msub><mi mathvariant=\"normal\">O</mi><mn>5</mn></msub></math>"}, {"id": "VIBVm", "text": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi mathvariant=\"normal\">N</mi><mn>2</mn></msub><msub><mi mathvariant=\"normal\">O</mi><mn>3</mn></msub></math>"}], "ans": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi>NO</mi></math>", "correct": "N0B5r"}, {"id": "695e3b3f3dc984756e9de6b2", "type": "singleCorrect", "html": "<p>Which of the following statement is INCORRECT?</p>", "sol": "<p>White phosphorous easily reacts&nbsp;with sodium hydroxide to give phosphine in the laboratory.</p><p>Both oxidation and reduction takes place.</p><p>Oxidation:&nbsp;&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mover><msub><mi mathvariant=\"normal\">P</mi><mn>4</mn></msub><mn>0</mn></mover><mo>&#160;</mo><mo>&#8594;</mo><msub><mi>NaH</mi><mn>2</mn></msub><mover><mi mathvariant=\"normal\">P</mi><mrow><mo>+</mo><mn>1</mn></mrow></mover><msub><mi mathvariant=\"normal\">O</mi><mn>2</mn></msub></math></p><p>Reduction:&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mover><msub><mi mathvariant=\"normal\">P</mi><mn>4</mn></msub><mn>0</mn></mover><mo>&#160;</mo><mo>&#160;</mo><mo>&#160;</mo><mo>&#8594;</mo><mo>&#160;</mo><mo>&#160;</mo><mover><msub><mi>PH</mi><mn>3</mn></msub><mrow><mo>-</mo><mn>3</mn></mrow></mover></math></p>", "opts": [{"id": "AZdAM", "text": "The stability of hydrides increases from <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi>NH</mi><mn>3</mn></msub></math> to <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi>BiH</mi><mn>3</mn></msub></math> in&nbsp;the group <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mn>15</mn></math> of the periodic table."}, {"id": "OyPG7", "text": "Nitrogen cannot form&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mtext>d&#960;-p&#960;</mtext></math>&nbsp;bond."}, {"id": "neYJF", "text": "Single <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi mathvariant=\"normal\">N</mi><mo>&#8211;</mo><mi mathvariant=\"normal\">N</mi></math> bond is weaker than the single <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi mathvariant=\"normal\">P</mi><mo>&#8211;</mo><mi mathvariant=\"normal\">P</mi></math> bond."}, {"id": "yKjca", "text": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi mathvariant=\"normal\">N</mi><mn>2</mn></msub><msub><mi mathvariant=\"normal\">O</mi><mn>4</mn></msub></math> has two resonance structures."}], "ans": "The stability of hydrides increases from <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi>NH</mi><mn>3</mn></msub></math> to <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi>BiH</mi><mn>3</mn></msub></math> in&nbsp;the group <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mn>15</mn></math> of the periodic table.", "correct": "AZdAM"}, {"id": "695e3b3f3dc984756e9de6b3", "type": "singleCorrect", "html": "What happens when phosphine gas is mixed with chlorine gas?", "sol": "<p style=\"text-align: justify;\">Phosphine is a highly poisonous gas.&nbsp;It reacts with traces of oxidizing agents like&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi>HNO</mi><mn>3</mn></msub><mo>,</mo><mo>&#160;</mo><msub><mi>Cl</mi><mn>2</mn></msub><mo>&#160;</mo><mtext>and</mtext><mo>&#160;</mo><msub><mi>Br</mi><mn>2</mn></msub></math>&nbsp;vapours.</p><p style=\"text-align: justify;\">On mixing phosphine with chlorine gas,&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi>PCl</mi><mn>5</mn></msub></math> and <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi>HCl</mi></math>&nbsp;are formed. The reaction is exothermic and&nbsp;hence, heat will be released.&nbsp;So, the mixture will cool down.<br /><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi>PH</mi><mn>3</mn></msub><mo>+</mo><mn>4</mn><msub><mi>Cl</mi><mn>2</mn></msub><mo>&#10230;</mo><msub><mi>PCl</mi><mn>5</mn></msub><mo>+</mo><mn>3</mn><mi>HCl</mi></math></p>", "opts": [{"id": "kLtKq", "text": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi>PCl</mi><mn>3</mn></msub></math> and <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi>HCl</mi></math> are formed and the mixture warms up."}, {"id": "OhZp4", "text": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi>PCl</mi><mn>5</mn></msub></math> and <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi>HCl</mi></math> are formed and the mixture cools down."}, {"id": "MGMfi", "text": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi>PH</mi><mn>3</mn></msub><msub><mi>Cl</mi><mn>2</mn></msub></math> is formed with warming up of mixture."}, {"id": "gq9Ws", "text": "The mixture only cools down."}], "ans": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi>PCl</mi><mn>5</mn></msub></math> and <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi>HCl</mi></math> are formed and the mixture cools down.", "correct": "OhZp4"}, {"id": "695e3b3f3dc984756e9de6b4", "type": "singleCorrect", "html": "The product formed in the reaction of <math><mi mathvariant=\"normal\">S</mi><mi mathvariant=\"normal\">O</mi><mi mathvariant=\"normal\">C</mi><msub><mrow><mi mathvariant=\"normal\">l</mi></mrow><mrow><mn>2</mn></mrow></msub></math> with white phosphorous is", "sol": "<math><msub><mrow><mi mathvariant=\"normal\">P</mi></mrow><mrow><mn>4</mn><mfenced separators=\"|\"><mrow><mi mathvariant=\"normal\">s</mi></mrow></mfenced></mrow></msub><mo>+</mo><mn>8</mn><mi mathvariant=\"normal\">S</mi><mi mathvariant=\"normal\">O</mi><mi mathvariant=\"normal\">C</mi><msub><mrow><mi mathvariant=\"normal\">l</mi></mrow><mrow><mn>2</mn><mfenced separators=\"|\"><mrow><mi mathvariant=\"normal\">l</mi></mrow></mfenced></mrow></msub><mo>\u2192</mo><mn>4</mn><mi mathvariant=\"normal\">P</mi><mi mathvariant=\"normal\">C</mi><msub><mrow><mi mathvariant=\"normal\">l</mi></mrow><mrow><mn>3</mn><mfenced separators=\"|\"><mrow><mi mathvariant=\"normal\">l</mi></mrow></mfenced></mrow></msub><mo>+</mo><mn>4</mn><mi mathvariant=\"normal\">S</mi><msub><mrow><mi mathvariant=\"normal\">O</mi></mrow><mrow><mn>2</mn><mfenced separators=\"|\"><mrow><mi mathvariant=\"normal\">g</mi></mrow></mfenced></mrow></msub><mo>+</mo><mn>2</mn><msub><mrow><mi mathvariant=\"normal\">S</mi></mrow><mrow><mn>2</mn></mrow></msub><mi mathvariant=\"normal\">C</mi><msub><mrow><mi mathvariant=\"normal\">l</mi></mrow><mrow><mn>2</mn><mfenced separators=\"|\"><mrow><mi mathvariant=\"normal\">g</mi></mrow></mfenced></mrow></msub></math><br/>The product formed in the reaction of <math><mi mathvariant=\"normal\">S</mi><mi mathvariant=\"normal\">O</mi><mi mathvariant=\"normal\">C</mi><msub><mrow><mi mathvariant=\"normal\">l</mi></mrow><mrow><mn>2</mn></mrow></msub></math> with white phosphorous is <math><mi mathvariant=\"normal\">P</mi><mi mathvariant=\"normal\">C</mi><msub><mrow><mi mathvariant=\"normal\">l</mi></mrow><mrow><mn>3</mn></mrow></msub></math>", "opts": [{"id": "777dN", "text": "<math><mi mathvariant=\"normal\">P</mi><mi mathvariant=\"normal\">C</mi><msub><mrow><mi mathvariant=\"normal\">l</mi></mrow><mrow><mn>3</mn></mrow></msub></math>"}, {"id": "r633G", "text": "<math><mi mathvariant=\"normal\">S</mi><msub><mrow><mi mathvariant=\"normal\">O</mi></mrow><mrow><mn>2</mn></mrow></msub><mi mathvariant=\"normal\">C</mi><msub><mrow><mi mathvariant=\"normal\">l</mi></mrow><mrow><mn>2</mn></mrow></msub></math>"}, {"id": "C2b9S", "text": "<math><mi mathvariant=\"normal\">S</mi><mi mathvariant=\"normal\">C</mi><msub><mrow><mi mathvariant=\"normal\">l</mi></mrow><mrow><mn>2</mn></mrow></msub></math>"}, {"id": "JwXSS", "text": "<math><mi mathvariant=\"normal\">P</mi><mi mathvariant=\"normal\">O</mi><mi mathvariant=\"normal\">C</mi><msub><mrow><mi mathvariant=\"normal\">l</mi></mrow><mrow><mn>3</mn></mrow></msub></math>"}], "ans": "<math><mi mathvariant=\"normal\">P</mi><mi mathvariant=\"normal\">C</mi><msub><mrow><mi mathvariant=\"normal\">l</mi></mrow><mrow><mn>3</mn></mrow></msub></math>", "correct": "777dN"}, {"id": "695e3b3f3dc984756e9de6b5", "type": "singleCorrect", "html": "In which of the following compounds, the nitrogen atom exhibits negative oxidation state?", "sol": "Sodium azide is <math><mi mathvariant=\"normal\">N</mi><mi mathvariant=\"normal\">a</mi><msub><mrow><mi mathvariant=\"normal\">N</mi></mrow><mrow><mn>3</mn></mrow></msub></math>. In azide <math><mo>(</mo><msubsup><mrow><mi mathvariant=\"normal\">N</mi></mrow><mrow><mn>3</mn></mrow><mrow><mo>-</mo></mrow></msubsup><mo>)</mo></math> ion the average oxidation number of N is -1/3.<br/>In NO the oxidation number of Nitrogen is +2.<br/>In sodium nitrate <math><mo>(</mo><mi mathvariant=\"normal\">N</mi><mi mathvariant=\"normal\">a</mi><mi mathvariant=\"normal\">N</mi><msub><mrow><mi mathvariant=\"normal\">O</mi></mrow><mrow><mn>3</mn></mrow></msub><mo>)</mo></math> the oxidation number of nitrogen is +5.<br/>In sodium nitrite <math><mo>(</mo><mi mathvariant=\"normal\">N</mi><mi mathvariant=\"normal\">a</mi><mi mathvariant=\"normal\">N</mi><msub><mrow><mi mathvariant=\"normal\">O</mi></mrow><mrow><mn>2</mn></mrow></msub><mo>)</mo></math> the oxidation number of nitrogen is +3.", "opts": [{"id": "c625u", "text": "Sodium nitrate"}, {"id": "tx3NI", "text": "NO"}, {"id": "APuGA", "text": "Sodium azide"}, {"id": "sAnXb", "text": "Sodium nitrite"}], "ans": "Sodium azide", "correct": "APuGA"}, {"id": "695e3b3f3dc984756e9de6b6", "type": "singleCorrect", "html": "The number of <math><mi mathvariant=\"normal\">S</mi><mo>-</mo><mi mathvariant=\"normal\">S</mi></math> bonds in sulphur trioxide trimer <math><mfenced separators=\"|\"><mrow><msub><mrow><mi mathvariant=\"normal\">S</mi></mrow><mrow><mn>3</mn></mrow></msub><msub><mrow><mi mathvariant=\"normal\">O</mi></mrow><mrow><mn>9</mn></mrow></msub></mrow></mfenced></math> is", "sol": "<br/><img alt=\"\" src=\"https://cdn.quizrr.in/question-assets/bitsat/2025/chapter-test/image10-0481495b-ec40-4194-a7f1-97a00b875f6d.jpg\"/><br/>The cyclic trimer of <math><msub><mrow><mi mathvariant=\"normal\">S</mi><mi mathvariant=\"normal\">O</mi></mrow><mrow><mn>3</mn></mrow></msub></math> is <math><msub><mrow><mi mathvariant=\"normal\">S</mi></mrow><mrow><mn>3</mn></mrow></msub><msub><mrow><mi mathvariant=\"normal\">O</mi></mrow><mrow><mn>9</mn></mrow></msub></math>", "opts": [{"id": "qvM2A", "text": "<math> <mn>3</mn></math>"}, {"id": "u4QdN", "text": "<math> <mn>2</mn></math>"}, {"id": "sSvJV", "text": "<math> <mn>1</mn></math>"}, {"id": "W6dKB", "text": "<math> <mn>0</mn></math>"}], "ans": "<math> <mn>0</mn></math>", "correct": "W6dKB"}, {"id": "695e3b3f3dc984756e9de6b7", "type": "singleCorrect", "html": "Which of the following statement is wrong?", "sol": "<math> <mrow> <msubsup> <mrow></mrow> <mrow> <mn>16</mn></mrow> <mrow> <mn>35</mn></mrow> </msubsup> <mtext>S</mtext><mo>+</mo><msubsup> <mrow> <mtext>SO</mtext></mrow> <mn>3</mn> <mrow> <mn>2</mn><mo>\u2212</mo></mrow> </msubsup> <mo>\u2192</mo><msup> <mrow> <msubsup> <mo stretchy=\"false\">[</mo> <mrow> <mn>16</mn></mrow> <mrow> <mn>35</mn></mrow> </msubsup> <msub> <mrow> <mtext>SSO</mtext></mrow> <mn>3</mn> </msub> <mo stretchy=\"false\">]</mo></mrow> <mrow> <mn>2</mn><mo>\u2212</mo></mrow> </msup> <mover> <mrow> <mo>\u2192</mo><mtext>\u2009</mtext></mrow> <mrow> <mn>2</mn><msup> <mtext>H</mtext> <mo>+</mo> </msup> </mrow> </mover> <msubsup> <mtext>\u2009</mtext> <mrow> <mn>16</mn></mrow> <mrow> <mn>34</mn></mrow> </msubsup> <mtext>S</mtext><mo>+</mo><msub> <mtext>H</mtext> <mn>2</mn> </msub> <mtext>O</mtext><mo>+</mo><msub> <mrow> <mtext>SO</mtext></mrow> <mn>2</mn> </msub> </mrow> </math><br/><img alt=\"\" src=\"https://cdn-question-pool.getmarks.app/NEET/DPP-Chemistry/asdfasdfa.png\" style=\"width: 120px; height: 119px;\"/><br/>The tagging technique confirms that two S atoms in <math><msub><mrow><mi mathvariant=\"normal\">S</mi></mrow><mrow><mn>2</mn></mrow></msub><msubsup><mrow><mi mathvariant=\"normal\">O</mi></mrow><mrow><mn>3</mn></mrow><mrow><mn>2</mn><mo>-</mo></mrow></msubsup></math> ions do not occupy equivalent positions.<br/>Also, <math><mi mathvariant=\"normal\">w</mi><mi mathvariant=\"normal\">a</mi><mi mathvariant=\"normal\">t</mi><mi mathvariant=\"normal\">e</mi><mi mathvariant=\"normal\">r</mi><mover accent=\"false\"><mo>\u2192</mo><mrow><mi mathvariant=\"normal\">s</mi><mi mathvariant=\"normal\">o</mi><mi mathvariant=\"normal\">l</mi><mi mathvariant=\"normal\">i</mi><mi mathvariant=\"normal\">d</mi><mi mathvariant=\"normal\">i</mi><mi mathvariant=\"normal\">f</mi><mi mathvariant=\"normal\">i</mi><mi mathvariant=\"normal\">c</mi><mi mathvariant=\"normal\">a</mi><mi mathvariant=\"normal\">t</mi><mi mathvariant=\"normal\">i</mi><mi mathvariant=\"normal\">o</mi><mi mathvariant=\"normal\">n</mi></mrow></mover><mi mathvariant=\"normal\">i</mi><mi mathvariant=\"normal\">c</mi><mi mathvariant=\"normal\">e</mi></math><br/><math> <mrow> <mtext>ice</mtext><munder> <mo>\u2192</mo> <mrow> <mtext>sublimation</mtext></mrow> </munder> <mtext>vapour</mtext><munder> <mo>\u2192</mo> <mrow> <mtext>Hoarfrost</mtext></mrow> </munder> <mtext>snow</mtext></mrow> </math><br/><math><mi mathvariant=\"normal\">i</mi><mi mathvariant=\"normal\">c</mi><mi mathvariant=\"normal\">e</mi><mo>\u2192</mo><mi mathvariant=\"normal\">v</mi><mi mathvariant=\"normal\">a</mi><mi mathvariant=\"normal\">p</mi><mi mathv
