></mrow><mrow><mn>2</mn></mrow></msub><msub><mrow><mi>O</mi></mrow><mrow><mn>7</mn></mrow></msub></math>  solution green whereas  <math><mi>C</mi><msub><mrow><mi>O</mi></mrow><mrow><mn>2</mn></mrow></msub></math>  does not change the colour of the solution.", "opts": [{"id": "RKpS3", "text": "Limewater"}, {"id": "2YEQ0", "text": "Baryta water"}, {"id": "GQCIX", "text": "Acidified  <math><msub><mrow><mi>K</mi></mrow><mrow><mn>2</mn></mrow></msub><mi>C</mi><msub><mrow><mi>r</mi></mrow><mrow><mn>2</mn></mrow></msub><msub><mrow><mi>O</mi></mrow><mrow><mn>7</mn></mrow></msub></math>  solution"}, {"id": "M1l80", "text": "<math><msub><mrow><mi>H</mi></mrow><mrow><mn>2</mn></mrow></msub><mi>S</mi><msub><mrow><mi>O</mi></mrow><mrow><mn>4</mn></mrow></msub></math>  solution"}], "ans": "Acidified  <math><msub><mrow><mi>K</mi></mrow><mrow><mn>2</mn></mrow></msub><mi>C</mi><msub><mrow><mi>r</mi></mrow><mrow><mn>2</mn></mrow></msub><msub><mrow><mi>O</mi></mrow><mrow><mn>7</mn></mrow></msub></math>  solution", "correct": "GQCIX"}, {"id": "695e3b373dc984756e9de5b0", "type": "singleCorrect", "html": "The hottest region of Bunsen flame show in the figure below is <br/><img src=\"https://cdn-question-pool.getmarks.app/NEET/DPP-Chemistry/fc05b3c8-5b2f-4612-9cc2-e736102440d9.png\" style=\"width:1.37361in;height:1.56042in\"/>", "sol": "<img src=\"https://cdn-question-pool.getmarks.app/NEET/DPP-Chemistry/3785b021-d2fb-45a9-be4d-e8b72a96d089.png\" style=\"width:3.5in;height:1.61319in\"/>", "opts": [{"id": "hS023", "text": "region 4"}, {"id": "A4Oyq", "text": "region 1"}, {"id": "lWdbb", "text": "region 2"}, {"id": "BWD9m", "text": "region 3"}], "ans": "region 2", "correct": "lWdbb"}, {"id": "695e3b373dc984756e9de5b1", "type": "singleCorrect", "html": "Reaction of <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi>NaCl</mi></math> with conc. <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi mathvariant=\"normal\">H</mi><mn>2</mn></msub><msub><mi>SO</mi><mn>4</mn></msub></math> liberates a gas <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi mathvariant=\"normal\">X</mi></math> that turns moist blue litmus paper red. When gas <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi mathvariant=\"normal\">X</mi></math> is passed into a test tube containing egg shell powder suspended in water another gas, <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi mathvariant=\"normal\">Y</mi></math> is generated which when passed through lime water makes it milky. The gases <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi mathvariant=\"normal\">X</mi></math> and <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi mathvariant=\"normal\">Y</mi></math> respectively, are", "sol": "<p><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi>NaCl</mi></math>&nbsp;reacts with highly acidic&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi>conc</mi><mo>.</mo><mo>&#160;</mo><msub><mi mathvariant=\"normal\">H</mi><mn>2</mn></msub><msub><mi>SO</mi><mn>4</mn></msub></math>&nbsp;to form sodium sulphate along with the liberation of hydrogen chloride gas <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mo>(</mo><mi mathvariant=\"normal\">X</mi><mo>)</mo></math>.</p><p><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mn>2</mn><mi>NaCl</mi><mo>+</mo><mi>conc</mi><mo>.</mo><mo>&#160;</mo><msub><mi mathvariant=\"normal\">H</mi><mn>2</mn></msub><msub><mi>SO</mi><mn>4</mn></msub><mo>&#8594;</mo><msub><mi>Na</mi><mn>2</mn></msub><msub><mi>SO</mi><mn>4</mn></msub><mo>+</mo><munder><mrow><mn>2</mn><mi>HCl</mi></mrow><mfenced><mi mathvariant=\"normal\">X</mi></mfenced></munder></math></p><p>Egg shell powder contains calcium carbonate, which reacts with&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi>HCl</mi></math>&nbsp;to give calcium chloride, water and carbon dioxide&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfenced><mi mathvariant=\"normal\">Y</mi></mfenced></math>.</p><p><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi>CaCO</mi><mn>3</mn></msub><mo>+</mo><mi>HCl</mi><mo>&#8594;</mo><mi>CaCl</mi><mo>+</mo><munder><msub><mi>CO</mi><mn>2</mn></msub><mfenced><mi mathvariant=\"normal\">Y</mi></mfenced></munder><mo>+</mo><msub><mi mathvariant=\"normal\">H</mi><mn>2</mn></msub><mi mathvariant=\"normal\">O</mi></math></p><p>Carbon dioxide when passed through lime water turns it milky due to formation of white coloured water soluble calcium carbonate.</p><p><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi>Ca</mi><mo>(</mo><mi>OH</mi><msub><mo>)</mo><mn>2</mn></msub><mo>+</mo><msub><mi>CO</mi><mn>2</mn></msub><mo>&#8594;</mo><munder><msub><mi>CaCO</mi><mn>3</mn></msub><mi>white</mi></munder><mo>+</mo><msub><mi mathvariant=\"normal\">H</mi><mn>2</mn></msub><mi mathvariant=\"normal\">O</mi></math></p>", "opts": [{"id": "iBNcw", "text": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi>HCl</mi></math> and <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi>CO</mi><mn>2</mn></msub></math>"}, {"id": "m1321", "text": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi>Cl</mi><mn>2</mn></msub></math> and <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi>CO</mi><mn>2</mn></msub></math>"}, {"id": "74wLm", "text": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi>SO</mi><mn>2</mn></msub></math> and <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi>CO</mi><mn>2</mn></msub></math>"}, {"id": "DnrFg", "text": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi>SO</mi><mn>2</mn></msub></math> and <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi>HCl</mi></math>"}], "ans": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi>HCl</mi></math> and <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi>CO</mi><mn>2</mn></msub></math>", "correct": "iBNcw"}, {"id": "695e3b373dc984756e9de5b2", "type": "singleCorrect", "html": "A hydrated salt of a bivalent metal when heated strongly produces a mixture of gases which when bubbled through <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi>Ba</mi><msub><mfenced><mi>OH</mi></mfenced><mn>2</mn></msub></math> solution produces a white solid. This solid on treatment with dilute <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi>HCl</mi></math> dissolves a part of the solid leaving another part insoluble which is filtered. The filtrate on treatment with <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi>Br</mi><mn>2</mn></msub></math> water slowly precipitates another white solid, which is not soluble in <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi>HCl</mi></math>. The gas mixtures are -", "sol": "<p>Hydrated ferrous sulphate on heating forms anhydrous ferrous sulphate which on further heating oxidises to ferric oxide and liberates&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi>SO</mi><mn>2</mn></msub><mo>&#160;</mo><mi>and</mi><mo>&#160;</mo><msub><mi>SO</mi><mn>3</mn></msub></math>.</p><p><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi>FeSO</mi><mn>4</mn></msub><mo>.</mo><mn>7</mn><msub><mi mathvariant=\"normal\">H</mi><mn>2</mn></msub><mi mathvariant=\"normal\">O</mi><mover><mo>&#8594;</mo><mo>&#8710;</mo></mover><munder><msub><mi>FeSO</mi><mn>4</mn></msub><mi>anhydrous</mi></munder><mo>+</mo><mn>7</mn><msub><mi mathvariant=\"normal\">H</mi><mn>2</mn></msub><mi mathvariant=\"normal\">O</mi><mspace linebreak=\"newline\"></mspace><msub><mi>FeSO</mi><mn>4</mn></msub><mover><mo>&#8594;</mo><mo>&#8710;</mo></mover><msub><mi>Fe</mi><mn>2</mn></msub><msub><mi mathvariant=\"normal\">O</mi><mn>3</mn></msub><mo>+</mo><msub><mi>SO</mi><mn>2</mn></msub><mo>+</mo><msub><mi>SO</mi><mn>3</mn></msub></math></p><p>These gases react with&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi>Ba</mi><msub><mfenced><mi>OH</mi></mfenced><mn>2</mn></msub></math>&nbsp;to give white coloured&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi>BaSO</mi><mn>4</mn></msub></math>, which reacts with dilute&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi>HCl</mi></math>&nbsp;to give insoluble&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi>BaCl</mi><mn>2</mn></msub></math>. This when&nbsp;treated with bromine water forms white precipitate of&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi>BaBr</mi><mn>2</mn></msub></math>.</p><p><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi>Ba</mi><mo>(</mo><mi>OH</mi><msub><mo>)</mo><mn>2</mn></msub><mo>+</mo><msub><mi>SO</mi><mn>3</mn></msub><mo>&#8594;</mo><munder><msub><mi>BaSO</mi><mn>4</mn></msub><mi>white</mi></munder><mover><mo>&#8594;</mo><mrow><mi>dil</mi><mo>.</mo><mo>&#160;</mo><mi>HCl</mi></mrow></mover><msub><mi>BaCl</mi><mn>2</mn></msub><mover><mo>&#8594;</mo><msub><mi>Br</mi><mn>2</mn></msub></mover><munder><msub><mi>BaBr</mi><mn>2</mn></msub><mi>white</mi></munder></math></p>", "opts": [{"id": "ucmCf", "text": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi>CO</mi><mn>2</mn></msub></math> and <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi>CO</mi></math>"}, {"id": "vJZQm", "text": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi>SO</mi><mn>3</mn></msub></math> and <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi>SO</mi><mn>2</mn></msub></math>"}, {"id": "tOYFU", "text": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi>SO</mi><mn>3</mn></msub></math> and <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi>CO</mi><mn>2</mn></msub></math>"}, {"id": "ORyWh", "text": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi>SO</mi><mn>2</mn></msub></math> and <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi>CO</mi></math>"}], "ans": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi>SO</mi><mn>3</mn></msub></math> and <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi>SO</mi><mn>2</mn></msub></math>", "correct": "vJZQm"}, {"id": "695e ath> .", "opts": [{"id": "yTBa0", "text": "<math><mi>C</mi><mi>u</mi><mi>C</mi><msub><mrow><mi>l</mi></mrow><mrow><mn>2</mn></mrow></msub></math>"}, {"id": "9xkba", "text": "<math><mi>B</mi><mi>a</mi><mi>C</mi><msub><mrow><mi>l</mi></mrow><mrow><mn>2</mn></mrow></msub></math>"}, {"id": "3m9tR", "text": "<math><mi>P</mi><mi>b</mi><mi>C</mi><msub><mrow><mi>l</mi></mrow><mrow><mn>2</mn></mrow></msub></math>"}, {"id": "9Azai", "text": "<math><mi>C</mi><mi>u</mi><mo>(</mo><mi>N</mi><msub><mrow><mi>O</mi></mrow><mrow><mn>3</mn></mrow></msub><msub><mrow><mo>)</mo></mrow><mrow><mn>2</mn></mrow></msub></math>"}], "ans": "<math><mi>B</mi><mi>a</mi><mi>C</mi><msub><mrow><mi>l</mi></mrow><mrow><mn>2</mn></mrow></msub></math>", "correct": "9xkba"}, {"id": "695e3b383dc984756e9de5c2", "type": "singleCorrect", "html": "A doctor by mistake administers a Ba(NO<sub>3</sub>)<sub>2</sub> solution to a patient for radiography investigations. Which of the following should be given as the best to prevent the absorption of soluble barium ?", "sol": "<math><mrow> <mtext>Ba</mtext> <msub> <mrow> <mfenced close=\")\" open=\"(\" separators=\",\"> <mrow> <msub> <mtext>NO</mtext> <mn>3</mn> </msub> </mrow> </mfenced> </mrow> <mn>2</mn> </msub> <mo>+</mo> <msub> <mtext>Na</mtext> <mn>2</mn> </msub> <msub> <mtext>SO</mtext> <mn>4</mn> </msub> <mo>\u27f6</mo> <munder> <mrow> <msub> <mtext>BaSO</mtext> <mn>4</mn> </msub> <mo>\u2193</mo> </mrow> <mtext>white ppt.</mtext> </munder> <mo>+</mo> <mn>2</mn> <msub> <mtext>NaNO</mtext> <mn>3</mn> </msub></mrow></math>", "opts": [{"id": "qDIKs", "text": "NaCl"}, {"id": "jbUo8", "text": "Na<sub>2</sub>SO<sub>4</sub>"}, {"id": "IOrvu", "text": "KCl"}, {"id": "LQw7q", "text": "NH<sub>4</sub>Cl"}], "ans": "Na<sub>2</sub>SO<sub>4</sub>", "correct": "jbUo8"}, {"id": "695e3b383dc984756e9de5c3", "type": "singleCorrect", "html": "A mixture of two salts is not soluble in water, but soluble in dilute <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi>HCl</mi></math> solution. What can the mixture&nbsp;be?", "sol": "<p>Transition metal salts are not soluble in water due to their high covalent character, but some of them are soluble in dilute&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi>HCl</mi></math>.</p><p>Anions like sulphide, borate, phosphate, oxalate and carbonate of various cationic combinations are insoluble in water.</p><p>Salts of silver<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfenced><mi mathvariant=\"normal\">I</mi></mfenced></math>, copper<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfenced><mi mathvariant=\"normal\">I</mi></mfenced></math>, mercury<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfenced><mi>II</mi></mfenced></math> and lead<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfenced><mi>III</mi></mfenced></math>&nbsp;with most anions are insoluble in water.</p><p>Among the given combinations,&nbsp;silver nitrate and potassium bromide do not dissolve in dilute <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi>HCl</mi></math>.<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mtable columnalign=\"left\"><mtr><mtd><msub><mi>AgNO</mi><mn>3</mn></msub><mo>+</mo><mi>dilute</mi><mo>&#160;</mo><mi>HCl</mi><mo>&#8594;</mo><munder><mrow><mi>AgCl</mi><mo>&#8595;</mo></mrow><mrow><mo>(</mo><mi>white</mi><mo>&#160;</mo><mi>precipitate</mi><mo>)</mo></mrow></munder><mo>+</mo><msub><mi>HNO</mi><mn>3</mn></msub></mtd></mtr><mtr><mtd><mi>KBr</mi><mo>+</mo><mi>dilute</mi><mo>&#160;</mo><mi>HCl</mi><mo>&#8594;</mo><mi>KCl</mi><mo>&#160;</mo><mo>(</mo><mi>aqueous</mi><mo>)</mo><mo>+</mo><mi>HBr</mi></mtd></mtr></mtable></math></p><p>Similarly,&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi>FeCl</mi><mn>3</mn></msub></math>&nbsp;and&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi>CaCO</mi><mn>3</mn></msub></math>,&nbsp;both form precipitates which are not soluble in dilute&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi>HCl</mi></math>.</p><p>Salt of&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi>Mn</mi><mo>(</mo><msub><mi>NO</mi><mn>3</mn></msub><msub><mo>)</mo><mn>2</mn></msub></math>&nbsp;with&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi>MgSO</mi><mn>4</mn></msub></math>&nbsp;is also not soluble in dilute&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi>HCl</mi></math>&nbsp;because&nbsp;one is ionic and the other is covalent.</p><p>But a combination of&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi>BaCO</mi><mn>3</mn></msub></math>&nbsp;and&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi>ZnS</mi></math>&nbsp;forms&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi>BaCl</mi><mn>2</mn></msub></math>&nbsp;and&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi>ZnCl</mi><mn>2</mn></msub></math>&nbsp;in which both are covalent and form colourless solutions in dilute&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi>HCl</mi></math>.</p><p><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi>BaCO</mi><mn>3</mn></msub><mo>+</mo><mn>2</mn><mi>HCl</mi><mo>&#8594;</mo><msub><mi>BaCl</mi><mn>2</mn></msub><mo>+</mo><msub><mi mathvariant=\"normal\">H</mi><mn>2</mn></msub><msub><mi>CO</mi><mn>3</mn></msub><mspace linebreak=\"newline\"></mspace><mi>ZnS</mi><mo>+</mo><mn>2</mn><mi>HCl</mi><mo>&#8594;</mo><msub><mi>ZnCl</mi><mn>2</mn></msub><mo>+</mo><msub><mi mathvariant=\"normal\">H</mi><mn>2</mn></msub><mi mathvariant=\"normal\">S</mi></math></p>", "opts": [{"id": "i8W50", "text": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi>AgNO</mi><mn>3</mn></msub></math> and <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi>KBr</mi></math>"}, {"id": "Ez0jU", "text": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi>BaCO</mi><mn>3</mn></msub></math> and <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi>ZnS</mi></math>"}, {"id": "t4kyG", "text": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi>FeCl</mi><mn>3</mn></msub></math> and <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi>CaCO</mi><mn>3</mn></msub></math>"}, {"id": "FFPId", "text": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi>Mn</mi><msub><mfenced><msub><mi>NO</mi><mn>3</mn></msub></mfenced><mn>2</mn></msub></math> and <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi>MgSO</mi><mn>4</mn></msub></math>"}], "ans": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi>BaCO</mi><mn>3</mn></msub></math> and <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi>ZnS</mi></math>", "correct": "Ez0jU"}, {"id": "695e3b383dc984756e9de5c4", "type": "singleCorrect", "html": "A fire work gave brick red colour. It probably contained a salt of", "sol": "Ca metal give brick red colour in flame test.", "opts": [{"id": "Pn1Li", "text": "Ca"}, {"id": "IkV6x", "text": "K"}, {"id": "PcSL1", "text": "Ba"}, {"id": "2kObq", "text": "Mg"}], "ans": "Ca", "correct": "Pn1Li"}, {"id": "695e3b383dc984756e9de5c5", "type": "singleCorrect", "html": "A solution of a metal ion when treated with KI gives a red precipitate which dissolves in excess KI to give a colourless solution. Moreover, the solution of metal ion on treatment with a solution of cobalt (II) thiocyanate gives rise to a deep blue crystalline precipitate. The metal ion is", "sol": "Here metal ion is <math><mi mathvariant=\"normal\">H</mi><msup><mrow><mi mathvariant=\"normal\">g</mi></mrow><mrow><mn>2</mn><mo>+</mo></mrow></msup></math> and the reactions are as follows<br/><math><mi mathvariant=\"normal\">H</mi><msup><mrow><mi mathvariant=\"normal\">g</mi></mrow><mrow><mn>2</mn><mo>+</mo></mrow></msup><mo>+</mo><mi mathvariant=\"normal\">K</mi><mi mathvariant=\"normal\">I</mi><mo>\u2192</mo><munder><mrow><mi mathvariant=\"normal\">H</mi><mi mathvariant=\"normal\">g</mi><msub><mrow><mi mathvariant=\"normal\">I</mi></mrow><mrow><mn>2</mn></mrow></msub></mrow><mrow><mi mathvariant=\"normal\">R</mi><mi mathvariant=\"normal\">e</mi><mi mathvariant=\"normal\">d</mi><mi mathvariant=\"normal\">p</mi><mi mathvariant=\"normal\">p</mi><mi mathvariant=\"normal\">t</mi><mo>.</mo></mrow></munder></math><br/><math> <mrow> <msub> <mrow> <mtext>HgI</mtext></mrow> <mn>2</mn> </msub> <mo>+</mo><mtext>KI</mtext><mfenced> <mrow> <mtext>excess</mtext></mrow> </mfenced><mo>\u2192</mo><munder> <mrow> <msub> <mtext>K</mtext> <mn>2</mn> </msub> <msub> <mrow> <mtext>HgI</mtext></mrow> <mn>4</mn> </msub> </mrow> <mrow> <mtext>Soluble</mtext></mrow> </munder> </mrow> </math><br/><math> <mrow> <msup> <mrow> <mtext>HgI</mtext></mrow> <mrow> <mn>2</mn><mo>+</mo></mrow> </msup> <mo>+</mo><mtext>Co</mtext><msub> <mrow> <mo stretchy=\"false\">(</mo><mtext>SCN</mtext><mo stretchy=\"false\">)</mo></mrow> <mn>2</mn> </msub> <mo>\u2192</mo><munder> <mrow> <mtext>Hg</mtext><msub> <mrow> <mo stretchy=\"false\">(</mo><mtext>SCN</mtext><mo stretchy=\"false\">)</mo></mrow> <mn>2</mn> </msub> </mrow> <mrow> <mtext>Blue crystalline precipitate</mtext></mrow> </munder> </mrow> </math>", "opts": [{"id": "ptCQJ", "text": "<math><mi mathvariant=\"normal\">P</mi><msup><mrow><mi mathvariant=\"normal\">b</mi></mrow><mrow><mn>2</mn><mo>+</mo></mrow></msup></math>"}, {"id": "dX2ap", "text": "<math><mi mathvariant=\"normal\">H</mi><msup><mrow><mi mathvariant=\"normal\">g</mi></mrow><mrow><mn>2</mn><mo>+</mo></mrow></msup></math>"}, {"id": "m7buW", "text": "<math><mi mathvariant=\"normal\">C</mi><msup><mrow><mi mathvariant=\"normal\">u</mi></mrow><mrow><mn>2</mn><mo>+</mo></mrow></msup></math>"}, {"id": "0yO43", "text": "<math><mi mathvariant=\"normal\">C</mi><msup><mrow><mi mathvariant=\"normal\">o</mi></mrow><mrow><mn>2</mn><mo>+</mo></mrow></msup></math>"}], "ans": "<math><mi mathvariant=\"normal\">H</mi><msup><mrow><mi mathvariant=\"normal\">g</mi></mrow><mrow><mn>2</mn><mo>+</mo></mrow></msup></math>", "correct": "dX2ap"}, {"id": "695e3b383dc984756e9de5c6", "type": "singleCorrect", "html": "Which one of the following anions is not easily removed from aqueous solutions by precipitation?", "sol": "<p>Chloride, carbonate or sulphate ions can be precipitated. Example: <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi>AgCl</mi><mo>,</mo><mo>&#160;</mo><msub><mi>BaCO</mi><mn>3</mn></msub><mo>,</mo><mo>&#160;</mo><msub><mi>BaSO</mi><mn>4</mn></msub><mo>&#160;</mo><mi>etc</mi><mo>.</mo><mo>,</mo></math></p><p>Most of the nitrates are soluble in water and cannot be easily precipitated.</p>", "opts": [{"id": "s0vdi", "text": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msup><mi>Cl</mi><mo>-</mo></msup></math>"}, {"id": "NualW", "text": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msubsup><mi>NO</mi><mn>3</mn><mo>-</mo></msubsup></math>"}, {"id": "lXwa8", "text": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msubsup><mi>CO</mi><mn>3</mn><mrow><mn>2</mn><mo>-</mo></mrow></msubsup></math>"}, {"id": "YPSs1", "text": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msubsup><mi>SO</mi><mn>4</mn><mrow><mn>2</mn><mo>-</mo></mrow></msubsup></math>"}], "ans": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msubsup><mi>NO</mi><mn>3</mn><mo>-</mo></msubsup></math>", "correct": "NualW"}, {"id": "695e3b383dc984756e9de5c7", "type": "singleCorrect", "html": "Which of the following salts is used in the bead test for basic character?", "sol": "Microcosmic salt, <math> <mrow> <msub> <mrow> <mtext>Na(NH</mtext></mrow> <mtext>4</mtext> </msub> <msub> <mrow> <mtext>)HPO</mtext></mrow> <mtext>4</mtext> </msub> <mo>\u22c5</mo><msub> <mrow> <mtext>4H</mtext></mrow> <mtext>2</mtext> </msub> <mtext>O,</mtext></mrow> </math> on heating produces a transparent bead of sodium metaphosphate <math><mo>(</mo><mi mathvariant=\"normal\">N</mi><mi mathvariant=\"normal\">a</mi><mi mathvariant=\"normal\">P</mi><msub><mrow><mi mathvariant=\"normal\">O</mi></mrow><mrow><mn>3</mn></mrow></msub><mo>)</mo></math> .<br/><math> <mrow> <msub> <mrow> <mtext>Na(NH</mtext></mrow> <mtext>4</mtext> </msub> <msub> <mrow> <mtext>)HPO</mtext></mrow> <mtext>4</mtext> </msub> <mo>\u22c5</mo><msub> <mrow> <mtext>4H</mtext></mrow> <mtext>2</mtext> </msub> <mtext>O</mtext><mover> <mo>\u2192</mo> <mtext>\u0394</mtext> </mover> <msub> <mrow> <mtext>NH</mtext></mrow> <mtext>3</mtext> </msub> <mtext>\u2004</mtext><mtext>+</mtext><mtext>\u2004</mtext><msub> <mrow> <mtext>5H</mtext></mrow> <mtext>2</mtext> </msub> <mtext>O</mtext><mtext>\u2004</mtext><mtext>+</mtext><mtext>\u2004</mtext><msub> <mrow> <mtext>NaPO</mtext></mrow> <mtext>3</mtext> </msub> </mrow></math><br/><math><mi mathvariant=\"normal\">N</mi><mi mathvariant=\"normal\">a</mi><mi mathvariant=\"normal\">P</mi><msub><mrow><mi mathvariant=\"normal\">O</mi></mrow><mrow><mn>3</mn></mrow></msub></math> combines with certain metallic oxides to form coloured beads of the corrosponding orthophosphates, e.g.,<br/><math><mi mathvariant=\"normal\">N</mi><mi mathvariant=\"normal\">a</mi><mi mathvariant=\"normal\">P</mi><msub><mrow><mi mathvariant=\"normal\">O</mi></mrow><mrow><mn>3</mn></mrow></msub><mo>+</mo><mi mathvariant=\"normal\">C</mi><mi mathvariant=\"normal\">u</mi><mi mathvariant=\"normal\">O</mi><mo>\u2192</mo><munder><mrow><mi mathvariant=\"normal\">C</mi><mi mathvariant=\"normal\">u</mi><mi mathvariant=\"normal\">N</mi><mi mathvariant=\"normal\">a</mi><mi mathvariant=\"normal\">P</mi><msub><mrow><mi mathvariant=\"normal\">O</mi></mrow><mrow><mn>4</mn></mrow></msub></mrow><mrow><mo>(</mo><mi mathvariant=\"normal\">B</mi><mi mathvariant=\"normal\">l</mi><mi mathvariant=\"normal\">u</mi><mi mathvariant=\"normal\">e</mi><mo>)</mo></mrow></munder></math>", "opts": [{"id": "FNeQ1", "text": "<math><mi mathvariant=\"normal\">N</mi><mi mathvariant=\"normal\">a</mi><mo>(</mo><mi mathvariant=\"normal\">N</mi><msub><mrow><mi mathvariant=\"normal\">H</mi></mrow><mrow><mn>4</mn></mrow></msub><mo>)</mo><mi mathvariant=\"normal\">H</mi><mi mathvariant=\"normal\">P</mi><msub><mrow><mi mathvariant=\"norm math><mo>+</mo><mtext>I</mtext><mi>\u00a0</mi></math>effect and\u00a0<math><mo>-</mo><mi mathvariant=\"normal\">N</mi><msub><mrow><mi mathvariant=\"normal\">O</mi></mrow><mrow><mn>2</mn></mrow></msub><mi>\u00a0</mi></math>group has\u00a0<math><mo>-</mo><mtext>I</mtext><mi>\u00a0</mi></math>effect<math><mo>.</mo></math> Therefore, in p-nitro toluene the dipole moments of <math><mo>\u2013</mo><mi mathvariant=\"normal\">C</mi><msub><mrow><mi mathvariant=\"normal\">H</mi></mrow><mrow><mn>3</mn></mrow></msub><mi>\u00a0</mi></math>and\u00a0<math><mo>-</mo><mi mathvariant=\"normal\">N</mi><msub><mrow><mi mathvariant=\"normal\">O</mi></mrow><mrow><mn>2</mn></mrow></msub></math> groups act in the same direction. So, the resultant dipole moment is additive.<br/>i.e., 3.93 + 0.43 = 4.36 debye<br/><strong><img alt=\"\" src=\"https://cdn-question-pool.getmarks.app/NEET/DPP-Chemistry/afndsajfsda.png\" style=\"width: 492px; height: 262px;\"/></strong>", "opts": [{"id": "AV031", "text": "3.50 D"}, {"id": "Vjd1u", "text": "2.18 D"}, {"id": "uZeCl", "text": "4.36 D"}, {"id": "9mCem", "text": "5.30 D"}], "ans": "4.36 D", "correct": "uZeCl"}, {"id": "695e3b383dc984756e9de5d0", "type": "singleCorrect", "html": "The number of possible dative bonds in the phosphoric acid molecule is", "sol": "<p>Structure of&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi mathvariant=\"normal\">H</mi><mn>3</mn></msub><msub><mi>PO</mi><mn>4</mn></msub></math>&nbsp;(phosphoric acid) is shown below:&nbsp;</p><p>&nbsp;&nbsp;<img src=\"https://cdn-question-pool.getmarks.app/NEET/DPP-Chemistry/ea982c95-ef02-4e87-a0e9-22ed9fd92588-image.png\" style=\"width: 134px; height: 112px;\" />&nbsp;</p><p>Dative bond is another name for coordinate bond, which is&nbsp;just like covalent bond, but with the difference that the shared pair of electrons are provided by a single atom only.</p><p>Here,&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi mathvariant=\"normal\">H</mi><mn>3</mn></msub><msub><mi>PO</mi><mn>4</mn></msub></math>&nbsp;has no dative bond - all bonds are covalent. <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi mathvariant=\"normal\">P</mi></math>&nbsp;has expanded its octet.</p>", "opts": [{"id": "IQ9e7", "text": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mn>1</mn><mo>.</mo></math>"}, {"id": "G3bb8", "text": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mn>0</mn><mo>.</mo></math>"}, {"id": "2Url6", "text": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mn>2</mn><mo>.</mo></math>"}, {"id": "hY3Hd", "text": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mn>4</mn><mo>.</mo></math>"}], "ans": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mn>0</mn><mo>.</mo></math>", "correct": "G3bb8"}, {"id": "695e3b383dc984756e9de5d1", "type": "singleCorrect", "html": "Arrange the following in the correct order of Lewis acidity: BF<sub>3</sub>, BCl<sub>3</sub>, BBr<sub>3</sub>.", "sol": "In BF<sub>3</sub>, BCl<sub>3</sub> and BBr<sub>3</sub> each will shown <math> <mrow> <msub> <mtext>p</mtext> <mi>\u03c0</mi> </msub> <mo>-</mo> <msub> <mtext>p</mtext> <mi>\u03c0</mi> </msub> </mrow> </math> back bonding as follows.<br/><img alt=\"\" src=\"https://cdn-question-pool.getmarks.app/NEET/DPP-Chemistry/EM0030787Prev.jpg\" style=\"width: 387px; height: 224px;\"/><br/>Extant of overlapping\u00a0 as the <math> <mrow> <mn>2</mn><mtext>p</mtext><mo>\u2212</mo><mn>2</mn><mtext>p</mtext><mo>&gt;</mo><mn>2</mn><mtext>p</mtext><mo>\u2212</mo><mn>3</mn><mtext>p</mtext><mo>&gt;</mo><mn>2</mn><mtext>p</mtext><mo>\u2212</mo><mn>4</mn><mtext>p</mtext></mrow>\u00a0 \u00a0</math> difference between the size of p orbital increases the\u00a0extent of overlapping decreases\u00a0the availability of vacant orbital increases and the acidic character increases.\u00a0<br/>Hence correct order of Lewis acidity represented by option (BF<sub>3</sub> &lt; BCl<sub>3</sub> &lt; BBr<sub>3</sub>) .", "opts": [{"id": "COYR3", "text": "BF<sub>3</sub> &gt; BBr<sub>3</sub> &gt; BCl<sub>3</sub>"}, {"id": "0J0Oq", "text": "BF<sub>3</sub> &gt; BCl<sub>3</sub> &gt; BBr<sub>3</sub>"}, {"id": "EPEPL", "text": "BF<sub>3</sub> &lt; BCl<sub>3</sub> &lt; BBr<sub>3</sub>"}, {"id": "jkved", "text": "BBr<sub>3</sub> &lt; BF<sub>3</sub> &lt; BCl<sub>3</sub>"}], "ans": "BF<sub>3</sub> &lt; BCl<sub>3</sub> &lt; BBr<sub>3</sub>", "correct": "EPEPL"}, {"id": "695e3b383dc984756e9de5d2", "type": "singleCorrect", "html": "Which of the following two are isostructural?", "sol": "In <math><mtext>X</mtext><mtext>e</mtext><msub><mrow><mtext>F</mtext></mrow><mrow><mn>2</mn></mrow></msub><mtext>\u00a0</mtext><mtext>a</mtext><mtext>n</mtext><mtext>d</mtext><mtext>\u00a0</mtext><mtext>I</mtext><msubsup><mrow><mtext>F</mtext></mrow><mrow><mn>2</mn></mrow><mrow><mo>-</mo></mrow></msubsup><mo>.</mo></math> Both <math><mtext>X</mtext><mtext>e</mtext><msub><mrow><mtext>F</mtext></mrow><mrow><mn>2</mn></mrow></msub><mtext>\u00a0</mtext><mtext>a</mtext><mtext>n</mtext><mtext>d</mtext><mtext>\u00a0</mtext><mtext>I</mtext><msubsup><mrow><mtext>F</mtext></mrow><mrow><mn>2</mn></mrow><mrow><mo>-</mo></mrow></msubsup></math> are <math><mtext>s</mtext><msup><mrow><mtext>p</mtext></mrow><mrow><mn>3</mn></mrow></msup><mtext>d</mtext></math> hybridized and have planar shape.", "opts": [{"id": "e8lZR", "text": "<math><mtext>N</mtext><msub><mrow><mtext>H</mtext></mrow><mrow><mn>3</mn></mrow></msub><mo>,</mo><mtext>\u00a0</mtext><mtext>B</mtext><msub><mrow><mtext>F</mtext></mrow><mrow><mn>3</mn></mrow></msub></math>"}, {"id": "9dJ7v", "text": "<math><mtext>P</mtext><mtext>C</mtext><msub><mrow><mtext>l</mtext></mrow><mrow><mn>5</mn></mrow></msub><mtext>\u00a0</mtext><mo>,</mo><mtext>\u00a0</mtext><mtext>l</mtext><mtext>C</mtext><msub><mrow><mtext>l</mtext></mrow><mrow><mn>5</mn></mrow></msub></math>"}, {"id": "b6py4", "text": "<math><mtext>X</mtext><mtext>e</mtext><msub><mrow><mtext>F</mtext></mrow><mrow><mn>2</mn></mrow></msub><mo>,</mo><mtext>\u00a0</mtext><mtext>I</mtext><msubsup><mrow><mtext>F</mtext></mrow><mrow><mn>2</mn></mrow><mrow><mo>-</mo></mrow></msubsup></math>"}, {"id": "LlkH6", "text": "<math><mtext>C</mtext><msubsup><mrow><mtext>O</mtext></mrow><mrow><mn>3</mn></mrow><mrow><mo>-</mo><mn>2</mn></mrow></msubsup><mo>,</mo><mtext>\u00a0</mtext><mtext>S</mtext><msubsup><mrow><mtext>O</mtext></mrow><mrow><mn>3</mn></mrow><mrow><mo>-</mo><mn>2</mn></mrow></msubsup></math>"}], "ans": "<math><mtext>X</mtext><mtext>e</mtext><msub><mrow><mtext>F</mtext></mrow><mrow><mn>2</mn></mrow></msub><mo>,</mo><mtext>\u00a0</mtext><mtext>I</mtext><msubsup><mrow><mtext>F</mtext></mrow><mrow><mn>2</mn></mrow><mrow><mo>-</mo></mrow></msubsup></math>", "correct": "b6py4"}, {"id": "695e3b383dc984756e9de5d3", "type": "singleCorrect", "html": "The paramagnetic species is-", "sol": "The species containing unpaired electron will show paramagnetic nature. Among the given options, all the metal ions have only paired electrons, so whether the compound is magnetic or not depends on the anion in each case. In case of silicon dioxide and titanium oxide, O<sup>2-</sup>\u00a0is present which doesn't have unpaired electrons. In case of Barium peroxide, the peroxide ion (O<sub>2</sub><sup>2-</sup>) also has only paired electrons and hence the compound is diamagnetic.<br/>In case of potassium superoxide, O<sub>2</sub><sup>-</sup>\u00a0ion has unpaired electron and this will give the compound paramagnetic nature.", "opts": [{"id": "WS7vk", "text": "<math><msub><mrow><mi mathvariant=\"normal\">S</mi><mi mathvariant=\"normal\">i</mi><mi mathvariant=\"normal\">O</mi></mrow><mrow><mn>2</mn></mrow></msub></math>"}, {"id": "1BsMW", "text": "<math><msub><mrow><mi mathvariant=\"normal\">T</mi><mi mathvariant=\"normal\">i</mi><mi mathvariant=\"normal\">O</mi></mrow><mrow><mn>2</mn></mrow></msub></math>"}, {"id": "FDoOW", "text": "<math><msub><mrow><mi mathvariant=\"normal\">B</mi><mi mathvariant=\"normal\">a</mi><mi mathvariant=\"normal\">O</mi></mrow><mrow><mn>2</mn></mrow></msub></math>"}, {"id": "KBCs3", "text": "<math><msub><mrow><mi mathvariant=\"normal\">K</mi><mi mathvariant=\"normal\">O</mi></mrow><mrow><mn>2</mn></mrow></msub></math>"}], "ans": "<math><msub><mrow><mi mathvariant=\"normal\">K</mi><mi mathvariant=\"normal\">O</mi></mrow><mrow><mn>2</mn></mrow></msub></math>", "correct": "KBCs3"}, {"id": "695e3b383dc984756e9de5d4", "type": "singleCorrect", "html": "The correct order in which the <math><mi mathvariant=\"normal\">O</mi><mo>-</mo><mi mathvariant=\"normal\">O</mi></math> bond length increases in the following is-", "sol": "The increasing order is<br/><img 100%\";=\"\" alt=\"\" object-fit:contain\"=\"\" src=\"https://cdn-question-pool.getmarks.app/NEET/DPP-Chemistry/EM0041878_1.jpg\" style=\"width: 468px; height: 144px;\"/><br/>Due to resonance in <math><msub><mrow><mi mathvariant=\"normal\">O</mi></mrow><mrow><mn>3</mn></mrow></msub></math>, the <math><mi mathvariant=\"normal\">O</mi><mo>-</mo><mi mathvariant=\"normal\">O</mi></math> bond length will be in between <math><mi mathvariant=\"normal\">O</mi><mo>=</mo><mi mathvariant=\"normal\">O</mi><mi mathvariant=\"normal\">\u00a0</mi></math>and <math><mi mathvariant=\"normal\">O</mi><mo>-</mo><mi mathvariant=\"normal\">O</mi></math>", "opts": [{"id": "34fiy", "text": "<math><msub><mrow><mi mathvariant=\"normal\">O</mi></mrow><mrow><mn>2</mn></mrow></msub><mo>&lt;</mo><msub><mrow><mi mathvariant=\"normal\">O</mi></mrow><mrow><mn>3</mn></mrow></msub><mo>&lt;</mo><msub><mrow><mi mathvariant=\"normal\">H</mi></mrow><mrow><mn>2</mn></mrow></msub><msub><mrow><mi mathvariant=\"normal\">O</mi></mrow><mrow><mn>2</mn></mrow></msub></math>"}, {"id": "yAf0Q", "text": "<math><msub><mrow><mi mathvariant=\"normal\">H</mi></mrow><mrow><mn>2</mn></mrow></msub><msub><mrow><mi mathvariant=\"normal\">O</mi></mrow><mrow><mn>2</mn></mrow></msub><mo>&lt;</mo><msub><mrow><mi mathvariant=\"normal\">O</mi></mrow><mrow><mn>3</mn></mrow></msub><mo>&lt;</mo><msub><mrow><mi mathvar t=\"normal\">p</mi></mrow><mrow><mn>3</mn></mrow></msup></math> hybridised/ pyramidal (non-planar)</br></br>", "opts": [{"id": "SfS82", "text": "12"}, {"id": "M8mdZ", "text": "0"}, {"id": "x2bpR", "text": "10"}, {"id": "TlK64", "text": "11"}], "ans": "10", "correct": "x2bpR"}, {"id": "695e3b383dc984756e9de5d8", "type": "singleCorrect", "html": "The correct sequence of increasing covalent character is represented by:", "sol": "According to Fajan's Rule,\n1. Smaller the size of cation, the larger the size of the anion, greater is the covalent character of the ionic bond.\n2. Greater the charge of cation, greater is the covalent character of the ionic bond.\n3. For cations with same charge and size, the one, with $(n-1) d^n n s^{\\circ}$ which is found in transition elements have greater covalent character than the cation with $n s^2 n p^6$ electronic configuration, which is commonly found in alkali or alkaline earth metals.\nThus, order of covalent character is:\n$$\n\\mathrm{NaCl} &lt; \\mathrm{LiCl} &lt; \\mathrm{BeCl}_2\n$$\nI Caution\nLarger the anion, less is the effective nuclear charge that holds the valence electron of the ion in place. Since the last electron is loosely bound in large anions, it can easily be polarised by a cation, thereby making the compound more covalent.", "opts": [{"id": "2Kygm", "text": "$\\mathrm{LiCl} &lt; \\mathrm{NaCl} &lt; \\mathrm{BeCl}_2$"}, {"id": "z4YoL", "text": "$\\mathrm{BeCl}_2 &lt; \\mathrm{LiCl} &lt; \\mathrm{NaCl}$"}, {"id": "QYq2w", "text": "$\\mathrm{NaCl} &lt; \\mathrm{LiCl} &lt; \\mathrm{BeCl}_2$"}, {"id": "AvaMS", "text": "$\\mathrm{BeCl}_2 &lt; \\mathrm{NaCl} &lt; \\mathrm{LiCl}$"}], "ans": "$\\mathrm{NaCl} &lt; \\mathrm{LiCl} &lt; \\mathrm{BeCl}_2$", "correct": "QYq2w"}, {"id": "695e3b383dc984756e9de5d9", "type": "singleCorrect", "html": "Among <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi>CaH</mi><mn>2</mn></msub><mo>,</mo><mi mathvariant=\"normal\">\u00a0</mi><msub><mi>BeH</mi><mn>2</mn></msub><mo>,</mo><mi mathvariant=\"normal\">\u00a0</mi><msub><mi>BaH</mi><mn>2</mn></msub><mo>,</mo></math>\u00a0what is the order of ionic character?", "sol": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi>BeH</mi><mn>2</mn></msub><mo>&lt;</mo><msub><mi>CaH</mi><mn>2</mn></msub><mo>&lt;</mo><msub><mi>BaH</mi><mn>2</mn></msub></math><br/><br/>The size of the elements follow the order: <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi>Be</mi><mo>&lt;</mo><mi>Ca</mi><mo>&lt;</mo><mi>Ba</mi></math><br/><br/>Smaller the size of cation, more will be its polarizing power. Thus, a higher polarization will lead to a greater covalent character, or the least ionic character. Hence, <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi>BeH</mi><mn>2</mn></msub></math> will be least ionic. Top to bottom size of cation increase so covalent character decrease and ionic character increases.", "opts": [{"id": "axO6V", "text": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi>BeH</mi><mn>2</mn></msub><mo>&lt;</mo><msub><mi>BaH</mi><mn>2</mn></msub><mo>&lt;</mo><msub><mi>CaH</mi><mn>2</mn></msub></math>"}, {"id": "4JEa5", "text": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi>CaH</mi><mn>2</mn></msub><mo>&lt;</mo><msub><mi>BeH</mi><mn>2</mn></msub><mo>&lt;</mo><msub><mi>BaH</mi><mn>2</mn></msub></math>"}, {"id": "fcXh9", "text": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi>BeH</mi><mn>2</mn></msub><mo>&lt;</mo><msub><mi>CaH</mi><mn>2</mn></msub><mo>&lt;</mo><msub><mi>BaH</mi><mn>2</mn></msub></math>"}, {"id": "70GNr", "text": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi>BaH</mi><mn>2</mn></msub><mo>&lt;</mo><msub><mi>BeH</mi><mn>2</mn></msub><mo>&lt;</mo><msub><mi>CaH</mi><mn>2</mn></msub></math>"}], "ans": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi>BeH</mi><mn>2</mn></msub><mo>&lt;</mo><msub><mi>CaH</mi><mn>2</mn></msub><mo>&lt;</mo><msub><mi>BaH</mi><mn>2</mn></msub></math>", "correct": "fcXh9"}, {"id": "695e3b383dc984756e9de5da", "type": "singleCorrect", "html": "The hybridization of orbitals of <math> <mrow> <mtext>N</mtext> </mrow> </math> atom in <math> <mrow> <msubsup> <mtext>NO</mtext> <mn>3</mn> <mo>-</mo> </msubsup> <msubsup> <mtext>, NO</mtext> <mn>2</mn> <mo>+</mo> </msubsup> </mrow> </math> and <math> <mrow> <msubsup> <mtext>NH</mtext> <mn>4</mn> <mo>+</mo> </msubsup> </mrow> </math> are respectively", "sol": "The structures of <math> <mrow> <msubsup> <mtext>NO</mtext> <mn>3</mn> <mo>-</mo> </msubsup> <msubsup> <mtext>, NO</mtext> <mn>2</mn> <mo>+</mo> </msubsup> </mrow> </math> and <math> <mrow> <msubsup> <mtext>NH</mtext> <mn>4</mn> <mo>+</mo> </msubsup> </mrow> </math> is<br /><img alt=\"\" src=\"https://cdn-question-pool.getmarks.app/NEET/DPP-Chemistry/EM0006943_AnsExp2_1..jpg\" style=\"width: 260px; height: 235px;\" />", "opts": [{"id": "RUiHi", "text": "<math> <mrow> <msup> <mtext>sp, sp</mtext> <mn>2</mn> </msup> <msup> <mtext>, sp</mtext> <mn>3</mn> </msup> </mrow> </math>"}, {"id": "aZSIo", "text": "<math> <mrow> <msup> <mtext>sp</mtext> <mn>2</mn> </msup> <msup> <mtext>, sp, sp</mtext> <mn>3</mn> </msup> </mrow> </math>"}, {"id": "tnZna", "text": "<math> <mrow> <msup> <mtext>sp, sp</mtext> <mn>3</mn> </msup> <msup> <mtext>, sp</mtext> <mn>2</mn> </msup> </mrow> </math>"}, {"id": "WDVUB", "text": "<math> <mrow> <msup> <mtext>sp</mtext> <mn>2</mn> </msup> <msup> <mtext>, sp</mtext> <mn>3</mn> </msup> <mtext>, sp</mtext> </mrow> </math>"}], "ans": "<math> <mrow> <msup> <mtext>sp</mtext> <mn>2</mn> </msup> <msup> <mtext>, sp, sp</mtext> <mn>3</mn> </msup> </mrow> </math>", "correct": "aZSIo"}, {"id": "695e3b383dc984756e9de5db", "type": "singleCorrect", "html": "In the Born-Haber cycle for the formation of solid common salt <math><mfenced separators=\"|\"><mrow><mi mathvariant=\"normal\">N</mi><mi mathvariant=\"normal\">a</mi><mi mathvariant=\"normal\">C</mi><mi mathvariant=\"normal\">l</mi></mrow></mfenced></math>, the largest contribution comes from", "sol": "According to Born Haber cycle enthalpy of formation is <math><mi mathvariant=\"normal\">\u0394</mi><msub><mrow><mi mathvariant=\"normal\">H</mi></mrow><mrow><mi mathvariant=\"normal\">f</mi></mrow></msub><mo>=</mo><mi mathvariant=\"normal\">\u0394</mi><msub><mrow><mi mathvariant=\"normal\">H</mi></mrow><mrow><mi mathvariant=\"normal\">s</mi><mi mathvariant=\"normal\">u</mi><mi mathvariant=\"normal\">b</mi><mi mathvariant=\"normal\">l</mi><mo>.</mo></mrow></msub><mo>+</mo><mfrac><mrow><mn>1</mn></mrow><mrow><mn>2</mn></mrow></mfrac><mi mathvariant=\"normal\">\u0394</mi><msub><mrow><mi mathvariant=\"normal\">H</mi></mrow><mrow><mi mathvariant=\"normal\">d</mi><mi mathvariant=\"normal\">i</mi><mi mathvariant=\"normal\">s</mi><mi mathvariant=\"normal\">s</mi><mo>.</mo></mrow></msub><mo>+</mo><mi mathvariant=\"normal\">I</mi><mi mathvariant=\"normal\">E</mi><mo>-</mo><mi mathvariant=\"normal\">E</mi><mi mathvariant=\"normal\">A</mi><mo>+</mo><mi mathvariant=\"normal\">L</mi><mi mathvariant=\"normal\">E</mi></math>", "opts": [{"id": "8Q9z1", "text": "The low ionisation energy of <math><mi mathvariant=\"normal\">N</mi><mi mathvariant=\"normal\">a</mi></math>"}, {"id": "NX5Fi", "text": "The high electron affinity of <math><mi mathvariant=\"normal\">C</mi><mi mathvariant=\"normal\">l</mi></math>"}, {"id": "1zxLx", "text": "The low <math><mi mathvariant=\"normal\">\u0394</mi><msub><mrow><mi mathvariant=\"normal\">H</mi></mrow><mrow><mi mathvariant=\"normal\">v</mi><mi mathvariant=\"normal\">a</mi><mi mathvariant=\"normal\">p</mi></mrow></msub></math> of <math><mi mathvariant=\"normal\">N</mi><mi mathvariant=\"normal\">a</mi><mfenced separators=\"|\"><mrow><mi mathvariant=\"normal\">s</mi></mrow></mfenced></math>"}, {"id": "j3vFH", "text": "The lattice energy"}], "ans": "The lattice energy", "correct": "j3vFH"}, {"id": "695e3b383dc984756e9de5dc", "type": "singleCorrect", "html": "The dipole moment of <math><mi mathvariant=\"normal\">L</mi><mi mathvariant=\"normal\">i</mi><mi mathvariant=\"normal\">H</mi></math> is <math><mn>1.964</mn><mo>\u00d7</mo><mn>1</mn><msup><mrow><mn>0</mn></mrow><mrow><mo>-</mo><mn>29</mn></mrow></msup><mi></mi></math> Coulomb meter and the interatomic distance between <math><mi mathvariant=\"normal\">L</mi><mi mathvariant=\"normal\">i</mi></math> and <math><mi mathvariant=\"normal\">H</mi></math> is 1.596 \u00c5. The percentage ionic character of <math><mi mathvariant=\"normal\">L</mi><mi mathvariant=\"normal\">i</mi><mi mathvariant=\"normal\">H</mi></math> is", "sol": "<math><mi mathvariant=\"normal\">\u03b4</mi><mo>=</mo><mfrac><mrow><mn>1.964</mn><mo>\u00d7</mo><mn>1</mn><msup><mrow><mn>0</mn></mrow><mrow><mo>-</mo><mn>29</mn></mrow></msup></mrow><mrow><mn>1.596</mn><mo>\u00d7</mo><mn>1</mn><msup><mrow><mn>0</mn></mrow><mrow><mo>-</mo><mn>10</mn></mrow></msup></mrow></mfrac><mo>=</mo><mn>1.2306</mn><mo>\u00d7</mo><mn>1</mn><msup><mrow><mn>0</mn></mrow><mrow><mo>-</mo><mn>19</mn></mrow></msup><mi mathvariant=\"normal\">C</mi></math><br/><math><mi mathvariant=\"normal\">%</mi><mi mathvariant=\"normal\"></mi><mi mathvariant=\"normal\">i</mi><mi mathvariant=\"normal\">o</mi><mi mathvariant=\"normal\">n</mi><mi mathvariant=\"normal\">i</mi><mi mathvariant=\"normal\">c\u00a0</mi><mi mathvariant=\"normal\"></mi><mi mathvariant=\"normal\">c</mi><mi mathvariant=\"normal\">h</mi><mi mathvariant=\"normal\">a</mi><mi mathvariant=\"normal\">r</mi><mi mathvariant=\"normal\">a</mi><mi mathvariant=\"normal\">c</mi><mi mathvariant=\"normal\">t</mi><mi mathvariant=\"normal\">e</mi><mi mathvariant=\"normal\">r</mi><mi mathvariant=\"normal\"></mi><mo>=</mo><mfrac><mrow><mn>1.2306</mn><mo>\u00d7</mo><mn>1</mn><msup><mrow><mn>0</mn></mrow><mrow><mo>-</mo><mn>19</mn></mrow></msup><mo>\u00d7</mo><mn>100</mn></mrow><mrow><mn>1.602</mn><mo>\u00d7</mo><mn>1</mn><msup><mrow><mn>0</mn></mrow><mrow><mo>-</mo><mn>19</mn></mrow></msup></mrow></mfrac><mo>=</mo><mn>76.8</mn><mi mathvariant=\"normal\">%</mi></math>", "opts": [{"id": "PXvW4", "text": "82.5%"}, {"id": "IdsHY", "text": "63.2%"}, {"id": "BPgjN", "text": "76.8%"}, {"id": "tTANJ", "text": "90.5%"}], "ans": "76.8%", "correct": "BPgjN"}, {"id": "695e3b383dc984756e9de5dd", "type": "singleCorrect", "html": "<p>The total number of covalent bonds formed in the Lewis structures of given species respectively are:</p><p>(a)&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msubsup><mi>CO</mi><mn>3</mn><mrow><mn>2</mn><mo>-</mo></mrow></msubsup></math></p><p>(b)&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi>CCl</mi><mn>4</mn></msub></math></p><p>(c)&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi>NF</mi><mn>3</mn></msub></math></p><p>(d)&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi>HNO</mi><mn>3</mn></msub></math></p>", "sol": "<p>Covalent bond is formed by sharing of electrons, which is generally observed between two non-metals.</p><p><math xmlns=\"http://www.w3.org/1998/Math/MathML\"></math>(a)&nbsp;</p><p><img src=\"https://cdn.quizrr.in/question-assets/bitsat/2025/chapter-test/037aa53e-733d-4ee1-ab68-65c0186f8288-image.png\" style=\"width: 149px; height: 99px;\" />&nbsp;</p><p>The number of covalent bonds in&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msubsup><mi>CO</mi><mn>3</mn><mrow><mn>2</mn><mo>-</mo></mrow></msubsup></math>&nbsp;is&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mo>=</mo><mn>4</mn></math>.</p><p><math xmlns=\"http://www.w3.org/1998/Math/MathML\"></math>(b)&nbsp;&nbsp;</p><p>&nbsp;<img src=\"https://cdn.quizrr.in/question-assets/bitsat/2025/chapter-test/b4fd0540-0e34-4abe-84ad-0bbcf43c7387-image.png\" style=\"width: 121px; height: 114px;\" />&nbsp;</p><p>The number of covalent bonds in&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi>CCl</mi><mn>4</mn></msub></math>&nbsp;is&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mo>=</mo><mn>4</mn></math>.</p><p><math xmlns=\"http://www.w3.org/1998/Math/MathML\"></math>(c)&nbsp;</p><p>&nbsp;<img src=\"https://cdn.quizrr.in/question-assets/bitsat/2025/chapter-test/9329aa99-50bd-434e-9055-a579c12596c6-image.png\" style=\"width: 123px; height: 77px;\" />&nbsp;</p><p>The number of covalent bonds in&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi>NF</mi><mn>3</mn></msub></math>&nbsp;is<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mo>=</mo><mn>3</mn></math>.</p><p><math xmlns=\"http://www.w3.org/1998/Math/MathML\"></math>(d)&nbsp;</p><p>&nbsp;&nbsp;<img src=\"https://cdn.quizrr.in/question-assets/bitsat/2025/chapter-test/e2f0c729-b9e9-4d4e-a5f2-3bd267b2b954-image.png\" style=\"width: 158px; height: 104px;\" />&nbsp;</p><p>The number of covalent bonds in&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi>HNO</mi><mn>3</mn></msub></math>&nbsp;is&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mo>=</mo><mn>5</mn></math>.</p>", "opts": [{"id": "unY4J", "text": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mn>4</mn><mo>,</mo><mo>&#160;</mo><mn>4</mn><mo>,</mo><mo>&#160;</mo><mn>3</mn><mo>,</mo><mo>&#160;</mo><mn>5</mn></math>."}, {"id": "YVjPt", "text": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mn>4</mn><mo>,</mo><mo>&#160;</mo><mn>3</mn><mo>,</mo><mo>&#160;</mo><mn>5</mn><mo>,</mo><mo>&#160;</mo><mn>4</mn></math>."}, {"id": "uGHF6", "text": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mn>3</mn><mo>,</mo><mo>&#160;</mo><mn>5</mn><mo>,</mo><mo>&#160;</mo><mn>4</mn><mo>,</mo><mo>&#160;</mo><mn>3</mn></math>."}, {"id": "VjFE9", "text": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mn>5</mn><mo>,</mo><mo>&#160;</mo><mn>3</mn><mo>,</mo><mo>&#160;</mo><mn>4</mn><mo>,</mo><mo>&#160;</mo><mn>5</mn></math>."}], "ans": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mn>4</mn><mo>,</mo><mo>&#160;</mo><mn>4</mn><mo>,</mo><mo>&#160;</mo><mn>3</mn><mo>,</mo><mo>&#160;</mo><mn>5</mn></math>.", "correct": "unY4J"}, {"id": "695e3b383dc984756e9de5de", "type": "singleCorrect", "html": "Which of the following has intramolecular hydrogen bonding?", "sol": "<img alt=\"\" src=\"https://cdn-question-pool.getmarks.app/NEET/DPP-Chemistry/132162.png\" style=\"width: 133px; height: 123px;\"/><br/>Intramolecular hydrogen bonding(within the molecule).", "opts": [{"id": "FRXM6", "text": "H<sub>2</sub>O"}, {"id": "wA8tU", "text": "o-nitrophenol"}, {"id": "IQXot", "text": "NH<sub>3</sub>"}, {"id": "6CFtu", "text": "CH<sub>3</sub>COOH"}], "ans": "o-nitrophenol", "correct": "wA8tU"}, {"id": "695e3b393dc984756e9de5df", "type": "singleCorrect", "html": "Coordinate covalent bond is absent in:", "sol": "<p>In&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi>PCl</mi><mn>3</mn></msub></math>, only covalent bond is present. In&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi mathvariant=\"normal\">H</mi><mn>3</mn></msub><msup><mi mathvariant=\"normal\">O</mi><mo>+</mo></msup></math>, one coordinate covalent bond and two covalent&nbsp;bonds are present.&nbsp;</p><p>The adduct of&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi>NH</mi><mn>3</mn></msub><mo>&#160;</mo><mi>and</mi><mo>&#160;</mo><msub><mi>BF</mi><mn>3</mn></msub></math>&nbsp;contain one coordinate covalent bond.</p><p><img height=\"74\" src=\"https://cdn-question-pool.getmarks.app/NEET/DPP-Chemistry/651ca849-0fba-4080-9e75-7c3e61dbe358-image.png\" width=\"293\" /></p><p><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msup><mfenced open=\"[\" close=\"]\"><mrow><mi>Fe</mi><msub><mfenced><mi>CN</mi></mfenced><mn>6</mn></msub></mrow></mfenced><mrow><mn>4</mn><mo>-</mo></mrow></msup></math>&nbsp;is complex compound, which contain 6 coordinate covalent bonds.</p>", "opts": [{"id": "BJtCw", "text": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msup><mfenced open=\"[\" close=\"]\"><mrow><mi>Fe</mi><msub><mfenced><mi>CN</mi></mfenced><mn>6</mn></msub></mrow></mfenced><mrow><mn>4</mn><mo>-</mo></mrow></msup></math>"}, {"id": "SaF6U", "text": "adduct of <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi>NH</mi><mn>3</mn></msub></math> and <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi>BH</mi><mn>3</mn></msub></math>."}, {"id": "g7DxT", "text": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi mathvariant=\"normal\">H</mi><mn>3</mn></msub><msup><mi mathvariant=\"normal\">O</mi><mo>+</mo></msup></math>"}, {"id": "zciXx", "text": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi>PCl</mi><mn>3</mn></msub></math>"}], "ans": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi>PCl</mi><mn>3</mn></msub></math>", "correct": "zciXx"}, {"id": "695e3b393dc984756e9de5e0", "type": "singleCorrect", "html": "<math><msub><mrow><mi mathvariant=\"normal\">N</mi></mrow><mrow><mn>2</mn></mrow></msub></math> and <math><msub><mrow><mi mathvariant=\"normal\">O</mi></mrow><mrow><mn>2</mn></mrow></msub></math> are converted to monopositive cations <math><msubsup><mrow><mi mathvariant=\"normal\">N</mi></mrow><mrow><mn>2</mn></mrow><mrow><mo>+</mo></mrow></msubsup></math> and <math><msubsup><mrow><mi mathvariant=\"normal\">O</mi></mrow><mrow><mn>2</mn></mrow><mrow><mo>+</mo></mrow></msubsup></math> respectively. Which is incorrect?<br/>(According to Molecular orbital theory)", "sol": "M.O. configuration of <math><msub><mrow><mi mathvariant=\"normal\">N</mi></mrow><mrow><mn>2</mn></mrow></msub></math> is<br/><math><msup><mrow><mi mathvariant=\"normal\">\u03c3</mi><mn>1</mn><mi mathvariant=\"normal\">s</mi></mrow><mrow><mn>2</mn></mrow></msup><msup><mrow><mo>&lt;</mo><msup><mrow><mi mathvariant=\"normal\">\u03c3</mi></mrow><mrow><mi mathvariant=\"normal\">*</mi></mrow></msup><mn>1</mn><mi mathvariant=\"normal\">s</mi></mrow><mrow><mn>2</mn></mrow></msup><mo>&lt;</mo><msup><mrow><mi mathvariant=\"normal\">\u03c3</mi><mn>2</mn><mi mathvariant=\"normal\">s</mi></mrow><mrow><mn>2</mn></mrow></msup><mo>&lt;</mo><msup><mrow><msup><mrow><mi mathvariant=\"normal\">\u03c3</mi></mrow><mrow><mi mathvariant=\"normal\">*</mi></mrow></msup><mn>2</mn><mi mathvariant=\"normal\">s</mi></mrow><mrow><mn>2</mn></mrow></msup><mo>&lt;</mo><msup><mrow><msup><mrow><mi mathvariant=\"normal\">\u03c0</mi></mrow><mrow><mn>2</mn></mrow></msup><msub><mrow><mi mathvariant=\"normal\">p</mi></mrow><mrow><mi mathvariant=\"normal\">x</mi></mrow></msub></mrow><mrow><mn>2</mn></mrow></msup><mo>=</mo><msup><mrow><mi mathvariant=\"normal\">\u03c0</mi><mn>2</mn><msub><mrow><mi mathvariant=\"normal\">p</mi></mrow><mrow><mi mathvariant=\"normal\">y</mi></mrow></msub></mrow><mrow><mn>2</mn></mrow></msup><mo>&lt;</mo><msup><mrow><mi mathvariant=\"normal\">\u03c3</mi><mn>2</mn><msub><mrow><mi mathvariant=\"normal\">p</mi></mrow><mrow><mi mathvariant=\"normal\">z</mi></mrow></msub></mrow><mrow><mn>2</mn></mrow></msup></math><br/>B.O. of <math><msub><mrow><mi mathvariant=\"normal\">N</mi></mrow><mrow><mn>2</mn></mrow></msub><mo>=</mo><mfrac><mrow><mn>10</mn><mo>-</mo><mn>4</mn></mrow><mrow><mn>2</mn></mrow></mfrac><mo>=</mo><mn>3</mn></math><br/>M.O. configuration of <math><msubsup><mrow><mi mathvariant=\"normal\">N</mi></mrow><mrow><mn>2</mn></mrow><mrow><mo>+</mo></mrow></msubsup></math> is<br/><math><msup><mrow><mi mathvariant=\"normal\">\u03c3</mi><mn>1</mn><mi mathvariant=\"normal\">s</mi></mrow><mrow><mn>2</mn></mrow></msup><mo>&lt;</mo><msup><mrow><msup><mrow><mi mathvariant=\"normal\">\u03c3</mi></mrow><mrow><mi mathvariant=\"normal\">*</mi></mrow></msup><mn>1</mn><mi mathvariant=\"normal\">s</mi></mrow><mrow><mn>2</mn></mrow></msup><mo>&lt;</mo><msup><mrow><mi mathvariant=\"normal\">\u03c3</mi><mn>2</mn><mi mathvariant=\"normal\">s</mi></mrow><mrow><mn>2</mn></mrow></msup><mo>&lt;</mo><msup><mrow><msup><mrow><mi mathvariant=\"normal\">\u03c3</mi></mrow><mrow><mi mathvariant=\"normal\">*</mi></mrow></msup><mn>2</mn><mi mathvariant=\"normal\">s</mi></mrow><mrow><mn>2</mn></mrow></msup><mo>&lt;</mo><msup><mrow><mi mathvariant=\"normal\">\u03c0</mi><mn>2</mn><msub><mrow><mi mathvariant=\"normal\">p</mi></mrow><mrow><mi mathvariant=\"normal\">x</mi></mrow></msub></mrow><mrow><mn>2</mn></mrow></msup><mo>=</mo><msup><mrow><mi mathvariant=\"normal\">\u03c0</mi><mn>2</mn><msub><mrow><mi mathvariant=\"normal\">p</mi></mrow><mrow><mi mathvariant=\"normal\">y</mi></mrow></msub></mrow><mrow><mn>2</mn></mrow></msup><mo>&lt;</mo><msup><mrow><mi mathvariant=\"normal\">\u03c3</mi><mn>2</mn><msub><mrow><mi mathvariant=\"normal\">p</mi></mrow><mrow><mi mathvariant=\"normal\">z</mi></mrow></msub></mrow><mrow><mn>1</mn></mrow></msup></math><br/>B.O. of <math><msubsup><mrow><mi mathvariant=\"normal\">N</mi></mrow><mrow><mn>2</mn></mrow><mrow><mo>+</mo></mrow></msubsup><mo>=</mo><mfrac><mrow><mn>9</mn><mo>-</mo><mn>4</mn></mrow><mrow><mn>2</mn></mrow></mfrac><mo>=</mo><mn>2.5</mn></math><br/>M.O. of configuration of <math><msub><mrow><mi mathvariant=\"normal\">O</mi></mrow><mrow><mn>2</mn></mrow></msub></math> is<br/><math><msup><mrow><mi mathvariant=\"normal\">\u03c3</mi><mn>1</mn><mi mathvariant=\"normal\">s</mi></mrow><mrow><mn>2</mn></mrow></msup><mo>&lt;</mo><msup><mrow><msup><mrow><mi mathvariant=\"normal\">\u03c3</mi></mrow><mrow><mi mathvariant=\"normal\">*</mi></mrow></msup><mn>1</mn><mi mathvariant=\"normal\">s</mi></mrow><mrow><mn>2</mn></mrow></msup><mo>&lt;</mo><msup><mrow><mi mathvariant=\"normal\">\u03c3</mi><mn>2</mn><mi mathvariant=\"normal\">s</mi></mrow><mrow><mn>2</mn></mrow></msup><mo>&lt;</mo><msup><mrow><msup><mrow><mi mathvariant=\"normal\">\u03c3</mi></mrow><mrow><mi mathvariant=\"normal\">*</mi></mrow></msup><mi mathvariant=\"normal\"></mi><mn>2</mn><mi mathvariant=\"normal\">s</mi></mrow><mrow><mn>2</mn></mrow></msup><mo>&lt;</mo><msup><mrow><mi mathvariant=\"normal\">\u03c3</mi><mn>2</mn><msub><mrow><mi mathvariant=\"normal\">p</mi></mrow><mrow><mi mathvariant=\"normal\">z</mi></mrow></msub></mrow><mrow><mn>2</mn></mrow></msup><mo>&lt;</mo><msup><mrow><mi mathvariant=\"normal\">\u03c0</mi><mn>2</mn><msub><mrow><mi mathvariant=\"normal\">p</mi></mrow><mrow><mi mathvariant=\"normal\">x</mi></mrow></msub></mrow><mrow><mn>2</mn></mrow></msup><mo>&lt;</mo><msup><mrow><msup><mrow><mi mathvariant=\"normal\">\u03c0</mi><mn>2</mn><msub><mrow><mi mathvariant=\"normal\">p</mi></mrow><mrow><mi mathvariant=\"normal\">y</mi></mrow></msub></mrow><mrow><mi></mi></mrow></msup></mrow><mrow><mn>2</mn></mrow></msup><mo>&lt;</mo><msup><mrow><msup><mrow><mi mathvariant=\"normal\">\u03c0</mi></mrow><mrow><mi mathvariant=\"normal\">*</mi></mrow></msup><mn>2</mn><msub><mrow><mi mathvariant=\"normal\">p</mi></mrow><mrow><mi mathvariant=\"normal\">x</mi></mrow></msub></mrow><mrow><mn>1</mn></mrow></msup><mo>&lt;</mo><msup><mrow><msup><mrow><mi mathvariant=\"normal\">\u03c0</mi></mrow><mrow><mi mathvariant=\"normal\">*</mi></mrow></msup><mn>2</mn><msub><mrow><mi mathvariant=\"normal\">p</mi></mrow><mrow><mi mathvariant=\"normal\">y</mi></mrow></msub></mrow><mrow><mn>1</mn></mrow></msup></math><br/><math><mo>\u2234</mo></math> B.O. of <math><msub><mrow><mi mathvariant=\"normal\">O</mi></mrow><mrow><mn>2</mn></mrow></msub><mo>=</mo><mfrac><mrow><mn>10</mn><mo>\u2013</mo><mn>6</mn></mrow><mrow><mn>2</mn></mrow></mfrac><mo>=</mo><mn>2</mn></math><br/>As it is paramagnetic so option <math><mo>(</mo><mi mathvariant=\"normal\">a</mi><mo>)</mo></math> is incorrect.<br/>M.O. configuration of <math><msubsup><mrow><mi mathvariant=\"normal\">O</mi></mrow><mrow><mn>2</mn></mrow><mrow><mo>+</mo></mrow></msubsup></math> is<br/><math><msup><mrow><mi mathvariant=\"normal\">\u03c3</mi><mn>1</mn><mi mathvariant=\"normal\">s</mi></mrow><mrow><mn>2</mn></mrow></msup><mo>&lt;</mo><msup><mrow><msup><mrow><mi mathvariant=\"normal\">\u03c3</mi></mrow><mrow><mi mathvariant=\"normal\">*</mi></mrow></msup><mn>1</mn><mi mathvariant=\"normal\">s</mi></mrow><mrow><mn>2</mn></mrow></msup><mo>&lt;</mo><msup><mrow><mi mathvariant=\"normal\">\u03c3</mi><mn>2</mn><mi mathvariant=\"normal\">s</mi></mrow><mrow><mn>2</mn></mrow></msup><mo>&lt;</mo><msup><mrow><msup><mrow><mi mathvariant=\"normal\">\u03c3</mi></mrow><mrow><mi mathvariant=\"normal\">*</mi></mrow></msup><mn>2</mn><mi mathvariant=\"normal\">s</mi></mrow><mrow><mn>2</mn></mrow></msup><mo>&lt;</mo><msup><mrow><mi mathvariant=\"normal\">\u03c3</mi><mn>2</mn><msub><mrow><mi mathvariant=\"normal\">p</mi></mrow><mrow><mi mathvariant=\"normal\">x</mi></mrow></msub></mrow><mrow><mn>2</mn></mrow></msup><mo>&lt;</mo><msup><mrow><mi mathvariant=\"normal\">\u03c0</mi><mn>2</mn><msub><mrow><mi mathvariant=\"normal\">p</mi></mrow><mrow><mi mathvariant=\"normal\">y</mi></mrow></msub></mrow><mrow><mn>2</mn></mrow></msup><mo>\u2245</mo><msup><mrow><mi mathvariant=\"normal\">\u03c0</mi><mn>2</mn><msub><mrow><mi mathvariant=\"normal\">p</mi></mrow><mrow><mi mathvariant=\"normal\">z</mi></mrow></msub></mrow><mrow><mn>2</mn></mrow></msup><mo>&lt;</mo><msup><mrow><msup><mrow><mi mathvariant=\"normal\">\u03c0</mi></mrow><mrow><mi mathvariant=\"normal\">*</mi></mrow></msup><mn>2</mn><msub><mrow><mi mathvariant=\"normal\">p</mi></mrow><mrow><mi mathvariant=\"normal\">y</mi></mrow></msub></mrow><mrow><mn>1</mn></mrow></msup><mo>\u2245</mo><mi></mi><msup><mrow><msup><mrow><mi mathvariant=\"normal\">\u03c0</mi></mrow><mrow><mi mathvariant=\"normal\">*</mi></mrow></msup><mn>2</mn><msub><mrow><mi mathvariant=\"normal\">p</mi></mrow><mrow><mi mathvariant=\"normal\">z</mi></mrow></msub></mrow><mrow><mn>0</mn></mrow></msup></math><br/>B.O. of <math><msubsup><mrow><mi mathvariant=\"normal\">O</mi></mrow><mrow><mn>2</mn></mrow><mrow><mo>+</mo></mrow></msubsup><mo>=</mo><mfrac><mrow><mn>10</mn><mo>-</mo><mn>5</mn></mrow><mrow><mn>2</mn></mrow></mfrac><mo>=</mo><mn>2.5</mn></math><br/>B.O. <math><mo>\u221d</mo></math> Bond energy <math><mo>\u221d</mo><mfrac><mrow><mn>1</mn></mrow><mrow><mi mathvariant=\"normal\">B</mi><mi mathvariant=\"normal\">o</mi><mi mathvariant=\"normal\">n</mi><mi mathvariant=\"normal\">d\u00a0</mi><mi mathvariant=\"normal\"></mi><mi mathvariant=\ variant=\"normal\">O</mi></mrow><mrow><mo>+</mo></mrow></msup></math> <br/>while the rest orders are incorrect and their correct order is as follows <br/><math><mi mathvariant=\"normal\">N</mi><msub><mrow><mi mathvariant=\"normal\">H</mi></mrow><mrow><mn>3</mn></mrow></msub><mo>&gt;</mo><mi mathvariant=\"normal\">P</mi><msub><mrow><mi mathvariant=\"normal\">H</mi></mrow><mrow><mn>3</mn></mrow></msub><mo>&gt;</mo><mi mathvariant=\"normal\">A</mi><mi mathvariant=\"normal\">s</mi><msub><mrow><mi mathvariant=\"normal\">H</mi></mrow><mrow><mn>3</mn></mrow></msub><mo>&gt;</mo><mi mathvariant=\"normal\">S</mi><mi mathvariant=\"normal\">b</mi><msub><mrow><mi mathvariant=\"normal\">H</mi></mrow><mrow><mn>3</mn></mrow></msub></math> <br/><math><mi mathvariant=\"normal\">O</mi><msub><mrow><mi mathvariant=\"normal\">F</mi></mrow><mrow><mn>2</mn></mrow></msub><mo>&lt;</mo><mi mathvariant=\"normal\">O</mi><msub><mrow><mi mathvariant=\"normal\">H</mi></mrow><mrow><mn>2</mn></mrow></msub><mo>&lt;</mo><mi mathvariant=\"normal\">O</mi><mi mathvariant=\"normal\">C</mi><msub><mrow><mi mathvariant=\"normal\">l</mi></mrow><mrow><mn>2</mn></mrow></msub></math> <br/><math><mi mathvariant=\"normal\">B</mi><msub><mrow><mi mathvariant=\"normal\">F</mi></mrow><mrow><mn>3</mn></mrow></msub><mo>=</mo><mi mathvariant=\"normal\">B</mi><mi mathvariant=\"normal\">C</mi><msub><mrow><mi mathvariant=\"normal\">l</mi></mrow><mrow><mn>3</mn></mrow></msub><mo>=</mo><mi mathvariant=\"normal\">B</mi><mi mathvariant=\"normal\">B</mi><msub><mrow><mi mathvariant=\"normal\">r</mi></mrow><mrow><mn>3</mn></mrow></msub><mo>=</mo><mi mathvariant=\"normal\">B</mi><msub><mrow><mi mathvariant=\"normal\">I</mi></mrow><mrow><mn>3</mn></mrow></msub></math>", "opts": [{"id": "haZpb", "text": "<math><mi mathvariant=\"normal\">N</mi><msub><mrow><mi mathvariant=\"normal\">H</mi></mrow><mrow><mn>3</mn></mrow></msub><mo>&lt;</mo><mi mathvariant=\"normal\">P</mi><msub><mrow><mi mathvariant=\"normal\">H</mi></mrow><mrow><mn>3</mn></mrow></msub><mo>&lt;</mo><mi mathvariant=\"normal\">A</mi><mi mathvariant=\"normal\">s</mi><msub><mrow><mi mathvariant=\"normal\">H</mi></mrow><mrow><mn>3</mn></mrow></msub><mo>&lt;</mo><mi mathvariant=\"normal\">S</mi><mi mathvariant=\"normal\">b</mi><msub><mrow><mi mathvariant=\"normal\">H</mi></mrow><mrow><mn>3</mn></mrow></msub></math>"}, {"id": "WAdsN", "text": "<math><msub><mrow><mi mathvariant=\"normal\">H</mi></mrow><mrow><mn>2</mn></mrow></msub><mi mathvariant=\"normal\">O</mi><mo>&lt;</mo><mi mathvariant=\"normal\">O</mi><msub><mrow><mi mathvariant=\"normal\">F</mi></mrow><mrow><mn>2</mn></mrow></msub><mo>&lt;</mo><mi mathvariant=\"normal\">C</mi><msub><mrow><mi mathvariant=\"normal\">l</mi></mrow><mrow><mn>2</mn></mrow></msub><mi mathvariant=\"normal\">O</mi></math>"}, {"id": "nX2xY", "text": "<math><msub><mrow><mi mathvariant=\"normal\">H</mi></mrow><mrow><mn>3</mn></mrow></msub><mi mathvariant=\"normal\">T</mi><msup><mrow><mi mathvariant=\"normal\">e</mi></mrow><mrow><mo>+</mo></mrow></msup><mo>&lt;</mo><msub><mrow><mi mathvariant=\"normal\">H</mi></mrow><mrow><mn>3</mn></mrow></msub><mi mathvariant=\"normal\">S</mi><msup><mrow><mi mathvariant=\"normal\">e</mi></mrow><mrow><mo>+</mo></mrow></msup><mo>&lt;</mo><msub><mrow><mi mathvariant=\"normal\">H</mi></mrow><mrow><mn>3</mn></mrow></msub><msup><mrow><mi mathvariant=\"normal\">S</mi></mrow><mrow><mo>+</mo></mrow></msup><mo>&lt;</mo><msub><mrow><mi mathvariant=\"normal\">H</mi></mrow><mrow><mn>3</mn></mrow></msub><msup><mrow><mi mathvariant=\"normal\">O</mi></mrow><mrow><mo>+</mo></mrow></msup></math>"}, {"id": "CnZAz", "text": "<math><mi mathvariant=\"normal\">B</mi><msub><mrow><mi mathvariant=\"normal\">F</mi></mrow><mrow><mn>3</mn></mrow></msub><mo>&lt;</mo><mi mathvariant=\"normal\">B</mi><mi mathvariant=\"normal\">C</mi><msub><mrow><mi mathvariant=\"normal\">l</mi></mrow><mrow><mn>3</mn></mrow></msub><mo>&lt;</mo><mi mathvariant=\"normal\">B</mi><mi mathvariant=\"normal\">B</mi><msub><mrow><mi mathvariant=\"normal\">r</mi></mrow><mrow><mn>3</mn></mrow></msub><mo>&lt;</mo><mi mathvariant=\"normal\">B</mi><msub><mrow><mi mathvariant=\"normal\">I</mi></mrow><mrow><mn>3</mn></mrow></msub></math>"}], "ans": "<math><msub><mrow><mi mathvariant=\"normal\">H</mi></mrow><mrow><mn>3</mn></mrow></msub><mi mathvariant=\"normal\">T</mi><msup><mrow><mi mathvariant=\"normal\">e</mi></mrow><mrow><mo>+</mo></mrow></msup><mo>&lt;</mo><msub><mrow><mi mathvariant=\"normal\">H</mi></mrow><mrow><mn>3</mn></mrow></msub><mi mathvariant=\"normal\">S</mi><msup><mrow><mi mathvariant=\"normal\">e</mi></mrow><mrow><mo>+</mo></mrow></msup><mo>&lt;</mo><msub><mrow><mi mathvariant=\"normal\">H</mi></mrow><mrow><mn>3</mn></mrow></msub><msup><mrow><mi mathvariant=\"normal\">S</mi></mrow><mrow><mo>+</mo></mrow></msup><mo>&lt;</mo><msub><mrow><mi mathvariant=\"normal\">H</mi></mrow><mrow><mn>3</mn></mrow></msub><msup><mrow><mi mathvariant=\"normal\">O</mi></mrow><mrow><mo>+</mo></mrow></msup></math>", "correct": "nX2xY"}, {"id": "695e3b393dc984756e9de5e2", "type": "singleCorrect", "html": "The covalency of carbon in the <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi>CO</mi></math> molecule is three because", "sol": "<p>Oxygen atom needs two electrons to complete its octet so double bond can be considered between carbon and oxygen to complete the octet of oxygen. But octet of carbon is not completed which require additional two electrons to complete its octet. Requirement of these two electrons are fulfilled by oxygen through coordinate bond formation. Coordinate bond is directed from oxygen to carbon i.e. oxygen atom donate its electron pair to carbon atom. Once coordinate bond is formed, it is similar to covalent bond. So, overall covalency is three.</p>", "opts": [{"id": "EkumG", "text": "an unexcited carbon atom has two unpaired electrons."}, {"id": "XL1Mv", "text": "the carbon atom can be an acceptor of an electron pair."}, {"id": "ym5tw", "text": "the carbon atom has four valence electrons."}, {"id": "tKxli", "text": "maximum covalency of carbon is three."}], "ans": "the carbon atom can be an acceptor of an electron pair.", "correct": "XL1Mv"}, {"id": "695e3b393dc984756e9de5e3", "type": "singleCorrect", "html": "Among the given species the one which contains weakest carbon- oxygen bond : <math> <mrow> <msub> <mrow> <mtext>CO</mtext></mrow> <mtext>2</mtext> </msub> <mtext>,</mtext><mtext>\u2004</mtext><msub> <mrow> <mtext>CH</mtext></mrow> <mtext>3</mtext> </msub> <msup> <mrow> <mtext>COO</mtext></mrow> <mo>\u2212</mo> </msup> <mtext>,</mtext><mtext>\u2004</mtext><mtext>CO,</mtext><mtext>\u2004</mtext><msubsup> <mrow> <mtext>CO</mtext></mrow> <mtext>3</mtext> <mrow> <mtext>2</mtext><mo>\u2212</mo></mrow> </msubsup> </mrow> </math> ", "sol": "<img alt=\"\" src=\"https://cdn-question-pool.getmarks.app/NEET/DPP-Chemistry/670828.PNG\" style=\"width: 185px; height: 208px;\"/><br/><math> <mrow> <mtext>Bond</mtext><mtext>\u2004</mtext><mtext>strength</mtext><mtext>\u2004</mtext><mo>\u221d</mo><mtext>\u2004</mtext><mtext>Bond</mtext><mtext>\u2004</mtext><mtext>order</mtext></mrow></math><br/>Bond order is determined through resonating structure. Among the given species, the bond dissociation energy of <math><mi mathvariant=\"normal\">C</mi><mo>-</mo><mi mathvariant=\"normal\">O</mi></math> bond is minimum in case of <math><mi mathvariant=\"normal\">C</mi><msubsup><mrow><mi mathvariant=\"normal\">O</mi></mrow><mrow><mn>3</mn></mrow><mrow><mn>2</mn><mo>-</mo></mrow></msubsup></math> by which <math><mi mathvariant=\"normal\">C</mi><mo>-</mo><mi mathvariant=\"normal\">O</mi></math> bond become more weaker in <math><mi mathvariant=\"normal\">C</mi><msubsup><mrow><mi mathvariant=\"normal\">O</mi></mrow><mrow><mn>3</mn></mrow><mrow><mn>2</mn><mo>-</mo></mrow></msubsup></math> or the bond order of <math><mi mathvariant=\"normal\">C</mi><msubsup><mrow><mi mathvariant=\"normal\">O</mi></mrow><mrow><mn>3</mn></mrow><mrow><mn>2</mn><mo>-</mo></mrow></msubsup></math> (1.33) is minimum so the bond become weaker.", "opts": [{"id": "ZMA3c", "text": "<math><mi mathvariant=\"normal\">C</mi><msub><mrow><mi mathvariant=\"normal\">O</mi></mrow><mrow><mn>2</mn></mrow></msub></math>"}, {"id": "0TZAf", "text": "<math><mi mathvariant=\"normal\">C</mi><msub><mrow><mi mathvariant=\"normal\">H</mi></mrow><mrow><mn>3</mn></mrow></msub><mi mathvariant=\"normal\">C</mi><mi mathvariant=\"normal\">O</mi><msup><mrow><mi mathvariant=\"normal\">O</mi></mrow><mrow><mo>-</mo></mrow></msup></math>"}, {"id": "CWLen", "text": "<math><mi mathvariant=\"normal\">C</mi><mi mathvariant=\"normal\">O</mi></math>"}, {"id": "KbRVI", "text": "<math><mi mathvariant=\"normal\">C</mi><msubsup><mrow><mi mathvariant=\"normal\">O</mi></mrow><mrow><mn>3</mn></mrow><mrow><mi mathvariant=\"normal\"></mi><mn>2</mn><mo>-</mo></mrow></msubsup></math>"}], "ans": "<math><mi mathvariant=\"normal\">C</mi><msubsup><mrow><mi mathvariant=\"normal\">O</mi></mrow><mrow><mn>3</mn></mrow><mrow><mi mathvariant=\"normal\"></mi><mn>2</mn><mo>-</mo></mrow></msubsup></math>", "correct": "KbRVI"}, {"id": "695e3b393dc984756e9de5e4", "type": "singleCorrect", "html": "Given the species <math><msub><mrow><mi mathvariant=\"normal\">N</mi></mrow><mrow><mn>2</mn></mrow></msub><mo>,</mo><mi mathvariant=\"normal\">&nbsp;</mi><mi mathvariant=\"normal\">C</mi><mi mathvariant=\"normal\">O</mi><mo>,</mo><mi mathvariant=\"normal\">&nbsp;</mi><msup><mrow><mi mathvariant=\"normal\">N</mi><mi mathvariant=\"normal\">O</mi></mrow><mrow><mo>+</mo></mrow></msup></math> and <math><msup><mrow><mi mathvariant=\"normal\">C</mi><mi mathvariant=\"normal\">N</mi></mrow><mrow><mo>&ndash;</mo></mrow></msup></math> which of the following statements are true for them -<br />(I) All the species are diamagnetic<br />(II) All the species are isostructural<br />(III) All the species have identical bond order<br />(IV) More than one species have zero dipole moment", "sol": "All species are iso-electronic.", "opts": [{"id": "GlIT7", "text": "I, II and III"}, {"id": "R0kpA", "text": "I, II, III and IV"}, {"id": "BurkQ", "text": "III and IV"}, {"id": "gveuS", "text": "I and II"}], "ans": "I, II and III", "correct": "GlIT7"}, {"id": "695e3b393dc984756e9de5e5", "type": "singleCorrect", "html": "The correct order in which oxygen-oxygen bond dissociation energy increases is", "sol": "<math><msub><mrow><mi mathvariant=\"normal\">H</mi></mrow><mrow><mn>2</mn></mrow></msub><msub><mrow><mi mathvariant=\"normal\">O</mi></mrow><mrow><mn>2</mn></mrow></msub></math> has a peroxide bond with a bond order of <math><mn>1</mn></math> while in <math><msub><mrow><mi mathvariant=\"normal\">O</mi></mrow><mrow><mn>3</mn></mrow></msub></math> the bond order is <math><mn>1.5</mn></math> and in <math><msub><mrow><mi mathvariant=\"normal\">O</mi></mrow><mrow><mn>2</mn></mrow></msub></math> it is\u00a0<math><mn>2</mn></math>. Hence, the bond dissociation energy order is <math><msub><mrow><mi mathvariant=\"normal\">H</mi></mrow><mrow><mn>2</mn></mrow></msub><msub><mrow><mi mathvariant=\"normal\">O</mi></mrow><mrow><mn>2</mn></mrow></msub><mo>&lt;</mo><msub><mrow><mi mathvariant=\"normal\">O</mi></mrow><mrow><mn>3</mn></mrow></msub><mo>&lt;</mo><msub><mrow><mi mathvariant=\"normal\">O</mi></mrow><mrow><mn>2</mn></mrow></msub></math>", "opts": [{"id": "6fuwM", "text": "<math><msub><mrow><mi mathvariant=\"normal\">H</mi></mrow><mrow><mn>2</mn></mrow></msub><msub><mrow><mi mathvariant=\"normal\">O</mi></mrow><mrow><mn>2</mn></mrow></msub><mo>&lt;</mo><msub><mrow><mi mathvariant=\"normal\">O</mi></mrow><mrow><mn>2</mn></mrow></msub><mo>&lt;</mo><msub><mrow><mi mathvariant=\"normal\">O</mi></mrow><mrow><mn>3</mn></mrow></msub></math>"}, {"id": "rZeMz", "text": "<math><msub><mrow><mi mathvariant=\"normal\">H</mi></mrow><mrow><mn>2</mn></mrow></msub><msub><mrow><mi mathvariant=\"normal\">O</mi></mrow><mrow><mn>2</mn></mrow></msub><mo>&lt;</mo><msub><mrow><mi mathvariant=\"normal\">O</mi></mrow><mrow><mn>3</mn></mrow></msu
