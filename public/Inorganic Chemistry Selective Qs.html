n><mo>-</mo></mrow></msup></math>"}, {"id": "96WwW", "text": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mo>[</mo><mi>Fe</mi><mo>(</mo><mi>CN</mi><msub><mo>)</mo><mn>6</mn></msub><msup><mo>]</mo><mrow><mn>4</mn><mo>-</mo></mrow></msup><mo>&#62;</mo><mo>[</mo><msub><mi>CoCI</mi><mn>4</mn></msub><msup><mo>]</mo><mrow><mn>2</mn><mo>-</mo></mrow></msup><mo>&#62;</mo><mo>[</mo><msub><mi>MnCI</mi><mn>4</mn></msub><msup><mo>]</mo><mrow><mn>2</mn><mo>-</mo></mrow></msup></math>"}, {"id": "Npw3p", "text": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mo>[</mo><msub><mi>MnCI</mi><mn>4</mn></msub><msup><mo>]</mo><mrow><mn>2</mn><mo>-</mo></mrow></msup><mo>&#62;</mo><mo>[</mo><msub><mi>CoCI</mi><mn>4</mn></msub><msup><mo>]</mo><mrow><mn>2</mn><mo>-</mo></mrow></msup><mo>&#62;</mo><mo>[</mo><mi>Fe</mi><mo>(</mo><mi>CN</mi><msub><mo>)</mo><mn>6</mn></msub><msup><mo>]</mo><mrow><mn>4</mn><mo>-</mo></mrow></msup></math>"}], "ans": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mo>[</mo><msub><mi>MnCI</mi><mn>4</mn></msub><msup><mo>]</mo><mrow><mn>2</mn><mo>-</mo></mrow></msup><mo>&#62;</mo><mo>[</mo><msub><mi>CoCI</mi><mn>4</mn></msub><msup><mo>]</mo><mrow><mn>2</mn><mo>-</mo></mrow></msup><mo>&#62;</mo><mo>[</mo><mi>Fe</mi><mo>(</mo><mi>CN</mi><msub><mo>)</mo><mn>6</mn></msub><msup><mo>]</mo><mrow><mn>4</mn><mo>-</mo></mrow></msup></math>", "correct": "Npw3p"}, {"id": "695e3b3c3dc984756e9de645", "type": "singleCorrect", "html": "Among the following, which one is an organometallic compound?", "sol": "<p>An organometallic compound is considered as a substance that contains a carbon-metal bond.</p><p>Trimethyl aluminum is one of the simplest examples of an organoaluminum compound and despite its name, it has the formula</p><p><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mstyle mathsize=\"18px\"><msub><mi>Al</mi><mn>2</mn></msub><mo>(</mo><msub><mi>CH</mi><mn>3</mn></msub><msub><mo>)</mo><mn>6</mn></msub></mstyle></math>&nbsp;.</p><p>It exists as a dimer and has a similar structure as diborane.</p><p>It contains <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mn>3</mn><mi mathvariant=\"normal\">C</mi><mo>-</mo><mn>2</mn><mi mathvariant=\"normal\">e</mi></math> type of bonding. The shared methyl groups bridge between the two aluminum atoms, i.e., shown in following structure - <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mo>&#160;</mo><mi>Al</mi><mo>-</mo><mi mathvariant=\"normal\">C</mi><mo>-</mo><mi>Al</mi></math> (carbon-metal bond)</p><p><br /><img alt=\"\" src=\"https://cdn-question-pool.getmarks.app/NEET/DPP-Chemistry/Al2_CH3_6.jpg\" style=\"width: 181px; height: 80px;\" />\u200b</p><p>But, in other options, there is no directly <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi mathvariant=\"normal\">C</mi><mo>-</mo><mi mathvariant=\"normal\">M</mi></math> bond present.</p>", "opts": [{"id": "FL2W1", "text": "<math><msub><mrow><mi mathvariant=\"normal\">C</mi></mrow><mrow><mn>2</mn></mrow></msub><msub><mrow><mi mathvariant=\"normal\">H</mi></mrow><mrow><mn>5</mn></mrow></msub><mi mathvariant=\"normal\">O</mi><mi mathvariant=\"normal\">N</mi><mi mathvariant=\"normal\">a</mi></math>"}, {"id": "tIvEg", "text": "<math><msub><mrow><mi mathvariant=\"normal\">C</mi></mrow><mrow><mn>2</mn></mrow></msub><msub><mrow><mi mathvariant=\"normal\">H</mi></mrow><mrow><mn>5</mn></mrow></msub><mi mathvariant=\"normal\">\u00a0</mi><mo>\u2014</mo><mi mathvariant=\"normal\">S</mi><mo>\u2014</mo><mi mathvariant=\"normal\">S</mi><mo>\u2014</mo><mi mathvariant=\"normal\">\u00a0</mi><msub><mrow><mi mathvariant=\"normal\">C</mi></mrow><mrow><mn>2</mn></mrow></msub><msub><mrow><mi mathvariant=\"normal\">H</mi></mrow><mrow><mn>5</mn></mrow></msub></math>"}, {"id": "CUq4y", "text": "<math><msub><mrow><mi mathvariant=\"normal\">A</mi><mi mathvariant=\"normal\">l</mi></mrow><mrow><mn>2</mn></mrow></msub><msub><mrow><mfenced separators=\"|\"><mrow><msub><mrow><mi mathvariant=\"normal\">C</mi><mi mathvariant=\"normal\">H</mi></mrow><mrow><mn>3</mn></mrow></msub></mrow></mfenced></mrow><mrow><mn>6</mn></mrow></msub></math>"}, {"id": "ZKYoU", "text": "<math><mi mathvariant=\"normal\">A</mi><mi mathvariant=\"normal\">l</mi><msub><mrow><mfenced separators=\"|\"><mrow><msub><mrow><mi mathvariant=\"normal\">C</mi></mrow><mrow><mn>6</mn></mrow></msub><msub><mrow><mi mathvariant=\"normal\">H</mi></mrow><mrow><mn>5</mn></mrow></msub><mi mathvariant=\"normal\">S</mi></mrow></mfenced></mrow><mrow><mn>3</mn></mrow></msub></math>"}], "ans": "<math><msub><mrow><mi mathvariant=\"normal\">A</mi><mi mathvariant=\"normal\">l</mi></mrow><mrow><mn>2</mn></mrow></msub><msub><mrow><mfenced separators=\"|\"><mrow><msub><mrow><mi mathvariant=\"normal\">C</mi><mi mathvariant=\"normal\">H</mi></mrow><mrow><mn>3</mn></mrow></msub></mrow></mfenced></mrow><mrow><mn>6</mn></mrow></msub></math>", "correct": "CUq4y"}, {"id": "695e3b3c3dc984756e9de646", "type": "singleCorrect", "html": "Amongst the following, the most stable complex is", "sol": "In all these complexes, Fe is in +3 oxidation state. However, the complex ([Fe(C<sub>2</sub>O<sub>4</sub>)<sub>3</sub>]<sup>3-</sup>) is a chelate because three <math> <mrow> <msub> <mtext>C</mtext> <mn>2</mn> </msub> <msubsup> <mtext>O</mtext> <mn>4</mn> <mrow> <mn>2</mn> <mo>-</mo> </mrow> </msubsup> </mrow> </math> ions act as the chelating ligands. Thus, the most stable complex is [Fe(C<sub>2</sub>O<sub>4</sub>)<sub>3</sub>]<sup>3-</sup>.", "opts": [{"id": "nunKB", "text": "[Fe(H<sub>2</sub>O)<sub>6</sub>]<sup>3+</sup>"}, {"id": "1wXL9", "text": "[Fe(NH<sub>3</sub>)<sub>6</sub>]<sup>3+</sup>"}, {"id": "NAYmg", "text": "[Fe(C<sub>2</sub>O<sub>4</sub>)<sub>3</sub>]<sup>3-</sup>"}, {"id": "xXbPN", "text": "[FeCl<sub>6</sub>]<sup>3-</sup>"}], "ans": "[Fe(C<sub>2</sub>O<sub>4</sub>)<sub>3</sub>]<sup>3-</sup>", "correct": "NAYmg"}, {"id": "695e3b3c3dc984756e9de647", "type": "singleCorrect", "html": "Which one of the following pairs of isomers and types of isomerism are CORRECTLY&nbsp;matched?", "sol": "<p>Linkage isomerism: Coordination compounds having&nbsp;ambidentate ligands.</p><p>Coordination isomerism: In this isomerism, both isomers have a&nbsp;complex cation and an anion, and the metals exchange their&nbsp;position in each complex.</p><p>Ionisation isomerism: Ions exchange their position from&nbsp;inside the complex to&nbsp;outside the complex, and vice-versa.</p><p>So, by these definitions, all the options are correct.</p>", "opts": [{"id": "fAYt6", "text": "[Co(NH<sub>3</sub>)<sub>5</sub>(NO<sub>2</sub>)]Cl<sub>2</sub> and [Co(NH<sub>3</sub>)<sub>5</sub>(ONO)]Cl<sub>2</sub>... Linkage"}, {"id": "JzElA", "text": "[Cu(NH<sub>3</sub>)<sub>4</sub>] [(PtCl<sub>4</sub>)] and [Pt(NH<sub>3</sub>)<sub>4</sub>] [CuCl<sub>4</sub>].... Coordination"}, {"id": "dgiH5", "text": "[Pt(NH<sub>3</sub>)<sub>4</sub>Cl<sub>2</sub>)] Br<sub>2</sub> and [Pt(NH<sub>3</sub>)<sub>4</sub> Br<sub>2</sub>)] Cl<sub>2</sub>.... Ionization"}, {"id": "8FKvF", "text": "All of these"}], "ans": "All of these", "correct": "8FKvF"}, {"id": "695e3b3c3dc984756e9de648", "type": "singleCorrect", "html": "For the given complex [<math><mi mathvariant=\"normal\">C</mi><mi mathvariant=\"normal\">o</mi><mi mathvariant=\"normal\">C</mi><msub><mrow><mi mathvariant=\"normal\">l</mi></mrow><mrow><mn>2</mn></mrow></msub><mfenced separators=\"|\"><mrow><mi mathvariant=\"normal\">e</mi><mi mathvariant=\"normal\">n</mi></mrow></mfenced><msub><mrow><mfenced separators=\"|\"><mrow><mi mathvariant=\"normal\">N</mi><msub><mrow><mi mathvariant=\"normal\">H</mi></mrow><mrow><mn>3</mn></mrow></msub></mrow></mfenced></mrow><mrow><mn>2</mn></mrow></msub><mo>]</mo></math>+, the number of geometrical isomers, the number of optical isomers and total number of isomers of all type possible respectively are", "sol": "1. Geometrical isomers have same structural formula but differ in spatial arrangement of groups.<br/>2. Different arrangement of atoms or groups in three dimensional space results in two optical isomers which are image of each other.<br /><img alt=\"\" src=\"https://cdn-question-pool.getmarks.app/NEET/DPP-Chemistry/image15-48b71dd7-f5d4-4875-b10e-1fbcbcd35b4d.jpg\" style=\"width: 324px; height: 291px;\" /><br/>Therefore, number of geometrical isomers, optical isomers and total number of isomers are 2, 2 and 3 respectively.", "opts": [{"id": "Zlj1W", "text": "2, 2 and 4"}, {"id": "wYCOf", "text": "2, 2 and 3"}, {"id": "7HR2j", "text": "2, 0 and 2"}, {"id": "enlo5", "text": "0, 2 and 2"}], "ans": "2, 2 and 4", "correct": "Zlj1W"}, {"id": "695e3b3c3dc984756e9de649", "type": "singleCorrect", "html": "Which of the following statements is correct for the complex <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi mathvariant=\"normal\">K</mi><mn>4</mn></msub><mfenced open=\"[\" close=\"]\"><mrow><mi>Fe</mi><msub><mfenced><mi>CN</mi></mfenced><mn>5</mn></msub><msub><mi mathvariant=\"normal\">O</mi><mn>2</mn></msub></mrow></mfenced></math> having <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><msup><mi mathvariant=\"normal\">t</mi><mn>6</mn></msup><mrow><mn>2</mn><mi mathvariant=\"normal\">g</mi></mrow></msub><mo>,</mo><mo>&#160;</mo><msub><msup><mi mathvariant=\"normal\">e</mi><mn>0</mn></msup><mi mathvariant=\"normal\">g</mi></msub></math> electronic configuration?", "sol": "<p>A configuration of <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><msup><mi mathvariant=\"normal\">t</mi><mn>6</mn></msup><mrow><mn>2</mn><mi mathvariant=\"normal\">g</mi></mrow></msub></math>&nbsp;orbital&nbsp;means six electrons are placed in the first three <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mn>3</mn><mi mathvariant=\"normal\">d</mi></math>-orbitals of the complex ion. This implies that all the electrons are paired under the influence of the strong <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msup><mi>CN</mi><mo>-</mo></msup></math>&nbsp;ligands.</p><p><img alt=\"\" src=\"https://cdn-question-pool.getmarks.app/NEET/DPP-Chemistry/EM0021891_AnsExp_26_.jpg\" style=\"width: 456px; height: 216px;\" /></p><p>The complex is paramagnetic in nature due to the presence of the unpaired electron in <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msup><msub><mi mathvariant=\"normal\">O</mi><mn>2</mn></msub><mo>-</mo></msup></math>.</p>", "opts": [{"id": "WbE2I", "text": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msup><mi mathvariant=\"normal\">d</mi><mn>2</mn></msup><msup><mi>sp</mi><mn>3</mn></msup></math> hybridised and paramagnetic."}, {"id": "PLJe2", "text": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msup><mi>sp</mi><mn>3</mn></msup><msup><mi mathvariant=\"normal\">d</mi><mn>2</mn></msup></math> hybridised and paramagnetic."}, {"id": "rUbqc", "text": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msup><mi>sp</mi><mn>3</mn></msup><msup><mi mathvariant=\"normal\">d</mi><mn>2</mn></msup></math> hybridised and diamagnetic."}, {"id": "1QN5r", "text": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msup><mi mathvariant=\"normal\">d</mi><mn>2</mn></msup><msup><mi>sp</mi><mn>3</mn></msup></math> hybridised and diamagnetic."}], "ans": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msup><mi mathvariant=\"normal\">d</mi><mn>2</mn></msup><msup><mi>sp</mi><mn>3</mn></msup></math> hybridised and paramagnetic.", "correct": "WbE2I"}, {"id": "695e3b3c3dc984756e9de64a", "type": "singleCorrect", "html": "The possible number of isomers (both striuctural and stereo) for the complex <math><mo>[</mo><mi mathvariant=\"normal\">M</mi><mi mathvariant=\"normal\">B</mi><msub><mrow><mi mathvariant=\"normal\">r</mi></mrow><mrow><mn>2</mn></mrow></msub><mi mathvariant=\"normal\">C</mi><msub><mrow><mi mathvariant=\"normal\">l</mi></mrow><mrow><mn>2</mn></mrow></msub><mo>]</mo><mi mathvariant=\"normal\">S</mi><msub><mrow><mi mathvariant=\"normal\">O</mi></mrow><mrow><mn>4</mn></mrow></msub></math> is", "sol": "The complex ion <math><mo>[</mo><mi mathvariant=\"normal\">M</mi><mi mathvariant=\"normal\">B</mi><msub><mrow><mi mathvariant=\"normal\">r</mi></mrow><mrow><mn>2</mn></mrow></msub><mi mathvariant=\"normal\">C</mi><msub><mrow><mi mathvariant=\"normal\">l</mi></mrow><mrow><mn>2</mn></mrow></msub><msup><mrow><mo>]</mo></mrow><mrow><mn>2</mn><mo>+</mo></mrow></msup></math> shows geometrical isomerism. <br/>The geometrical isomers are <br/>(i) cis- <math><mo>[</mo><mi mathvariant=\"normal\">M</mi><mi mathvariant=\"normal\">B</mi><msub><mrow><mi mathvariant=\"normal\">r</mi></mrow><mrow><mn>2</mn></mrow></msub><mi mathvariant=\"normal\">C</mi><msub><mrow><mi mathvariant=\"normal\">l</mi></mrow><mrow><mn>2</mn></mrow></msub><mo>]</mo><mi mathvariant=\"normal\">S</mi><msub><mrow><mi mathvariant=\"normal\">O</mi></mrow><mrow><mn>4</mn></mrow></msub></math> <br/>(ii) trans- <math><mo>[</mo><mi mathvariant=\"normal\">M</mi><mi mathvariant=\"normal\">B</mi><msub><mrow><mi mathvariant=\"normal\">r</mi></mrow><mrow><mn>2</mn></mrow></msub><mi mathvariant=\"normal\">C</mi><msub><mrow><mi mathvariant=\"normal\">l</mi></mrow><mrow><mn>2</mn></mrow></msub><mo>]</mo><mi mathvariant=\"normal\">S</mi><msub><mrow><mi mathvariant=\"normal\">O</mi></mrow><mrow><mn>4</mn></mrow></msub></math> <br/>The compound also shows ionization isomerism. The ionization isomers are <br/>(i) <math><mo>[</mo><mi mathvariant=\"normal\">M</mi><mi mathvariant=\"normal\">B</mi><msub><mrow><mi mathvariant=\"normal\">r</mi></mrow><mrow><mn>2</mn></mrow></msub><mo>(</mo><mi mathvariant=\"normal\">S</mi><msub><mrow><mi mathvariant=\"normal\">O</mi></mrow><mrow><mn>4</mn></mrow></msub><mo>)</mo><mo>]</mo><mi mathvariant=\"normal\">C</mi><msub><mrow><mi mathvariant=\"normal\">l</mi></mrow><mrow><mn>2</mn></mrow></msub></math> <br/>(ii) <math><mo>[</mo><mi mathvariant=\"normal\">M</mi><mi mathvariant=\"normal\">C</mi><msub><mrow><mi mathvariant=\"normal\">l</mi></mrow><mrow><mn>2</mn></mrow></msub><mo>(</mo><mi mathvariant=\"normal\">S</mi><msub><mrow><mi mathvariant=\"normal\">O</mi></mrow><mrow><mn>4</mn></mrow></msub><mo>)</mo><mo>]</mo><mi mathvariant=\"normal\">B</mi><msub><mrow><mi mathvariant=\"normal\">r</mi></mrow><mrow><mn>2</mn></mrow></msub></math> <br/>(iii) <math><mo>[</mo><mi mathvariant=\"normal\">M</mi><mi mathvariant=\"normal\">B</mi><mi mathvariant=\"normal\">r</mi><mi mathvariant=\"normal\">C</mi><mi mathvariant=\"normal\">l</mi><mo>(</mo><mi mathvariant=\"normal\">S</mi><msub><mrow><mi mathvariant=\"normal\">O</mi></mrow><mrow><mn>4</mn></mrow></msub><mo>)</mo><mo>]</mo><mi mathvariant=\"normal\">B</mi><mi mathvariant=\"normal\">r</mi><mi mathvariant=\"normal\">C</mi><mi mathvariant=\"normal\">l</mi></math> <br/>Thus, a total of five isomers are formed.", "opts": [{"id": "rm9FE", "text": "2"}, {"id": "tkpha", "text": "4"}, {"id": "580tj", "text": "5"}, {"id": "0YrcF", "text": "7"}], "ans": "5", "correct": "580tj"}, {"id": "695e3b3c3dc984756e9de64b", "type": "singleCorrect", "html": "The complex showing a spin-only magnetic moment of <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mn>2</mn><mo>.</mo><mn>82</mn><mo>&#160;</mo><mi>BM</mi></math> is", "sol": "<p>The formula for spin-only magnetic moment <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mo>(</mo><mi mathvariant=\"normal\">&#956;</mi><mo>)</mo></math>&nbsp;of a compound is given as,</p><p><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi mathvariant=\"normal\">&#956;</mi><mi mathvariant=\"normal\">s</mi></msub><mo>=</mo><msqrt><mi mathvariant=\"normal\">n</mi><mo>(</mo><mi mathvariant=\"normal\">n</mi><mo>+</mo><mn>1</mn><mo>)</mo></msqrt></math></p><p>where&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi mathvariant=\"normal\">n</mi></math> is the number of unpaired electrons in the compound.</p><p>Given the value of&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi mathvariant=\"normal\">&#956;</mi><mi mathvariant=\"normal\">s</mi></msub><mo>=</mo><mn>2</mn><mo>.</mo><mn>82</mn><mo>&#160;</mo><mi>BM</mi><mo>.</mo></math></p><p>Putting the value of <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi mathvariant=\"normal\">&#956;</mi><mi mathvariant=\"normal\">s</mi></msub></math>&nbsp;in the formula of magnetic moment, we get,</p><p><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mn>2</mn><mo>.</mo><mn>82</mn><mo>&#160;</mo><mi>BM</mi><mo>=</mo><msqrt><mi mathvariant=\"normal\">n</mi><mo>(</mo><mi mathvariant=\"normal\">n</mi><mo>&#8201;</mo><mo>+</mo><mn>1</mn><mo>)</mo><mo>,</mo></msqrt></math><br/><math><mi mathvariant=\"normal\">n</mi><mfenced><mrow><mi mathvariant=\"normal\">n</mi><mo>+</mo><mn>1</mn></mrow></mfenced><mo>=</mo><msup><mfenced><mrow><mn>2</mn><mo>.</mo><mn>82</mn><mo>&#160;</mo><mi>BM</mi></mrow></mfenced><mn>2</mn></msup><mo>,</mo></math><br/><math><msup><mi mathvariant=\"normal\">n</mi><mn>2</mn></msup><mo>+</mo><mi mathvariant=\"normal\">n</mi><mo>=</mo><mn>7</mn><mo>.</mo><mn>95</mn><mo>&#8776;</mo><mn>8</mn><mo>,</mo></math><br/><math><msup><mi mathvariant=\"normal\">n</mi><mn>2</mn></msup><mo>+</mo><mi mathvariant=\"normal\">n</mi><mo>=</mo><mn>8</mn><mo>,</mo></math><br/><math><msup><mi mathvariant=\"normal\">n</mi><mn>2</mn></msup><mo>+</mo><mi mathvariant=\"normal\">n</mi><mo>-</mo><mn>8</mn><mo>=</mo><mn>0</mn><mo>,</mo></math><br/><math><msup><mi mathvariant=\"normal\">n</mi><mn>2</mn></msup><mo>+</mo><mn>4</mn><mi mathvariant=\"normal\">n</mi><mo>-</mo><mn>2</mn><mi mathvariant=\"normal\">n</mi><mo>-</mo><mn>8</mn><mo>=</mo><mn>0</mn><mo>,</mo></math><br/><math><mi mathvariant=\"normal\">n</mi><mfenced><mrow><mi mathvariant=\"normal\">n</mi><mo>+</mo><mn>4</mn></mrow></mfenced><mo>-</mo><mn>2</mn><mfenced><mrow><mi mathvariant=\"normal\">n</mi><mo>+</mo><mn>4</mn></mrow></mfenced><mo>=</mo><mn>0</mn><mo>,</mo></math><br/><math><mfenced><mrow><mi mathvariant=\"normal\">n</mi><mo>-</mo><mn>2</mn></mrow></mfenced><mfenced><mrow><mi mathvariant=\"normal\">n</mi><mo>+</mo><mn>4</mn></mrow></mfenced><mo>=</mo><mn>0</mn><mo>,</mo></math><br/><math><mi mathvariant=\"normal\">n</mi><mo>-</mo><mn>2</mn><mo>=</mo><mn>0</mn><mo>;</mo><mo>&#160;</mo><mi mathvariant=\"normal\">n</mi><mo>+</mo><mn>4</mn><mo>=</mo><mn>0</mn><mo>,</mo></math><br/><math><mi mathvariant=\"normal\">n</mi><mo>=</mo><mn>2</mn><mo>;</mo><mo>&#160;</mo><mi mathvariant=\"normal\">n</mi><mo>=</mo><mo>-</mo><mn>4</mn><mo>.</mo></math></p><p>Since the number of unpaired electrons <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mo>(</mo><mi mathvariant=\"normal\">n</mi><mo>)</mo></math>&nbsp;in a compound cannot be a negative value, the value of <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi mathvariant=\"normal\">n</mi><mo>=</mo><mo>-</mo><mn>4</mn></math>&nbsp;is discarded.</p><p>Therefore, the number of unpaired electrons&nbsp;in the given compound is <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mn>2</mn></math>. So, in order to find the complex showing a spin-only magnetic moment of&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mn>2</mn><mo>.</mo><mn>82</mn><mo>&#160;</mo><mi>BM</mi></math>,&nbsp;we have to look for the complex having&nbsp;two unpaired electrons.<br /><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mo>(</mo><mn>1</mn><mo>)</mo><mo>&#160;</mo><mi>Ni</mi><mo>(</mo><mi>CO</mi><msub><mo>)</mo><mn>4</mn></msub></math>-<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi>CO</mi></math> is a neutral ligand. So, the&nbsp;oxidation state of <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi>Ni</mi></math>, taken as <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi mathvariant=\"normal\">x</mi></math>&nbsp;in the complex is,</p><p><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi mathvariant=\"normal\">x</mi><mo>+</mo><mn>0</mn><mo>&#215;</mo><mn>4</mn><mo>=</mo><mn>0</mn><mo>,</mo></math><br/><math><mi mathvariant=\"normal\">x</mi><mo>+</mo><mn>0</mn><mo>=</mo><mn>0</mn><mo>,</mo></math><br/><math><mi mathvariant=\"normal\">x</mi><mo>=</mo><mn>0</mn><mo>.</mo></math></p><p>Therefore, the oxidation state of&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi>Ni</mi></math> is <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mn>0</mn></math>. The electronic configuration of <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mmultiscripts><mi>Ni</mi><mprescripts></mprescripts><mn>28</mn><none></none></mmultiscripts></math>&nbsp;is&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mo>[</mo><mi>Ar</mi><mo>]</mo><mn>3</mn><msup><mi mathvariant=\"normal\">d</mi><mn>8</mn></msup><mn>4</mn><msup><mi mathvariant=\"normal\">s</mi><mn>2</mn></msup></math>.</p><p><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi>CO</mi></math> is a strong ligand, so &nbsp;pairing of electrons will take place in <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi>Ni</mi></math> under its influence. Therefore, it will not have any unpaired electrons, and the complex <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mo>[</mo><mi>Ni</mi><mo>(</mo><mi>CO</mi><msub><mo>)</mo><mn>4</mn></msub><mo>]</mo></math>&nbsp;will have a <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mn>0</mn></math>&nbsp;spin-magnetic moment.</p><p><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mo>(</mo><mn>2</mn><mo>)</mo><mo>&#160;</mo><mo>[</mo><msub><mi>NiCl</mi><mn>4</mn></msub><msup><mo>]</mo><mrow><mn>2</mn><mo>-</mo></mrow></msup></math>-The charge on a&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msup><mi>Cl</mi><mo>-</mo></msup></math>&nbsp;ligand is&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mo>-</mo><mn>1</mn></math>. Therefore, the oxidation state of&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi>Ni</mi></math>, taken as&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi mathvariant=\"normal\">x</mi></math>&nbsp;in the complex, can be calculated as,</p><p><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi mathvariant=\"normal\">x</mi><mo>+</mo><mo>(</mo><mo>-</mo><mn>1</mn><mo>)</mo><mo>&#215;</mo><mn>4</mn><mo>=</mo><mo>-</mo><mn>2</mn><mo>,</mo><mspace linebreak=\"newline\"/><mi mathvariant=\"normal\">x</mi><mo>-</mo><mn>4</mn><mo>=</mo><mo>-</mo><mn>2</mn><mo>,</mo><mspace linebreak=\"newline\"/><mi mathvariant=\"normal\">x</mi><mo>=</mo><mo>-</mo><mn>2</mn><mo>+</mo><mn>4</mn><mo>,</mo><mspace linebreak=\"newline\"/><mi mathvariant=\"normal\">x</mi><mo>=</mo><mo>+</mo><mn>2</mn><mo>.</mo></math></p><p>Therefore, the oxidation state of&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi>Ni</mi></math>&nbsp;in the complex is&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mo>+</mo><mn>2</mn></math>. The electronic configuration of&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msup><mi>Ni</mi><mrow><mn>2</mn><mo>+</mo></mrow></msup></math>&nbsp;can be written as&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mo>[</mo><mi>Ar</mi><mo>]</mo><mn>3</mn><msup><mi mathvariant=\"normal\">d</mi><mn>8</mn></msup><mn>4</mn><msup><mi mathvariant=\"normal\">s</mi><mn>0</mn></msup></math>.</p><p><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msup><mi>Cl</mi><mo>-</mo></msup></math>&nbsp;is a weak field ligand, so it will not cause pairing of the valence electrons.<img alt=\"\" src=\"https://cdn-question-pool.getmarks.app/NEET/DPP-Chemistry/EM0008874_AnsExp1_1.jpg\" style=\"width: 421px; height: 156px;\" /><br />The four&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msup><mi>Cl</mi><mo>-</mo></msup></math>&nbsp;ligands donate <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mn>8</mn></math>&nbsp;electrons to the central&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msup><mi>Ni</mi><mrow><mn>2</mn><mo>+</mo></mrow></msup></math>&nbsp;ion, and so, it forms an&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msup><mi>sp</mi><mn>3</mn></msup></math>&nbsp;hybridized ion.</p><p>Therefore, <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mo>[</mo><msub><mi>NiCl</mi><mn>4</mn></msub><msup><mo>]</mo><mrow><mn>2</mn><mo>-</mo></mrow></msup></math>&nbsp;is the complex with <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mn>2</mn></math>&nbsp;unpaired electrons,&nbsp;and therefore, it has a spin-only magnetic moment of <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mn>2</mn><mo>.</mo><mn>82</mn><mo>&#160;</mo><mi>BM</mi><mo>.</mo></math></p><p><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mo>(</mo><mn>3</mn><mo>)</mo><mo>&#160;</mo><mo>[</mo><mi>Ni</mi><mo>(</mo><msub><mi>PPh</mi><mn>3</mn></msub><msub><mo>)</mo><mn>4</mn></msub><mo>]</mo></math>-The charge&nbsp;on the&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi>PPh</mi><mn>3</mn></msub></math>&nbsp;ligand is <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mo>-</mo><mn>1</mn></math>. The oxidation state of&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi>Ni</mi></math>&nbsp;can be calculated as,</p><p><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi mathvariant=\"normal\">x</mi><mo>+</mo><mo>(</mo><mo>-</mo><mn>1</mn><mo>)</mo><mo>&#215;</mo><mn>4</mn><mo>=</mo><mn>0</mn><mo>,</mo></math><br/><math><mi mathvariant=\"normal\">x</mi><mo>-</mo><mn>4</mn><mo>=</mo><mn>0</mn><mo>,</mo></math><br/><math><mi mathvariant=\"normal\">x</mi><mo>=</mo><mo>+</mo><mn>4</mn><mo>.</mo><mo>&#160;</mo></math></p><p>The electronic configuration of&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msup><mi>Ni</mi><mrow><mo>+</mo><mn>4</mn></mrow></msup></math>&nbsp;can be written as&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mo>[</mo><mi>Ar</mi><mo>]</mo><mn>3</mn><msup><mi mathvariant=\"normal\">d</mi><mn>6</mn></msup><mn>4</mn><msup><mi mathvariant=\"normal\">s</mi><mn>0</mn></msup></math>.</p><p>Since&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi>PPh</mi><mn>3</mn></msub></math>&nbsp;is a strong field ligand, it will cause pairing of the electrons in&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msup><mi>Ni</mi><mrow><mo>+</mo><mn>4</mn></mrow></msup></math>, and therefore, it will have <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mn>0</mn></math>&nbsp;spin-magnetic moment value.</p><p><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mo>(</mo><mn>4</mn><mo>)</mo><mo>&#160;</mo><mo>[</mo><mi>Ni</mi><mo>(</mo><mi>CN</mi><msub><mo>)</mo><mn>4</mn></msub><msup><mo>]</mo><mrow><mn>2</mn><mo>-</mo></mrow></msup></math>-The charge on a&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msup><mi>CN</mi><mo>-</mo></msup></math>&nbsp;ligand is&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mo>-</mo><mn>1</mn></math>. Therefore,&nbsp;the oxidation state of&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi>Ni</mi></math>&nbsp;can be calculated as,</p><p><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi mathvariant=\"normal\">x</mi><mo>+</mo><mo>(</mo><mo>-</mo><mn>1</mn><mo>)</mo><mo>&#215;</mo><mn>4</mn><mo>=</mo><mo>-</mo><mn>2</mn><mo>,</mo></math><br/><math><mi mathvariant=\"normal\">x</mi><mo>-</mo><mn>4</mn><mo>=</mo><mo>-</mo><mn>2</mn><mo>,</mo></math><br/><math><mi mathvariant=\"normal\">x</mi><mo>=</mo><mo>-</mo><mn>2</mn><mo>+</mo><mn>4</mn><mo>,</mo></math><br/><math><mi mathvariant=\"normal\">x</mi><mo>=</mo><mo>+</mo><mn>2</mn><mo>.</mo></math></p><p>The electronic configuration of&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msup><mi>Ni</mi><mrow><mn>2</mn><mo>+</mo></mrow></msup></math>&nbsp;can be written as&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mo>[</mo><mi>Ar</mi><mo>]</mo><mn>3</mn><msup><mi mathvariant=\"normal\">d</mi><mn>8</mn></msup><mn>4</mn><msup><mi mathvariant=\"normal\">s</mi><mn>0</mn></msup></math>.</p><p>Since&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msup><mi>CN</mi><mo>-</mo></msup></math>&nbsp;is&nbsp;a strong field ligand, it will cause pairing of the electrons in <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msup><mi>Ni</mi><mrow><mn>2</mn><mo>+</mo></mrow></msup></math>, and it will have no spin-magnetic moment value.</p>", "opts": [{"id": "UyG0M", "text": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi>Ni</mi><msub><mfenced><mi>CO</mi></mfenced><mn>4</mn></msub></math>"}, {"id": "Q5D8z", "text": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msup><mfenced open=\"[\" close=\"]\"><msub><mi>NiCl</mi><mn>4</mn></msub></mfenced><mrow><mn>2</mn><mo>-</mo></mrow></msup></math>"}, {"id": "p8p2Q", "text": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi>Ni</mi><msub><mfenced><msub><mi>PPh</mi><mn>3</mn></msub></mfenced><mn>4</mn></msub></math>"}, {"id": "YnBA4", "text": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msup><mfenced open=\"[\" close=\"]\"><mrow><mi>Ni</mi><msub><mfenced><mi>CN</mi></mfenced><mn>4</mn></msub></mrow></mfenced><mrow><mn>2</mn><mo>-</mo></mrow></msup></math>"}], "ans": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msup><mfenced open=\"[\" close=\"]\"><msub><mi>NiCl</mi><mn>4</mn></msub></mfenced><mrow><mn>2</mn><mo>-</mo></mrow></msup></math>", "correct": "Q5D8z"}, {"id": "695e3b3c3dc984756e9de64c", "type": "singleCorrect", "html": "Which of following coordinate complexes is an exception to EAN rule?<br/>(Given Atomic number Pt = 78, Fe = 26, Zn = 30, Cu = 29)", "sol": "As in <math><mo>[</mo><mi mathvariant=\"normal\">C</mi><mi mathvariant=\"normal\">u</mi><mo>(</mo><msub><mrow><mi mathvariant=\"normal\">H</mi></mrow><mrow><mn>2</mn></mrow></msub><mi mathvariant=\"normal\">O</mi><msub><mrow><mo>)</mo></mrow><mrow><mn>4</mn></mrow></msub><msup><mrow><mo>]</mo></mrow><mrow><mn>2</mn><mo>+</mo></mrow></msup></math> EAN is 35, so it does not follow EAN rule.<br/>EAN <math><mo>=</mo></math> Atomic number of central atom + Number of electrons donated by ligands \u2013 oxidation state of central atom.<br/>(A) <math><mo>[</mo><mi mathvariant=\"normal\">P</mi><mi mathvariant=\"normal\">t</mi><mo>(</mo><mi mathvariant=\"normal\">N</mi><msub><mrow><mi mathvariant=\"normal\">H</mi></mrow><mrow><mn>3</mn></mrow></msub><msub><mrow><mo>)</mo></mrow><mrow><mn>6</mn></mrow></msub><msup><mrow><mo>]</mo></mrow><mrow><mn>4</mn><mo>+</mo></mrow></msup></math> EAN <math><mo>=</mo><mn>78</mn><mo>+</mo><mn>2</mn><mo>\u00d7</mo><mn>6</mn><mo>-</mo><mn>4</mn><mo>=</mo><mn>86</mn></math><br/>(B) <math><mo>[</mo><mi mathvariant=\"normal\">F</mi><mi mathvariant=\"normal\">e</mi><mo>(</mo><mi mathvariant=\"normal\">C</mi><mi mathvariant=\"normal\">N</mi><msub><mrow><mo>)</mo></mrow><mrow><mn>6</mn></mrow></msub><msup><mrow><mo>]</mo></mrow><mrow><mn>4</mn><mo>-</mo></mrow></msup></math> EAN <math><mo>=</mo><mn>26</mn><mo>+</mo><mn>1</mn><mo>\u00d7</mo><mn>6</mn><mo>+</mo><mn>4</mn><mo>=</mo><mn>36</mn></math><br/>(C) <math><mo>[</mo><mi mathvariant=\"normal\">Z</mi><mi mathvariant=\"normal\">n</mi><mo>(</mo><mi mathvariant=\"normal\">N</mi><msub><mrow><mi mathvariant=\"normal\">H</mi></mrow><mrow><mn>3</mn></mrow></msub><msub><mrow><mo>)</mo></mrow><mrow><mn>4</mn></mrow></msub><msup><mrow><mo>]</mo></mrow><mrow><mn>2</mn><mo>+</mo></mrow></msup></math> EAN <math><mo>=</mo><mn>30</mn><mo>+</mo><mn>2</mn><mo>\u00d7</mo><mn>4</mn><mo>-</mo><mn>2</mn><mo>=</mo><mn>36</mn></math><br/>(D) <math><mo>[</mo><mi mathvariant=\"normal\">C</mi><mi mathvariant=\"normal\">u</mi><mo>(</mo><msub><mrow><mi mathvariant=\"normal\">H</mi></mrow><mrow><mn>2</mn></mrow></msub><mi mathvariant=\"normal\">O</mi><msub><mrow><mo>)</mo></mrow><mrow><mn>4</mn></mrow></msub><msup><mrow><mo>]</mo></mrow><mrow><mn>2</mn><mo>+</mo></mrow></msup></math> EAN <math><mo>=</mo><mn>29</mn><mo>+</mo><mn>2</mn><mo>\u00d7</mo><mn>4</mn><mo>-</mo><mn>2</mn><mo>=</mo><mn>35</mn></math>", "opts": [{"id": "TynFR", "text": "<math><mo>[</mo><mi mathvariant=\"normal\">P</mi><mi mathvariant=\"normal\">t</mi><mo>(</mo><mi mathvariant=\"normal\">N</mi><msub><mrow><mi mathvariant=\"normal\">H</mi></mrow><mrow><mn>3</mn></mrow></msub><msub><mrow><mo>)</mo></mrow><mrow><mn>6</mn></mrow></msub><msup><mrow><mo>]</mo></mrow><mrow><mn>4</mn><mo>+</mo></mrow></msup></math>"}, {"id": "5l8yx", "text": "<math><mo>[</mo><mi mathvariant=\"normal\">F</mi><mi mathvariant=\"normal\">e</mi><mo>(</mo><mi mathvariant=\"normal\">C</mi><mi mathvariant=\"normal\">N</mi><msub><mrow><mo>)</mo></mrow><mrow><mn>6</mn></mrow></msub><msup><mrow><mo>]</mo></mrow><mrow><mn>4</mn><mo>-</mo></mrow></msup></math>"}, {"id": "bfgla", "text": "<math><mo>[</mo><mi mathvariant=\"normal\">Z</mi><mi mathvariant=\"normal\">n</mi><mo>(</mo><mi mathvariant=\"normal\">N</mi><msub><mrow><mi mathvariant=\"normal\">H</mi></mrow><mrow><mn>3</mn></mrow></msub><msub><mrow><mo>)</mo></mrow><mrow><mn>4</mn></mrow></msub><msup><mrow><mo>]</mo></mrow><mrow><mn>2</mn><mo>+</mo></mrow></msup></math>"}, {"id": "paUZv", "text": "<math><mo>[</mo><mi mathvariant=\"normal\">C</mi><mi mathvariant=\"normal\">u</mi><mo>(</mo><msub><mrow><mi mathvariant=\"normal\">H</mi></mrow><mrow><mn>2</mn></mrow></msub><mi mathvariant=\"normal\">O</mi><msub><mrow><mo>)</mo></mrow><mrow><mn>4</mn></mrow></msub><msup><mrow><mo>]</mo></mrow><mrow><mn>2</mn><mo>+</mo></mrow></msup></math>"}], "ans": "<math><mo>[</mo><mi mathvariant=\"normal\">C</mi><mi mathvariant=\"normal\">u</mi><mo>(</mo><msub><mrow><mi mathvariant=\"normal\">H</mi></mrow><mrow><mn>2</mn></mrow></msub><mi mathvariant=\"normal\">O</mi><msub><mrow><mo>)</mo></mrow><mrow><mn>4</mn></mrow></msub><msup><mrow><mo>]</mo></mrow><mrow><mn>2</mn><mo>+</mo></mrow></msup></math>", "correct": "paUZv"}, {"id": "695e3b3c3dc984756e9de64d", "type": "singleCorrect", "html": "In which of the following octahedral complexes of Co (At. No. 27), will the magnitude of <math><mo>\u2206</mo></math><span style=\"display: none;\">\u00a0<sub>0</sub><span style=\"display: none;\">\u00a0 be the highest?", "sol": "CFSE (crystal field splitting energy) for octahedral complex, <math><msub><mrow><mo>\u2206</mo></mrow><mrow><mn>0</mn></mrow></msub></math> depends on the strength of ligand. Spectrochemically it has been found that the strength ution of ammonia it produces [Cu(NH<sub>3</sub>)<sub>4</sub>]<sup>2+ </sup>which has deep blue colour.<br/><math> <mrow> <mtable> <mtr> <mtd> <mfenced close=\"]\" open=\"[\" separators=\",\"> <mrow> <mtext>Cu</mtext> <msub> <mrow> <mfenced close=\")\" open=\"(\" separators=\",\"> <mrow> <msub> <mtext>H</mtext> <mn>2</mn> </msub> <mtext>O</mtext> </mrow> </mfenced> </mrow> <mn>4</mn> </msub> </mrow> </mfenced> <msub> <mtext>SO</mtext> <mn>4</mn> </msub> <mo>&middot;</mo> <msub> <mtext>H</mtext> <mn>2</mn> </msub> <mtext>O</mtext> </mtd> <mtd> <mo>+</mo> </mtd> <mtd> <msub> <mtext>NH</mtext> <mn>3</mn> </msub> </mtd> <mtd> <mo>&rarr;</mo> </mtd> <mtd> <mfenced close=\"]\" open=\"[\" separators=\",\"> <mrow> <mtext>Cu</mtext> <msub> <mrow> <mfenced close=\")\" open=\"(\" separators=\",\"> <mrow> <msub> <mtext>NH</mtext> <mn>3</mn> </msub> </mrow> </mfenced> </mrow> <mn>4</mn> </msub> </mrow> </mfenced> <msub> <mtext>SO</mtext> <mn>4</mn> </msub> </mtd> </mtr> <mtr> <mtd> </mtd> <mtd> </mtd> <mtd> </mtd> <mtd> </mtd> <mtd> <mtext>Deep blue colour</mtext> </mtd> </mtr> <mtr> <mtd> </mtd> <mtd> </mtd> <mtd> </mtd> <mtd> </mtd> <mtd> <mfenced close=\")\" open=\"(\" separators=\",\"> <mrow> <mtext>neddle like crystal</mtext> </mrow> </mfenced> </mtd> </mtr> </mtable> </mrow> </math><br/><math> <mrow> <mfenced close=\"]\" open=\"[\" separators=\",\"> <mrow> <mtext>X</mtext> </mrow> </mfenced> <mo>=</mo> <mfenced close=\"]\" open=\"[\" separators=\",\"> <mrow> <mtext>Cu</mtext> <msub> <mrow> <mfenced close=\")\" open=\"(\" separators=\",\"> <mrow> <msub> <mtext>H</mtext> <mn>2</mn> </msub> <mtext>O</mtext> </mrow> </mfenced> </mrow> <mn>4</mn> </msub> </mrow> </mfenced> <msub> <mtext>SO</mtext> <mn>4</mn> </msub> <mo>&middot;</mo> <msub> <mtext>H</mtext> <mn>2</mn> </msub> <mtext>O</mtext> </mrow> </math><br/><math> <mrow> <mfenced close=\"]\" open=\"[\" separators=\",\"> <mrow> <mtext>Y</mtext> </mrow> </mfenced> <mo>=</mo> <mfenced close=\"]\" open=\"[\" separators=\",\"> < msub> <mtext>H</mtext> <mn>2</mn> </msub> <mtext>O</mtext> </mrow> </mfenced> </mrow> <mn>4</mn> </msub> </mrow> </mfenced> <msub> <mtext>SO</mtext> <mn>4</mn> </msub> <mo>&middot;</mo> <msub> <mtext>H</mtext> <mn>2</mn> </msub> <mtext>O</mtext> </mrow> </math> and [Y] is [Cu(NH<sub>3</sub>)<sub>4</sub>]SO<sub>4</sub>", "correct": "zQXRQ"}, {"id": "695e3b3c3dc984756e9de653", "type": "singleCorrect", "html": "The correct statements among I to III are: <br/>(I) Valence bond theory cannot explain the color exhibited by transition metal complexes. <br/>(II) Valence bond theory can predict quantitatively the magnetic properties of transition metal complexes. <br/>(III) Valence bond theory cannot distinguish ligands as weak and strong field ones.", "sol": "Valence Bond Theory cannot explain the colour of transition metal complexes .this theory was also unable to distinguish between weak and strong Fields ligands. Valence Bond Theory does not explain and give quantitative interpretation of magnetic data. Hence, statement (II) is not right.", "opts": [{"id": "lXzs4", "text": "(I) and (II) only"}, {"id": "T3eNd", "text": "(II) and (III) only"}, {"id": "B8WmY", "text": "(I) and (III) only"}, {"id": "aA5x3", "text": "(I), (II) and (III)"}], "ans": "(I) and (II) only", "correct": "lXzs4"}, {"id": "695e3b3c3dc984756e9de654", "type": "singleCorrect", "html": "A complex formed from nitrato and chloro ligands gives a precipitate of two moles of <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi>AgCl</mi></math> with <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi>AgNO</mi><mn>3</mn></msub></math>. The formula of the complex is:", "sol": "<p>Pentaaminenitratocobalt(III)chloride can give two moles of silver chloride precipitate on reacting with silver nitrate, because the counter chloride ion can&nbsp;ionise to give the reaction.</p><p><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><munder><mrow><mo>[</mo><mi>Co</mi><mo>(</mo><msub><mi>NH</mi><mn>3</mn></msub><msub><mo>)</mo><mn>5</mn></msub><msub><mi>NO</mi><mn>3</mn></msub><mo>]</mo><msub><mi>Cl</mi><mn>2</mn></msub></mrow><mrow><mi>Pentaaminenitratocobalt</mi><mo>(</mo><mi>III</mi><mo>)</mo><mi>chloride</mi></mrow></munder><mo>&#160;</mo><mo>+</mo><munder><mrow><mn>2</mn><msub><mi>AgNO</mi><mn>3</mn></msub></mrow><mrow><mo>(</mo><mi>silver</mi><mo>(</mo><mi mathvariant=\"normal\">I</mi><mo>)</mo><mo>&#160;</mo><mi>nitrate</mi><mo>)</mo></mrow></munder><mo>&#160;</mo><mo>&#8594;</mo><mo>&#160;</mo><munder><mrow><mfenced close=\"]\" open=\"[\"><mrow><mi>Co</mi><mo>(</mo><msub><mi>NH</mi><mn>3</mn></msub><msub><mo>)</mo><mn>5</mn></msub><msub><mi>NO</mi><mn>3</mn></msub></mrow></mfenced><msub><mfenced><msub><mi>NO</mi><mn>3</mn></msub></mfenced><mn>2</mn></msub></mrow><mrow><mo>(</mo><mi>Pentaamminenitratocobalt</mi><mo>(</mo><mi>III</mi><mo>)</mo><mi>nitrate</mi><mo>)</mo></mrow></munder><mo>&#160;</mo><mo>+</mo><mo>&#160;</mo><munder><mrow><mn>2</mn><mi>AgCl</mi></mrow><mrow><mo>(</mo><mi>silver</mi><mo>(</mo><mi mathvariant=\"normal\">I</mi><mo>)</mo><mo>&#160;</mo><mi>chloride</mi><mo>)</mo></mrow></munder><mo>&#160;</mo></math></p>", "opts": [{"id": "hwkWL", "text": "<p><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mo>[</mo><mi>Co</mi><mo>(</mo><msub><mi>NH</mi><mn>3</mn></msub><msub><mo>)</mo><mn>5</mn></msub><msub><mi>NO</mi><mn>3</mn></msub><mo>]</mo><msub><mi>Cl</mi><mn>2</mn></msub></math></p>"}, {"id": "eveu4", "text": "<p><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mo>[</mo><mi>Co</mi><mo>(</mo><msub><mi>NH</mi><mn>3</mn></msub><msub><mo>)</mo><mn>5</mn></msub><mi>Cl</mi><mo>]</mo><msub><mi>NO</mi><mn>3</mn></msub><mi>Cl</mi></math></p>"}, {"id": "nziKV", "text": "<p><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mo>[</mo><mi>Co</mi><mo>(</mo><msub><mi>NH</mi><mn>3</mn></msub><msub><mo>)</mo><mn>5</mn></msub><mi>Cl</mi><mo>]</mo><mo>(</mo><msub><mi>NO</mi><mn>3</mn></msub><msub><mo>)</mo><mn>2</mn></msub></math></p>"}, {"id": "rE4Gy", "text": ow><mfenced separators=\"|\"><mrow><mi>N</mi><msub><mrow><mi>H</mi></mrow><mrow><mn>3</mn></mrow></msub></mrow></mfenced></mrow><mrow><mn>2</mn></mrow></msub><mi>C</mi><msub><mrow><mi>l</mi></mrow><mrow><mn>2</mn></mrow></msub></mrow></mfenced></math></td>\t\t</tr>\t\t<tr>\t\t\t<td>D. <math><msup><mrow><mi>d</mi></mrow><mrow><mn>2</mn></mrow></msup><mi>s</mi><msup><mrow><mi>p</mi></mrow><mrow><mn>3</mn></mrow></msup></math></td>\t\t\t<td>(iv) <math><msup><mrow><mfenced close=\"]\" open=\"[\" separators=\"|\"><mrow><mi>C</mi><mi>o</mi><msub><mrow><mi>F</mi></mrow><mrow><mn>6</mn></mrow></msub></mrow></mfenced></mrow><mrow><mn>3</mn><mo>-</mo></mrow></msup></math></td>\t\t</tr>\t\t<tr>\t\t\t<td>&nbsp;</td>\t\t\t<td>(v) <math><mfenced close=\"]\" open=\"[\" separators=\"|\"><mrow><mi>F</mi><mi>e</mi><msub><mrow><mfenced separators=\"|\"><mrow><mi>C</mi><mi>O</mi></mrow></mfenced></mrow><mrow><mn>5</mn></mrow></msub></mrow></mfenced></math></td>\t\t</tr>\t</tbody></table>", "sol": "<p>I.<math><msup><mrow><mfenced close=\"]\" open=\"[\" separators=\"|\"><mrow><mi>C</mi><mi>o</mi><msub><mrow><mfenced separators=\"|\"><mrow><mi>N</mi><msub><mrow><mi>H</mi></mrow><mrow><mn>3</mn></mrow></msub></mrow></mfenced></mrow><mrow><mn>6</mn></mrow></msub></mrow></mfenced></mrow><mrow><mn>3</mn><mo>+</mo></mrow></msup></math><span style=\"display: none;\">&nbsp;<span style=\"display: none;\">&nbsp;<br/>Here Co is present as <math><mi>C</mi><msup><mrow><mi>o</mi></mrow><mrow><mn>3</mn><mo>+</mo></mrow></msup></math> ion. <math><mi>N</mi><msub><mrow><mi>H</mi></mrow><mrow><mn>3</mn></mrow></msub></math> being strong field ligand pair up the unpaired electrons of Co.<br/><math><msub><mrow></mrow><mrow><mn>27</mn></mrow></msub><mi>C</mi><mi>o</mi><mo>=</mo><mfenced close=\"]\" open=\"[\" separators=\"|\"><mrow><mi>A</mi><mi>r</mi></mrow></mfenced><mn>3</mn><msup><mrow><mi>d</mi></mrow><mrow><mn>7</mn></mrow></msup><mn>4</mn><msup><mrow><mi>s</mi></mrow><mrow><mn>2</mn></mrow></msup></math><br/><math><mo>&there4;</mo></math> <math><mi>C</mi><msup><mrow><mi>o</mi></mrow><mrow><mn>3</mn><mo>+</mo></mrow></msup><mo>=</mo><mfenced close=\"]\" open=\"[\" separators=\"|\"><mrow><mi>A</mi><mi>r</mi></mrow></mfenced><mn>3</mn><msup><mrow><mi>d</mi></mrow><mrow><mn>6</mn></mrow></msup><mn>4</mn><msup><mrow><mi>s</mi></mrow><mrow><mn>0</mn></mrow></msup></math><br/><img alt=\"\" height=\"83\" src=\"https://cdn-question-pool.getmarks.app/NEET/DPP-Chemistry/9_solu_chem_14.jpg\" width=\"209\" /><br />II. <math><mfenced close=\"]\" open=\"[\" separators=\"|\"><mrow><mi>N</mi><mi>i</mi><msub><mrow><mfenced separators=\"|\"><mrow><mi>C</mi><mi>O</mi></mrow></mfenced></mrow><mrow><mn>4</mn></mrow></msub></mrow></mfenced></math></p><p>Here Ni is present in its ground state. CO being a strong field ligand, pair up the unpaired electrons of Ni<br/><math><msub><mrow></mrow><mrow><mn>28</mn></mrow></msub><mi>N</mi><mi>i</mi><mo>=</mo><mfenced close=\"]\" open=\"[\" separators=\"|\"><mrow><mi>A</mi><mi>r</mi></mrow></mfenced><mn>3</mn><msup><mrow><mi>d</mi></mrow><mrow><mn>8</mn></mrow></msup><mi>&nbsp;</mi><mn>4</mn><msup><mrow><mi>s</mi></mrow><mrow><mn>2</mn></mrow></msup></math><br/><img alt=\"\" src=\"https://cdn-question-pool.getmarks.app/NEET/DPP-Chemistry/9_solu_1_chem_14.jpg\" style=\"width: 248px; height: 124px;\" /><br />III. <math><mfenced close=\"]\" open=\"[\" separators=\"|\"><mrow><mi>P</mi><mi>t</mi><msub><mrow><mfenced separators=\"|\"><mrow><mi>N</mi><msub><mrow><mi>H</mi></mrow><mrow><mn>3</mn></mrow></msub></mrow></mfenced></mrow><mrow><mn>2</mn></mrow></msub><mi>C</mi><msub><mrow><mi>l</mi></mrow><mrow><mn>2</mn></mrow></msub></mrow></mfenced></math><br/>Here Pt is present as <math><mi>P</mi><msup><mrow><mi>t</mi></mrow><mrow><mn>2</mn><mo>+</mo></mrow></msup></math> ion.<br/><math><msub><mrow></mrow><mrow><mn>78</mn></mrow></msub><mi>P</mi><mi>t</mi><mo>=</mo><mfenced close=\"]\" open=\"[\" separators=\"|\"><mrow><mi>X</mi><mi>e</mi></mrow></mfenced><mi>&nbsp;</mi><mn>5</mn><msup><mrow><mi>d</mi></mrow><mrow><mn>9</mn></mrow></msup><mi>&nbsp;</mi><mn>6</mn><msup><mrow><mi>s</mi></mrow><mrow><mn>1</mn></mrow></msup></math><br/><math><mi>P</mi><msup><mrow><mi>t</mi></mrow><mrow><mn>2</mn><mo>+</mo></mrow></msup><mo>=</mo><mfenced close=\"]\" open=\"[\" separators=\"|\"><mrow><mi>X</mi><mi>e</mi></mrow></mfenced><mi>&nbsp;</mi><mn>5</mn><msup><mrow><mi>d</mi></mrow><mrow><mn>8</mn></mrow></msup><mi>&nbsp;</mi><mn>6</mn><msup><mrow><mi>s</mi></mrow><mrow><mn>0</mn></mrow></msup><mi>&nbsp;</mi></math><br/><img alt=\"\" src=\"https://cdn-question-pool.getmarks.app/NEET/DPP-Chemistry/9_solu_2_chem_14.jpg\" style=\"width: 275px; height: 114px;\" /><br />IV. <math><msup><mrow><mfenced close=\"]\" open=\"[\" separators=\"|\"><mrow><mi>C</mi><mi>o</mi><msub><mrow><mi>F</mi></mrow><mrow><mn>6</mn></mrow></msub></mrow></mfenced></mrow><mrow><mn>3</mn><mo>-</mo></mrow></msup></math><br/>Here Co is present as <math><mi>C</mi><msup><mrow><mi>o</mi></mrow><mrow><mn>3</mn><mo>+</mo></mrow></msup></math> ion, F being weak field ligand is unable to pair up its unpaired electrons.<br/><math><mi>C</mi><msup><mrow><mi>o</mi></mrow><mrow><mn>3</mn><mo>+</mo></mrow></msup><mo>=</mo><mfenced close=\"]\" open=\"[\" separators=\"|\"><mrow><mi>A</mi><mi>r</mi></mrow></mfenced><mn>3</mn><msup><mrow><mi>d</mi></mrow><mrow><mn>6</mn></mrow></msup><mi>&nbsp;</mi><mn>4</mn><msup><mrow><mi>s</mi></mrow><mrow><mn>0</mn></mrow></msup></math><br/><img alt=\"\" src=\"https://cdn-question-pool.getmarks.app/NEET/DPP-Chemistry/9_solu_3_chem_14.jpg\" style=\"width: 272px; height: 88px;\" /><br />V. <math><mfenced close=\"]\" open=\"[\" separators=\"|\"><mrow><mi>F</mi><mi>e</mi><msub><mrow><mfenced separators=\"|\"><mrow><mi>C</mi><mi>O</mi></mrow></mfenced></mrow><mrow><mn>5</mn></mrow></msub></mrow></mfenced></math><br/>Here Fe is present in its ground state.<br/><math><msub><mrow></mrow><mrow><mn>26</mn></mrow></msub><mi>F</mi><mi>e</mi><mo>=</mo><mfenced close=\"]\" open=\"[\" separators=\"|\"><mrow><mi>A</mi><mi>r</mi></mrow></mfenced><mn>3</mn><msup><mrow><mi>d</mi></mrow><mrow><mn>6</mn></mrow></msup><mi>&nbsp;</mi><mn>4</mn><msup><mrow><mi>s</mi></mrow><mrow><mn>2</mn></mrow></msup></math><br/><img alt=\"\" src=\"https://cdn-question-pool.getmarks.app/NEET/DPP-Chemistry/9_solu_4_chem_14.jpg\" style=\"width: 254px; height: 108px;\" /></p>", "opts": [{"id": "WHoib", "text": "<table border=\"1\"><tr><td> A</td><td> B</td><td> C</td><td> D</td></tr><tr><td> (v)</td><td> (ii)</td><td> (iv)</td><td> (iii)</td></tr></table>"}, {"id": "IVXRj", "text": "<table border=\"1\"><tr><td> A</td><td> B</td><td> C</td><td> D</td></tr><tr><td> (ii)</td><td> (iii)</td><td> (iv)</td><td> (v)</td></tr></table>"}, {"id": "2GFvS", "text": "<table border=\"1\"><tr><td> A</td><td> B</td><td> C</td><td> D</td></tr><tr><td> (ii)</td><td> (iii)</td><td> (i)</td><td> (v)</td></tr></table>"}, {"id": "xbTjQ", "text": "<table border=\"1\">\t<tbody>\t\t<tr>\t\t\t<td>A</td>\t\t\t<td>B</td>\t\t\t<td>C</td>\t\t\t<td>D</td>\t\t</tr>\t\t<tr>\t\t\t<td>(iii)</td>\t\t\t<td>(ii)</td>\t\t\t<td>(iv)</td>\t\t\t<td>(i)</td>\t\t</tr>\t</tbody></table>"}], "ans": "<table border=\"1\">\t<tbody>\t\t<tr>\t\t\t<td>A</td>\t\t\t<td>B</td>\t\t\t<td>C</td>\t\t\t<td>D</td>\t\t</tr>\t\t<tr>\t\t\t<td>(iii)</td>\t\t\t<td>(ii)</td>\t\t\t<td>(iv)</td>\t\t\t<td>(i)</td>\t\t</tr>\t</tbody></table>", "correct": "xbTjQ"}, {"id": "695e3b3c3dc984756e9de656", "type": "singleCorrect", "html": "What is the incorrect statement regarding two given complexes <math> <mrow> <mfenced close=\"]\" open=\"[\"> <mrow> <mtext>Cr</mtext><mfenced> <mrow> <msub> <mtext>H</mtext> <mtext>2</mtext> </msub> <msub> <mtext>O</mtext> <mtext>6</mtext> </msub> </mrow> </mfenced><msub> <mrow> <mtext>Cl</mtext></mrow> <mtext>3</mtext> </msub> </mrow> </mfenced><mtext>\u00a0</mtext><mfenced> <mtext>A</mtext> </mfenced></mrow> </math> and <math> <mrow> <mfenced close=\"]\" open=\"[\"> <mrow> <mtext>Cr</mtext><msub> <mrow> <mfenced> <mrow> <msub> <mrow> <mtext>NH</mtext></mrow> <mtext>3</mtext> </msub> </mrow> </mfenced></mrow> <mn>6</mn> </msub> </mrow> </mfenced><msub> <mrow> <mtext>Cl</mtext></mrow> <mtext>3</mtext> </msub> <mfenced> <mtext>B</mtext> </mfenced></mrow><mo>,</mo> </math> \u00a0which are violet and yellow coloured respectively?", "sol": "<math> <mrow> <msub> <mrow> <mfenced> <mrow> <msub> <mtext>\u0394</mtext> <mn>0</mn> </msub> </mrow> </mfenced></mrow> <mtext>A</mtext> </msub> <mo>&lt;</mo><msub> <mrow> <mfenced> <mrow> <msub> <mtext>\u0394</mtext> <mn>0</mn> </msub> </mrow> </mfenced></mrow> <mtext>B</mtext></msub></mrow></math>, both complexes have <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi>CN</mi><mo>=</mo><mn>6</mn><mo>,</mo></math> <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi mathvariant=\"normal\">B</mi></math> has strong field ligand and <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi mathvariant=\"normal\">A</mi></math> has weak field ligand<br/>so <math> <msub> <mfenced> <mrow> <msub> <mtext>\u0394</mtext> <mn>0</mn> </msub> </mrow> </mfenced> <mtext>A</mtext> </msub> <mo>&lt;</mo><msub> <mfenced> <mrow> <msub> <mtext>\u0394</mtext> <mn>0</mn> </msub> </mrow> </mfenced> <mtext>B</mtext> </msub> </math><br/>In both complexes, <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi>Cr</mi></math> has <math><mn>3</mn></math> unpaired electrons and hence, will be paramagnetic <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfenced close=\"]\" open=\"[\" separators=\"|\"><mrow><mi>Cr</mi><mfenced separators=\"|\"><mrow><msub><mi mathvariant=\"normal\">H</mi><mn>2</mn></msub><mi mathvariant=\"normal\">O</mi></mrow></mfenced></mrow></mfenced><msub><mi>Cl</mi><mn>3</mn></msub></math><br/><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfenced close=\"]\" open=\"[\" separators=\"|\"><mrow><msup><mi>Cr</mi><mrow><mo>+</mo><mn>3</mn></mrow></msup><mo>=</mo><mn>1</mn><msup><mi mathvariant=\"normal\">S</mi><mn>2</mn></msup><mtext>\u2009\u2009</mtext><mn>2</mn><msup><mi mathvariant=\"normal\">S</mi><mn>2</mn></msup><mtext>\u2009\u2009</mtext><mn>2</mn><msup><mi mathvariant=\"normal\">p</mi><mn>6</mn></msup><mtext>\u2009</mtext><mn>3</mn><msup><mi mathvariant=\"normal\">S</mi><mn>2</mn></msup><mtext>\u2009</mtext><mn>3</mn><msup><mi mathvariant=\"normal\">p</mi><mn>6</mn></msup><mtext>\u2009\u2009</mtext><mn>3</mn><msup><mi mathvariant=\"normal\">d</mi><mn>3</mn></msup></mrow></mfenced></math> in strong field ligand or weak field ligand is <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msubsup><mi mathvariant=\"normal\">t</mi><mrow><mn>2</mn><mi mathvariant=\"normal\">g</mi></mrow><mn>111</mn></msubsup><mo>,</mo><msup><mi>eg</mi><mi mathvariant=\"normal\">o</mi></msup></math><br/><img src=\"https://cdn-question-pool.getmarks.app/NEET/DPP-Chemistry/edpqlvcpbygnonvzttwieddqixepnesnxoyxowbrvmcxdvgsjv.png\" style=\"height: 104px; width: 350px;\"/><br/><math><msub><mrow><mi mathvariant=\"normal\">\u0394</mi></mrow><mrow><mn>0</mn></mrow></msub></math> order will be compared by spectrochemical series not by energies of violet and yellow light. Hence incorrect", "opts": [{"id": "vsArI", "text": "Both are paramagnetic with three unpaired electrons"}, {"id": "UhCrz", "text": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi mathvariant=\"normal\">\u0394</mi><mn>0</mn></msub></math> value of <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfenced separators=\"|\"><mi mathvariant=\"normal\">A</mi></mfenced></math> is less than that of <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfenced separators=\"|\"><mi mathvariant=\"normal\">B</mi></mfenced></math>"}, {"id": "Qh6Yn", "text": "<math><msub><mrow><mi mathvariant=\"normal\">\u0394</mi></mrow><mrow><mn>0</mn></mrow></msub></math> values of <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfenced separators=\"|\"><mi mathvariant=\"normal\">A</mi></mfenced></math> and <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfenced separators=\"|\"><mi mathvariant=\"normal\">B</mi></mfenced></math> are calculated from the energies violet and yellow light, respectively."}, {"id": "MfmpD", "text": "Both absorb energies corresponding to their complementary colors."}], "ans": "<math><msub><mrow><mi mathvariant=\"normal\">\u0394</mi></mrow><mrow><mn>0</mn></mrow></msub></math> values of <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfenced separators=\"|\"><mi mathvariant=\"normal\">A</mi></mfenced></math> and <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfenced separators=\"|\"><mi mathvariant=\"normal\">B</mi></mfenced></math> are calculated from the energies violet and yellow light, respectively.", "correct": "Qh6Yn"}, {"id": "695e3b3c3dc984756e9de657", "type": "singleCorrect", "html": "Which is the correct order for the wavelength of absorption in the visible region?", "sol": "The absorption of energy or the observation of colour in a complex transition compound depends on the charge of the metal ion and the nature of the ligands attached. The same metal ion with different ligands shows different absorption depending upon the type of ligand. The presence of weak field ligands make the central metal ion to absorb low energies i.e., of higher wavelength. The field strength of ligands can be obtained from spectrochemical series. i.e.<br/>(weak field) <math><msup><mrow><mi mathvariant=\"normal\">I</mi></mrow><mrow><mi mathvariant=\"normal\">\u00ad</mi><mo>\u2013</mo></mrow></msup><mo>&lt;</mo><mi mathvariant=\"normal\">B</mi><msup><mrow><mi mathvariant=\"normal\">r</mi></mrow><mrow><mo>\u2013</mo></mrow></msup><mo>&lt;</mo><msup><mrow><mi mathvariant=\"normal\">S</mi></mrow><mrow><mn>2</mn><mo>\u2013</mo></mrow></msup><mo>&lt;</mo><mi mathvariant=\"normal\">C</mi><msup><mrow><mi mathvariant=\"normal\">l</mi></mrow><mrow><mo>\u2013</mo></mrow></msup><mo>&lt;</mo><mi mathvariant=\"normal\">N</mi><msup><mrow><msub><mrow><mi mathvariant=\"normal\">O</mi></mrow><mrow><mn>3</mn></mrow></msub></mrow><mrow><mo>\u2013</mo></mrow></msup><mo>&lt;</mo><msup><mrow><mi mathvariant=\"normal\">F</mi></mrow><mrow><mo>\u2013</mo></mrow></msup><mo>&lt;</mo><mi mathvariant=\"normal\">O</mi><msup><mrow><mi mathvariant=\"normal\">H</mi></mrow><mrow><mo>\u2013</mo></mrow></msup><mo>&lt;</mo><msub><mrow><mi mathvariant=\"normal\">H</mi></mrow><mrow><mn>2</mn></mrow></msub><mi mathvariant=\"normal\">O</mi><mo>&lt;</mo><mi mathvariant=\"normal\">N</mi><msub><mrow><mi mathvariant=\"normal\">H</mi></mrow><mrow><mn>3</mn></mrow></msub><mo>&lt;</mo><mi mathvariant=\"normal\">N</mi><msup><mrow><msub><mrow><mi mathvariant=\"normal\">O</mi></mrow><mrow><mn>2</mn></mrow></msub></mrow><mrow><mo>\u2013</mo></mrow></msup><mo>&lt;</mo><mi mathvariant=\"normal\">C</mi><msup><mrow><mi mathvariant=\"normal\">N</mi></mrow><mrow><mo>\u2013</mo></mrow></msup><mo>&lt;</mo><mi mathvariant=\"normal\">C</mi><mi mathvariant=\"normal\">O</mi></math> (strong field).", "opts": [{"id": "9GTAv", "text": "<math><mo>[</mo><mi mathvariant=\"normal\">N</mi><mi mathvariant=\"normal\">i</mi><mo>(</mo><mi mathvariant=\"normal\">N</mi><msub><mrow><mi mathvariant=\"normal\">O</mi></mrow><mrow><mn>2</mn></mrow></msub><msub><mrow><mo>)</mo></mrow><mrow><mn>6</mn></mrow></msub><msup><mrow><mo>]</mo></mrow><mrow><mn>4</mn><mo>-</mo></mrow></msup><mo>&lt;</mo><mo>[</mo><mi mathvariant=\"normal\">N</mi><mi mathvariant=\"normal\">i</mi><mo>(</mo><mi mathvariant=\"normal\">N</mi><msub><mrow><mi mathvariant=\"normal\">H</mi></mrow><mrow><mn>3</mn></mrow></msub><msub><mrow><mo>)</mo></mrow><mrow><mn>6</mn></mrow></msub><msup><mrow><mo>]</mo></mrow><mrow><mn>2</mn><mo>+</mo></mrow></msup><mo>&lt;</mo><mo>[</mo><mi mathvariant=\"normal\">N</mi><mi mathvariant=\"normal\">i</mi><mo>(</mo><msub><mrow><mi mathvariant=\"normal\">H</mi></mrow><mrow><mn>2</mn></mrow></msub><mi mathvariant=\"normal\">O</mi><msub><mrow><mo>)</mo></mrow><mrow><mn>6</mn></mrow></msub><msup><mrow><mo>]</mo></mrow><mrow><mn>2</mn> /msub><msub><mrow><mo>)</mo></mrow><mrow><mn>6</mn></mrow></msub><msup><mrow><mo>]</mo></mrow><mrow><mn>4</mn><mo>-</mo></mrow></msup></math>"}, {"id": "ACuH8", "text": "<math><mo>[</mo><mi mathvariant=\"normal\">N</mi><mi mathvariant=\"normal\">i</mi><mo>(</mo><mi mathvariant=\"normal\">N</mi><msub><mrow><mi mathvariant=\"normal\">H</mi></mrow><mrow><mn>3</mn></mrow></msub><msub><mrow><mo>)</mo></mrow><mrow><mn>6</mn></mrow></msub><msup><mrow><mo>]</mo></mrow><mrow><mn>2</mn><mo>+</mo></mrow></msup><mo>&lt;</mo><mo>[</mo><mi mathvariant=\"normal\">N</mi><mi mathvariant=\"normal\">i</mi><mo>(</mo><msub><mrow><mi mathvariant=\"normal\">H</mi></mrow><mrow><mn>2</mn></mrow></msub><mi mathvariant=\"normal\">O</mi><msub><mrow><mo>)</mo></mrow><mrow><mn>6</mn></mrow></msub><msup><mrow><mo>]</mo></mrow><mrow><mn>2</mn><mo>+</mo></mrow></msup><mo>&lt;</mo><mo>[</mo><mi mathvariant=\"normal\">N</mi><mi mathvariant=\"normal\">i</mi><mo>(</mo><mi mathvariant=\"normal\">N</mi><msub><mrow><mi mathvariant=\"normal\">O</mi></mrow><mrow><mn>2</mn></mrow></msub><msub><mrow><mo>)</mo></mrow><mrow><mn>6</mn></mrow></msub><msup><mrow><mo>]</mo></mrow><mrow><mn>4</mn><mo>-</mo></mrow></msup></math>"}], "ans": "<math><mo>[</mo><mi mathvariant=\"normal\">N</mi><mi mathvariant=\"normal\">i</mi><mo>(</mo><mi mathvariant=\"normal\">N</mi><msub><mrow><mi mathvariant=\"normal\">O</mi></mrow><mrow><mn>2</mn></mrow></msub><msub><mrow><mo>)</mo></mrow><mrow><mn>6</mn></mrow></msub><msup><mrow><mo>]</mo></mrow><mrow><mn>4</mn><mo>-</mo></mrow></msup><mo>&lt;</mo><mo>[</mo><mi mathvariant=\"normal\">N</mi><mi mathvariant=\"normal\">i</mi><mo>(</mo><mi mathvariant=\"normal\">N</mi><msub><mrow><mi mathvariant=\"normal\">H</mi></mrow><mrow><mn>3</mn></mrow></msub><msub><mrow><mo>)</mo></mrow><mrow><mn>6</mn></mrow></msub><msup><mrow><mo>]</mo></mrow><mrow><mn>2</mn><mo>+</mo></mrow></msup><mo>&lt;</mo><mo>[</mo><mi mathvariant=\"normal\">N</mi><mi mathvariant=\"normal\">i</mi><mo>(</mo><msub><mrow><mi mathvariant=\"normal\">H</mi></mrow><mrow><mn>2</mn></mrow></msub><mi mathvariant=\"normal\">O</mi><msub><mrow><mo>)</mo></mrow><mrow><mn>6</mn></mrow></msub><msup><mrow><mo>]</mo></mrow><mrow><mn>2</mn><mo>+</mo></mrow></msup></math>", "correct": "9GTAv"}, {"id": "695e3b3c3dc984756e9de658", "type": "singleCorrect", "html": "<p>For next two question please follow the same</p><p>Complex compounds are molecular compounds which retain their identities even when dissolved in water. They do not give all the simple ions in solution but instead furnish complex ions. The complex compounds are often called co-ordination compounds because certain groups called ligands are attached to the central metal ion by co-ordinate or dative bonds. Co-ordination compounds exhibit isomerism, both structural and stereoisomerism. The structure, magnetic property, colour and electrical properties of complexes are explained by various theories.</p><p>Arrange the following compounds in order of their molar conductance :</p><p>(i) K[Co(NO<sub>2</sub>)<sub>4</sub>(NH<sub>3</sub>)<sub>2</sub>]<br />(ii) [Cr(ONO)<sub>3</sub>(NH<sub>3</sub>)<sub>3</sub>]<br />(iii) [Cr(NO<sub>2</sub>)(NH<sub>3</sub>)<sub>5</sub>]<sub>3</sub>[Co(NO<sub>2</sub>)<sub>6</sub>]<sub>2</sub><br />(iv) Mg[Cr(NO<sub>2</sub>)<sub>5</sub>(NH<sub>3</sub>)]</p>", "sol": "Molar conductance will depend on ionic mobility and no of ions produced per unit species on dissociation<br/>(i) K[Co(NO<sub>2</sub>)<sub>4</sub>(NH<sub>3</sub>)<sub>2</sub>] - 2 Ions / molecule<br/>(ii) [Cr(ONO)<sub>3</sub>(NH<sub>3</sub>)<sub>3</sub>] - 1 unit / molecule<br/>(iii) [Cr(NO<sub>2</sub>)(NH<sub>3</sub>)<sub>5</sub>]<sub>3</sub>[CO(NO<sub>2</sub>)<sub>6</sub>]<sub>2</sub> - 5 Ions / molecule<br/>(iv) Mg[Cr(NO<sub>2</sub>)<sub>5</sub>(NH<sub>3</sub>)] - 2 Ions / molecule<br/>out of (i) and (iv) K<sup>+</sup> and Mg<sup>2</sup><sup>+</sup>, Mg<sup>2</sup><sup>+</sup> due to high solvation will have lower Ionic mobility &amp; lower molar conductance ub><mi mathvariant=\"normal\">n</mi><mi>complex</mi></msub><mo>=</mo><mo>&#160;</mo><mfrac><mrow><mn>0</mn><mo>.</mo><mn>319</mn><mo>&#160;</mo><mi>grams</mi></mrow><mrow><mn>266</mn><mo>.</mo><mn>44</mn><mo>&#160;</mo><mi>grams</mi><mo>/</mo><mi>mol</mi></mrow></mfrac><mo>=</mo><mn>0</mn><mo>.</mo><mn>0012</mn><mo>&#160;</mo><mi>mol</mi></math></p><p>Number of moles of <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi>NaOH</mi></math>&nbsp;consumed&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mo>=</mo><mfrac><mrow><mn>28</mn><mo>.</mo><mn>5</mn><mo>&#160;</mo><mi>mL</mi><mo>&#215;</mo><mn>0</mn><mo>.</mo><mn>125</mn><mo>&#160;</mo><mi mathvariant=\"normal\">M</mi></mrow><mn>1000</mn></mfrac><mo>=</mo><mn>0</mn><mo>.</mo><mn>0036</mn><mo>&#160;</mo><mi>mol</mi></math></p><p>Moles of&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi>NaOH</mi></math>&nbsp;consumed&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mo>=</mo></math>&nbsp;Moles of&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi>HCl</mi></math>&nbsp;formed&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mo>=</mo><mn>0</mn><mo>.</mo><mn>0036</mn><mo>&#160;</mo><mi>mol</mi></math>.</p><p>As&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mn>0</mn><mo>.</mo><mn>0012</mn></math>&nbsp;moles of the complex produces&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mn>0</mn><mo>.</mo><mn>0036</mn></math>&nbsp;moles of <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi>HCl</mi></math>,&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mn>1</mn></math>&nbsp;mole of complex will produce&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mrow><mn>0</mn><mo>.</mo><mn>0036</mn></mrow><mrow><mn>0</mn><mo>.</mo><mn>0012</mn></mrow></mfrac><mo>=</mo><mn>3</mn><mo>&#160;</mo><mi>mol</mi></math>.</p><p>Thus,&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mn>3</mn></math>&nbsp;moles of&nbsp;&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msup><mi>Cl</mi><mo>-</mo></msup></math>&nbsp;outside coordination&nbsp;sphere.</p><p>Hence, the formula of the complex is:&nbsp;</p><p><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfenced close=\"]\" open=\"[\"><mrow><mi>Cr</mi><msub><mfenced><mrow><msub><mi mathvariant=\"normal\">H</mi><mn>2</mn></msub><mi mathvariant=\"normal\">O</mi></mrow></mfenced><mn>6</mn></msub></mrow></mfenced><msub><mi>Cl</mi><mn>3</mn></msub></math>.</p>", "opts": [{"id": "upw0q", "text": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfenced open=\"[\" close=\"]\"><mrow><mi>Cr</mi><msub><mfenced><mrow><msub><mi mathvariant=\"normal\">H</mi><mn>2</mn></msub><mi mathvariant=\"normal\">O</mi></mrow></mfenced><mn>6</mn></msub></mrow></mfenced><msub><mi>Cl</mi><mn>3</mn></msub></math>"}, {"id": "yuwFd", "text": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfenced open=\"[\" close=\"]\"><mrow><msub><mi>CrCl</mi><mn>2</mn></msub><msub><mfenced><mrow><msub><mi mathvariant=\"normal\">H</mi><mn>2</mn></msub><mi mathvariant=\"normal\">O</mi></mrow></mfenced><mn>4</mn></msub></mrow></mfenced><mi>Cl</mi><mo mathvariant=\"bold\">&#183;</mo><mn>2</mn><msub><mi mathvariant=\"normal\">H</mi><mn>2</mn></msub><mi mathvariant=\"normal\">O</mi></math>"}, {"id": "qZpZ9", "text": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfenced open=\"[\" close=\"]\"><mrow><msub><mi>CrCl</mi><mn>3</mn></msub><msub><mfenced><mrow><msub><mi mathvariant=\"normal\">H</mi><mn>2</mn></msub><mi mathvariant=\"normal\">O</mi></mrow></mfenced><mn>3</mn></msub></mrow></mfenced><mo mathvariant=\"bold\">&#183;</mo><mn>3</mn><msub><mi mathvariant=\"normal\">H</mi><mn>2</mn></msub><mi mathvariant=\"normal\">O</mi></math>"}, {"id": "i4SzO", "text": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfenced open=\"[\" close=\"]\"><mrow><mi>CrCl</mi><msub><mfenced><mrow><msub><mi mathvariant=\"normal\">H</mi><mn>2</mn></msub><mi mathvariant=\"normal\">O</mi></mrow></mfenced><mn>5</m er of bidentate ligands only.<br />S:Total number of unsymmetrical bidentate ligands.", "sol": "P<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mo>=</mo><msubsup><mtext>NH</mtext><mn>2</mn><mo>-</mo></msubsup><mo>,</mo><msubsup><mo>O</mo><mn>2</mn><mo>-</mo></msubsup><mo>,</mo><msup><mo>OH</mo><mo>-</mo></msup><mo>,</mo><msup><mo>Cl</mo><mo>-</mo></msup><mo>=</mo><mn>4</mn></math><br/>Q<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mo>=</mo><msubsup><mtext>SO</mtext><mn>4</mn><mrow><mn>2</mn><mo>-</mo></mrow></msubsup><mo>,</mo><msubsup><mo>NO</mo><mn>2</mn><mo>-</mo></msubsup><mo>,</mo><msubsup><mo>CO</mo><mn>3</mn><mrow><mn>2</mn><mo>-</mo></mrow></msubsup><mo>,</mo><msub><mo>CH</mo><mn>3</mn></msub><msup><mtext>COO</mtext><mo>-</mo></msup><mo>=</mo><mn>4</mn></math><br/>R<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mo>=</mo><mi>en</mi><mo>,</mo></math>&nbsp;Acetylacetone,&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi>Phen</mi><mo>,</mo><mo>&#160;</mo><mi>DMG</mi><mo>,</mo><mo>&#160;</mo><mi>Gly</mi><mo>=</mo><mn>5</mn></math><br/>S<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mo>=</mo><mi>DMG</mi><mo>,</mo><mo>&#160;</mo><mi>Gly</mi><mo>=</mo><mn>2</mn></math><br/>P<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mo>+</mo></math>Q<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mo>-</mo></math>R<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mo>-</mo></math>S<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mo>=</mo><mn>4</mn><mo>+</mo><mn>4</mn><mo>-</mo><mn>5</mn><mo>-</mo><mn>2</mn><mo>=</mo><mn>1</mn></math>", "opts": [{"id": "vrqJ8", "text": "3"}, {"id": "LmB8j", "text": "2"}, {"id": "A2Ykv", "text": "5"}, {"id": "1Yc4J", "text": "1"}], "ans": "1", "correct": "1Yc4J"}]}, {"name": "p Block Elements (Group 13 & 14)", "qs": [{"id": "695e3b3c3dc984756e9de660", "type": "singleCorrect", "html": "Pick out the incorrect statement about CO.", "sol": "Here option D is incorrect statement as the complex formed by CO with
