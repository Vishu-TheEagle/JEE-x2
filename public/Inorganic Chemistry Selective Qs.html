>0</mn> <mtext>.</mtext> <mn>5</mn> </mtd> </mtr> <mtr> <mtd> <msubsup> <mtext>He</mtext> <mn>2</mn> <mrow> <mn>2</mn> <mo>-</mo> </mrow> </msubsup> </mtd> <mtd> <mo>=</mo> </mtd> <mtd> <mtext>B</mtext> <mtext>.</mtext> <mtext>O</mtext> <mo>=</mo> <mfrac> <mrow> <mn>4</mn> <mo>-</mo> <mn>2</mn> </mrow> <mrow> <mn>2</mn> </mrow> </mfrac> <mo>=</mo> <mn>1</mn> <mtext>.</mtext> <mn>0</mn> </mtd> </mtr> </mtable> </mrow> </math><br/><strong>(iv)</strong> \u00a0\u00a0<math> <mrow> <mtable> <mtr> <mtd> <msubsup> <mtext>H</mtext> <mn>2</mn> <mo>-</mo> </msubsup> </mtd> <mtd> <mo>\u21d2</mo> </mtd> <mtd> <mtext>B</mtext> <mtext>.</mtext> <mtext>O</mtext> <mo>=</mo> <mfrac> <mrow> <mn>2</mn> <mo>-</mo> <mn>1</mn> </mrow> <mrow> <mn>2</mn> </mrow> </mfrac> <mo>=</mo> <mn>0</mn> <mtext>.</mtext> <mn>5</mn> </mtd> </mtr> <mtr> <mtd> <msubsup> <mtext>He</mtext> <mn>2</mn> <mrow> <mn>2</mn> <mo>-</mo> </mrow> </msubsup> </mtd> <mtd> <mo>\u21d2</mo> </mtd> <mtd> <mtext>B</mtext> <mtext>.</mtext> <mtext>O</mtext> <mo>=</mo> <mfrac> <mrow> <mn>4</mn> <mo>-</mo> <mn>2</mn> </mrow> <mrow> <mn>2</mn> </mrow> </mfrac> <mo>=</mo> <mn>1</mn> <mtext>.</mtext> <mn>0</mn> </mtd> </mtr> </mtable> </mrow> </math><br/>As both H<sub>2</sub><sup>2+</sup> and He<sub>2</sub> have zero bond order and hence do not exist.", "opts": [{"id": "lJXWw", "text": "<math> <mrow> <msubsup> <mtext>H</mtext> <mn>2</mn> <mrow> <mn>2</mn> <mo>+</mo> </mrow> </msubsup> <mtext>,\u00a0</mtext> <msub> <mtext>He</mtext> <mn>2</mn> </msub> </mrow> </math>"}, {"id": "EJLZF", "text": "<math><mrow> <msubsup> <mtext>H</mtext> <mn>2</mn> <mo>-</mo> </msubsup> <mtext>,\u00a0</mtext> <msubsup> <mtext>He</mtext> <mn>2</mn> <mrow> <mn>2</mn> <mo>+</mo> </mrow> </msubsup></mrow></math>"}, {"id": "qmGor", "text": "<math> <mrow> <msubsup> <mtext>H</mtext> <mn>2</mn> <mo>+</mo> </msubsup> <mtext>,\u00a0</mtext> <msubsup> <mtext>He</mtext> <mn>2</mn> <mrow> <mn>2</mn> <mo>-</mo> </mrow> </msubsup> </mrow> </math>"}, {"id": "f9FP6", "text": "<math><mrow> <msubsup> <mtext>H</mtext> <mn>2</mn> <mo>-</mo> </msubsup> <mtext>,\u00a0</mtext> <msubsup> <mtext>He</mtext> <mn>2</mn> <mrow> <mn>2</mn> <mo>-</mo> </mrow> </msubsup></mrow></math>"}], "ans": "<math> <mrow> <msubsup> <mtext>H</mtext> <mn>2</mn> <mrow> <mn>2</mn> <mo>+</mo> </mrow> </msubsup> <mtext>,\u00a0</mtext> <msub> <mtext>He</mtext> <mn>2</mn> </msub> </mrow> </math>", "correct": "lJXWw"}, {"id": "695e3b393dc984756e9de5e9", "type": "singleCorrect", "html": "Shape of <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi>XeF</mi><mi mathvariant=\"normal\">4</mi></msub></math>&nbsp;molecule is _______.&nbsp; &nbsp;&nbsp; &nbsp;<br />", "sol": "<p><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi>XeF</mi><mn>4</mn></msub></math>&nbsp;has eight valence shell electrons&nbsp;in which four form sigma bonds with fluorine while two lone pairs&nbsp;remain&nbsp;unbonded. This compound forms&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msup><mi>sp</mi><mn>3</mn></msup><msup><mi mathvariant=\"normal\">d</mi><mn>2</mn></msup></math>&nbsp;hybridisation with square planer shape due to two lone pair bond pair repulsion.</p>", "opts": [{"id": "6C5i5", "text": "linear"}, {"id": "uGG7j", "text": "pyramidal"}, {"id": "WmFt1", "text": "tetrahedral"}, {"id": "FdKdj", "text": "square planar"}], "ans": "square planar", "correct": "FdKdj"}, {"id": "695e3b393dc984756e9de5ea", "type": "singleCorrect", "html": "Sodium chloride is soluble in water but not in benzene because", "sol": "Hydration energy resolve during dissolution in the water while lattice energy gives the energy to break the crystal so<br/>For a compound to be soluble, the solvation energy must be greater than the lattice energy. Since, NaCl is soluble in water but insoluble in benzene.<br/><math> <mrow> <mo>\u0394</mo> <msub> <mtext>H</mtext> <mtext>Solvation</mtext> </msub> <mo>&gt;</mo> <mo>\u0394</mo> <msub> <mtext>H</mtext> <mtext>Lattice energy\u00a0</mtext></msub></mrow></math>in water<br/>and<br/><math> <mrow> <mo>\u0394</mo> <msub> <mtext>H</mtext> <mtext>Solvation</mtext> </msub> <mo>&lt;</mo> <mo>\u0394</mo> <msub> <mtext>H</mtext> <mtext>Lattice energy</mtext></msub></mrow></math> in benzene", "opts": [{"id": "IJzg1", "text": "<math> <mrow> <mo>\u0394</mo> <msub> <mtext>H</mtext> <mtext>Solvation</mtext> </msub> <mo>&lt;</mo> <mo>\u0394</mo> <msub> <mtext>H</mtext> <mtext>Lattice energy</mtext></msub></mrow></math>\u00a0 in water and<br/>\u00a0<br/><math> <mrow> <mo>\u0394</mo> <msub> <mtext>H</mtext> <mtext>Solvation</mtext> </msub> <mo>&gt;</mo> <mo>\u0394</mo> <msub> <mtext>H</mtext> <mtext>Lattice energy\u00a0</mtext></msub></mrow></math> in benzene"}, {"id": "PcqG0", "text": "<math> <mrow> <mo>\u0394</mo> <msub> <mtext>H</mtext> <mtext>Solvation</mtext> </msub> <mo>&gt;</mo> <mo>\u0394</mo> <msub> <mtext>H</mtext> <mtext>Lattice energy </mtext>\u00a0</msub></mrow></math>in water and<br/><math> <mrow> <mo>\u0394</mo> <msub> <mtext>H</mtext> <mtext>Solvation</mtext> </msub> <mo>&lt;</mo> <mo>\u0394</mo> <msub> <mtext>H</mtext> <mtext>Lattice energy</mtext></msub></mrow></math> in benzene"}, {"id": "ISY92", "text": "<math> <mrow> <mo>\u0394</mo> <msub> <mtext>H</mtext> <mtext>Solvation</mtext> </msub> <mo>=</mo> <mo>\u0394</mo> <msub> <mtext>H</mtext> <mtext>Lattice energy </mtext></msub></mrow></math>in water and<br/><math> <mrow> <mo>\u0394</mo> <msub> <mtext>H</mtext> <mtext>Solvation</mtext> </msub> <mo>&lt;</mo> <mo>\u0394</mo> <msub> <mtext>H</mtext> <mtext>Lattice energy</mtext></msub></mrow></math> in benzene"}, {"id": "zrNzA", "text": "<math> <mrow> <mo>\u0394</mo> <msub> <mtext>H</mtext> <mtext>Solvation</mtext> </msub> <mo>&lt;</mo> <mo>\u0394</mo> <msub> <mtext>H</mtext> <mtext>Lattice energy </mtext>\u00a0</msub></mrow></math>in water and<br/><math> <mrow> <mo>\u0394</mo> <msub> <mtext>H</mtext> <mtext>Solvation</mtext> </msub> <mo>=</mo> <mo>\u0394</mo> <msub> <mtext>H</mtext> <mtext>Lattice energy\u00a0</mtext></msub></mrow></math> in benzene"}], "ans": "<math> <mrow> <mo>\u0394</mo> <msub> <mtext>H</mtext> <mtext>Solvation</mtext> </msub> <mo>&gt;</mo> <mo>\u0394</mo> <msub> <mtext>H</mtext> <mtext>Lattice energy </mtext>\u00a0</msub></mrow></math>in water and<br/><math> <mrow> <mo>\u0394</mo> <msub> <mtext>H</mtext> <mtext>Solvation</mtext> </msub> <mo>&lt;</mo> <mo>\u0394</mo> <msub> <mtext>H</mtext> <mtext>Lattice energy</mtext></msub></mrow></math> in benzene", "correct": "PcqG0"}, {"id": "695e3b393dc984756e9de5eb", "type": "singleCorrect", "html": "What is the true statement regarding <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi>IF</mi><mn>5</mn></msub></math>&nbsp;molecule?", "sol": "<p>The structure of <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi>IF</mi><mn>5</mn></msub><mo>&#160;</mo></math><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfenced><mrow><msup><mi>Sp</mi><mn>3</mn></msup><msup><mi mathvariant=\"normal\">d</mi><mn>2</mn></msup><mo>&#160;</mo><mo>-</mo><mo>&#160;</mo><mn>5</mn><mo>&#160;</mo><mi mathvariant=\"normal\">b</mi><mo>.</mo><mi mathvariant=\"normal\">p</mi><mo>.</mo><mo>+</mo><mn>1</mn><mo>&#160;</mo><mi mathvariant=\"normal\">l</mi><mo>.</mo><mi mathvariant=\"normal\">p</mi><mo>.</mo></mrow></mfenced></math>&nbsp;is as follows:</p><p>&nbsp;&nbsp;<img height=\"245\" src=\"https://cdn-question-pool.getmarks.app/NEET/DPP-Chemistry/c372d36b-23c9-4aa3-a680-884631009ee7-image.png\" width=\"292\" />&nbsp;</p><ul>\t<li>The lone pair is situated on the axial position of the geometry and&nbsp;the shape is&nbsp;square pyramidal.</li>\t<li>There are two&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msup><mn>180</mn><mo>&#176;</mo></msup></math>&nbsp;angle <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi mathvariant=\"normal\">F</mi><mo>-</mo><mi mathvariant=\"normal\">I</mi><mo>-</mo><mi mathvariant=\"normal\">F</mi></math>&nbsp;bonds&nbsp;(if we check ideally, they are actually&nbsp;less than <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mn>180</mn><mo>&#176;</mo></math>).</li>\t<li>In this shape, all the equatorial-axial&nbsp;bond angles are somewhat lower than <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mn>90</mn><mo>&#176;</mo></math>&nbsp;due to the distortion caused by lone pair present on iodine. However, they all are equal as all the equatorial bonds are equidistant from lone pair and&nbsp;thus, undergo same repulsion.</li>\t<li>There is a&nbsp;total of five faces in this molecule. One is a square base, and the other four faces are triangles formed by joining any two consecutive equatorial <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi mathvariant=\"normal\">F</mi></math> atoms with axial <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi mathvariant=\"normal\">F</mi></math> atom.</li></ul>", "opts": [{"id": "nxxFg", "text": "There is only one lone pair present in equatorial position."}, {"id": "iE6t2", "text": "All <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi mathvariant=\"normal\">F</mi><mo>-</mo><mi mathvariant=\"normal\">I</mi><mo>-</mo><mi mathvariant=\"normal\">F</mi></math> angles formed between equatorial and axial bonds are identical."}, {"id": "0hAdu", "text": "There are eight faces in this molecule."}, {"id": "3aTK2", "text": "Number of <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi mathvariant=\"normal\">F</mi><mo>-</mo><mi mathvariant=\"normal\">I</mi><mo>-</mo><mi mathvariant=\"normal\">F</mi></math> angles at&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msup><mn>180</mn><mo>&#176;</mo></msup></math> is&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mn>3</mn></math>."}], "ans": "All <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi mathvariant=\"normal\">F</mi><mo>-</mo><mi mathvariant=\"normal\">I</mi><mo>-</mo><mi mathvariant=\"normal\">F</mi></math> angles formed between equatorial and axial bonds are identical.", "correct": "iE6t2"}, {"id": "695e3b393dc984756e9de5ec", "type": "singleCorrect", "html": "Hydrogen chloride molecule contains", "sol": "A gaseous <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi>HCl</mi><mo>&#160;</mo></math>molecule has hydrogen and chlorine linked by a covalent bond. Here electronegativity of chlorine is greater than that of hydrogen. Due to this the shared pair of electrons is more attracted towards chorines. Thus, chlorine end of the molecule has higher electron density and becomes slightly negative and the hydrogen and slightly positive. Hence, the covalent bond in <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi>HCl</mi><mo>&#160;</mo></math>has a polar character as shown below,<br /><img alt=\"\" src=\"https://cdn-question-pool.getmarks.app/NEET/DPP-Chemistry/image1-45a4064a-de4a-4b6c-bd15-54900473cda4.jpg\" />", "opts": [{"id": "oKgd9", "text": "polar covalent bond."}, {"id": "YpOYd", "text": "double bond."}, {"id": "MBrdf", "text": "co-ordinate bond."}, {"id": "DngsN", "text": "electrovalent bond."}], "ans": "polar covalent bond.", "correct": "oKgd9"}, {"id": "695e3b393dc984756e9de5ed", "type": "singleCorrect", "html": "Which of the following compounds will have the highest dipole moment?", "sol": "The electron-donation of <math><mo>-</mo><mi mathvariant=\"normal\">O</mi><mi mathvariant=\"normal\">H</mi></math> reinforces the electron-withdrawing by <math><mo>-</mo><mi mathvariant=\"normal\">N</mi><msub><mrow><mi mathvariant=\"normal\">O</mi></mrow><mrow><mn>2</mn></mrow></msub></math>. Also, resonance increases distance between the charges. Charge separation is maximum for p-nitrophenol, therefore, it has maximum dipole moment.<br/><img src=\"https://cdn-question-pool.getmarks.app/NEET/DPP-Chemistry/56b94510-ad20-4161-b08b-3cc112996f48.png\" style=\"width: 350px; height: 175px;\"/>", "opts": [{"id": "CjOPy", "text": "<img src=\"https://cdn-question-pool.getmarks.app/NEET/DPP-Chemistry/10af638e-fb0e-4d17-bf5a-0e6f285261c8.png\" style=\"height: 47px; width: 80px;\"/>"}, {"id": "jDL9t", "text": "<img src=\"https://cdn-question-pool.getmarks.app/NEET/DPP-Chemistry/c5d4f2b0-da56-4876-ba61-c6ce91e2d21a.png\" style=\"height: 73px; width: 90px;\"/>"}, {"id": "O3JaU", "text": "<img src=\"https://cdn-question-pool.getmarks.app/NEET/DPP-Chemistry/cc49d7da-dc90-47f4-80dd-7a8bc12878d8.png\" style=\"height: 73px; width: 110px;\"/>"}, {"id": "VIeJj", "text": "<img src=\"https://cdn-question-pool.getmarks.app/NEET/DPP-Chemistry/8474edf5-9ac6-448a-ba76-982836e3574a.png\" style=\"height: 42px; width: 120px;\"/>"}], "ans": "<img src=\"https://cdn-question-pool.getmarks.app/NEET/DPP-Chemistry/8474edf5-9ac6-448a-ba76-982836e3574a.png\" style=\"height: 42px; width: 120px;\"/>", "correct": "VIeJj"}, {"id": "695e3b393dc984756e9de5ee", "type": "singleCorrect", "html": "Among the following mixtures, dipole - dipole as the major interaction, is present in", "sol": "<table align=\"center\" border=\"1\" cellpadding=\"1\" cellspacing=\"1\" style=\"width: 100%;\">\t<tbody>\t\t<tr>\t\t\t<td><strong>Molecules</strong></td>\t\t\t<td><strong>Interaction</strong></td>\t\t</tr>\t\t<tr>\t\t\t<td>Benzene and ethanol</td>\t\t\t<td>Dispersion force</td>\t\t</tr>\t\t<tr>\t\t\t<td>Acetonitrile and acetone</td>\t\t\t<td>Dipole-dipole</td>\t\t</tr>\t\t<tr>\t\t\t<td>KCl and water</td>\t\t\t<td>Ion-dipole</td>\t\t</tr>\t\t<tr>\t\t\t<td>Benzene and carbon tetrachloride</td>\t\t\t<td>Dispersion (London) force</td>\t\t</tr>\t</tbody></table>", "opts": [{"id": "peZ37", "text": "Benzene and ethanol"}, {"id": "Tzka3", "text": "Acetonitrile and acetone"}, {"id": "XeuJP", "text": "KCl and water"}, {"id": "4jbsV", "text": "Benzene and carbon tetrachloride"}], "ans": "Acetonitrile and acetone", "correct": "Tzka3"}, {"id": "695e3b393dc984756e9de5ef", "type": "singleCorrect", "html": "Which oxide of iodine in the following is the true covalent in nature?", "sol": "In general, higher the oxidation state, more is the covalent character of the oxide. <math><msub><mrow><mi mathvariant=\"normal\">I</mi></mrow><mrow><mn>2</mn></mrow></msub><msub><mrow><mi mathvariant=\"normal\">O</mi></mrow><mrow><mn>7</mn></mrow></msub></math> &amp; <math><msub><mrow><mi mathvariant=\"normal\">I</mi></mrow><mrow><mn>2</mn></mrow></msub><msub><mrow><mi mathvariant=\"normal\">O</mi></mrow><mrow><mn>9</mn></mrow></msub></math> do not exist. <math><msub><mrow><mi mathvariant=\"normal\">I</mi></mrow><mrow><mn>2</mn></mrow></msub><msub><mrow><mi mathvariant=\"normal\">O</mi></mrow><mrow><mn>4</mn></mrow></msub></math> is ionic in nature. It is infact iodyl iodate <math><mo>[</mo><mi mathvariant=\"normal\">I</mi><mi mathvariant=\"normal\">O</mi><msup><mrow><mo>]</mo></mrow><mrow><mo>+</mo></mrow></msup><mo>[</mo><mi mathvariant=\"normal\">I</mi><msub><mrow><mi mathvariant=\"normal\">O</mi></mrow><mrow><mn>3</mn></mrow></msub><msup><mrow><mo>]</mo></mrow><mrow><mo>-</mo></mrow></msup></math>. The only covalent oxide is <math><msub><mrow><mi mathvariant=\"normal\">I</mi></mrow><mrow><mn>2</mn></mrow></msub><msub><mrow><mi mathvariant=\"normal\">O</mi></mrow><mrow><mn>5</mn></mrow></msub></math> .", "opts": [{"id": "9QDqV", "text": "<math><msub><mrow><mi mathvariant=\"normal\">I</mi></mrow><mrow><mn>2</mn></mrow></msub><msub><mrow><mi mathvariant=\"normal\">O</mi></mrow><mrow><mn>4</mn></mrow></msub></math>"}, {"id": "Wywet", "text": "<math><msub><mrow><mi mathvariant=\"normal\">I</mi></mrow><mrow><mn>2</mn></mrow></msub><msub><mrow><mi mathvariant=\"normal\">O</mi></mrow><mrow><mn>5</mn></mrow></msub></math>"}, {"id": "d6xSV", "text": "<math><msub><mrow><mi mathvariant=\"normal\">I</mi></mrow><mrow><mn>2</mn></mrow></msub><msub><mrow><mi mathvariant=\"normal\">O</mi></mrow><mrow><mn>7</mn></mrow></msub></math>"}, {"id": "5sf3u", "text": "<math><msub><mrow><mi mathvariant=\"normal\">I</mi></mrow><mrow><mn>2</mn></mrow></msub><msub><mrow><mi mathvariant=\"normal\">O</mi></mrow><mrow><mn>9</mn></mrow></msub></math>"}], "ans": "<math><msub><mrow><mi mathvariant=\"normal\">I</mi></mrow><mrow><mn>2</mn></mrow></msub><msub><mrow><mi mathvariant=\"normal\">O</mi></mrow><mrow><mn>5</mn></mrow></msub></math>", "correct": "Wywet"}, {"id": "695e3b393dc984756e9de5f0", "type": "singleCorrect", "html": "Which statement is NOT correct?<br/>\r(According to\u00a0Valence bond theory)", "sol": "A <math><mtext>\u03c3</mtext><mo>-</mo></math> bond is stronger than a <math><mtext>\u03c0</mtext><mo>-</mo></math> bond.<br/>Sigma <math><mfenced separators=\"|\"><mrow><mtext>\u03c3</mtext></mrow></mfenced></math> bonds are formed by head on overlap of unhybridised <math><mtext>s</mtext><mo>-</mo><mtext>s</mtext><mo>,</mo><mtext>\u00a0</mtext><mtext>p</mtext><mo>-</mo><mtext>p</mtext><mtext>\u00a0</mtext><mtext>o</mtext><mtext>r</mtext><mtext>\u00a0</mtext><mtext>s</mtext><mo>-</mo><mtext>p</mtext></math> orbitals and hybridized orbitals <math><mfenced separators=\"|\"><mrow><mtext>s</mtext><mtext>p</mtext><mo>,</mo><mtext>\u00a0</mtext><mtext>s</mtext><msup><mrow><mtext>p</mtext></mrow><mrow><mn>2</mn></mrow></msup><mo>,</mo><mtext>\u00a0</mtext><mtext>s</mtext><msup><mrow><mtext>p</mtext></mrow><mrow><mn>3</mn></mrow></msup><mo>,</mo><mtext>\u00a0</mtext><mtext>s</mtext><msup><mrow><mtext>p</mtext></mrow><mrow><mn>3</mn></mrow></msup><mtext>d</mtext><mtext>\u00a0</mtext><mtext>a</mtext><mtext>n</mtext><mtext>d</mtext><mtext>\u00a0</mtext><mtext>s</mtext><msup><mrow><mtext>p</mtext></mrow><mrow><mn>3</mn></mrow></msup><msup><mrow><mtext>d</mtext></mrow><mrow><mn>2</mn></mrow></msup></mrow></mfenced></math>\u00a0. Hence,\u00a0<math><mtext>\u03c3</mtext></math> bond are strong bonds. Where as Pi <math><mfenced separators=\"|\"><mrow><mtext>\u03c0</mtext></mrow></mfenced><mo>-</mo></math> bonds are formed by side ways overlap of unhybridised p and d orbitals. Hence <math><mtext>\u03c0</mtext></math> bonds are weak bonds.", "opts": [{"id": "W1PXX", "text": "A sigma(\u03c3) bond is weaker than a <math><mtext>\u03c0</mtext><mo>-</mo><mtext>b</mtext><mtext>o</mtext><mtext>n</mtext><mtext>d</mtext></math>"}, {"id": "BwS9t", "text": "A sigma bond is stronger than a  <math><mtext>\u03c0</mtext><mo>-</mo><mtext>b</mtext><mtext>o</mtext><mtext>n</mtext><mtext>d</mtext></math>"}, {"id": "83WT6", "text": "A double bond is stronger than a single bond"}, {"id": "fJIdk", "text": "A double bond is shorter than a single bond"}], "ans": "A sigma(\u03c3) bond is weaker than a <math><mtext>\u03c0</mtext><mo>-</mo><mtext>b</mtext><mtext>o</mtext><mtext>n</mtext><mtext>d</mtext></math>", "correct": "W1PXX"}, {"id": "695e3b393dc984756e9de5f1", "type": "singleCorrect", "html": "Which of the following statements is true about hydrogen bonding?", "sol": "For hydrogen bonding, the size of the atom should be small and electronegativity must be high for e.g. F, O, N. Although chlorine has high electronegativity but due to its larger size hydrogen bonding is not possible with it. <math><mi mathvariant=\"normal\">K</mi><mi mathvariant=\"normal\">H</mi><mi mathvariant=\"normal\">C</mi><msub><mrow><mi mathvariant=\"normal\">l</mi></mrow><mrow><mn>2</mn></mrow></msub><mo>(</mo><mi mathvariant=\"normal\">H</mi><mi mathvariant=\"normal\">C</mi><msubsup><mrow><mi mathvariant=\"normal\">l</mi></mrow><mrow><mn>2</mn></mrow><mrow><mo>-</mo></mrow></msubsup><mo>)</mo></math> don't exists but <math><mi mathvariant=\"normal\">K</mi><mi mathvariant=\"normal\">H</mi><msub><mrow><mi mathvariant=\"normal\">F</mi></mrow><mrow><mn>2</mn></mrow></msub><mo>(</mo><mi mathvariant=\"normal\">H</mi><msubsup><mrow><mi mathvariant=\"normal\">F</mi></mrow><mrow><mn>2</mn></mrow><mrow><mo>-</mo></mrow></msubsup><mo>)</mo></math> exists due to lack of H-bonding in HCl but possible in HF.", "opts": [{"id": "Vd3jD", "text": "Cl and N have comparable electronegativities yet there is no H-bonding in HCl because size of Cl is large"}, {"id": "TfwCW", "text": "Intermolecular H-bonding results in decrease in m.p. and b.p."}, {"id": "G7rvQ", "text": "Ice has maximum density at <math><mn>0</mn><mo>\u00b0</mo></math> C due to H-bonding"}, {"id": "DoKon", "text": "<math><mi mathvariant=\"normal\">K</mi><mi mathvariant=\"normal\">H</mi><mi mathvariant=\"normal\">C</mi><msub><mrow><mi mathvariant=\"normal\">l</mi></mrow><mrow><mn>2</mn></mrow></msub><mo>(</mo><mi mathvariant=\"normal\">H</mi><mi mathvariant=\"normal\">C</mi><msubsup><mrow><mi mathvariant=\"normal\">l</mi></mrow><mrow><mn>2</mn></mrow><mrow><mo>-</mo></mrow></msubsup><mo>)</mo></math> exists but <math><mi mathvariant=\"normal\">K</mi><mi mathvariant=\"normal\">H</mi><msub><mrow><mi mathvariant=\"normal\">F</mi></mrow><mrow><mn>2</mn></mrow></msub><mo>(</mo><mi mathvariant=\"normal\">H</mi><msubsup><mrow><mi mathvariant=\"normal\">F</mi></mrow><mrow><mn>2</mn></mrow><mrow><mo>-</mo></mrow></msubsup><mo>)</mo></math> does not exist due to lack of H-bonding in HCl"}], "ans": "Cl and N have comparable electronegativities yet there is no H-bonding in HCl because size of Cl is large", "correct": "Vd3jD"}, {"id": "695e3b393dc984756e9de5f2", "type": "singleCorrect", "html": "Which of the following statements is not true regarding molecular orbital theory?", "sol": "As bonding molecular orbital has lower energy than the antibonding molecular orbital so statement C is incorrect here.", "opts": [{"id": "Pk1HA", "text": "The atomic orbital of comparable energies combine to form molecular orbitals"}, {"id": "wi2X3", "text": "An atomic orbital is monocentric while a molecular orbital is polycentric"}, {"id": "pJxje", "text": "Bonding molecular orbital has higher energy than antibonding molecular orbital"}, {"id": "XaO8m", "text": "Molecular orbitals like atomic orbitals obey Aufbau principle for filling of electrons"}], "ans": "Bonding molecular orbital has higher energy than antibonding molecular orbital", "correct": "pJxje"}, {"id": "695e3b393dc984756e9de5f3", "type": "singleCorrect", "html": "If <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mo>'</mo><mi mathvariant=\"normal\">Q</mi><mo>'</mo></math> is the magnitude of charge and <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mo>'</mo><mi mathvariant=\"normal\">r</mi><mo>'</mo></math>&nbsp;is the distance between the centres of positive and negative charges then dipole moment <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mo>(</mo><mi mathvariant=\"normal\">&#956;</mi><mo>)</mo></math> is given by", "sol": "<p>A dipole moment arises in any system in which there is a separation of charge. They can, therefore, arise in ionic bonds as well as in covalent bonds. Dipole moments occur due to the difference in electronegativity between two chemically bonded atoms.</p><p>A dipole moment is the product of the magnitude of the charge and the distance between the centers of the positive and negative charges. It is denoted by the Greek letter &lsquo;&micro;&rsquo;</p><p>Mathematically,</p><p>Dipole moment = Charge <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mo>&#215;</mo></math>&nbsp;distance of separation.&nbsp;</p>", "opts": [{"id": "zt9ZT", "text": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi mathvariant=\"normal\">&#956;</mi><mo>=</mo><mi mathvariant=\"normal\">Q</mi><mo>-</mo><mi mathvariant=\"normal\">r</mi></math>"}, {"id": "AblrX", "text": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi mathvariant=\"normal\">&#956;</mi><mo>=</mo><mi mathvariant=\"normal\">Q</mi><mo>+</mo><mi mathvariant=\"normal\">r</mi></math>"}, {"id": "tg19o", "text": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi mathvariant=\"normal\">&#956;</mi><mo>=</mo><mfrac><mi mathvariant=\"normal\">Q</mi><mi mathvariant=\"normal\">r</mi></mfrac></math>"}, {"id": "aXu38", "text": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi mathvariant=\"normal\">&#956;</mi><mo>=</mo><mi mathvariant=\"normal\">Q</mi><mo>&#215;</mo><mi mathvariant=\"normal\">r</mi></math>"}], "ans": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi mathvariant=\"normal\">&#956;</mi><mo>=</mo><mi mathvariant=\"normal\">Q</mi><mo>&#215;</mo><mi mathvariant=\"normal\">r</mi></math>", "correct": "aXu38"}, {"id": "695e3b393dc984756e9de5f4", "type": "singleCorrect", "html": "<math><mi mathvariant=\"normal\">o</mi></math> -nitrophenol is more volatile than para-nitrophenol due to -", "sol": "<br/><img alt=\"\" src=\"https://cdn-question-pool.getmarks.app/NEET/DPP-Chemistry/image29-f2360d9c-ecb7-46fc-b3f1-8eec996aab7f.jpg\"/> <br/>Intramolecular  <math><mi mathvariant=\"normal\">H</mi></math> -bond intermolecular  <math><mi mathvariant=\"normal\">H</mi></math> -bond and steam volatile and boiling  <math><mi mathvariant=\"normal\">p</mi><mi mathvariant=\"normal\">t</mi></math>. is higher.", "opts": [{"id": "xfxyX", "text": "intramolecular  <math><mi mathvariant=\"normal\">H</mi></math> -bonding in  <math><mi mathvariant=\"normal\">o</mi></math> -nitrophenol and intermolecular  <math><mi mathvariant=\"normal\">H</mi></math> -bonding in  <math><mi mathvariant=\"normal\">p</mi></math> -nitrophenol"}, {"id": "N8EVx", "text": "intermolecular  <math><mi mathvariant=\"normal\">H</mi></math> -bonding in  <math><mi mathvariant=\"normal\">o</mi></math> -nitrophenol and intramolecular  <math><mi mathvariant=\"normal\">H</mi></math> -bonding in  <math><mi mathvariant=\"normal\">p</mi></math> -nitrophenol"}, {"id": "Uo8dW", "text": "more stronger intramolecular  <math><mi mathvariant=\"normal\">H</mi></math> -bonding in  <math><mi mathvariant=\"normal\">o</mi></math> -nitrophenol as compared to  <math><mi mathvariant=\"normal\">p</mi></math> -nitrophenol"}, {"id": "jaJLM", "text": "more stronger intermolecular  <math><mi mathvariant=\"normal\">H</mi></math> -bonding in  <math><mi mathvariant=\"normal\">o</mi></math> -nitrophenol as compared to  <math><mi mathvariant=\"normal\">p</mi></math> -nitrophenol"}], "ans": "intramolecular  <math><mi mathvariant=\"normal\">H</mi></math> -bonding in  <math><mi mathvariant=\"normal\">o</mi></math> -nitrophenol and intermolecular  <math><mi mathvariant=\"normal\">H</mi></math> -bonding in  <math><mi mathvariant=\"normal\">p</mi></math> -nitrophenol", "correct": "xfxyX"}, {"id": "695e3b393dc984756e9de5f5", "type": "singleCorrect", "html": "In a polar molecule, the ionic charge is <math><mn>4.8</mn><mo>&#215;</mo><msup><mrow><mn>10</mn></mrow><mrow><mo>-</mo><mn>10&#160; </mn></mrow></msup> <mn>esu</mn></math>. If the interionic distance is <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mn>1</mn><mi mathvariant=\"normal\">&#8491;</mi></math> unit, then the dipole moment is:", "sol": "Given, ionic charge <math><mo>=</mo><mn>4.8</mn><mo>&#215;</mo><msup><mrow><mn>10</mn></mrow><mrow><mo>-</mo><mn>10</mn></mrow></msup><mn>esu</mn> </math><br/>and, ionic distance <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mo>=</mo><mn>1</mn><mo>&#160;&#8491;</mo><mo>=</mo><msup><mn>10</mn><mrow><mo>-</mo><mn>8</mn></mrow></msup><mn>&#160; cm</mn></math><br/>We know that,<br/><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi>Dipole</mi><mo>&#160;</mo><mi>moment</mi><mo>&#160;</mo><mo>=</mo><mo>&#160;</mo><mi>Ionic</mi><mo>&#160;</mo><mi>charge</mi><mo>&#160;</mo><mo>&#215;</mo><mo>&#160;</mo><mi>Ionic</mi><mo>&#160;</mo><mi>distance</mi></math><br/><math><mo>=</mo><mn>4.8</mn><mo>&#215;</mo><msup><mrow><mn>10</mn></mrow><mrow><mo>-</mo><mn>10</mn></mrow></msup><mo>&#215;</mo><msup><mrow><mn>10</mn></mrow><mrow><mo>-</mo><mn>8</mn></mrow></msup></math><br/><math><mo>=</mo><mn>4.8</mn><mo>&#215;</mo><msup><mrow><mn>10</mn></mrow><mrow><mo>-</mo><mn>18</mn></mrow></msup><mn>&#160; esu</mn></math> <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi mathvariant=\"normal\">c</mi><mi mathvariant=\"normal\">m</mi></math><br/><math><mo>=</mo><mn>4.8</mn><mn>&#160; debye</mn> </math>", "opts": [{"id": "A8mpE", "text": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mn>0</mn><mo>.</mo><mn>48</mn><mo>&#160;</mo><mi>debye</mi></math>"}, {"id": "D1JGM", "text": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mn>4</mn><mo>.</mo><mn>18</mn><mo> i></math> (Order of boiling point)", "correct": "pUqE7"}, {"id": "695e3b393dc984756e9de5f7", "type": "singleCorrect", "html": "The correct order for the given pair of isomers is:", "sol": "<p>Dipole moment of the cis isomer <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mo>&#62;</mo></math>dipole moment of the trans isomer. Hence, the water solubility of the cis<br />isomer is greater than the trans isomer.</p>", "opts": [{"id": "dBW8w", "text": "<img src=\"https://cdn-question-pool.getmarks.app/NEET/DPP-Chemistry/379c8837-07b2-43ba-9f46-71db98e41933-image.png\" style=\"width: 411px; height: 71px;\" />&nbsp;(Melting point)"}, {"id": "SCqQq", "text": "<img src=\"https://cdn-question-pool.getmarks.app/NEET/DPP-Chemistry/3cb39c66-b7fa-4ef1-8124-6c502c5cc2dc-image.png\" style=\"width: 435px; height: 67px;\" />&nbsp;(Dipole moment)"}, {"id": "bPSnr", "text": "<img src=\"https://cdn-question-pool.getmarks.app/NEET/DPP-Chemistry/3ea601da-9d4e-4c37-b01e-3cd18b484341-image.png\" style=\"width: 398px; height: 87px;\" />&nbsp;(Boiling point)"}, {"id": "k6Uii", "text": "<img src=\"https://cdn-question-pool.getmarks.app/NEET/DPP-Chemistry/04c58114-f95f-42b0-a4a3-378aba6f0f1b-image.png\" style=\"width: 487px; height: 84px;\" />&nbsp;(Water solubility)"}], "ans": "<img src=\"https://cdn-question-pool.getmarks.app/NEET/DPP-Chemistry/3cb39c66-b7fa-4ef1-8124-6c502c5cc2dc-image.png\" style=\"width: 435px; height: 67px;\" />&nbsp;(Dipole moment)", "correct": "SCqQq"}, {"id": "695e3b393dc984756e9de5f8", "type": "singleCorrect", "html": "Which of the following sequences represent the correct increasing order of bond angles in the given molecules?", "sol": "<math> <mrow> <msub> <mrow> <mtext>OF</mtext></mrow> <mn>2</mn> </msub> <mo>=</mo><mn>103</mn><mo>\u00b0</mo><mo>,</mo><msub> <mtext>H</mtext> <mn>2</mn> </msub> <mtext>O</mtext><mo>=</mo><mn>104.5</mn><mo>\u00b0</mo><mo>,</mo><msub> <mrow> <mtext>OCl</mtext></mrow> <mn>2</mn> </msub> <mo>=</mo><mn>110</mn><mo>\u00b0</mo><mo>,</mo><msub> <mrow> <mtext>ClO</mtext></mrow> <mrow> <mn>2</mn><mo>\u2013</mo></mrow> </msub> <mo>=</mo><mn>111</mn><mo>\u00b0</mo></mrow></math>", "opts": [{"id": "V9apZ", "text": "<math><mi mathvariant=\"normal\">C</mi><mi mathvariant=\"normal\">l</mi><msub><mrow><mi mathvariant=\"normal\">O</mi></mrow><mrow><mn>2</mn></mrow></msub><mo>&lt;</mo><mi mathvariant=\"normal\">O</mi><msub><mrow><mi mathvariant=\"normal\">F</mi></mrow><mrow><mn>2</mn></mrow></msub><mo>&lt;</mo><mi mathvariant=\"normal\">O</mi><mi mathvariant=\"normal\">C</mi><msub><mrow><mi mathvariant=\"normal\">l</mi></mrow><mrow><mn>2</mn></mrow></msub><mo>&lt;</mo><msub><mrow><mi mathvariant=\"normal\">H</mi></mrow><mrow><mn>2</mn></mrow></msub><mi mathvariant=\"normal\">O</mi></math>"}, {"id": "9qBjC", "text": "<math><mi mathvariant=\"normal\">O</mi><msub><mrow><mi mathvariant=\"normal\">F</mi></mrow><mrow><mn>2</mn></mrow></msub><mo>&lt;</mo><msub><mrow><mi mathvariant=\"normal\">H</mi></mrow><mrow><mn>2</mn></mrow></msub><mi mathvariant=\"normal\">O</mi><mo>&lt;</mo><mi mathvariant=\"normal\">O</mi><mi mathvariant=\"normal\">C</mi><msub><mrow><mi mathvariant=\"normal\">l</mi></mrow><mrow><mn>2</mn></mrow></msub><mo>&lt;</mo><mi mathvariant=\"normal\">C</mi><mi mathvariant=\"normal\">l</mi><msub><mrow><mi mathvariant=\"normal\">O</mi></mrow><mrow><mn>2</mn></mrow></msub></math>"}, {"id": "zS1dS", "text": "<math><mi mathvariant=\"normal\">O</mi><mi mathvariant=\"normal\">C</mi><msub><mrow><mi mathvariant=\"normal\">l</mi></mrow><mrow><mn>2</mn></mrow></msub><mo>&lt;</mo><mi mathvariant=\"normal\">C</mi><mi mathvariant=\"normal\">l</mi><msub><mrow><mi mathvariant=\"normal\">O</mi></mrow><mrow><mn>2</mn></mrow></msub><mo>&lt;</mo><msub><mrow><mi mathvariant=\"normal\">H</mi></mrow><mrow><mn>2</mn></mrow></msub><mi mathvariant=\"normal\">O</mi><mo>&lt;</mo><mi mathvariant=\"normal\">O</mi><msub><mrow><mi mathvariant=\"normal\">F</mi></mrow><mrow><mn>2</mn></mrow></msub></math>"}, {"id": "cPUKM", "text": "<math><msub><mrow><mi mathvariant=\"normal\">H</mi></mrow><mrow><mn>2</mn></mrow></msub><mi mathvariant=\"normal\">O</mi><mo>&lt;</mo><mi mathvariant=\"normal\">O</mi><msub><mrow><mi mathvariant=\"normal\">F</mi></mrow><mrow><mn>2</mn></mrow></msub><mo>&lt;</mo><mi mathvariant=\"normal\">O</mi><mi mathvariant=\"normal\">C</mi><msub><mrow><mi mathvariant=\"normal\">l</mi></mrow><mrow><mn>2</mn></mrow></msub><mo>&lt;</mo><mi mathvariant=\"normal\">C</mi><mi mathvariant=\"normal\">l</mi><msub><mrow><mi mathvariant=\"normal\">O</mi></mrow><mrow><mn>2</mn></mrow></msub></math>"}], "ans": "<math><mi mathvariant=\"normal\">O</mi><msub><mrow><mi mathvariant=\"normal\">F</mi></mrow><mrow><mn>2</mn></mrow></msub><mo>&lt;</mo><msub><mrow><mi mathvariant=\"normal\">H</mi></mrow><mrow><mn>2</mn></mrow></msub><mi mathvariant=\"normal\">O</mi><mo>&lt;</mo><mi mathvariant=\"normal\">O</mi><mi mathvariant=\"normal\">C</mi><msub><mrow><mi mathvariant=\"normal\">l</mi></mrow><mrow><mn>2</mn></mrow></msub><mo>&lt;</mo><mi mathvariant=\"normal\">C</mi><mi mathvariant=\"normal\">l</mi><msub><mrow><mi mathvariant=\"normal\">O</mi></mrow><mrow><mn>2</mn></mrow></msub></math>", "correct": "9qBjC"}, {"id": "695e3b393dc984756e9de5f9", "type": "singleCorrect", "html": "Which of the following statements is correct?", "sol": "Because of the greater difference in electronegativity between <math><mi mathvariant=\"normal\">C</mi></math> and <math><mi mathvariant=\"normal\">O</mi></math>, the energy of the <math><mi mathvariant=\"normal\">molecular orbitals</mi></math>\u00a0in <math><mi mathvariant=\"normal\">C</mi><mi mathvariant=\"normal\">O</mi></math> are in the following order<br/><math><msub><mrow><msubsup><mrow><mi>\u03c3</mi></mrow><mrow><mn>1</mn><mi>s</mi></mrow><mrow><mn>2</mn></mrow></msubsup></mrow><mrow></mrow></msub><msubsup><mrow><mi>\u03c3</mi></mrow><mrow><mn>1</mn><mi>s</mi></mrow><mrow><mi>*</mi><mn>2</mn></mrow></msubsup><msubsup><mrow><mi>\u00a0</mi><mi>\u03c3</mi></mrow><mrow><mn>2</mn><mi>s</mi></mrow><mrow><mn>2</mn></mrow></msubsup><mi>\u00a0</mi><mfenced close=\"]\" open=\"[\" separators=\"|\"><mrow><msubsup><mrow><mi>\u03c0</mi></mrow><mrow><mn>2</mn><msub><mrow><mi>p</mi></mrow><mrow><mi>y</mi></mrow></msub></mrow><mrow><mn>2</mn><mi>\u00a0</mi></mrow></msubsup><mo>=</mo><msubsup><mrow><mi>\u03c0</mi></mrow><mrow><mn>2</mn><msub><mrow><mi>p</mi></mrow><mrow><mi>z</mi></mrow></msub></mrow><mrow><mn>2</mn><mi>\u00a0</mi></mrow></msubsup></mrow></mfenced><msubsup><mrow><mi>\u03c3</mi></mrow><mrow><mn>2</mn><msub><mrow><mi>p</mi></mrow><mrow><mi>z</mi></mrow></msub><mi>\u00a0</mi></mrow><mrow><mn>2</mn></mrow></msubsup><msubsup><mrow><mi>\u03c3</mi></mrow><mrow><mn>2</mn><mi>s</mi><mi>\u00a0</mi></mrow><mrow><mi>*</mi><mn>2</mn></mrow></msubsup></math><br/><math><mi mathvariant=\"normal\">Bond order</mi></math>\u00a0in <math><mi mathvariant=\"normal\">C</mi><mi mathvariant=\"normal\">O</mi><mo>=</mo><mi mathvariant=\"normal\">\u00a0</mi><mfrac><mrow><mn>1</mn></mrow><mrow><mn>2</mn></mrow></mfrac><mi mathvariant=\"normal\">\u00a0</mi><mfenced separators=\"|\"><mrow><mn>10</mn><mi mathvariant=\"normal\">\u00a0</mi><mo>\u2013</mo><mi mathvariant=\"normal\">\u00a0</mi><mn>4</mn></mrow></mfenced><mo>=</mo><mn>3</mn></math><br/>", "opts": [{"id": "GgILM", "text": "The bond length in <math><mi mathvariant=\"normal\">C</mi><mi mathvariant=\"normal\">O</mi></math> is <math><mn>1.128</mn><mi mathvariant=\"normal\">\u00a0</mi><mi mathvariant=\"normal\">\u00c5</mi></math> and <math><msup><mrow><mi mathvariant=\"normal\">C</mi><mi mathvariant=\"normal\">O</mi></mrow><mrow><mo>+</mo></mrow></msup></math> is <math><mn>1.115</mn><mi mathvariant=\"normal\">\u00a0</mi><mi mathvariant=\"normal\">\u00c5</mi></math> because during conversion of <math><mi mathvariant=\"normal\">C</mi><mi mathvariant=\"normal\">O</mi></math> to <math><msup><mrow><mi mathvariant=\"normal\">C</mi><mi mathvariant=\"normal\">O</mi></mrow><mrow><mo>+</mo></mrow></msup></math>,\u00a0electron is removed from anti bonding orbital"}, {"id": "TrEkR", "text": "The bond length in <math><mi mathvariant=\"normal\">C</mi><mi mathvariant=\"normal\">O</mi></math> is <math><mn>1.115</mn><mi mathvariant=\"normal\">\u00a0</mi><mi mathvariant=\"normal\">\u00c5</mi></math> and <math><msup><mrow><mi mathvariant=\"normal\">C</mi><mi mathvariant=\"normal\">O</mi></mrow><mrow><mo>+</mo></mrow></msup></math> is <math><mn>1.128</mn><mi mathvariant=\"normal\">\u00a0</mi><mi mathvariant=\"normal\">\u00c5</mi></math> because during conversion of <math><mi mathvariant=\"normal\">C</mi><mi mathvariant=\"normal\">O</mi></math> to <math><msup><mrow><mi mathvariant=\"normal\">C</mi><mi mathvariant=\"normal\">O</mi></mrow><mrow><mo>+</mo></mrow></msup></math> electron is removed from bonding orbital"}, {"id": "xBMgk", "text": "During conversion of <math><mi mathvariant=\"normal\">C</mi><mi mathvariant=\"normal\">O</mi></math> to <math><msup><mrow><mi mathvariant=\"normal\">C</mi><mi mathvariant=\"normal\">O</mi></mrow><mrow><mo>+</mo></mrow></msup></math> bond length does not vary because bond order remain same"}, {"id": "OL79v", "text": "The bond length in <math><mi mathvariant=\"normal\">C</mi><mi mathvariant=\"normal\">O</mi></math> is <math><mn>1.115</mn><mi mathvariant=\"normal\">\u00a0</mi><mi mathvariant=\"normal\">\u00c5</mi></math> and <math><msup><mrow><mi mathvariant=\"normal\">C</mi><mi mathvariant=\"normal\">O</mi></mrow><mrow><mo>+</mo></mrow></msup></math> is <math><mn>1.128</mn><mi>\u00a0</mi><mi>\u00c5</mi></math> because bond order decreases during conversion of <math><mi mathvariant=\"normal\">C</mi><mi mathvariant=\"normal\">O</mi></math> to <math><msup><mrow><mi mathvariant=\"normal\">C</mi><mi mathvariant=\"normal\">O</mi></mrow><mrow><mo>+</mo></mrow></msup></math>"}], "ans": "The bond length in <math><mi mathvariant=\"normal\">C</mi><mi mathvariant=\"normal\">O</mi></math> is <math><mn>1.128</mn><mi mathvariant=\"normal\">\u00a0</mi><mi mathvariant=\"normal\">\u00c5</mi></math> and <math><msup><mrow><mi mathvariant=\"normal\">C</mi><mi mathvariant=\"normal\">O</mi></mrow><mrow><mo>+</mo></mrow></msup></math> is <math><mn>1.115</mn><mi mathvariant=\"normal\">\u00a0</mi><mi mathvariant=\"normal\">\u00c5</mi></math> because during conversion of <math><mi mathvariant=\"normal\">C</mi><mi mathvariant=\"normal\">O</mi></math> to <math><msup><mrow><mi mathvariant=\"normal\">C</mi><mi mathvariant=\"normal\">O</mi></mrow><mrow><mo>+</mo></mrow></msup></math>,\u00a0electron is removed from anti bonding orbital", "correct": "GgILM"}, {"id": "695e3b393dc984756e9de5fa", "type": "singleCorrect", "html": "<p>Given below are two statements: one is labelled as Assertion A&nbsp;and the other is labelled as Reason R :</p><p>Assertion A :&nbsp;The <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi mathvariant=\"normal\">H</mi><mo>-</mo><mi mathvariant=\"normal\">O</mi><mo>-</mo><mi mathvariant=\"normal\">H</mi></math> bond angle in water molecule is <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mn>104</mn><mo>.</mo><mn>5</mn><mo>&#176;</mo></math>.</p><p>Reason&nbsp;R : The lone pair <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mo>-</mo></math>&nbsp;lone pair repulsion of electrons is higher than the bond pair <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mo>-</mo></math>&nbsp;bond pair repulsion.</p>", "sol": "<p><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi mathvariant=\"normal\">H</mi><mn>2</mn></msub><mi mathvariant=\"normal\">O</mi></math></p><p><img src=\"https://cdn-question-pool.getmarks.app/NEET/DPP-Chemistry/8e49525a-5325-435f-a9fd-3fd765f3ed46-image.png\" style=\"width: 117px; height: 113px;\" /></p><p><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi>&#952;</mi><mo>=</mo><mn>104</mn><mo>.</mo><mn>5</mn><mo>&#176;</mo></math></p><p>The hybridisation of oxygen is water molecule is <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msup><mi>sp</mi><mn>3</mn></msup></math>.</p><p>So electron geometry of water molecule is tetrahedral, and the bond angle should be <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mn>109</mn><mo>&#176;</mo><msup><mn>28</mn><mrow><mo>&#39;</mo><mo>&#39;</mo></mrow></msup></math> but as we know that lone pair-lone pair repulsion of electrons is higher than the bond pair-bond pair repulsion because lone pair occupies&nbsp;more space around central atom than that of bond pair, The <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi mathvariant=\"normal\">H</mi><mo>-</mo><mi mathvariant=\"normal\">O</mi><mo>-</mo><mi mathvariant=\"normal\">H</mi></math> bond angle in water molecule is <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mn>104</mn><mo>.</mo><mn>5</mn><mo>&#176;</mo></math>.</p>", "opts": [{"id": "xyvX5", "text": "A is false but R&nbsp;is true"}, {"id": "JUaPl", "text": "Both A&nbsp;and R are true, but R&nbsp;is not the&nbsp;correct explanation of A"}, {"id": "ZH7mT", "text": "A is true but R&nbsp;is false"}, {"id": "CdJRU", "text": "Both A&nbsp;and R&nbsp;are true, and R&nbsp;is the correct explanation of A"}], "ans": "Both A&nbsp;and R&nbsp;are true, and R&nbsp;is the correct explanation of A", "correct": "CdJRU"}, {"id": "695e3b393dc984756e9de5fb", "type": "singleCorrect", "html": "The most unlikely representation of resonance structures of p-nitrophenoxide ion is", "sol": "Among the given structures, the most unlikely structure is given in option C because in this structure N is shown to be pentavalent but N-atom can not have more than 4 bonds as it has only 1s and 3p orbitals and no d orbital.", "opts": [{"id": "7oUo4", "text": "<img src=\"https://cdn.quizrr.in/question-assets/bitsat/2025/chapter-test/5fb00aa7-0a59-4a94-8e9f-c0d979f2564f.png\" style=\"width:0.97361in;height:1.47986in\"/>"}, {"id": "BBq3c", "text": "<img src=\"https://cdn.quizrr.in/question-assets/bitsat/2025/chapter-test/5cf1fb5b-7ef6-4239-b4cf-0649d0112ff1.png\" style=\"width:0.96042in;height:1.47986in\"/>"}, {"id": "6Evo airs and one lone pair is square pyramidal as shown below-</p><p><img src=\"https://cdn-question-pool.getmarks.app/NEET/DPP-Chemistry/7dc0740d-c92e-43ba-97e8-170a9c57d6a5-image.png\" style=\"width: 250px; height: 221px;\"/></p>", "opts": [{"id": "OHwe6", "text": "Trigonal bipyramidal"}, {"id": "9ilZB", "text": "Square pyramidal"}, {"id": "5RWgy", "text": "Pentagonal planar"}, {"id": "D7k2a", "text": "Square planar"}], "ans": "Square pyramidal", "correct": "9ilZB"}, {"id": "695e3b3a3dc984756e9de604", "type": "singleCorrect", "html": "Which of the following sequences represent the correct increasing order of bond angles in the given molecules?", "sol": "<p><img src=\"https://cdn-question-pool.getmarks.app/NEET/DPP-Chemistry/b8ddcffd-d373-498b-9702-1acfe80bd0fe-image.png\" style=\"width: 387px; height: 82px;\" /></p><p>Bond angle of all molecules are shown in fig.</p><p>Bond angle in <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi mathvariant=\"normal\">C</mi><mi mathvariant=\"normal\">l</mi><msub><mi mathvariant=\"normal\">O</mi><mn>2</mn></msub><mo>=</mo><mi mathvariant=\"normal\">&#160;</mi><mn>118</mn><mo>&#176;</mo></math>.<br />Bond angle in <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi mathvariant=\"normal\">C</mi><msub><mi mathvariant=\"normal\">l</mi><mn>2</mn></msub><mi mathvariant=\"normal\">O</mi><mo>=</mo><mi mathvariant=\"normal\">&#160;</mi><mn>111</mn><mo>&#176;</mo></math>.<br />Bond angle in <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi mathvariant=\"normal\">F</mi><mn>2</mn></msub><mi mathvariant=\"normal\">O</mi><mi mathvariant=\"normal\">&#160;</mi><mo>=</mo><mn>103</mn><mo>&#176;</mo></math>.<br />Bond angle in <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi mathvariant=\"normal\">H</mi><mn>2</mn></msub><mi mathvariant=\"normal\">O</mi><mo>=</mo><mi mathvariant=\"normal\">&#160;</mi><mn>105</mn><mo>&#176;</mo></math>.</p><p>Hence correct order of&nbsp; bond angle is ;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi>OF</mi><mn>2</mn></msub><mo>&#60;</mo><msub><mi mathvariant=\"normal\">H</mi><mn>2</mn></msub><mi mathvariant=\"normal\">O</mi><mo>&#60;</mo><msub><mi>OCl</mi><mn>2</mn></msub><mo>&#60;</mo><msub><mi>ClO</mi><mn>2</mn></msub></math></p>", "opts": [{"id": "94n4p", "text": "<math><msub><mrow><mi mathvariant=\"normal\">C</mi><mi mathvariant=\"normal\">l</mi><mi mathvariant=\"normal\">O</mi></mrow><mrow><mn>2</mn></mrow></msub><mo>&lt;</mo><msub><mrow><mi mathvariant=\"normal\">O</mi><mi mathvariant=\"normal\">F</mi></mrow><mrow><mn>2</mn></mrow></msub><mo>&lt;</mo><msub><mrow><mi mathvariant=\"normal\">O</mi><mi mathvariant=\"normal\">C</mi><mi mathvariant=\"normal\">l</mi></mrow><mrow><mn>2</mn></mrow></msub><mo>&lt;</mo><msub><mrow><mi mathvariant=\"normal\">H</mi></mrow><mrow><mn>2</mn></mrow></msub><mi mathvariant=\"normal\">O</mi></math>"}, {"id": "8G7G9", "text": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi mathvariant=\"normal\">O</mi><msub><mi mathvariant=\"normal\">F</mi><mn>2</mn></msub><mo>&#60;</mo><msub><mi mathvariant=\"normal\">H</mi><mn>2</mn></msub><mi mathvariant=\"normal\">O</mi><mo>&#60;</mo><mi mathvariant=\"normal\">O</mi><mi mathvariant=\"normal\">C</mi><msub><mi mathvariant=\"normal\">l</mi><mn>2</mn></msub><mo>&#60;</mo><mi mathvariant=\"normal\">C</mi><mi mathvariant=\"normal\">l</mi><msub><mi mathvariant=\"normal\">O</mi><mn>2</mn></msub></math>"}, {"id": "o1Ji2", "text": "<math><msub><mrow><mi mathvariant=\"normal\">O</mi><mi mathvariant=\"normal\">C</mi><mi mathvariant=\"normal\">l</mi></mrow><mrow><mn>2</mn></mrow></msub><mo>&lt;</mo><msub><mrow><mi mathvariant=\"normal\">C</mi><mi mathvariant=\"normal\">l</mi><mi mathvariant=\"normal\">O</mi></mrow><mrow><mn>2</mn></mrow></msub><mo>&lt;</mo><msub><mrow><mi mathvariant=\"normal\">H</mi></mrow><mrow><mn>2</mn></mrow></msub><mi mathvariant=\"normal\">O</mi><mo>&lt;</mo><msub><mrow><mi mathvariant=\"normal\">O</mi><mi mathvariant=\"normal\">F</mi></mrow><mro ns from metal atoms.", "opts": [{"id": "C9wKp", "text": "<math><mtext>G</mtext><mtext>a</mtext><mo>,</mo><mtext>I</mtext><mtext>n</mtext><mo>,</mo><mtext>T</mtext><mtext>l</mtext></math>"}, {"id": "PqNVS", "text": "<math><mtext>N</mtext><mtext>a</mtext><mo>,</mo><mtext>M</mtext><mtext>g</mtext><mo>,</mo><mtext>A</mtext><mtext>l</mtext></math>"}, {"id": "oy4kx", "text": "<math><mtext>N</mtext><mo>,</mo><mtext>O</mtext><mo>,</mo><mtext>F</mtext></math>"}, {"id": "cJYbD", "text": "<math><mtext>V</mtext><mo>,</mo><mtext>C</mtext><mtext>r</mtext><mo>,</mo><mtext>M</mtext><mtext>n</mtext></math>"}], "ans": "<math><mtext>N</mtext><mo>,</mo><mtext>O</mtext><mo>,</mo><mtext>F</mtext></math>", "correct": "oy4kx"}, {"id": "695e3b3a3dc984756e9de607", "type": "singleCorrect", "html": "What was the main drawback of Mendeleev's periodic table?", "sol": "<p>Mendeleev's arranged all the known elements in increasing order of their atomic masses and gave the periodic law.</p><p>According to Mendeleev's Periodic law, The physical and chemical properties of the elements are the periodic function of their atomic masses.</p><p>Mendeleev designed a periodic table and arranged all the elements in increasing order of their atomic masses but not included the isotpes. As isotopes also have the different atomic masses. It is the major limitation of the Mendeleev's periodic table.</p>", "opts": [{"id": "Kyj0H", "text": "Many elements have several isotopes."}, {"id": "w0onU", "text": "Noble gases do not form compounds."}, {"id": "QbpYM", "text": "Some groups stand divided into two sub groups <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi mathvariant=\"normal\">A</mi></math> and <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi mathvariant=\"normal\">B</mi></math>."}, {"id": "VRUb7", "text": "Atomic weights of elements are not always whole numbers."}], "ans": "Many elements have several isotopes.", "correct": "Kyj0H"}, {"id": "695e3b3a3dc984756e9de608", "type": "singleCorrect", "html": "Which one of the following oxides is amphoteric in character?", "sol": "<p>An oxide is amphoteric in character if it forms salts with both acids (behaves as a base) and bases (behaves as an acid). The necessary condition for an oxide to exhibit amphoteric character is that it must be a metallic oxide, because only metals can show variable oxidation states.</p><p>Non-metallic oxides do not react with acids at all, because they are themselves acidic in nature.&nbsp;</p><p>Among <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi>SnO</mi><mn>2</mn></msub><mo>,</mo><mo>&#160;</mo><msub><mi>SiO</mi><mn>2</mn></msub><mo>,</mo><mo>&#160;</mo><msub><mi>CO</mi><mn>2</mn></msub><mo>,</mo><mo>&#160;</mo><mi>and</mi><mo>&#160;</mo><mi>CaO</mi><mo>,</mo></math> only <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi>Sn</mi><mo>&#160;</mo><mo>(</mo><mi>tin</mi><mo>)</mo></math> &nbsp;and <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi>Ca</mi><mo>&#160;</mo><mo>(</mo><mi>calcium</mi><mo>)</mo></math>&nbsp;are&nbsp;the metals. So, there is possibility of&nbsp; only <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi>SnO</mi><mn>2</mn></msub></math>&nbsp;or <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi>CaO</mi></math>, or both&nbsp;to show amphoterism.&nbsp;</p><p>Reaction of <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi>SnO</mi><mn>2</mn></msub></math>&nbsp;with&nbsp;acid :</p><p><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi>SnO</mi><mn>2</mn></msub><mo>+</mo><mn>4</mn><mi>HCl</mi><mo>&#8594;</mo><munder><msub><mi>SnCl</mi><mn>4</mn></msub><mrow><mo>&#160;</mo><mi>tin</mi><mo>(</mo><mi>IV</mi><mo>)</mo><mi>chloride</mi><mo>&#160;</mo><mo>(</mo><mi>salt</mi><mo>)</mo></mrow></munder><mo>+</mo><mn>2</mn><msub><mi mathvariant=\"normal\">H</mi><mn>2</mn></msub><mi mathvariant=\"normal\">O</mi></math></p><p>Reaction of <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi>SnO</mi><mn>2</mn></msub></math>&nbsp;with&nbsp;base&nbsp;:<br/><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi>SnO</mi><mn>2</mn></msub><mo>+</mo><mn>2</mn><mi>NaOH</mi><mo>&#8594;</mo><munder><mrow><msub><mi>Na</mi><mn>2</mn></msub><msub><mi>SnO</mi><mn>3</mn></msub></mrow><mrow><mi>sodium</mi><mo>&#160;</mo><mi>stannate</mi><mo>&#160;</mo><mo>(</mo><mi>salt</mi><mo>)</mo></mrow></munder><mo>+</mo><msub><mi mathvariant=\"normal\">H</mi><mn>2</mn></msub><mi mathvariant=\"normal\">O</mi></math></p><p><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi>SnO</mi><mn>2</mn></msub></math>&nbsp;reacts with both acid and base, and is thus, amphoteric in nature.&nbsp;</p><p>Reaction of <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi>CaO</mi></math>&nbsp;with&nbsp;acid :</p><p><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi>CaO</mi><mo>&#160;</mo><mo>+</mo><mo>&#160;</mo><mn>2</mn><mi>HCl</mi><mo>&#160;</mo><mo>&#8594;</mo><mo>&#160;</mo><munder><mrow><msub><mi>CaCl</mi><mn>2</mn></msub><mo>&#160;</mo></mrow><mrow><mi>calcium</mi><mo>&#160;</mo><mi>chloride</mi><mo>&#160;</mo><mo>(</mo><mi>salt</mi><mo>)</mo></mrow></munder><mo>+</mo><mo>&#160;</mo><msub><mi mathvariant=\"normal\">H</mi><mn>2</mn></msub><mi mathvariant=\"normal\">O</mi></math></p><p>Reaction of <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi>CaO</mi></math>&nbsp;with&nbsp;base :</p><p><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi>CaO</mi><mo>&#160;</mo><mo>+</mo><mo>&#160;</mo><mn>2</mn><mi>NaOH</mi><mo>&#160;</mo><mo>&#8594;</mo><munder><mrow><mi>Ca</mi><mo>(</mo><mi>OH</mi><msub><mo>)</mo><mn>2</mn></msub></mrow><mrow><mi>calcium</mi><mo>&#160;</mo><mi>hydroxide</mi></mrow></munder><mo>&#160;</mo><mo>+</mo><mo>&#160;</mo><munder><mrow><msub><mi>Na</mi><mn>2</mn></msub><mi mathvariant=\"normal\">O</mi></mrow><mrow><mi>sodium</mi><mo>&#160;</mo><mi>oxide</mi></mrow></munder></math></p><p><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi>CaO</mi></math>&nbsp;does not form salt with a base. Therefore, it is not an amphoteric oxide.&nbsp;</p><p>Let us also see the reactions of&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi>SiO</mi><mn>2</mn></msub></math>&nbsp;and <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi>CO</mi><mn>2</mn></msub></math>&nbsp;with an acid and a base.&nbsp;</p><p><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi>SiO</mi><mn>2</mn></msub><mo>&#160;</mo><mo>+</mo><mo>&#160;</mo><mi>HCl</mi><mo>&#160;</mo><mo>&#8594;</mo><mi>No</mi><mo>&#160;</mo><mi>reaction</mi></math><br/><math><msub><mi>CO</mi><mn>2</mn></msub><mo>&#160;</mo><mo>+</mo><mo>&#160;</mo><mi>HCl</mi><mo>&#160;</mo><mo>&#8594;</mo><mi>No</mi><mo>&#160;</mo><mi>reaction</mi></math></p><p><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi>SiO</mi><mn>2</mn></msub></math>&nbsp;and&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi>CO</mi><mn>2</mn></msub></math>&nbsp;do not react with acid as both the oxides are themselves acidic in nature (non-metallic oxides).</p><p><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi>SiO</mi><mrow><mn>2</mn><mo>&#160;</mo></mrow></msub><mo>+</mo><mo>&#160;</mo><mn>2</mn><mi>NaOH</mi><mo>&#160;</mo><mo>&#8594;</mo><munder><mrow><msub><mi>Na</mi><mn>2</mn></msub><msub><mi>SiO</mi><mn>3</mn></msub></mrow><mrow><mi>sodium</mi><mo>&#160;</mo><mi>silicate</mi><mo>&#160;</mo><mo>(</mo><mi>salt</mi><mo>)</mo></mrow></munder><mo>&#160;</mo><mo>+</mo><msub><mi mathvariant=\"normal\">H</mi><mn>2</mn></msub><mi mathvariant=\"normal\">O</mi></math><br/><math><msub><mi>CO</mi><mrow><mn>2</mn><mo>&#160;</mo></mrow></msub><mo>+</mo><mo>&#160;</mo><mn>2</mn><mi>NaOH</mi><mo>&#160;</mo><mo>&#8594;</mo><munder><mrow><msub><mi>Na</mi><mn>2</mn></msub><msub><mi>CO</mi><mn>3</mn></msub></mrow><mrow><mi>sodium</mi><mo>&#160;</mo><mi>silicate</mi><mo>&#160;</mo><mo>(</mo><mi>salt</mi><mo>)</mo></mrow></munder><mo>&#160;</mo><mo>+</mo><msub><mi mathvariant=\"normal\">H</mi><mn>2</mn></msub><mi mathvariant=\"normal\">O</mi></math></p><p><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi>SiO</mi><mn>2</mn></msub></math>&nbsp;and&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi>CO</mi><mn>2</mn></msub></math>&nbsp;both form salts and water with a base, means they react with base.&nbsp;</p><p>Thus, only <strong>SnO<sub>2</sub>&nbsp;</strong>forms salts<strong>&nbsp;</strong>with both acid and base, and is therefore, an&nbsp;amphoteric oxide.<strong>&nbsp;</strong></p>", "opts": [{"id": "NbxwH", "text": "<math><mi mathvariant=\"normal\">S</mi><mi mathvariant=\"normal\">n</mi><msub><mrow><mi mathvariant=\"normal\">O</mi></mrow><mrow><mn>2</mn></mrow></msub></math>"}, {"id": "fRFbX", "text": "<math><mi mathvariant=\"normal\">S</mi><mi mathvariant=\"normal\">i</mi><msub><mrow><mi mathvariant=\"normal\">O</mi></mrow><mrow><mn>2</mn></mrow></msub></math>"}, {"id": "byXyw", "text": "<math><mi mathvariant=\"normal\">C</mi><msub><mrow><mi mathvariant=\"normal\">O</mi></mrow><mrow><mn>2</mn></mrow></msub></math>"}, {"id": "UBR2L", "text": "<math><mi mathvariant=\"normal\">C</mi><mi mathvariant=\"normal\">a</mi><mi mathvariant=\"normal\">O</mi></math>"}], "ans": "<math><mi mathvariant=\"normal\">S</mi><mi mathvariant=\"normal\">n</mi><msub><mrow><mi mathvariant=\"normal\">O</mi></mrow><mrow><mn>2</mn></mrow></msub></math>", "correct": "NbxwH"}, {"id": "695e3b3a3dc984756e9de609", "type": "singleCorrect", "html": "(X), (Y), (Z) are elements of the third period. Oxide of (X) is ionic, that of (Y) is amphoteric and of (Z) a giant molecule. (X), (Y) and (Z) will have atomic numbers in the order", "sol": "For third period, \"s\" block will form ionic oxide, 13th group forms amphoteric oxide, and 14th group element will form giant oxide <math><mo>(</mo><mi mathvariant=\"normal\">S</mi><mi mathvariant=\"normal\">i</mi><msub><mrow><mi mathvariant=\"normal\">O</mi></mrow><mrow><mn>2</mn></mrow></msub><mo>)</mo></math> .<br/>(X) &lt; (Y) &lt; (Z)", "opts": [{"id": "j6pKC", "text": "(X) &lt; (Y) &lt; (Z)"}, {"id": "zbMAb", "text": "(Z) &lt; (Y) &lt; (X)"}, {"id": "WbA32", "text": "(X) &lt; (Z) &lt; (Y)"}, {"id": "axN47", "text": "(Y) &lt; (X) &lt; (Z)"}], "ans": "(X) &lt; (Y) &lt; (Z)", "correct": "j6pKC"}, {"id": "695e3b3a3dc984756e9de60a", "type": "singleCorrect", "html": "The tenth elements in the Periodic Table resembles with the", "sol": "Each period consists of a series of elements whose atoms have the same principal quantum number <math><mo>(</mo><mi>n</mi><mo>)</mo></math> of the outermost shell, <math><mi>i</mi><mi>e</mi></math>, in second period, <math><mi>n</mi><mo>=</mo><mn>2</mn></math>, this shell has four orbitals (one <math><mn>2</mn><mi>s</mi></math> and three <math><mn>2</mn><mi>p</mi></math>) which can have eight electrons, hence second period contain 8 elements from atomic number 3 to 10", "opts": [{"id": "XAuSN", "text": "First period"}, {"id": "ydXxX", "text": "Second period"}, {"id": "1WIqJ", "text": "Fourth period"}, {"id": "kjduz", "text": "Ninth period"}], "ans": "Second period", "correct": "ydXxX"}, {"id": "695e3b3a3dc984756e9de60b", "type": "singleCorrect", "html": "<p>Beryllium and aluminium exhibit many properties which are similar. But, the two elements differ in:</p>", "sol": "<p>Beryllium and aluminium belong to different groups and exhibit different maximum covalency.<br />Beryllium is Group II and has valency 2, whereas Al has valency 3 as it is Group III.</p>", "opts": [{"id": "osw0q", "text": "<p>Exhibiting maximum covalency in compounds</p>"}, {"id": "vhl3Z", "text": "<p>Exhibiting amphoteric nature in their oxides</p>"}, {"id": "5kd5r", "text": "<p>Forming covalent halides</p>"}, {"id": "j7CQ5", "text": "<p>Forming polymeric hydrides</p>"}], "ans": "<p>Exhibiting maximum covalency in compounds</p>", "correct": "osw0q"}, {"id": "695e3b3a3dc984756e9de60c", "type": "singleCorrect", "html": "Which of the following order is correct?", "sol": "Here only option C is correct and rest other are incorrect as correct orders are<br/>(a) <math><mi mathvariant=\"normal\">C</mi><msup><mrow><mi mathvariant=\"normal\">a</mi></mrow><mrow><mn>2</mn><mo>+</mo></mrow></msup><mo>&lt;</mo><msup><mrow><mi mathvariant=\"normal\">K</mi></mrow><mrow><mo>+</mo></mrow></msup><mo>&lt;</mo><msup><mrow><mi mathvariant=\"normal\">S</mi></mrow><mrow><mn>2</mn><mo>-</mo></mrow></msup><mo>&lt;</mo><msup><mrow><mi mathvariant=\"normal\">P</mi></mrow><mrow><mn>3</mn><mo>-</mo></mrow></msup></math> : Ionic size<br/>(b) <math><mi mathvariant=\"normal\">N</mi><msubsup><mrow><mi mathvariant=\"normal\">a</mi></mrow><mrow><mo>(</mo><mi mathvariant=\"normal\">a</mi><mi mathvariant=\"normal\">q</mi><mo>.</mo><mo>)</mo></mrow><mrow><mo>+</mo></mrow></msubsup><mo>&lt;</mo><msubsup><mrow><mi mathvariant=\"normal\">K</mi></mrow><mrow><mo>(</mo><mi mathvariant=\"normal\">a</mi><mi mathvariant=\"normal\">q</mi><mo>.</mo><mo>)</mo></mrow><mrow><mo>+</mo></mrow></msubsup><mo>&lt;</mo><mi mathvariant=\"normal\">R</mi><msubsup><mrow><mi mathvariant=\"normal\">b</mi></mrow><mrow><mo>(</mo><mi mathvariant=\"normal\">a</mi><mi mathvariant=\"normal\">q</mi><mo>.</mo><mo>)</mo></mrow><mrow><mo>+</mo></mrow></msubsup><mo>&lt;</mo><mi mathvariant=\"normal\">C</mi><msubsup><mrow><mi mathvariant=\"normal\">s</mi></mrow><mrow><mo>(</mo><mi mathvariant=\"normal\">a</mi><mi mathvariant=\"normal\">q</mi><mo>.</mo><mo>)</mo></mrow><mrow><mo>+</mo></mrow></msubsup></math> : Electrical conductance<br/>(d) <math><msubsup><mrow><mi mathvariant=\"normal\">I</mi></mrow><mrow><mo>(</mo><mi mathvariant=\"normal\">a</mi><mi mathvariant=\"normal\">q</mi><mo>.</mo><mo>)</mo></mrow><mrow><mo>-</mo></mrow></msubsup><mo>&gt;</mo><mi mathvariant=\"normal\">B</mi><msubsup><mrow><mi mathvariant=\"normal\">r</mi></mrow><mrow><mo>(</mo><mi mathvariant=\"normal\">a</mi><mi mathvariant=\"normal\">q</mi><mo>.</mo><mo>)</mo></mrow><mrow><mo>-</mo></mrow></msubsup><mo>&gt;</mo><mi mathvariant=\"normal\">C</mi><msubsup><mrow><mi mathvariant=\"normal\">l</mi></mrow><mrow><mo>(</mo><mi mathvariant=\"normal\">a</mi><mi mathvariant=\"normal\">q</mi><mo>.</mo><mo>)</mo></mrow><mrow><mo>-</mo></mrow></msubsup><mo>&gt;</mo><msubsup><mrow><mi mathvariant=\"normal\">F</mi></mrow><mrow><mo>(</mo><mi mathvariant=\"normal\">a</mi><mi mathvariant=\"normal\">q</mi><mo>.</mo><mo>)</mo></mrow><mrow><mo>-</mo></mrow></msubsup></math> : Ionic mobility", "opts": [{"id": "UscCh", "text": "<math><msup><mrow><mi mathvariant=\"normal\">K</mi></mrow><mrow><mo>+</mo></mrow></msup><mo>&lt;</mo><mi mathvariant=\"normal\">C</mi><msup><mrow><mi mathvariant=\"normal\">a</mi></mrow><mrow><mn>2</mn><mo>+</mo></mrow></msup><mo>&lt;</mo><msup><mrow><mi mathvariant=\"normal\">P</mi></mrow><mrow><mn>3</mn><mo>-</mo></mrow></msup><mo>&lt;</mo><msup><mrow><mi mathvariant=\"normal\">S</mi></mrow><mrow><mn>2</mn><mo>-</mo></mrow></msup></math> : Ionic size"}, {"id": "dkosa", "text": "<math><mi mathvariant=\"normal\">N</mi><msubsup><mrow><mi mathvariant=\"normal\">a</mi></mrow><mrow><mo>(</mo><mi mathvariant=\"normal\">a</mi><mi mathvariant=\"normal\">q</mi><mo>.</mo><mo>)</mo></mrow><mrow><mo>+</mo></mrow></msubsup><mo>&gt;</mo><msubsup><mrow><mi mathvariant=\"normal\">K</mi></mrow><mrow><mo>(</mo><mi mathvariant=\"normal\">a</mi><mi mathvariant=\"normal\">q</mi><mo>.</mo><mo>)</mo></mrow><mrow><mo>+</mo></mrow></msubsup><mo>&gt;</mo><mi mathvariant=\"normal\">R</mi><msubsup><mrow><mi mathvariant=\"normal\">b</mi></mrow><mrow><mo>(</mo><mi mathvariant=\"normal\">a</mi><mi mathvariant=\"normal\">q</mi><mo>.</mo><mo>)</mo></mrow><mrow><mo>+</mo></mrow></msubsup><mo>&gt;</mo><mi mathvariant=\"normal\">C</mi><msubsup><mrow><mi mathvariant=\"normal\">s</mi></mrow><mrow><mo>(</mo><mi mathvariant=\"normal\">a</mi><mi mathvariant=\"normal\">q</mi><mo>.</mo><mo>)</mo></mrow><mrow><mo>+</mo></mrow></msubsup></math> : Electrical conductance"}, {"id": "cp2lo", "text": "<math><mi mathvariant=\"normal\">A</mi><msubsup><mrow><mi mathvariant=\"normal\">l</mi></mrow><mrow><mo>(</mo><mi mathvariant=\"normal\">a</mi><mi mathvariant=\"normal\">q</mi><mo>.</mo><mo>)</mo></mrow><mrow><mn>3</mn><mo>+</mo></mrow></msubsup><mo>&gt;</mo><mi mathvariant=\"normal\">M</mi><msubsup><mrow><mi mathvariant=\"normal\">g</mi></mrow><mrow><mo>(</mo><mi mathvariant=\"normal\">a</mi><mi mathvariant=\"normal\">q</mi><mo>.</mo><mo>)</mo></mrow><mrow><mn>2</mn><mo>+</mo></mrow></msubsup><mo>&gt;</mo><mi mathvariant=\"normal\">N</mi><msubsup><mrow><mi mathvariant=\"normal\">a</mi></mrow><mrow><mo>(</mo><mi mathvariant=\"normal\">a</mi><mi mathvariant=\"normal\">q</mi><mo>.</mo><mo>)</mo></mrow><mrow><mo>+</mo></mrow></msubsup></math> : Hydrated size"}, {"id": "J8zBD", "text": "<math><msubsup><mrow><mi mathvariant=\"normal\">I</mi></mrow><mrow><mo>(</mo><mi mathvariant=\"normal\">a</mi><mi mathvariant=\"normal\">q</mi><mo>.</mo><mo>)</mo></mrow><mrow><mo>-</mo></mrow></msubsup><mo>&lt;</mo><mi mathvariant=\"normal\">B</mi><msubsup><mrow><mi mathvariant=\"normal\">r</mi></mrow><mrow><mo>(</mo><mi mathvariant=\"normal\">a</mi><mi mathvariant=\"normal\">q</mi><mo>.</mo><mo>)</mo></mrow><mrow><mo>-</mo></mrow></msubsup><mo>&lt;</mo><mi mathvariant=\"normal\">C</mi><msubsup><mrow><mi mathvariant=\"normal\">l</mi></mrow><mrow><mo>(</mo><mi mathvariant=\"normal\">a</mi><mi mathvariant=\"normal\">q</mi><mo>.</mo><mo>)</mo></mrow><mrow><mo>-</mo></mrow></msubsup><mo>&lt;</mo><msubsup><mrow><mi mathvariant=\"normal\">F</mi></mrow><mrow><mo>(</mo><mi mathvariant=\"normal\">a</mi><mi mathvariant=\"normal\">q</mi><mo>.</mo><mo>)</mo></mrow><mrow><mo>-</mo></mrow></msubsup></math> : Ionic mobility"}], "ans": "<math><mi mathvariant=\"normal\">A</mi><msubsup><mrow><mi mathvariant=\"normal\">l</mi></mrow><mrow><mo>(</mo><mi mathvariant=\"normal\">a</mi><mi mathvariant=\"normal\">q</mi><mo>.</mo><mo>)</mo></mrow><mrow><mn>3</mn><mo>+</mo></mrow></msubsup><mo>&gt;</mo><mi mathvariant=\"normal\">M</mi><msubsup><mrow><mi mathvariant=\"normal\">g</mi></mrow><mrow><mo>(</mo><mi mathvariant=\"normal\">a</mi><mi mathvariant=\"normal\">q</mi><mo>.</mo><mo>)</mo></mrow><mrow><mn>2</mn><mo>+</mo></mrow></msubsup><mo>&gt;</mo><mi mathvariant=\"normal\">N</mi><msubsup><mrow><mi mathvariant=\"normal\">a</mi></mrow><mrow><mo>(</mo><mi mathvariant=\"normal\">a</mi><mi mathvariant=\"normal\">q</mi><mo>.</mo><mo>)</mo></mrow><mrow><mo>+</mo></mrow></msubsup></math> : Hydrated size", "correct": "cp2lo"}, {"id": "695e3b3a3dc984756e9de60d", "type": "singleCorrect", "html": "The correct order of the increasing lattice energy of the following is:", "sol": "<p><math> <mrow> <msub> <mtext>U</mtext> <mfenced close=\")\" open=\"(\" separators=\",\"> <mrow> <mtext>Lattice energy</mtext> </mrow> </mfenced> </msub> <mo>&#8733;</mo> <mfrac> <mrow> <mtext>Product of charges on ions</mtext> </mrow> <mrow> <mtext>Inter-ionic distance</mtext> </mrow> </mfrac> </mrow> </math><br/><math> <mrow> <msup> <mtext>Li</mtext> <mo>+</mo> </msup> </mrow> </math> and <math> <mrow> <msup> <mtext>F</mtext> <mo>-</mo> </msup> </mrow> </math> are&nbsp;the smallest ions.</p>", "opts": [{"id": "ilXEg", "text": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi>LiF</mi><mo>&#60;</mo><mi>NaF</mi><mo>&#60;</mo><mi>NaCI</mi><mo>&#60;</mo><mi>KBr</mi></math>"}, {"id": "XxpUB", "text": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi>NaF</mi><mo>&#60;</mo><mi>NaCl</mi><mo>&#60;</mo><mi>KBr</mi><mo>&#60;</mo><mi>LiF</mi></math>"}, {"id": "IW19U", "text": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi>NaCI</mi><mo>&#60;</mo><mi>NaF</mi><mo>&#60;</mo><mi>KBr</mi><mo>&#60;</mo><mi>LiF</mi></math>"}, {"id": "JfriW", "text": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi>KBr</mi><mo>&#60;</mo><mi>NaCl</mi><mo>&#60;</mo><mi>NaF</mi><mo>&#60;</mo><mi>LiF</mi></math>"}], "ans": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi>KBr</mi><mo>&#60;</mo><mi>NaCl</mi><mo>&#60;</mo><mi>NaF</mi><mo>&#60;</mo><mi>LiF</mi></math>", "correct": "JfriW"}, {"id": "695e3b3a3dc984756e9de60e", "type": "singleCorrect", "html": "Atomic radii of <math><mi mathvariant=\"normal\">T</mi><mi mathvariant=\"normal\">i</mi></math>, <math><mi mathvariant=\"normal\">Z</mi><mi mathvariant=\"normal\">r</mi></math> and <math><mi mathvariant=\"normal\">H</mi><mi mathvariant=\"normal\">f</mi></math> vary", "sol": "Ti, Zr and Hf belong to IV B group of Periodic Table and in a group atomic radii increases on moving down. However, the transition metals of <math><mn>4</mn><mi>d</mi></math>-series have nearly the same radii as metals of <math><mn>5</mn><mi>d</mi></math>-series. Hence, the order of atomic radii is<br/><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi>Ti</mi><mo>&#60;</mo><mi>Zr</mi><mo>&#8776;</mo><mi>Hf</mi></math><br/>Due to nearly equal atomic radii, Zr and Hf are called chemical twins.", "opts": [{"id": "squtA", "text": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi>Ti</mi><mi mathvariant=\"normal\">&#160;</mi><mo>&#62;</mo><mi>Zr</mi><mo>&#62;</mo><mi>Hf</mi></math>"}, {"id": "dsCz1", "text": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi>Ti</mi><mi mathvariant=\"normal\">&#160;</mi><mo>&#60;</mo><mi>Zr</mi><mo>&#60;</mo><mi mathvariant=\"normal\">&#160;</mi><mi>Hf</mi></math>"}, {"id": "sCcFc", "text": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi>Ti</mi><mo>&#60;</mo><mi>Hf</mi><mo>&#60;</mo><mi>Zr</mi></math>"}, {"id": "7EYRv", "text": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi>Ti</mi><mo>&#60;</mo><mi>Zr</mi><mo>=</mo><mi>Hf</mi></math>"}], "ans": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi>Ti</mi><mo>&#60;</mo><mi>Zr</mi><mo>=</mo><mi>Hf</mi></math>", "correct": "7EYRv"}, {"id": "695e3b3a3dc984756e9de60f", "type": "singleCorrect", "html": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi>AB</mi></math> is an ionic solid. The ionic radii of <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msup><mi mathvariant=\"normal\">A</mi><mo>+</mo></msup></math> and <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msup><mi mathvariant=\"normal\">B</mi><mo>-</mo></msup></math> are&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msub><mi mathvariant=\"normal\">r</mi><mi mathvariant=\"normal\">c</mi></msub></math>&nbsp;and<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi mathvariant=\"normal\">&#160;</mi><msub><mi mathvariant=\"normal\">r</mi><mi mathvariant=\"normal\">a</mi></msub></math>, respectively.&nbsp;The lattice energy of <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi>AB</mi></math> is proportional to:", "sol": "<p>The lattice energy is inversely proportional to the interionic distance of the crystal lattice. The lattice becomes stronger (i.e., the lattice energy,&nbsp;<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi mathvariant=\"normal\">U</mi></math> becomes more negative) as the interionic distance decreases. <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi mathvariant=\"normal\">U</mi></math> is proportional to <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>1</mn><mi mathvariant=\"normal\">r</mi></mfrac></math>.<br />Or <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi mathvariant=\"normal\">U</mi><mo>&#8733;</mo><mfrac><mn>1</mn><mrow><mo>(</mo><msub><mi mathvariant=\"normal\">r</mi><mi mathvariant=\"normal\">c</mi></msub><mo>+</mo><msub><mi mathvariant=\"normal\">r</mi><mi mathvariant=\"normal\">a</mi></msub><mo>)</mo></mrow></mfrac></math></p>", "opts": [{"id": "O46XM", "text": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><msub><mi mathvariant=\"normal\">r</mi><mi mathvariant=\"normal\">c</mi></msub><msub><mi mathvariant=\"normal\">r</mi><mi mathvariant=\"normal\">a</mi></msub></mfrac></math>"}, {"id": "ZECMz", "text": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mo>(</mo><msub><mi mathvariant=\"normal\">r</mi><mi mathvariant=\"normal\">c</mi></msub><mo>+</mo><msub><mi mathvariant=\"normal\">r</mi><mi mathvariant=\"normal\">a</mi></msub><mo>)</mo></math>"}, {"id": "Jhd6a", "text": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><msub><mi mathvariant=\"normal\">r</mi><mi mathvariant=\"normal\">a</mi></msub><msub><mi mathvariant=\"normal\">r</mi><mi mathvariant=\"normal\">c</mi></msub></mfrac></math>"}, {"id": "ORIQQ", "text": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>1</mn><mrow><mo>(</mo><msub><mi mathvariant=\"normal\">r</mi><mi mathvariant=\"normal\">c</mi></msub><mo>+</mo><msub><mi mathvariant=\"normal\">r</mi><mi mathvariant=\"normal\">a</mi></msub><mo>)</mo></mrow></mfrac></math>"}], "ans": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mfrac><mn>1</mn><mrow><mo>(</mo><msub><mi mathvariant=\"normal\">r</mi><mi mathvariant=\"normal\">c</mi></msub><mo>+</mo><msub><mi mathvariant=\"normal\">r</mi><mi mathvariant=\"normal\">a</mi></msub><mo>)</mo></mrow></mfrac></math>", "correct": "ORIQQ"}, {"id": "695e3b3a3dc984756e9de610", "type": "singleCorrect", "html": "The tenth elements in the periodic table resemble with the", "sol": "Tenth element(Ne) belongs to the noble gas family. Hence it resembles with second element(He) which is also a noble gas.", "opts": [{"id": "78v6G", "text": "First element"}, {"id": "PIkac", "text": "Second <span style=\"line-height: 20.7999992370605px;\">element"}, {"id": "OknUi", "text": "Fourth <span style=\"line-height: 20.7999992370605px;\">element"}, {"id": "j57FW", "text": "<span style=\"line-height: 20.7999992370605px;\">Ninth element"}], "ans": "Second <span style=\"line-height: 20.7999992370605px;\">element", "correct": "PIkac"}, {"id": "695e3b3a3dc984756e9de611", "type": "singleCorrect", "html": "In which two metals in the following pairs the difference between the ionic radii is maximum?", "sol": "Covalent radii decreases on going from left to right in periods. However among the transition elements the size do not changes much because the electrons add to the pneultimate d-subshells i.e.<br/><math><mo>(</mo><mi mathvariant=\"normal\">n</mi><mo>-</mo><mn>1</mn><mo>)</mo><mi mathvariant=\"normal\"></mi><mi mathvariant=\"normal\"></mi><mi mathvariant=\"normal\">d</mi><mo>-</mo></math> subshell.", "opts": [{"id": "azQZH", "text": "<math><mi mathvariant=\"normal\">K</mi><mo>,</mo><mi mathvariant=\"normal\"></mi><mi mathvariant=\"normal\">C</mi><mi mathvariant=\"normal\">a</mi></math>"}, {"id": "r4AJa", "text": "<math><mi mathvariant=\"normal\">M</mi><mi mathvariant=\"normal\">n</mi><mo>,</mo><mi mathvariant=\"normal\"></mi><mi mathvariant=\"normal\">F</mi><mi mathvariant=\"normal\">e</mi></math>"}, {"id": "S75LE", "text": "<math><mi mathvariant=\"normal\">C</mi><mi mathvariant=\"normal\">o</mi><mo>,</mo><mi mathvariant=\"normal\"></mi><mi mathvariant=\"normal\">N</mi><mi mathvariant=\"normal\">i</mi></math>"}, {"id": "DzmlE", "text": "<math><mi mathvariant=\"normal\">C</mi><mi mathvariant=\"normal\">r</mi><mo>,</mo><mi mathvariant=\"normal\"></mi><mi mathvariant=\"normal\"></mi><mi mathvariant=\"normal\">M</mi><mi mathvariant=\"normal\">n</mi></math>"}], "ans": "<math><mi mathvariant=\"normal\">K</mi><mo>,</mo><mi mathvariant=\"normal\"></mi><mi mathvariant=\"normal\">C</mi><mi mathvariant=\"normal\">a</mi></math>", "correct": "azQZH"}, {"id": "695e3b3a3dc984756e9de612", "type": "singleCorrect", "html": "The period number and group number of Tantalum (Z = 73) are respectively", "sol": "The period number and group number of Tantalum (Z = 73) are respectively VI and 5 <br/>Electronic configuration of Tantalum <math><mo>\u2192</mo></math> <math><mo>(</mo><mi mathvariant=\"normal\">X</mi><mi mathvariant=\"normal\">e</mi><mo>)</mo><mn>4</mn><msup><mrow><mi mathvariant=\"normal\">f</mi></mrow><mrow><mn>14</mn></mrow></msup><mo>,</mo><mn>5</mn><msup><mrow><mi mathvariant=\"normal\">d</mi></mrow><mrow><mn>3</mn></mrow></msup><mo>,</mo><mn>6</mn><msup><mrow><mi mathvariant=\"normal\">s</mi></mrow><mrow><mn>2</mn></mrow></msup></math>", "opts": [{"id": "gxOKk", "text": "5, 7"}, {"id": "zECRc", "text": "6, 13"}, {"id": "gCof3", "text": "6, 5"}, {"id": "VaA3T", "text": "None of these"}], "ans": "6, 5", "correct": "gCof3"}, {"id": "695e3b3a3dc984756e9de613", "type": "singleCorrect", "html": "An element of atomic mass <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mn>40</mn></math> has <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mn>2</mn><mo>,</mo><mn>8</mn><mo>,</mo><mn>8</mn><mo>,</mo><mn>2</mn></math>&nbsp;as the electronic configuration. Which one of the following statement regarding this element is not correct ?", "sol": "The element is calcium and hence its oxide <math><mo>(</mo><mi mathvariant=\"normal\">C</mi><mi mathvariant=\"normal\">a</mi><mi mathvariant=\"normal\">O</mi><mo>)</mo></math> is basic in nature.", "opts": [{"id": "0nyCI", "text": "It forms an basic oxide"}, {"id": "kcoDA", "text": "It belongs to II A group"}, {"id": "SxQlU", "text": "It belongs to IV period"}, {"id": "MzeEW", "text": "It forms an acidic oxide"}], "ans": "It forms an acidic oxide", "correct": "MzeEW"}, {"id": "695e3b3a3dc984756e9de614", "type": "singleCorrect", "html": "The Energy needed For <math> <mrow> <mtext>Li</mtext><mfenced> <mtext>g</mtext> </mfenced><mo>\u2192</mo><mo>\u00a0</mo><msup> <mrow> <mtext>Li</mtext></mrow> <mrow> <mtext>3+</mtext></mrow> </msup> <mfenced> <mtext>g</mtext> </mfenced><mo>+</mo><mn>3</mn><msup> <mtext>e</mtext> <mo>\u2212</mo> </msup> </mrow> </math> is 19600 kJ mole<sup>-1</sup>. <math> <mrow> <mtext>Li</mtext><mfenced> <mtext>g</mtext> </mfenced><mo>=</mo><mtext>\u2009</mtext><mn>520</mn><mtext>\u2009</mtext><msup> <mrow> <mtext>kJmole</mtext></mrow> <mrow> <mo>\u2212</mo><mn>1</mn></mrow> </msup> </mrow> </math>. Calculate IE<sub>2</sub> For <math> <mrow> <mtext>Li</mtext><mfenced> <mtext>g</mtext> </mfenced></mrow> </math> .<br/>\rionisation energy of H = 13.6 eV", "sol": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mtext>Li\u00a0(g)</mtext><mo>\u2192</mo><msup><mtext>Li</mtext><msup><mrow></mrow><mrow><mo>+</mo><mn>3</mn></mrow></msup></msup><mo>+</mo><mn>3</mn><msup><mtext>e</mtext><mo>-</mo></msup><msub><mtext>\u00a0;\u00a0\u00a0\u00a0\u00a0\u00a0IP</mtext><mtext>I</mtext></msub><mo>+</mo><msub><mtext>IP</mtext><mtext>II</mtext></msub><mo>+</mo><msub><mtext>IP</mtext><mtext>III</mtext></msub><mo>=</mo><mn>203</mn><mo>\u00b7</mo><mn>1</mn><mo>\u00a0</mo><mtext>ev/species</mtext></math><br/><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mtext>Li</mtext><mo>\u2192</mo><msup><mtext>Li</mtext><mo>+</mo></msup><mtext>(g)</mtext><mo>+</mo><mn>1</mn><msup><mtext>e</mtext><mo>-</mo></msup><mtext>;\u00a0\u00a0\u00a0</mtext><mn>\u00a0\u00a0 5</mn><mo>\u00b7</mo><mn>4</mn><mtext>eV</mtext><mo>/</mo><mtext>species\u00a0</mtext><mfenced><msub><mtext>IP</mtext><mtext>I</mtext></msub></mfenced></math><br/><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msup><mtext>Li</mtext><mo>+</mo></msup><mtext>(g)</mtext><mo>\u2192</mo><msup><mtext>Li</mtext><mtext>2+</mtext></msup><mo>+</mo><mn>1</mn><msup><mtext>e</mtext><mo>-</mo></msup><mtext>; \u00a0\u00a0 \u00a0\u00a0</mtext><msub><mtext>IP</mtext><mtext>II</mtext></msub><mo>=</mo><mtext>??\u00a0</mtext></math><br/><math xmlns=\"http://www.w3.org/1998/Math/MathML\"><msup><mtext>Li</mtext><mrow><mo>+</mo><mn>2</mn></mrow></msup><mo>\u2192</mo><msup><mtext>Li</mtext><mrow><mo>+</mo><mn>3</mn><mo>\u00a0</mo></mrow></msup><msub><mtext>(g);\u00a0 \u00a0 \u00a0 IP</mtext><mtext>III</mtext></msub><mo>=</mo><msub><mtext>IE</mtext><msup><mtext>Li</mtext><mtext>2+</mtext></msup></msub><mo>=</mo><mn>1</mn><mn>3</mn><mo>\u00b7</mo><mn>6</mn><mo>\u00d7</mo><msup><mfenced><mn>3</mn></mfenced><mn>2</mn></msup><mo>\u00a0=\u00a0</mo><mtext>122.4 eV/species</mtext></math>", "opts": [{"id": "1Avmv", "text": "<math> <mrow> <mtext>75.3 eV/species</mtext> </mrow> </math>"}, {"id": "EJqIg", "text": "<math> <mrow> <mtext>25.30 eV/species</mtext> </mrow> </math>"}, {"id": "utaBR", "text": "<math> <mrow> <mtext>30.45 eV/species</mtext> </mrow> </math>"}, {"id": "FsX7W", "text": "<math> <mrow> <mtext>62.40 eV/species</mtext> </mrow> </math>"}], "ans": "<math> <mrow> <mtext>75.3 eV/species</mtext> </mrow> </math>", "correct": "1Avmv"}, {"id": "695e3b3a3dc984756e9de615", "type": "singleCorrect", "html": "The correct order of ionization energy in the following second-period elements is:", "sol": "Ionization energy increases along the period. But <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi>Be</mi><mfenced><mrow><mn>2</mn><msup><mi mathvariant=\"normal\">s</mi><mn>2</mn></msup></mrow></mfenced></math> and <math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi mathvariant=\"normal\">N</mi><mfenced><mrow><mn>2</mn><msup><mi mathvariant=\"normal\">s</mi><mn>2</mn></msup><mn>2</mn><msup><mi mathvariant=\"normal\">p</mi><mn>3</mn></msup></mrow></mfenced></math> have higher ionization energy than boron\u00a0and oxygen respectively due to stable electronic configuration (half-filled and full-filled subshells are exceptionally stable).", "opts": [{"id": "6248A", "text": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi mathvariant=\"normal\">B</mi><mo>&lt;</mo><mi>Be</mi><mo>&lt;</mo><mi mathvariant=\"normal\">C</mi><mo>&lt;</mo><mi mathvariant=\"normal\">N</mi><mo>&lt;</mo><mi mathvariant=\"normal\">O</mi></math>"}, {"id": "lTRGU", "text": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi mathvariant=\"normal\">B</mi><mo>&lt;</mo><mi>Be</mi><mo>&lt;</mo><mi mathvariant=\"normal\">N</mi><mo>&lt;</mo><mi mathvariant=\"normal\">C</mi><mo>&lt;</mo><mi mathvariant=\"normal\">O</mi></math>"}, {"id": "hlytP", "text": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi>Be</mi><mo>&gt;</mo><mi mathvariant=\"normal\">B</mi><mo>&gt;</mo><mi mathvariant=\"normal\">C</mi><mo>&gt;</mo><mi mathvariant=\"normal\">N</mi><mo>&gt;</mo><mi mathvariant=\"normal\">O</mi></math>"}, {"id": "SnkFs", "text": "<math xmlns=\"http://www.w3.org/1998/Math/MathML\"><mi mathvariant=\"normal\">B</mi><mo>&lt;</mo><mi>Be</mi><mo>&lt;</mo>
