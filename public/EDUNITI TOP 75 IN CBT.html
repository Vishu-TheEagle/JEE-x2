<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JEE MAIN 2026 – Mock Test | EDUNITI</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0a0d14;--bg2:#111520;--bg3:#181d2b;--card:#1a2035;
    --border:#2a3050;--accent:#4f8ef7;--accent2:#f7c94f;
    --green:#3ecf8e;--red:#f75d5d;--purple:#a78bfa;
    --text:#e8ecf4;--muted:#8892aa;
    --font:'IBM Plex Sans',sans-serif;--mono:'IBM Plex Mono',monospace;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;}
  .header{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
  .brand{font-family:var(--mono);font-weight:600;font-size:13px;color:var(--accent);letter-spacing:.08em;}
  .test-title{font-size:13px;color:var(--muted);}
  .header-left{display:flex;align-items:center;gap:16px;}
  .timer{font-family:var(--mono);font-size:20px;font-weight:600;color:var(--accent2);background:rgba(247,201,79,.1);border:1px solid rgba(247,201,79,.3);padding:6px 16px;border-radius:6px;letter-spacing:.05em;}
  .timer.warning{color:var(--red);background:rgba(247,93,93,.1);border-color:rgba(247,93,93,.3);animation:blink 1s infinite;}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:.6}}
  .layout{display:flex;height:calc(100vh - 56px);}
  .sidebar{width:260px;min-width:260px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
  .sidebar-header{padding:16px;border-bottom:1px solid var(--border);}
  .sidebar-title{font-size:11px;font-family:var(--mono);color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-bottom:12px;}
  .legend{display:flex;flex-wrap:wrap;gap:8px;}
  .legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted);}
  .legend-dot{width:14px;height:14px;border-radius:3px;flex-shrink:0;}
  .ld-not{background:var(--bg3);border:1px solid var(--border);}
  .ld-answered{background:var(--green);}
  .ld-marked{background:var(--purple);}
  .ld-skipped{background:var(--red);opacity:.7;}
  .q-grid{padding:12px;overflow-y:auto;flex:1;}
  .q-grid-inner{display:grid;grid-template-columns:repeat(5,1fr);gap:5px;}
  .qnum{aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:11px;font-family:var(--mono);font-weight:500;border-radius:4px;cursor:pointer;border:1px solid var(--border);background:var(--bg3);color:var(--muted);transition:all .15s;}
  .qnum:hover{border-color:var(--accent);color:var(--accent);}
  .qnum.current{border-color:var(--accent);color:var(--accent);background:rgba(79,142,247,.15);}
  .qnum.answered{background:var(--green);border-color:var(--green);color:#0a1f14;font-weight:600;}
  .qnum.marked{background:var(--purple);border-color:var(--purple);color:white;}
  .qnum.skipped{background:rgba(247,93,93,.3);border-color:var(--red);color:var(--red);}
  .sidebar-stats{padding:14px 16px;border-top:1px solid var(--border);display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
  .stat-box{text-align:center;padding:8px 4px;border-radius:6px;background:var(--bg3);}
  .stat-num{font-family:var(--mono);font-size:18px;font-weight:600;}
  .stat-label{font-size:10px;color:var(--muted);margin-top:2px;}
  .sn-ans{color:var(--green);}
  .sn-skip{color:var(--red);}
  .sn-rem{color:var(--muted);}
  .main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
  .q-nav-bar{padding:12px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--bg2);flex-wrap:wrap;gap:8px;}
  .q-counter{font-family:var(--mono);font-size:13px;color:var(--muted);}
  .q-counter span{color:var(--text);font-weight:600;}
  .nav-btns{display:flex;gap:6px;flex-wrap:wrap;}
  .btn{padding:7px 14px;font-size:13px;font-family:var(--font);border-radius:6px;cursor:pointer;font-weight:500;transition:all .15s;border:1px solid;}
  .btn-ghost{background:transparent;border-color:var(--border);color:var(--muted);}
  .btn-ghost:hover{border-color:var(--accent);color:var(--accent);}
  .btn-primary{background:var(--accent);border-color:var(--accent);color:white;}
  .btn-primary:hover{background:#3a7de0;}
  .btn-mark{background:rgba(167,139,250,.15);border-color:var(--purple);color:var(--purple);}
  .btn-mark:hover{background:rgba(167,139,250,.25);}
  .btn-submit{background:rgba(62,207,142,.15);border-color:var(--green);color:var(--green);}
  .btn-submit:hover{background:rgba(62,207,142,.25);}
  .q-area{flex:1;overflow-y:auto;padding:28px 32px;}
  .q-tag{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-family:var(--mono);color:var(--accent);background:rgba(79,142,247,.1);border:1px solid rgba(79,142,247,.3);padding:3px 10px;border-radius:4px;margin-bottom:20px;text-transform:uppercase;letter-spacing:.08em;}
  .q-text{font-size:15px;line-height:1.8;color:var(--text);margin-bottom:20px;max-width:800px;}
  .fig-wrap{margin:16px 0 24px;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:16px;display:inline-block;}
  .fig-wrap svg{display:block;}
  .options{display:flex;flex-direction:column;gap:10px;max-width:680px;}
  .option{display:flex;align-items:flex-start;gap:14px;padding:14px 18px;border:1px solid var(--border);border-radius:8px;background:var(--card);cursor:pointer;transition:all .15s;font-size:14px;line-height:1.6;}
  .option:hover{border-color:var(--accent);background:rgba(79,142,247,.05);}
  .option.selected{border-color:var(--accent);background:rgba(79,142,247,.12);}
  .option-key{width:26px;height:26px;min-width:26px;border-radius:50%;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:12px;font-weight:600;color:var(--muted);transition:all .15s;flex-shrink:0;margin-top:1px;}
  .option.selected .option-key{background:var(--accent);border-color:var(--accent);color:white;}
  .integer-input-wrap{max-width:300px;}
  .integer-label{font-size:13px;color:var(--muted);margin-bottom:10px;}
  .integer-input{width:100%;padding:14px 16px;background:var(--card);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:var(--mono);font-size:20px;font-weight:500;outline:none;transition:border .15s;}
  .integer-input:focus{border-color:var(--accent);}
  .integer-input::placeholder{color:var(--muted);font-size:14px;}
  .result-screen{display:none;flex:1;align-items:flex-start;justify-content:center;padding:40px;flex-direction:column;gap:32px;overflow-y:auto;}
  .result-card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:40px 48px;max-width:700px;width:100%;}
  .result-title{font-family:var(--mono);font-size:13px;color:var(--accent);letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px;}
  .result-score{font-size:64px;font-weight:600;color:var(--accent2);font-family:var(--mono);line-height:1;margin-bottom:4px;}
  .result-max{font-size:16px;color:var(--muted);margin-bottom:32px;}
  .result-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:28px;}
  .res-box{background:var(--card);border-radius:10px;padding:16px;text-align:center;}
  .res-num{font-size:28px;font-weight:600;font-family:var(--mono);}
  .res-lbl{font-size:12px;color:var(--muted);margin-top:4px;}
  .rn-c{color:var(--green);}
  .rn-w{color:var(--red);}
  .rn-u{color:var(--muted);}
  .result-breakdown{border-top:1px solid var(--border);padding-top:20px;}
  .rb-title{font-size:12px;color:var(--muted);margin-bottom:12px;font-family:var(--mono);letter-spacing:.08em;text-transform:uppercase;}
  .rb-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;font-size:13px;}
  .rb-qn{font-family:var(--mono);color:var(--muted);width:32px;}
  .rb-ans{flex:1;}
  .rb-correct{color:var(--green);}
  .rb-wrong{color:var(--red);}
  .rb-skip{color:var(--muted);}
  .rb-key{font-family:var(--mono);font-size:12px;background:var(--card);padding:2px 8px;border-radius:4px;}
  .rb-scroll{max-height:300px;overflow-y:auto;}
  .btn-retake{margin-top:24px;padding:12px 32px;font-size:14px;}
  ::-webkit-scrollbar{width:5px;}
  ::-webkit-scrollbar-track{background:var(--bg);}
  ::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
  @keyframes fadein{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  .svg-label{fill:#8892aa;font-family:'IBM Plex Sans',sans-serif;font-size:12px;}
  .svg-label-white{fill:#e8ecf4;font-family:'IBM Plex Sans',sans-serif;font-size:12px;}
  .svg-line{stroke:#4f8ef7;stroke-width:1.5;fill:none;}
  .svg-arrow{stroke:#4f8ef7;stroke-width:1.5;fill:#4f8ef7;}
</style>
</head>

// STATE
let current=0,userAnswers={},marked=new Set(),visited=new Set(),timerInterval,totalSecs=3*3600,submitted=false;

function startTimer(){
  timerInterval=setInterval(()=>{
    if(submitted){clearInterval(timerInterval);return;}
    totalSecs--;
    const h=String(Math.floor(totalSecs/3600)).padStart(2,'0');
    const m=String(Math.floor((totalSecs%3600)/60)).padStart(2,'0');
    const s=String(totalSecs%60).padStart(2,'0');
    const el=document.getElementById('timer');
    el.textContent=`${h}:${m}:${s}`;
    if(totalSecs<=600)el.classList.add('warning');
    if(totalSecs<=0){clearInterval(timerInterval);submitTest();}
  },1000);
}

function renderPalette(){
  const pal=document.getElementById('qpalette');
  pal.innerHTML='';
  questions.forEach((q,i)=>{
    const d=document.createElement('div');
    d.className='qnum';
    d.textContent=i+1;
    if(i===current)d.classList.add('current');
    if(marked.has(q.id))d.classList.add('marked');
    else if(userAnswers[q.id]!==undefined)d.classList.add('answered');
    else if(visited.has(q.id)&&i!==current)d.classList.add('skipped');
    d.onclick=()=>goTo(i);
    pal.appendChild(d);
  });
  const ans=Object.keys(userAnswers).length;
  const skip=[...visited].filter(id=>userAnswers[id]===undefined&&!marked.has(id)).length;
  document.getElementById('s-ans').textContent=ans;
  document.getElementById('s-skip').textContent=skip;
  document.getElementById('s-rem').textContent=75-ans-skip;
  document.getElementById('qcur').textContent=current+1;
}

function renderQuestion(){
  const q=questions[current];
  visited.add(q.id);
  const area=document.getElementById('q-area');
  area.style.animation='none';area.offsetHeight;area.style.animation='fadein 0.2s';
  const typeLabel=q.type==='mcq'?'MCQ · +4 / −1':'Integer Type · +4 / 0';
  let html=`<div class="q-tag">${typeLabel}</div>`;
  html+=`<div class="q-text">${q.text}</div>`;
  if(q.fig&&figs[q.fig]){
    html+=`<div class="fig-wrap">${figs[q.fig]}</div>`;
  }
  if(q.type==='mcq'){
    html+='<div class="options">';
    const keys=['A','B','C','D'];
    q.opts.forEach((opt,i)=>{
      const sel=userAnswers[q.id]===String(i+1)?'selected':'';
      html+=`<div class="option ${sel}" onclick="selectOpt(${i+1})"><div class="option-key">${keys[i]}</div><div>${opt}</div></div>`;
    });
    html+='</div>';
  } else {
    const val=userAnswers[q.id]||'';
    html+=`<div class="integer-input-wrap"><div class="integer-label">Enter your answer (numerical value):</div><input type="number" class="integer-input" id="int-inp" placeholder="Type answer..." value="${val}" oninput="saveInteger(this.value)" onkeydown="if(event.key==='Enter')nextQ()"></div>`;
  }
  area.innerHTML=html;
  if(q.type==='integer')setTimeout(()=>{const el=document.getElementById('int-inp');if(el)el.focus();},50);
  renderPalette();
}

function selectOpt(n){const q=questions[current];userAnswers[q.id]=String(n);renderQuestion();}
function saveInteger(val){const q=questions[current];if(val.trim()==='')delete userAnswers[q.id];else userAnswers[q.id]=val.trim();renderPalette();}
function goTo(i){current=i;renderQuestion();}
function nextQ(){if(current<74){current++;renderQuestion();}}
function prevQ(){if(current>0){current--;renderQuestion();}}
function markReview(){const q=questions[current];if(marked.has(q.id))marked.delete(q.id);else marked.add(q.id);renderPalette();}
function clearResponse(){const q=questions[current];delete userAnswers[q.id];renderQuestion();}

function confirmSubmit(){
  const ans=Object.keys(userAnswers).length;
  if(confirm(`You have answered ${ans} out of 75 questions.\nSubmit the test?`))submitTest();
}

function submitTest(){
  if(submitted)return;
  submitted=true;
  clearInterval(timerInterval);
  let correct=0,wrong=0,unattempted=0;
  const details=[];
  questions.forEach(q=>{
    const ua=userAnswers[q.id];
    const key=answerKey[q.id];
    const isCorrect=ua!==undefined&&ua.toString().toLowerCase()===key.toString().toLowerCase();
    const isWrong=ua!==undefined&&!isCorrect;
    if(isCorrect)correct++;
    else if(isWrong)wrong++;
    else unattempted++;
    details.push({id:q.id,ua,key,isCorrect,isWrong});
  });
  const score=correct*4-wrong*1;
  document.getElementById('q-area').style.display='none';
  const rs=document.getElementById('result-screen');
  rs.style.display='flex';
  const detailRows=details.map(d=>{
    let cls='rb-skip',label='Not attempted';
    if(d.isCorrect){cls='rb-correct';label=`Your ans: ${d.ua} ✓`;}
    else if(d.isWrong){cls='rb-wrong';label=`Your ans: ${d.ua} ✗`;}
    return `<div class="rb-row"><div class="rb-qn">Q${d.id}</div><div class="rb-ans ${cls}">${label}</div><div class="rb-key">Key: ${d.key}</div></div>`;
  }).join('');
  rs.innerHTML=`<div class="result-card">
    <div class="result-title">Test Complete — JEE MAIN 2026 Part 2</div>
    <div class="result-score">${score}</div>
    <div class="result-max">out of 300 marks &nbsp;·&nbsp; +4/−1 scoring</div>
    <div class="result-grid">
      <div class="res-box"><div class="res-num rn-c">${correct}</div><div class="res-lbl">Correct (+4)</div></div>
      <div class="res-box"><div class="res-num rn-w">${wrong}</div><div class="res-lbl">Wrong (−1)</div></div>
      <div class="res-box"><div class="res-num rn-u">${unattempted}</div><div class="res-lbl">Unattempted</div></div>
    </div>
    <div class="result-breakdown">
      <div class="rb-title">Answer Review</div>
      <div class="rb-scroll">${detailRows}</div>
    </div>
    <button class="btn btn-primary btn-retake" onclick="retake()">Retake Test</button>
  </div>`;
}

function retake(){
  userAnswers={};marked.clear();visited.clear();
  current=0;submitted=false;totalSecs=3*3600;
  document.getElementById('q-area').style.display='';
  document.getElementById('result-screen').style.display='none';
  document.getElementById('timer').classList.remove('warning');
  document.getElementById('timer').textContent='03:00:00';
  renderQuestion();startTimer();
}

renderQuestion();
startTimer();
</script>
</body>
